// ── Rooms ──
async function dbLoadRooms() {
  try { const {data} = await supabase.from('rooms').select('*').order('created_at'); return data||[]; }
  catch { return []; }
}
async function dbSaveRoom(slug, name, tipo) {
  try { await supabase.from('rooms').upsert({slug,name,tipo}); } catch {}
}
async function dbDeleteRoom(slug) {
  try { await supabase.from('rooms').delete().eq('slug',slug); } catch {}
}

// ── Retros (auto-save model) ──
async function dbGetActiveRetro(sala) {
  try {
    const {data} = await supabase.from('retros')
      .select('*').eq('sala',sala).eq('status','active')
      .order('created_at',{ascending:false}).limit(1);
    return data?.[0] || null;
  } catch { return null; }
}
async function dbCreateRetro(sala, tipo, userId) {
  try {
    const {data} = await supabase.from('retros')
      .insert({sala, tipo, status:'active', data:{}, created_by:userId})
      .select().single();
    return data;
  } catch { return null; }
}
async function dbAutoSave(retroId, stateData) {
  if (!retroId) return false;
  try {
    const {error} = await supabase.from('retros')
      .update({data:stateData, updated_at:new Date().toISOString()})
      .eq('id',retroId);
    return !error;
  } catch { return false; }
}
async function dbCloseRetro(retroId) {
  if (!retroId) return;
  try {
    await supabase.from('retros')
      .update({status:'closed', updated_at:new Date().toISOString()})
      .eq('id',retroId);
  } catch {}
}
async function dbGetRetrosForSala(sala) {
  try {
    const {data} = await supabase.from('retros')
      .select('id,sala,tipo,status,created_at,updated_at,data')
      .eq('sala',sala).order('created_at',{ascending:false}).limit(30);
    return data||[];
  } catch { return []; }
}
async function dbGetAllRetros() {
  try {
    const {data} = await supabase.from('retros')
      .select('id,sala,tipo,status,created_at,updated_at,data')
      .order('created_at',{ascending:false});
    return data||[];
  } catch { return []; }
}

// ── Risks (persist across retros) ──
async function dbLoadRisks(sala) {
  try {
    const {data} = await supabase.from('risks').select('*').eq('sala',sala).order('created_at');
    if (!data) return [];
    return data.map(r=>({
      id:r.id, text:r.text, mitigation:r.mitigation||'', owner:r.owner||'Sin asignar',
      status:r.status||'open', impactVotes:r.impact_votes||{}, probVotes:r.prob_votes||{},
      fromNote:r.from_note, createdBy:r.created_by,
    }));
  } catch { return []; }
}
async function dbUpsertRisk(sala, risk) {
  try {
    await supabase.from('risks').upsert({
      id:risk.id, sala, text:risk.text, mitigation:risk.mitigation||'',
      owner:risk.owner||'Sin asignar', status:risk.status||'open',
      impact_votes:risk.impactVotes||{}, prob_votes:risk.probVotes||{},
      from_note:risk.fromNote||null, created_by:risk.createdBy||null,
    });
  } catch {}
}
async function dbDeleteRisk(id) {
  try { await supabase.from('risks').delete().eq('id',id); } catch {}
}

const getUser  = () => { try { return JSON.parse(localStorage.getItem('revelio_user')); } catch { return null; } };

/* ══════════════════════════════════════════════
   REALTIME HOOK WITH AUTO-SAVE
══════════════════════════════════════════════ */
function useRealtime(user) {
  const [retroId,   setRetroId]   = useState(null);
  const [lastSaved, setLastSaved] = useState(null);
  const [saving,    setSaving]    = useState(false);
  const [online,    setOnline]    = useState({});
  const [cursors,   setCursors]   = useState({});
  const [risks,     setRisks]     = useState([]);

  const tpl = TASK_TEMPLATES[TIPO] || TASK_TEMPLATES.agile;
  const [state, setState] = useState({
    notes:[], tasks:mkTasks(TIPO), actions:[], obj:{text:'',met:null}
  });

  const chRef  = useRef(null);
  const stRef  = useRef(state);
  const ridRef = useRef(retroId);
  const timer  = useRef(null);
  stRef.current  = state;
  ridRef.current = retroId;

  // ── Load active retro + risks on mount ──
  useEffect(() => {
    if (!user) return;
    (async () => {
      const [retro, loadedRisks] = await Promise.all([
        dbGetActiveRetro(SALA),
        dbLoadRisks(SALA),
      ]);
      let rid = retro?.id;
      if (!retro) {
        const created = await dbCreateRetro(SALA, TIPO, user.id);
        rid = created?.id;
      } else if (retro.data && Object.keys(retro.data).length > 0) {
        setState(prev => ({...prev, ...retro.data,
          // Ensure tasks exist even if not in saved data
          tasks: retro.data.tasks?.length ? retro.data.tasks : prev.tasks,
        }));
        setLastSaved(retro.updated_at || retro.created_at);
      }
      if (rid) setRetroId(rid);
      setRisks(loadedRisks);
    })();
  }, [user]);

  // ── Debounced auto-save (2s after last change) ──
  useEffect(() => {
    if (!retroId) return;
    clearTimeout(timer.current);
    timer.current = setTimeout(async () => {
      setSaving(true);
      const ok = await dbAutoSave(retroId, stRef.current);
      setSaving(false);
      if (ok) setLastSaved(new Date().toISOString());
    }, 2000);
    return () => clearTimeout(timer.current);
  }, [state, retroId]);

  // ── Supabase Realtime channel ──
  useEffect(() => {
    if (!user) return;
    const ch = supabase.channel(`revelio-${SALA}`, {config:{presence:{key:user.id}}});

    ch.on('presence', {event:'sync'}, () => {
      const ps = ch.presenceState();
      const u = {};
      Object.entries(ps).forEach(([k,arr]) => {
        if (arr.length > 0) u[k] = {name:arr[0].name, avatar:arr[0].avatar, color:arr[0].color};
      });
      setOnline(u);
    });

    ch.on('broadcast', {event:'cursor'}, ({payload}) => {
      if (payload.id === user.id) return;
      setCursors(prev => ({...prev, [payload.id]:{x:payload.x, y:payload.y, name:payload.name, avatar:payload.avatar, color:payload.color}}));
      // Remove cursor after 4s inactivity
      clearTimeout(window['__ct_'+payload.id]);
      window['__ct_'+payload.id] = setTimeout(() => setCursors(prev => { const n={...prev}; delete n[payload.id]; return n; }), 4000);
    });

    ch.on('broadcast', {event:'sync'}, ({payload}) => {
      if (payload.from === user.id) return;
      if (payload.key === 'risks') {
        setRisks(payload.data);
      } else {
        setState(prev => ({...prev, [payload.key]: payload.data}));
      }
    });

    ch.on('broadcast', {event:'req'}, ({payload}) => {
      if (payload.from === user.id) return;
      const s = stRef.current;
      Object.keys(s).forEach(k =>
        ch.send({type:'broadcast', event:'sync', payload:{key:k, data:s[k], from:user.id}})
      );
    });

    ch.subscribe(async (status) => {
      if (status === 'SUBSCRIBED') {
        await ch.track({name:user.name, avatar:user.avatar, color:user.color});
        setTimeout(() => ch.send({type:'broadcast', event:'req', payload:{from:user.id}}), 700);
      }
    });

    chRef.current = ch;
    return () => { clearTimeout(timer.current); supabase.removeChannel(ch); };
  }, [user]);

  // ── Broadcast state update ──
  const upd = useCallback((key, data) => {
    setState(prev => ({...prev, [key]:data}));
    chRef.current?.send({type:'broadcast', event:'sync', payload:{key, data, from:user?.id}});
  }, [user]);

  // ── Broadcast risk update ──
  const updRisk = useCallback((newRisks) => {
    setRisks(newRisks);
    chRef.current?.send({type:'broadcast', event:'sync', payload:{key:'risks', data:newRisks, from:user?.id}});
  }, [user]);

  // ── Cursor broadcast ──
  const moveCursor = useCallback((x, y) => {
    chRef.current?.send({type:'broadcast', event:'cursor', payload:{id:user?.id, x, y, name:user?.name, avatar:user?.avatar, color:user?.color}});
  }, [user]);

  // ── New retro ──
  const newRetro = useCallback(async () => {
    await dbCloseRetro(ridRef.current);
    const fresh = await dbCreateRetro(SALA, TIPO, user?.id);
    if (fresh) {
      setRetroId(fresh.id);
      setLastSaved(null);
      const freshState = {notes:[], tasks:mkTasks(TIPO), actions:[], obj:{text:'',met:null}};
      setState(freshState);
      ['notes','tasks','actions','obj'].forEach(k =>
        chRef.current?.send({type:'broadcast', event:'sync', payload:{key:k, data:freshState[k], from:user?.id}})
      );
    }
    return !!fresh;
  }, [user]);

  return { state, upd, risks, updRisk, moveCursor, retroId, saving, lastSaved, online, cursors, newRetro };
}

            ✨ Entrar como ${stored.name}
          </button>
          <button onClick=${()=>{localStorage.removeItem('revelio_user');location.reload();}} style=${{background:'none',border:'none',color:'#86868B',fontSize:13,cursor:'pointer'}}>
            Cambiar usuario

  return html`

      <div class="card" style=${{maxWidth:360,width:'90%',padding:32,animation:'fadeInScale .3s ease'}}>
        <div style=${{textAlign:'center',marginBottom:20}}>
          <div style=${{fontFamily:"'Comfortaa',sans-serif",fontSize:26,background:'linear-gradient(90deg,#007AFF,#5856D6)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>revelio</div>
          <p style=${{color:'#86868B',fontSize:12,marginTop:4}}>Sala: <b>${SALA}</b> · ${(TASK_TEMPLATES[TIPO]||TASK_TEMPLATES.agile).icon} ${(TASK_TEMPLATES[TIPO]||TASK_TEMPLATES.agile).label}</p>
        </div>
        <div style=${{display:'flex',gap:6,flexWrap:'wrap',justifyContent:'center',marginBottom:14}}>
          ${AVATARS.map(a => html`
            <button key=${a} onClick=${()=>setAv(a)} style=${{fontSize:20,cursor:'pointer',border:av===a?'2px solid #007AFF':'2px solid transparent',borderRadius:8,padding:'3px 5px',background:'none',transition:'border-color .15s'}}>
              ${a}
            </button>
          `)}
        </div>
        <div style=${{display:'flex',gap:6,justifyContent:'center',marginBottom:14}}>
          ${COLORS.map(c => html`
            <button key=${c} onClick=${()=>setCol(c)} style=${{width:22,height:22,borderRadius:'50%',background:c,border:col===c?'3px solid #1D1D1F':'3px solid transparent',cursor:'pointer',transition:'border-color .15s'}}></button>

  const [toast,        setToast]       = useState(null);
  const tipoInfo = TASK_TEMPLATES[TIPO] || TASK_TEMPLATES.agile;

  const showMsg = (msg) => { setToast(msg); setTimeout(()=>setToast(null), 2600); };

  const handleNewRetro = async () => {
    const ok = await newRetro();
    setNewRetroModal(false);
    if (ok) showMsg('🆕 Nueva retro iniciada');
  };

  const onlineArr = Object.entries(online).map(([k,v])=>({id:k,...v}));

  const content = () => {
    switch (phase) {
      case 'review':     return html`<${PhaseReview}     state=${state} upd=${upd} user=${user} showMsg=${showMsg} />`;

function PhaseReview({ state, upd, user, showMsg }) {

  const pct  = tasks.length ? Math.round(done/tasks.length*100) : 0;
  const [nt, setNt] = useState('');

  const toggle = id => upd('tasks', tasks.map(t=>t.id===id?{...t,done:!t.done}:t));
  const del    = id => upd('tasks', tasks.filter(t=>t.id!==id));
  const add    = () => { if (!nt.trim()) return; upd('tasks',[...tasks,{id:uid(),text:nt.trim(),done:false}]); setNt(''); };
  const setObj = (field,val) => upd('obj',{...obj,[field]:val});

  return html`
    <div style=${{maxWidth:680,margin:'0 auto',display:'flex',flexDirection:'column',gap:12}}>
      <div class="card">
        <h3 style=${{fontSize:14,fontWeight:700,marginBottom:10}}>🎯 Objetivo del Sprint</h3>
        <textarea value=${obj.text||''} onInput=${e=>setObj('text',e.target.value)} placeholder="¿Cuál era el objetivo del sprint?" rows=2
          style=${{width:'100%',padding:'10px 12px',borderRadius:10,border:'1.5px solid #E5E5EA',fontSize:13,resize:'none',outline:'none',fontFamily:'inherit',lineHeight:1.5}} />
        <div style=${{display:'flex',gap:8,marginTop:8}}>
          ${[['met','✅ Cumplido','#34C759'],['partial','⚠️ Parcial','#FF9500'],['unmet','❌ No cumplido','#FF3B30']].map(([v,l,c])=>html`
            <button key=${v} onClick=${()=>setObj('met',obj.met===v?null:v)} style=${{
              flex:1,padding:'7px',borderRadius:10,border:obj.met===v?`2px solid ${c}`:'2px solid #E5E5EA',
              background:obj.met===v?c+'18':'#FFF',color:obj.met===v?c:'#86868B',fontSize:11,fontWeight:600,cursor:'pointer',transition:'all .15s'
            }}>${l}</button>
          `)}
        </div>
      </div>

      <div class="card">
        <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <h3 style=${{fontSize:14,fontWeight:700}}>📋 Tareas del Sprint</h3>
          <span style=${{fontSize:13,fontWeight:700,color:pct===100?'#34C759':'#007AFF'}}>${done}/${tasks.length} · ${pct}%</span>
        </div>
        <div style=${{height:7,background:'#F2F2F7',borderRadius:4,marginBottom:12,overflow:'hidden'}}>
          <div style=${{height:'100%',width:pct+'%',background:pct===100?'#34C759':'linear-gradient(90deg,#007AFF,#5856D6)',borderRadius:4,transition:'width .4s ease'}}></div>
        </div>
        ${tasks.map(t => html`
          <div key=${t.id} style=${{display:'flex',alignItems:'center',gap:10,padding:'7px 0',borderBottom:'1px solid #F2F2F7',cursor:'pointer'}} onClick=${()=>toggle(t.id)}>
            <div style=${{width:20,height:20,borderRadius:6,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',border:t.done?'none':'2px solid #C7C7CC',background:t.done?'#34C759':'transparent',transition:'all .15s'}}>
              ${t.done && html`<span style=${{color:'#FFF',fontSize:11,fontWeight:700}}>✓</span>`}
            </div>
            <span style=${{flex:1,fontSize:13,textDecoration:t.done?'line-through':'none',color:t.done?'#86868B':'#1D1D1F',transition:'color .15s'}}>${t.text}</span>

    </div>`;
}

/* ══════════════════════════════════════════════
   PHASE: NOTES  (drag-drop + inline edit)
══════════════════════════════════════════════ */
function PhaseNotes({ state, upd, user, showMsg }) {
  const { notes } = state;
  const [cat,    setCat]    = useState('good');
  const [text,   setText]   = useState('');
  const [editId, setEditId] = useState(null);
  const [editTx, setEditTx] = useState('');
  const [dragId, setDragId] = useState(null);
  const [overCat,setOverCat]= useState(null);

  const add = () => {
    if (!text.trim()) return;
    const n = {id:uid(), text:text.trim(), category:cat, userId:user.id, userName:user.name,
               userAvatar:user.avatar, userColor:user.color, voters:[], reactions:{}};
    upd('notes', [...notes, n]);
    setText('');
    showMsg('📝 Nota añadida ✨');
  };

  const vote = id => {
    upd('notes', notes.map(n => {
      if (n.id !== id) return n;
      const vs = n.voters||[];
      return {...n, voters: vs.includes(user.id) ? vs.filter(v=>v!==user.id) : [...vs,user.id]};
    }));
  };

  const react = (id, emoji) => {
    upd('notes', notes.map(n => {
      if (n.id !== id) return n;
      const rs = {...(n.reactions||{})};
      if (!rs[emoji]) rs[emoji] = [];
      rs[emoji] = rs[emoji].includes(user.id) ? rs[emoji].filter(i=>i!==user.id) : [...rs[emoji],user.id];
      if (!rs[emoji].length) delete rs[emoji];
      return {...n, reactions:rs};
    }));
  };

  const del  = id => upd('notes', notes.filter(n=>n.id!==id));

  const startEdit = (n) => { setEditId(n.id); setEditTx(n.text); };
  const saveEdit  = (id) => {
    if (editTx.trim()) upd('notes', notes.map(n=>n.id===id?{...n,text:editTx.trim()}:n));
    setEditId(null);
  };

  // ── Drag & Drop handlers ──
  const onDragStart = (e, id) => { setDragId(id); e.dataTransfer.effectAllowed='move'; };
  const onDragOver  = (e, catId) => { e.preventDefault(); setOverCat(catId); };
  const onDragLeave = () => setOverCat(null);
  const onDrop      = (e, targetCat) => {
    e.preventDefault();
    if (dragId && targetCat) {
      upd('notes', notes.map(n => n.id===dragId ? {...n, category:targetCat} : n));
      showMsg('🔀 Nota movida');
    }
    setDragId(null); setOverCat(null);
  };
  const onDragEnd = () => { setDragId(null); setOverCat(null); };

  return html`
    <div style=${{maxWidth:960,margin:'0 auto'}}>
      <!-- Input -->
      <div class="card" style=${{marginBottom:14}}>
        <div style=${{display:'flex',gap:7,marginBottom:10}}>
          ${CATS.map(c => html`
            <button key=${c.id} onClick=${()=>setCat(c.id)} style=${{
              flex:1,padding:'7px 4px',borderRadius:10,border:cat===c.id?`2px solid ${c.color}`:'2px solid #E5E5EA',
              background:cat===c.id?c.bg:'#FFF',color:cat===c.id?c.color:'#86868B',fontSize:11,fontWeight:600,cursor:'pointer',transition:'all .15s'
            }}>${c.emoji} ${c.label}</button>
          `)}
        </div>
        <div style=${{display:'flex',gap:8}}>
          <textarea value=${text} onInput=${e=>setText(e.target.value)} placeholder="Escribe tu nota… (Enter para añadir)" rows=2
            onKeyDown=${e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();add();}}}
            style=${{flex:1,padding:'10px 12px',borderRadius:10,border:'1.5px solid #E5E5EA',fontSize:13,resize:'none',outline:'none',fontFamily:'inherit'}} />
          <button onClick=${add} style=${{padding:'0 18px',background:'linear-gradient(135deg,#007AFF,#5856D6)',color:'#FFF',border:'none',borderRadius:10,cursor:'pointer',fontWeight:700,fontSize:18}}>+</button>
        </div>
        <p style=${{fontSize:10,color:'#C7C7CC',marginTop:5}}>💡 Arrastra las notas entre columnas · Doble clic para editar</p>
      </div>

      <!-- Columns -->
      <div style=${{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:12}}>
        ${CATS.map(c => {
          const cn = [...notes.filter(n=>n.category===c.id)].sort((a,b)=>(b.voters?.length||0)-(a.voters?.length||0));
          const isOver = overCat===c.id;
          return html`
            <div key=${c.id}
              onDragOver=${e=>onDragOver(e,c.id)}
              onDragLeave=${onDragLeave}
              onDrop=${e=>onDrop(e,c.id)}
              style=${{
                background:isOver?c.color+'18':c.bg,
                borderRadius:14,padding:13,
                border:isOver?`2px dashed ${c.color}`:`1.5px solid ${c.color}28`,
                transition:'all .15s', minHeight:120,
              }}>
              <div style=${{display:'flex',alignItems:'center',gap:6,marginBottom:10}}>
                <span style=${{fontSize:15}}>${c.emoji}</span>
                <span style=${{fontWeight:700,color:c.color,fontSize:12}}>${c.label}</span>
                <span style=${{marginLeft:'auto',background:c.color+'20',color:c.color,fontSize:10,fontWeight:700,padding:'1px 7px',borderRadius:6}}>${cn.length}</span>
              </div>

              ${cn.map(n => html`
                <div key=${n.id}
                  draggable=${true}
                  onDragStart=${e=>onDragStart(e,n.id)}
                  onDragEnd=${onDragEnd}
                  class="hl"
                  style=${{
                    background:dragId===n.id?'#F2F2F7':'#FFF',
                    borderRadius:10,padding:10,marginBottom:8,
                    boxShadow:'0 1px 4px rgba(0,0,0,.05)',
                    cursor:'grab',opacity:dragId===n.id?.5:1,
                    transition:'opacity .15s',
                  }}>
                  <!-- Edit mode -->
                  ${editId===n.id
                    ? html`
                      <textarea value=${editTx} onInput=${e=>setEditTx(e.target.value)}
                        onKeyDown=${e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();saveEdit(n.id);}if(e.key==='Escape')setEditId(null);}}
                        onBlur=${()=>saveEdit(n.id)} autoFocus rows=2
                        style=${{width:'100%',padding:'6px 8px',borderRadius:8,border:`1.5px solid ${c.color}`,fontSize:12,resize:'none',outline:'none',fontFamily:'inherit',marginBottom:4}} />`
                    : html`<p onDblClick=${()=>startEdit(n)} style=${{fontSize:12,lineHeight:1.45,marginBottom:6,cursor:'text'}}>${n.text}</p>`
                  }

                  <div style=${{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap'}}>
                    <span style=${{fontSize:11}}>${n.userAvatar}</span>
                    <span style=${{fontSize:10,color:'#86868B'}}>${n.userName}</span>
                    <button onClick=${()=>vote(n.id)} style=${{
                      marginLeft:'auto',padding:'2px 8px',borderRadius:6,border:'none',fontSize:10,fontWeight:700,cursor:'pointer',
                      background:(n.voters||[]).includes(user.id)?c.color+'22':'#F2F2F7',
                      color:(n.voters||[]).includes(user.id)?c.color:'#86868B',
                    }}>▲ ${n.voters?.length||0}</button>
                    ${n.userId===user.id && html`
                      <button onClick=${()=>startEdit(n)} style=${{background:'none',border:'none',cursor:'pointer',fontSize:11,color:'#86868B'}} title="Editar">✏️</button>
                      <button onClick=${()=>del(n.id)} style=${{background:'none',border:'none',cursor:'pointer',fontSize:11,color:'#C7C7CC'}} title="Eliminar">✕</button>
                    `}
                  </div>
                  <div style=${{display:'flex',gap:3,marginTop:5,flexWrap:'wrap'}}>
                    ${EMOJIS.map(e => html`
                      <button key=${e} onClick=${()=>react(n.id,e)} style=${{
                        padding:'1px 5px',borderRadius:5,border:'none',cursor:'pointer',fontSize:10,
                        background:(n.reactions?.[e]||[]).includes(user.id)?c.color+'22':'#F2F2F7',
                      }}>${e}${(n.reactions?.[e]||[]).length>0?' '+n.reactions[e].length:''}</button>
                    `)}
                  </div>
                </div>
              `)}

              ${cn.length===0 && html`
                <div style=${{textAlign:'center',padding:'16px 0',color:c.color,opacity:.4,fontSize:12,border:`1.5px dashed ${c.color}40`,borderRadius:8}}>
                  Suelta aquí · ${c.emoji}
                </div>
              `}
            </div>`;
        })}
      </div>
    </div>`;
}

function PhaseDiscuss({ state, upd, user, risks, updRisk, showMsg }) {
  const { notes } = state;

    dbUpsertRisk(SALA, r);

  return html`

              <div style=${{fontWeight:800,fontSize:13,color:'#C7C7CC',minWidth:18,paddingTop:2}}>${i+1}</div>
              <div style=${{flex:1}}>
                <div style=${{display:'flex',gap:5,marginBottom:4,alignItems:'center'}}>
                  <span style=${{background:cat.bg,color:cat.color,fontSize:10,padding:'1px 6px',borderRadius:4,fontWeight:700}}>${cat.emoji} ${cat.label}</span>

              <div style=${{display:'flex',flexDirection:'column',gap:4}}>

                <button onClick=${()=>toAction(n)} style=${{padding:'4px 8px',borderRadius:7,border:'1px solid #007AFF',color:'#007AFF',background:'#EBF5FF',fontSize:10,cursor:'pointer',fontWeight:600,whiteSpace:'nowrap'}}>🎯 Acción</button>
              </div>
            </div>`;
        })}

    </div>`;
}

/* ══════════════════════════════════════════════
   PHASE: RISKS
══════════════════════════════════════════════ */
function PhaseRisks({ risks, updRisk, user, showMsg }) {
  const [newText, setNewText] = useState('');
  const [editId,  setEditId]  = useState(null);

  const add = () => {
    if (!newText.trim()) return;
    const r = {id:uid(), text:newText.trim(), mitigation:'', owner:'Sin asignar', status:'open', impactVotes:{}, probVotes:{}, createdBy:user.id};
    const nr = [...risks, r];
    updRisk(nr);
    dbUpsertRisk(SALA, r);
    setNewText('');
    showMsg('⚠️ Riesgo añadido');
  };

  const upd = (id, field, val) => {
    const nr = risks.map(r=>r.id===id?{...r,[field]:val}:r);
    updRisk(nr);
    const r = nr.find(r=>r.id===id);
    if (r) dbUpsertRisk(SALA, r);
  };

  const vote = (id, field, val) => {
    const nr = risks.map(r => {
      if (r.id!==id) return r;
      const vs = {...(r[field]||{})};
      vs[user.id] = val;
      return {...r, [field]:vs};
    });
    updRisk(nr);
    const r = nr.find(r=>r.id===id);
    if (r) dbUpsertRisk(SALA, r);
  };

  const close = id => {
    const nr = risks.map(r=>r.id===id?{...r,status:'mitigated'}:r);
    updRisk(nr);
    dbUpsertRisk(SALA, nr.find(r=>r.id===id));
    showMsg('✅ Riesgo mitigado');
  };

  const del = id => { updRisk(risks.filter(r=>r.id!==id)); dbDeleteRisk(id); showMsg('🗑️ Riesgo eliminado'); };

  const avg = v => { const vs=Object.values(v||{}); return vs.length?Math.round(vs.reduce((a,b)=>a+b,0)/vs.length):0; };
  const scoreColor = s => s>=15?'#FF3B30':s>=6?'#FF9500':'#34C759';

  const open = risks.filter(r=>r.status==='open');
  const mit  = risks.filter(r=>r.status==='mitigated');

  return html`
    <div style=${{maxWidth:780,margin:'0 auto'}}>
      <div style=${{display:'flex',gap:8,marginBottom:12}}>
        <input value=${newText} onInput=${e=>setNewText(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&add()}

      </div>
      ${open.map(r => {
        const ai = avg(r.impactVotes), ap = avg(r.probVotes), score = ai*ap;
        const sc  = scoreColor(score);
        return html`
          <div key=${r.id} class="hl" style=${{background:'#FFF',borderRadius:14,padding:15,marginBottom:10,boxShadow:'0 2px 10px rgba(0,0,0,.05)',borderLeft:`4px solid ${sc}`}}>
            <div style=${{display:'flex',gap:12,alignItems:'flex-start'}}>
              <div style=${{flex:1}}>
                ${editId===r.id
                  ? html`<input value=${r.text} onInput=${e=>upd(r.id,'text',e.target.value)} onBlur=${()=>setEditId(null)} autoFocus
                      style=${{width:'100%',padding:'4px 8px',borderRadius:6,border:'1px solid #E5E5EA',fontSize:13,outline:'none',fontFamily:'inherit'}} />`
                  : html`<p style=${{fontSize:13,fontWeight:600,marginBottom:6,cursor:'text'}} onDblClick=${()=>setEditId(r.id)}>${r.text} <span style=${{fontSize:10,color:'#86868B',fontWeight:400}}>dbl-clic para editar</span></p>`
                }
                <div style=${{display:'flex',gap:6,marginBottom:6,flexWrap:'wrap',alignItems:'center'}}>
                  <span style=${{fontSize:10,color:'#86868B',fontWeight:600}}>Impacto:</span>
                  ${[1,2,3,4,5].map(v=>html`<button key=${v} onClick=${()=>vote(r.id,'impactVotes',v)} style=${{width:22,height:22,borderRadius:5,border:'none',cursor:'pointer',fontSize:10,fontWeight:700,background:r.impactVotes?.[user.id]===v?'#FF3B30':'#F2F2F7',color:r.impactVotes?.[user.id]===v?'#FFF':'#86868B'}}>${v}</button>`)}
                  <span style=${{fontSize:10,color:'#86868B',marginLeft:2}}>avg: ${ai}</span>
                  <span style=${{fontSize:10,color:'#86868B',fontWeight:600,marginLeft:8}}>Prob:</span>
                  ${[1,2,3,4,5].map(v=>html`<button key=${v} onClick=${()=>vote(r.id,'probVotes',v)} style=${{width:22,height:22,borderRadius:5,border:'none',cursor:'pointer',fontSize:10,fontWeight:700,background:r.probVotes?.[user.id]===v?'#5856D6':'#F2F2F7',color:r.probVotes?.[user.id]===v?'#FFF':'#86868B'}}>${v}</button>`)}
                  <span style=${{fontSize:10,color:'#86868B',marginLeft:2}}>avg: ${ap}</span>
                </div>
                <input value=${r.mitigation||''} onInput=${e=>upd(r.id,'mitigation',e.target.value)} placeholder="Plan de mitigación…"
                  style=${{width:'100%',padding:'5px 10px',borderRadius:8,border:'1px solid #E5E5EA',fontSize:12,outline:'none',marginBottom:5}} />
                <div style=${{display:'flex',alignItems:'center',gap:6}}>
                  <span style=${{fontSize:10,color:'#86868B'}}>Responsable:</span>
                  <input value=${r.owner||''} onInput=${e=>upd(r.id,'owner',e.target.value)} placeholder="Sin asignar"
                    style=${{padding:'3px 8px',borderRadius:6,border:'1px solid #E5E5EA',fontSize:11,outline:'none',width:130}} />
                </div>
              </div>
              <div style=${{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6,flexShrink:0}}>
                <div style=${{background:sc,color:'#FFF',borderRadius:8,padding:'4px 10px',fontSize:11,fontWeight:700}}>Score ${score}</div>
                <button onClick=${()=>close(r.id)} style=${{padding:'4px 9px',borderRadius:7,border:'1px solid #34C759',color:'#34C759',background:'#F0FFF4',fontSize:10,cursor:'pointer',fontWeight:600}}>✅ Mitigar</button>
                <button onClick=${()=>del(r.id)} style=${{background:'none',border:'none',color:'#C7C7CC',cursor:'pointer',fontSize:12}}>🗑️</button>
              </div>
            </div>
          </div>`;
      })}
      ${open.length===0 && html`<div class="card" style=${{textAlign:'center',padding:28,color:'#86868B',fontSize:13}}>✅ Sin riesgos abiertos</div>`}
      ${mit.length>0 && html`
        <details style=${{marginTop:14}}>
          <summary style=${{cursor:'pointer',fontSize:12,color:'#86868B',fontWeight:600,padding:'6px 0'}}>✅ Riesgos mitigados (${mit.length})</summary>
          <div style=${{marginTop:6}}>
            ${mit.map(r=>html`
              <div key=${r.id} style=${{background:'#F9F9FB',borderRadius:10,padding:10,marginBottom:6,opacity:.65}}>
                <p style=${{fontSize:12,textDecoration:'line-through',color:'#86868B'}}>${r.text}</p>
              </div>
            `)}
          </div>
        </details>
      `}
    </div>`;
}

/* ══════════════════════════════════════════════
   PHASE: ACTIONS
══════════════════════════════════════════════ */
function PhaseActions({ state, upd, user, showMsg }) {
  const { actions } = state;
  const [text,  setText]  = useState('');
  const [owner, setOwner] = useState('');
  const [pri,   setPri]   = useState('medium');

  const add = () => {
    if (!text.trim()) return;
    upd('actions', [...actions, {id:uid(), text:text.trim(), owner:owner||'Sin asignar', status:'pending', priority:pri}]);
    setText(''); setOwner('');
    showMsg('🎯 Accionable añadido');
  };
  const upA = (id, field, val) => upd('actions', actions.map(a=>a.id===id?{...a,[field]:val}:a));
  const del = id => upd('actions', actions.filter(a=>a.id!==id));

  const priO = {high:3,medium:2,low:1};
  const sorted = [...actions].sort((a,b)=>(priO[b.priority]||0)-(priO[a.priority]||0));

  return html`
    <div style=${{maxWidth:680,margin:'0 auto'}}>
      <div class="card" style=${{marginBottom:12}}>
        <div style=${{display:'grid',gridTemplateColumns:'1fr 130px auto',gap:8,marginBottom:8}}>
          <input value=${text} onInput=${e=>setText(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&add()}
            placeholder="Accionable…" style=${{padding:'8px 12px',borderRadius:10,border:'1.5px solid #E5E5EA',fontSize:13,outline:'none'}} />
          <input value=${owner} onInput=${e=>setOwner(e.target.value)} placeholder="Responsable"
            style=${{padding:'8px 10px',borderRadius:10,border:'1.5px solid #E5E5EA',fontSize:13,outline:'none'}} />
          <button onClick=${add} style=${{padding:'8px 16px',background:'#007AFF',color:'#FFF',border:'none',borderRadius:10,cursor:'pointer',fontWeight:700,fontSize:16}}>+</button>
        </div>
        <div style=${{display:'flex',gap:6}}>
          ${PRIS.map(p=>html`
            <button key=${p.id} onClick=${()=>setPri(p.id)} style=${{
              flex:1,padding:'5px',borderRadius:8,border:pri===p.id?`2px solid ${p.color}`:'2px solid #E5E5EA',
              background:pri===p.id?p.color+'15':'#FFF',color:pri===p.id?p.color:'#86868B',fontSize:11,fontWeight:600,cursor:'pointer',transition:'all .15s'
            }}>${p.icon} ${p.label}</button>
          `)}
        </div>
      </div>
      ${sorted.map(a => {
        const st = STS.find(s=>s.id===a.status)||STS[0];
        const pr = PRIS.find(p=>p.id===a.priority)||PRIS[1];
        return html`
          <div key=${a.id} class="hl card" style=${{marginBottom:8,padding:'12px 14px',display:'flex',gap:10,alignItems:'center'}}>
            <span style=${{fontSize:15,flexShrink:0}}>${pr.icon}</span>
            <div style=${{flex:1,minWidth:0}}>
              <p style=${{fontSize:13,fontWeight:600,textDecoration:a.status==='done'?'line-through':'none',color:a.status==='done'?'#86868B':'#1D1D1F'}}>${a.text}</p>
              <p style=${{fontSize:10,color:'#86868B',marginTop:2}}>👤 ${a.owner}</p>
            </div>
            <select value=${a.status} onChange=${e=>upA(a.id,'status',e.target.value)} style=${{
              padding:'4px 7px',borderRadius:8,border:`1.5px solid ${st.color}`,background:st.bg,color:st.color,fontSize:10,fontWeight:700,cursor:'pointer',outline:'none'
            }}>
              ${STS.map(s=>html`<option key=${s.id} value=${s.id}>${s.label}</option>`)}
            </select>
            <button onClick=${()=>del(a.id)} style=${{background:'none',border:'none',color:'#C7C7CC',cursor:'pointer',fontSize:13}}>✕</button>
          </div>`;
      })}
      ${actions.length===0 && html`<div class="card" style=${{textAlign:'center',padding:28,color:'#86868B',fontSize:13}}>🎯 Aún no hay accionables</div>`}
    </div>`;
}

/* ══════════════════════════════════════════════
   PHASE: DASHBOARD
══════════════════════════════════════════════ */
function PhaseDashboard({ state, risks, saving, lastSaved, tipoInfo }) {
  const { notes, tasks, actions, obj } = state;
  const openRisks = risks.filter(r=>r.status==='open');
  const done  = actions.filter(a=>a.status==='done').length;
  const tDone = tasks.filter(t=>t.done).length;
  const votes = notes.reduce((s,n)=>s+(n.voters?.length||0),0);
  const pct   = actions.length ? Math.round(done/actions.length*100) : 0;

  const exportPDF = () => {
    const w = window.open('','_blank');
    const catHTML = CATS.map(c => {
      const cn = [...notes.filter(n=>n.category===c.id)].sort((a,b)=>(b.voters?.length||0)-(a.voters?.length||0));
      if (!cn.length) return '';
      return `<div style="margin-bottom:16px;padding:12px;border-radius:10px;border-left:4px solid ${c.color};background:${c.bg}">
        <p style="font-weight:700;font-size:13px;color:${c.color};margin-bottom:8px">${c.emoji} ${c.label} (${cn.length})</p>
        ${cn.map(n=>`<div style="padding:5px 0;border-bottom:1px solid rgba(0,0,0,.06);display:flex;justify-content:space-between;font-size:12px"><span>${n.text}</span><span style="color:#86868B">▲${n.voters?.length||0}</span></div>`).join('')}
      </div>`;
    }).join('');
    const actHTML = actions.length ? `
      <h2 style="font-size:15px;border-bottom:2px solid #E5E5EA;padding-bottom:6px;margin:20px 0 10px">🎯 Accionables</h2>
      ${[...actions].sort((a,b)=>{const o={high:3,medium:2,low:1};return(o[b.priority]||0)-(o[a.priority]||0);}).map(a=>`
        <div style="display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #E5E5EA;font-size:12px;align-items:center">
          <span>${PRIS.find(p=>p.id===a.priority)?.icon||'🟡'}</span>
          <span style="flex:1">${a.text}</span>
          <span style="color:#86868B">${a.owner}</span>
          <span style="color:${STS.find(s=>s.id===a.status)?.color||'#86868B'};font-weight:600">${STS.find(s=>s.id===a.status)?.label||a.status}</span>
        </div>`).join('')}` : '';
    const risksHTML = openRisks.length ? `
      <h2 style="font-size:15px;border-bottom:2px solid #FF9500;padding-bottom:6px;margin:20px 0 10px;color:#FF9500">⚠️ Riesgos abiertos</h2>
      ${openRisks.map(r=>`<div style="padding:6px 0;border-bottom:1px solid #FF950020;font-size:12px">${r.text} — ${r.owner}</div>`).join('')}` : '';
    const doc = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>revelio — ${SALA}</title>
    <style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,'Segoe UI',sans-serif;padding:40px;color:#1D1D1F;max-width:860px;margin:0 auto;font-size:13px;line-height:1.5}h1{font-size:22px;font-weight:800;margin-bottom:4px}@media print{body{padding:20px}}</style></head><body>
    <div style="text-align:center;margin-bottom:24px">
      <h1>revelio — ${SALA}</h1>
      <p style="color:#86868B;font-size:12px">${tipoInfo.icon} ${tipoInfo.label} · ${fd(lastSaved||new Date())} ${fdt(lastSaved||new Date())}</p>
      ${obj.text?`<p style="margin-top:8px;font-size:13px">🎯 <b>${obj.text}</b> — ${obj.met==='met'?'✅ Cumplido':obj.met==='partial'?'⚠️ Parcial':obj.met==='unmet'?'❌ No cumplido':'Sin evaluar'}</p>`:''}
    </div>
    <div style="display:flex;gap:10px;margin-bottom:20px">
      ${[['📝',notes.length,'Notas','#007AFF'],['▲',votes,'Votos','#FF9500'],[`🎯`,`${done}/${actions.length}`,'Accionables','#34C759'],['⚠️',openRisks.length,'Riesgos','#FF3B30']].map(([i,v,l,c])=>`<div style="flex:1;text-align:center;background:#F9F9FB;border-radius:10px;padding:12px;border:1px solid #E5E5EA"><div style="font-size:18px;font-weight:800;color:${c}">${v}</div><div style="font-size:10px;color:#86868B">${l}</div></div>`).join('')}
    </div>
    ${catHTML}${actHTML}${risksHTML}
    <p style="text-align:center;color:#86868B;font-size:10px;margin-top:28px">Generado con revelio ✨ — retroboost.netlify.app</p>
    </body></html>`;
    w.document.write(doc);
    w.document.close();
    setTimeout(()=>w.print(), 500);
  };

  return html`
    <div style=${{maxWidth:780,margin:'0 auto'}}>
      <!-- KPI cards -->
      <div style=${{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:14}}>
        ${[['📝',notes.length,'Notas','#007AFF'],['▲',votes,'Votos','#FF9500'],[`${done}/${actions.length}`,'Accionables','#34C759'],['⚠️ '+openRisks.length,'Riesgos abiertos','#FF3B30']].map(([v,l,c])=>html`
          <div class="card" style=${{textAlign:'center',padding:'14px 10px'}}>
            <div style=${{fontSize:20,fontWeight:800,color:c,marginBottom:2}}>${v}</div>
            <div style=${{fontSize:10,color:'#86868B'}}>${l}</div>
          </div>
        `)}
      </div>

      <!-- Tasks completion -->
      <div class="card" style=${{marginBottom:12}}>
        <div style=${{display:'flex',justifyContent:'space-between',marginBottom:6}}>
          <span style=${{fontSize:13,fontWeight:600}}>📋 Completitud de tareas</span>
          <span style=${{fontSize:13,fontWeight:700,color:'#34C759'}}>${tDone}/${tasks.length}</span>
        </div>
        <div style=${{height:8,background:'#F2F2F7',borderRadius:4,overflow:'hidden'}}>
          <div style=${{height:'100%',width:(tasks.length?tDone/tasks.length*100:0)+'%',background:'linear-gradient(90deg,#34C759,#30d158)',borderRadius:4,transition:'width .5s ease'}}></div>
        </div>
      </div>

      <!-- Notes by cat -->
      <div class="card" style=${{marginBottom:12}}>
        <h3 style=${{fontSize:13,fontWeight:700,marginBottom:12}}>📊 Distribución de notas</h3>
        ${CATS.map(c=>{
          const cn = notes.filter(n=>n.category===c.id);
          const w  = notes.length ? cn.length/notes.length*100 : 0;
          return html`
            <div key=${c.id} style=${{marginBottom:9}}>
              <div style=${{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                <span style=${{fontSize:12}}>${c.emoji} ${c.label}</span>
                <span style=${{fontSize:12,fontWeight:600,color:c.color}}>${cn.length}</span>
              </div>
              <div style=${{height:6,background:'#F2F2F7',borderRadius:3,overflow:'hidden'}}>
                <div style=${{height:'100%',width:w+'%',background:c.color,borderRadius:3,transition:'width .4s ease'}}></div>
              </div>
            </div>`;
        })}
      </div>

      <!-- Action completion -->
      ${actions.length>0 && html`
        <div class="card" style=${{marginBottom:12}}>
          <div style=${{display:'flex',justifyContent:'space-between',marginBottom:6}}>
            <span style=${{fontSize:13,fontWeight:600}}>🎯 Accionables · ${pct}% completado</span>
            <span style=${{fontSize:13,fontWeight:700,color:'#007AFF'}}>${done}/${actions.length}</span>
          </div>
          <div style=${{height:8,background:'#F2F2F7',borderRadius:4,overflow:'hidden'}}>
            <div style=${{height:'100%',width:pct+'%',background:'linear-gradient(90deg,#007AFF,#5856D6)',borderRadius:4,transition:'width .4s ease'}}></div>
          </div>
        </div>
      `}

      <!-- Open risks -->
      ${openRisks.length>0 && html`
        <div class="card" style=${{marginBottom:12,border:'1.5px solid #FF950028',background:'#FFFCF7'}}>
          <h3 style=${{fontSize:13,fontWeight:700,color:'#FF9500',marginBottom:10}}>⚠️ Riesgos abiertos (${openRisks.length})</h3>
          ${openRisks.map(r=>{
            const avgV = vs => { const a=Object.values(vs||{}); return a.length?Math.round(a.reduce((x,y)=>x+y,0)/a.length):0; };
            const score = avgV(r.impactVotes)*avgV(r.probVotes);
            const col = score>=15?'#FF3B30':score>=6?'#FF9500':'#34C759';
            return html`
              <div key=${r.id} style=${{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'7px 0',borderBottom:'1px solid #FF950015',fontSize:12}}>
                <span style=${{flex:1}}>${r.text}</span>
                <span style=${{background:col,color:'#FFF',borderRadius:6,padding:'1px 8px',fontSize:10,fontWeight:700,marginLeft:10}}>Score ${score}</span>
              </div>`;
          })}
        </div>
      `}

      <!-- Auto-save status + PDF -->
      <div class="card" style=${{display:'flex',alignItems:'center',gap:12}}>
        <div style=${{flex:1,fontSize:12,color:'#86868B'}}>
          ${saving
            ? html`<span style=${{animation:'pulse 1s infinite',color:'#FF9500',fontWeight:600}}>⏳ Auto-guardando…</span>`
            : lastSaved
              ? html`<span style=${{color:'#34C759',fontWeight:600}}>✅ Guardado ${fd(lastSaved)} ${fdt(lastSaved)}</span>`
              : html`<span>⏳ En espera de datos…</span>`
          }
        </div>
        <button onClick=${exportPDF} style=${{padding:'10px 20px',background:'linear-gradient(135deg,#007AFF,#5856D6)',color:'#FFF',border:'none',borderRadius:12,fontSize:13,fontWeight:600,cursor:'pointer',boxShadow:'0 3px 10px rgba(0,122,255,.3)'}}>
          📄 Exportar PDF
        </button>
      </div>
    </div>`;
}

/* ══════════════════════════════════════════════
   ADMIN  (portfolio dashboard + rooms mgmt)
══════════════════════════════════════════════ */
function Admin() {
  const [rooms,    setRooms]    = useState([]);
  const [retros,   setRetros]   = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [tab,      setTab]      = useState('dashboard');
  const [expanded, setExpanded] = useState(null);
  const [slug,  setSlug]  = useState('');
  const [name,  setName]  = useState('');
  const [tipo,  setTipo]  = useState('agile');
  const [toast, setToast] = useState(null);

  const msg = m => { setToast(m); setTimeout(()=>setToast(null),2400); };

  useEffect(()=>{
    (async()=>{
      const [r,rt] = await Promise.all([dbLoadRooms(), dbGetAllRetros()]);
      setRooms(r); setRetros(rt); setLoading(false);
    })();
  },[]);

  const addRoom = async () => {
    if (!slug.trim()||!name.trim()) return;
    await dbSaveRoom(slug.trim().toLowerCase(), name.trim(), tipo);
    const r = await dbLoadRooms(); setRooms(r);
    setSlug(''); setName('');
    msg('✅ Sala creada');
  };
  const delRoom = async s => {
    if (!confirm(`¿Eliminar sala "${s}"?`)) return;
    await dbDeleteRoom(s);
    setRooms(rooms.filter(r=>r.slug!==s));
    msg('🗑️ Sala eliminada');
  };

  const retrosFor = s => retros.filter(r=>r.sala===s);
  const go = (s,t) => location.href = `?sala=${s}&tipo=${t||'agile'}`;

  // ── Portfolio stats ──
  const salaStats = rooms.map(room => {
    const sr    = retrosFor(room.slug);
    const notes = sr.reduce((s,r)=>s+(r.data?.notes?.length||0),0);
    const votes = sr.reduce((s,r)=>s+(r.data?.notes?.reduce((a,n)=>a+(n.voters?.length||0),0)||0),0);
    const acts  = sr.reduce((s,r)=>s+(r.data?.actions?.length||0),0);
    const done  = sr.reduce((s,r)=>s+(r.data?.actions?.filter(a=>a.status==='done').length||0),0);
    const parts = [...new Set(sr.flatMap(r=>r.data?.notes?.map(n=>n.userName)||[]))];
    const last  = sr.find(r=>r.status==='active') || sr[0];
    const ti    = TASK_TEMPLATES[room.tipo] || TASK_TEMPLATES.agile;
    return { slug:room.slug, name:room.name, tipo:room.tipo, tipoInfo:ti, retros:sr.length, notes, votes, acts, done, parts:parts.length, last };
  });

  const glob = {
    retros:  retros.length,
    notes:   salaStats.reduce((s,x)=>s+x.notes,0),
    votes:   salaStats.reduce((s,x)=>s+x.votes,0),
    acts:    salaStats.reduce((s,x)=>s+x.acts,0),
    done:    salaStats.reduce((s,x)=>s+x.done,0),
    parts:   [...new Set(retros.flatMap(r=>r.data?.notes?.map(n=>n.userName)||[]))].length,
  };

  // Recent retros chronologically for sparkline
  const chronoRetros = [...retros]
    .filter(r=>r.data?.notes?.length>0)
    .sort((a,b)=>new Date(a.created_at)-new Date(b.created_at))
    .slice(-12);

  const maxNotes = Math.max(...chronoRetros.map(r=>r.data?.notes?.length||0), 1);
  const maxParts = Math.max(...chronoRetros.map(r=>{
    return [...new Set(r.data?.notes?.map(n=>n.userName)||[])].length;
  }), 1);
  const maxSalaNotes = Math.max(...salaStats.map(s=>s.notes), 1);

  const PALETTE = ['#007AFF','#5856D6','#34C759','#FF9500','#FF3B30','#00C7BE','#AF52DE','#FF2D55'];
  const bc = i => PALETTE[i % PALETTE.length];

  if (loading) return html`
    <div style=${{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#F2F2F7'}}>
      <div style=${{textAlign:'center',color:'#86868B'}}>
        <div style=${{fontSize:32,animation:'spin 1s linear infinite',display:'inline-block',marginBottom:8}}>⏳</div>
        <p>Cargando datos…</p>
      </div>
    </div>`;

  return html`
    <div style=${{minHeight:'100vh',background:'#F2F2F7'}}>

      <!-- HEADER -->
      <div style=${{background:'rgba(255,255,255,.93)',backdropFilter:'blur(14px)',borderBottom:'1px solid #E5E5EA',padding:'10px 20px',position:'sticky',top:0,zIndex:100}}>
        <div style=${{maxWidth:1100,margin:'0 auto',display:'flex',alignItems:'center',gap:12}}>
          <div style=${{fontFamily:"'Comfortaa',sans-serif",fontSize:20,background:'linear-gradient(90deg,#007AFF,#5856D6)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>revelio</div>
          <h2 style=${{fontSize:15,fontWeight:700}}>🏰 Panel de Administración</h2>
          <div style=${{marginLeft:'auto',display:'flex',gap:6}}>
            <button onClick=${()=>setTab('dashboard')} style=${{padding:'5px 14px',borderRadius:8,border:'none',background:tab==='dashboard'?'#007AFF':'#F2F2F7',color:tab==='dashboard'?'#FFF':'#86868B',fontSize:12,fontWeight:600,cursor:'pointer'}}>📊 Dashboard</button>
            <button onClick=${()=>setTab('rooms')}     style=${{padding:'5px 14px',borderRadius:8,border:'none',background:tab==='rooms'?'#007AFF':'#F2F2F7',color:tab==='rooms'?'#FFF':'#86868B',fontSize:12,fontWeight:600,cursor:'pointer'}}>📂 Salas</button>
            <button onClick=${()=>location.href='/'} style=${{padding:'5px 12px',borderRadius:8,border:'1px solid #E5E5EA',background:'#FFF',fontSize:12,cursor:'pointer',color:'#86868B'}}>← Inicio</button>
          </div>
        </div>
      </div>

      <div style=${{maxWidth:1100,margin:'0 auto',padding:'20px 16px'}}>

      ${tab==='dashboard' ? html`

        <!-- ══ DASHBOARD ══ -->

        <!-- Global KPI cards -->
        <div style=${{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:10,marginBottom:16}}>
          ${[
            ['📋', glob.retros,  'Retros',        '#007AFF'],
            ['📝', glob.notes,   'Notas',          '#5856D6'],
            ['▲',  glob.votes,   'Votos',          '#FF9500'],
            ['🎯', glob.acts,    'Accionables',    '#34C759'],
            ['✅', glob.done,    'Completados',    '#30d158'],
            ['👥', glob.parts,   'Participantes',  '#AF52DE'],
          ].map(([ic,v,l,c]) => html`
            <div class="card" style=${{textAlign:'center',padding:'14px 8px'}}>
              <div style=${{fontSize:11,marginBottom:4}}>${ic}</div>
              <div style=${{fontSize:22,fontWeight:800,color:c,lineHeight:1}}>${v}</div>
              <div style=${{fontSize:10,color:'#86868B',marginTop:3}}>${l}</div>
            </div>
          `)}
        </div>

        <!-- Charts row 1: Sparklines -->
        <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>

          <!-- Notas por retro (últimas 12) -->
          <div class="card">
            <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <h3 style=${{fontSize:13,fontWeight:700}}>📈 Notas por retro</h3>
              <span style=${{fontSize:10,color:'#86868B'}}>últimas ${chronoRetros.length} sesiones</span>
            </div>
            ${chronoRetros.length === 0
              ? html`<div style=${{height:80,display:'flex',alignItems:'center',justifyContent:'center',color:'#C7C7CC',fontSize:12}}>Sin datos aún</div>`
              : html`
                <div style=${{display:'flex',alignItems:'flex-end',gap:4,height:80}}>
                  ${chronoRetros.map((r,i) => {
                    const v = r.data?.notes?.length||0;
                    const h = Math.max((v/maxNotes)*100, 4);
                    const room = rooms.find(rm=>rm.slug===r.sala);
                    return html`
                      <div key=${i} style=${{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}} title="${room?.name||r.sala}: ${v} notas">
                        <span style=${{fontSize:9,color:'#86868B',fontWeight:700}}>${v||''}</span>
                        <div style=${{width:'100%',height:h+'%',minHeight:4,background:`linear-gradient(180deg,#007AFF,#5856D6)`,borderRadius:'3px 3px 0 0',transition:'height .4s'}}></div>
                      </div>`;
                  })}
                </div>
                <div style=${{display:'flex',gap:4,marginTop:4}}>
                  ${chronoRetros.map((r,i)=>{
                    const room=rooms.find(rm=>rm.slug===r.sala);
                    return html`<div key=${i} style=${{flex:1,fontSize:8,color:'#C7C7CC',textAlign:'center',overflow:'hidden',whiteSpace:'nowrap',textOverflow:'ellipsis'}} title=${room?.name||r.sala}>${(room?.name||r.sala).slice(0,4)}</div>`;
                  })}
                </div>
              `
            }
          </div>

          <!-- Participantes por retro -->
          <div class="card">
            <div style=${{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <h3 style=${{fontSize:13,fontWeight:700}}>👥 Participantes por retro</h3>
              <span style=${{fontSize:10,color:'#86868B'}}>últimas ${chronoRetros.length} sesiones</span>
            </div>
            ${chronoRetros.length === 0
              ? html`<div style=${{height:80,display:'flex',alignItems:'center',justifyContent:'center',color:'#C7C7CC',fontSize:12}}>Sin datos aún</div>`
              : html`
                <div style=${{display:'flex',alignItems:'flex-end',gap:4,height:80}}>
                  ${chronoRetros.map((r,i) => {
                    const parts = [...new Set(r.data?.notes?.map(n=>n.userName)||[])].length;
                    const h = Math.max((parts/maxParts)*100, 4);
                    return html`
                      <div key=${i} style=${{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                        <span style=${{fontSize:9,color:'#86868B',fontWeight:700}}>${parts||''}</span>
                        <div style=${{width:'100%',height:h+'%',minHeight:4,background:`linear-gradient(180deg,#34C759,#30d158)`,borderRadius:'3px 3px 0 0'}}></div>
                      </div>`;
                  })}
                </div>
              `
            }
          </div>
        </div>

        <!-- Charts row 2: Donut + Notas por proyecto -->
        <div style=${{display:'grid',gridTemplateColumns:'200px 1fr',gap:12,marginBottom:12}}>

          <!-- Donut accionables -->
          <div class="card" style=${{textAlign:'center',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
            <h3 style=${{fontSize:12,fontWeight:700,marginBottom:12}}>🎯 Accionables</h3>
            ${glob.acts === 0
              ? html`<div style=${{color:'#C7C7CC',fontSize:12,padding:'20px 0'}}>Sin datos</div>`
              : (() => {
                  const pct = Math.round(glob.done/glob.acts*100);
                  const r=54, circ=2*Math.PI*r;
                  const dash = (pct/100)*circ;
                  return html`
                    <svg width="130" height="130" viewBox="0 0 130 130">
                      <circle cx="65" cy="65" r=${r} fill="none" stroke="#F2F2F7" stroke-width="14"/>
                      <circle cx="65" cy="65" r=${r} fill="none" stroke="#34C759" stroke-width="14"
                        stroke-dasharray="${dash} ${circ}" stroke-dashoffset=${circ/4}
                        stroke-linecap="round" style=${{transition:'stroke-dasharray .6s ease'}}/>
                      <text x="65" y="60" text-anchor="middle" font-size="20" font-weight="800" fill="#1D1D1F">${pct}%</text>
                      <text x="65" y="76" text-anchor="middle" font-size="10" fill="#86868B">completado</text>
                    </svg>
                    <div style=${{fontSize:11,color:'#86868B',marginTop:4}}>
                      <span style=${{color:'#34C759',fontWeight:700}}>${glob.done}</span> completados de <b>${glob.acts}</b>
                    </div>`;
                })()
            }
          </div>

          <!-- Notas por proyecto (barras horizontales) -->
          <div class="card">
            <h3 style=${{fontSize:13,fontWeight:700,marginBottom:14}}>📝 Notas totales por proyecto</h3>
            ${salaStats.length===0
              ? html`<p style=${{color:'#C7C7CC',fontSize:12,textAlign:'center',padding:20}}>Crea salas para ver datos</p>`
              : salaStats.map((s,i) => {
                  const w = maxSalaNotes>0 ? (s.notes/maxSalaNotes)*100 : 0;
                  return html`
                    <div key=${s.slug} style=${{marginBottom:10}}>
                      <div style=${{display:'flex',justifyContent:'space-between',marginBottom:3,alignItems:'center'}}>
                        <div style=${{display:'flex',alignItems:'center',gap:6}}>
                          <button onClick=${()=>go(s.slug,s.tipo)} style=${{background:'none',border:'none',cursor:'pointer',fontSize:12,fontWeight:600,color:'#007AFF',padding:0}}>${s.name}</button>
                          <span style=${{background:s.tipoInfo.color+'15',color:s.tipoInfo.color,fontSize:9,padding:'1px 5px',borderRadius:4,fontWeight:700}}>${s.tipoInfo.icon} ${s.tipoInfo.label}</span>
                        </div>
                        <span style=${{fontSize:11,fontWeight:700,color:bc(i)}}>${s.notes}</span>
                      </div>
                      <div style=${{height:8,background:'#F2F2F7',borderRadius:4,overflow:'hidden'}}>
                        <div style=${{height:'100%',width:w+'%',background:bc(i),borderRadius:4,transition:'width .5s ease'}}></div>
                      </div>
                    </div>`;
                })
            }
          </div>
        </div>

        <!-- Portfolio table -->
        <div class="card">
          <h3 style=${{fontSize:13,fontWeight:700,marginBottom:14}}>📋 Portfolio de proyectos</h3>
          ${salaStats.length===0
            ? html`<p style=${{color:'#C7C7CC',fontSize:12,textAlign:'center',padding:20}}>Sin salas configuradas</p>`
            : html`
              <div style=${{overflowX:'auto'}}>
                <table style=${{width:'100%',borderCollapse:'collapse',fontSize:11}}>
                  <thead>
                    <tr style=${{borderBottom:'2px solid #E5E5EA'}}>
                      ${['Proyecto','Tipo','Retros','Notas','Votos','Accionables','% Hecho','Participantes','Última retro'].map(h=>html`
                        <th key=${h} style=${{padding:'7px 8px',textAlign:'left',fontWeight:700,color:'#86868B',fontSize:9,textTransform:'uppercase',whiteSpace:'nowrap'}}>${h}</th>
                      `)}
                    </tr>
                  </thead>
                  <tbody>
                    ${salaStats.map((s,i) => {
                      const pct = s.acts>0 ? Math.round(s.done/s.acts*100) : 0;
                      const pctColor = pct>=75?'#34C759':pct>=40?'#FF9500':'#FF3B30';
                      return html`
                        <tr key=${s.slug} style=${{borderBottom:'1px solid #F2F2F7',transition:'background .1s'}}
                          onMouseOver=${e=>e.currentTarget.style.background='#F9F9FB'}
                          onMouseOut=${e=>e.currentTarget.style.background='transparent'}>
                          <td style=${{padding:'9px 8px'}}>
                            <button onClick=${()=>go(s.slug,s.tipo)} style=${{background:'none',border:'none',cursor:'pointer',fontWeight:700,color:'#007AFF',fontSize:12,padding:0}}>${s.name}</button>
                          </td>
                          <td style=${{padding:'9px 8px'}}><span style=${{background:s.tipoInfo.color+'15',color:s.tipoInfo.color,fontSize:9,padding:'2px 6px',borderRadius:5,fontWeight:700,whiteSpace:'nowrap'}}>${s.tipoInfo.icon} ${s.tipoInfo.label}</span></td>
                          <td style=${{padding:'9px 8px',fontWeight:700,color:'#007AFF'}}>${s.retros}</td>
                          <td style=${{padding:'9px 8px',fontWeight:600}}>${s.notes}</td>
                          <td style=${{padding:'9px 8px',color:'#FF9500',fontWeight:600}}>${s.votes}</td>
                          <td style=${{padding:'9px 8px'}}>${s.acts}</td>
                          <td style=${{padding:'9px 8px'}}>
                            <div style=${{display:'flex',alignItems:'center',gap:6}}>
                              <div style=${{flex:1,height:6,background:'#F2F2F7',borderRadius:3,overflow:'hidden',minWidth:40}}>
                                <div style=${{height:'100%',width:pct+'%',background:pctColor,borderRadius:3}}></div>
                              </div>
                              <span style=${{color:pctColor,fontWeight:700,fontSize:10,minWidth:28}}>${pct}%</span>
                            </div>
                          </td>
                          <td style=${{padding:'9px 8px',fontWeight:600,color:'#AF52DE'}}>${s.parts}</td>
                          <td style=${{padding:'9px 8px',color:'#86868B'}}>
                            ${s.last ? fd(s.last.created_at) : '—'}
                            ${s.last?.status==='active'?html`<span style=${{marginLeft:4,background:'#34C75918',color:'#34C759',padding:'1px 5px',borderRadius:4,fontSize:9,fontWeight:700}}>● Activa</span>`:''}
                          </td>
                        </tr>`;
                    })}
                  </tbody>
                </table>
              </div>`
          }
        </div>

      ` : html`

        <!-- ══ ROOMS ══ -->

        <!-- Add room -->
        <div class="card" style=${{marginBottom:14}}>
          <h3 style=${{fontSize:13,fontWeight:700,marginBottom:12}}>➕ Nueva sala</h3>
          <div style=${{display:'flex',gap:8,flexWrap:'wrap'}}>
            <input value=${slug} onInput=${e=>setSlug(e.target.value)} placeholder="slug (ej: vwfs)"
              style=${{padding:'8px 12px',borderRadius:10,border:'1.5px solid #E5E5EA',fontSize:13,outline:'none',width:130}} />
            <input value=${name} onInput=${e=>setName(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&addRoom()} placeholder="Nombre completo"
              style=${{flex:1,padding:'8px 12px',borderRadius:10,border:'1.5px solid #E5E5EA',fontSize:13,outline:'none',minWidth:180}} />
            <select value=${tipo} onChange=${e=>setTipo(e.target.value)} style=${{padding:'8px 10px',borderRadius:10,border:'1.5px solid #E5E5EA',fontSize:13,outline:'none'}}>
              ${Object.entries(TASK_TEMPLATES).map(([k,v])=>html`<option key=${k} value=${k}>${v.icon} ${v.label}</option>`)}
            </select>
            <button onClick=${addRoom} style=${{padding:'8px 18px',background:'#007AFF',color:'#FFF',border:'none',borderRadius:10,cursor:'pointer',fontWeight:600,fontSize:13}}>Crear</button>
          </div>
        </div>

        <!-- Rooms list -->
        <div class="card">
          <h3 style=${{fontSize:13,fontWeight:700,marginBottom:14}}>📋 Salas configuradas (${rooms.length})</h3>
          ${rooms.length===0 && html`<p style=${{color:'#C7C7CC',textAlign:'center',padding:24,fontSize:13}}>Sin salas. Crea la primera ☝️</p>`}
          ${rooms.map(room => {
            const sr   = retrosFor(room.slug);
            const act  = sr.find(r=>r.status==='active');
            const ti   = TASK_TEMPLATES[room.tipo]||TASK_TEMPLATES.agile;
            const notes= sr.reduce((s,r)=>s+(r.data?.notes?.length||0),0);
            const acts = sr.reduce((s,r)=>s+(r.data?.actions?.length||0),0);
            const isExp= expanded===room.slug;
            return html`
              <div key=${room.slug} style=${{borderBottom:'1px solid #F2F2F7',paddingBottom:14,marginBottom:14}}>
                <div style=${{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>
                  <div style=${{flex:1,minWidth:200}}>
                    <div style=${{display:'flex',alignItems:'center',gap:7,marginBottom:3}}>
                      <button onClick=${()=>go(room.slug,room.tipo)} style=${{background:'none',border:'none',cursor:'pointer',fontWeight:700,color:'#007AFF',fontSize:14,padding:0}}>${room.name}</button>
                      ${act&&html`<span style=${{background:'#34C75918',color:'#34C759',padding:'1px 7px',borderRadius:5,fontSize:10,fontWeight:700}}>● Activa</span>`}
                    </div>
                    <div style=${{fontSize:10,color:'#86868B',display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
                      <span style=${{background:ti.color+'15',color:ti.color,padding:'1px 6px',borderRadius:4,fontWeight:600}}>${ti.icon} ${ti.label}</span>
                      <code>${room.slug}</code>
                      <span>·</span><span>${sr.length} retros</span>
                      <span>·</span><span>${notes} notas</span>
                      <span>·</span><span>${acts} accionables</span>
                    </div>
                  </div>
                  <div style=${{display:'flex',gap:6,flexWrap:'wrap'}}>
                    <button onClick=${()=>{navigator.clipboard.writeText(`${location.origin}?sala=${room.slug}&tipo=${room.tipo}`);msg('📋 Enlace copiado');}} style=${{padding:'5px 10px',borderRadius:8,border:'1px solid #E5E5EA',background:'#FFF',cursor:'pointer',fontSize:11}}>📋 Copiar enlace</button>
                    <button onClick=${()=>setExpanded(isExp?null:room.slug)} style=${{padding:'5px 10px',borderRadius:8,border:'1px solid #E5E5EA',background:isExp?'#EBF5FF':'#FFF',color:isExp?'#007AFF':'#1D1D1F',cursor:'pointer',fontSize:11}}>📂 Retros (${sr.length})</button>
                    <button onClick=${()=>go(room.slug,room.tipo)} style=${{padding:'5px 10px',borderRadius:8,border:'1px solid #007AFF',background:'#EBF5FF',color:'#007AFF',cursor:'pointer',fontSize:11,fontWeight:600}}>Entrar →</button>
                    <button onClick=${()=>delRoom(room.slug)} style=${{padding:'5px 8px',borderRadius:8,border:'1px solid #FF3B3020',background:'#FFF5F5',color:'#FF3B30',cursor:'pointer',fontSize:11}}>🗑️</button>
                  </div>
                </div>
                ${isExp && html`
                  <div style=${{marginTop:10,background:'#F9F9FB',borderRadius:12,padding:12}}>
                    <p style=${{fontSize:11,fontWeight:600,color:'#86868B',marginBottom:8}}>Historial de retros</p>
                    ${sr.length===0 && html`<p style=${{fontSize:12,color:'#C7C7CC',textAlign:'center',padding:'12px 0'}}>Sin retros guardadas aún</p>`}
                    ${sr.map(r=>{
                      const nC=r.data?.notes?.length||0, aC=r.data?.actions?.length||0;
                      const doneC=r.data?.actions?.filter(a=>a.status==='done').length||0;
                      return html`
                        <div key=${r.id} style=${{display:'flex',alignItems:'center',gap:10,padding:'7px 0',borderBottom:'1px solid #E5E5EA',fontSize:12}}>
                          <span style=${{background:r.status==='active'?'#34C75920':'#86868B18',color:r.status==='active'?'#34C759':'#86868B',padding:'1px 7px',borderRadius:5,fontSize:10,fontWeight:700,whiteSpace:'nowrap'}}>
                            ${r.status==='active'?'● Activa':'Cerrada'}
                          </span>
                          <span style=${{flex:1,color:'#86868B'}}>${fd(r.created_at)} · <b>${nC}</b> notas · <b>${aC}</b> accionables (<span style=${{color:'#34C759'}}>${doneC} ✅</span>)</span>
                          ${r.status==='active'&&html`<button onClick=${()=>go(room.slug,room.tipo)} style=${{padding:'3px 9px',borderRadius:6,border:'1px solid #007AFF',color:'#007AFF',background:'#EBF5FF',cursor:'pointer',fontSize:11,fontWeight:600}}>Abrir</button>`}
                        </div>`;
                    })}
                  </div>
                `}
              </div>`;
          })}
        </div>

      `}
      </div>

      ${toast && html`
        <div style=${{position:'fixed',bottom:20,left:'50%',transform:'translateX(-50%)',background:'#1D1D1F',color:'#FFF',padding:'10px 20px',borderRadius:12,fontSize:13,fontWeight:600,zIndex:500,animation:'fadeIn .2s',whiteSpace:'nowrap'}}>
          ${toast}
        </div>
      `}
    </div>`;
}

/* ══════════════════════════════════════════════
   LANDING
══════════════════════════════════════════════ */
function Landing() {
  return html`
    <div style=${{minHeight:'100vh',background:'linear-gradient(135deg,#667eea 0%,#764ba2 100%)',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24,textAlign:'center',color:'#FFF'}}>
      <div style=${{fontFamily:"'Comfortaa',sans-serif",fontSize:52,marginBottom:8,letterSpacing:2}}>revelio</div>
      <p style=${{fontSize:17,fontWeight:300,marginBottom:48,opacity:.85}}>Retrospectivas ágiles ✨ — en tiempo real, sin esfuerzo</p>
      <div style=${{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,maxWidth:580,width:'100%',marginBottom:40}}>
        ${PHASES.map(p=>html`
          <div key=${p.id} style=${{background:'rgba(255,255,255,.15)',borderRadius:14,padding:'14px 12px',backdropFilter:'blur(10px)',border:'1px solid rgba(255,255,255,.2)'}}>
            <div style=${{fontSize:22,marginBottom:5}}>${p.icon}</div>
            <div style=${{fontWeight:700,fontSize:12}}>${p.label}</div>
            <div style=${{fontSize:10,opacity:.75,marginTop:2,fontStyle:'italic'}}>${p.hp}</div>
          </div>
        `)}
      </div>
      <div style=${{background:'rgba(255,255,255,.15)',borderRadius:14,padding:'14px 20px',backdropFilter:'blur(10px)',marginBottom:16,fontSize:13,maxWidth:460}}>
        Entra con <code style=${{background:'rgba(255,255,255,.2)',padding:'2px 8px',borderRadius:5}}>${location.origin}?sala=TU_SALA</code><br/>
        <span style=${{opacity:.75,fontSize:11}}>Añade &tipo=waterfall | itil | kanban para elegir plantilla</span>
      </div>
      <a href="?admin" style=${{color:'#FFF',opacity:.8,fontSize:13,textDecoration:'none',padding:'8px 20px',border:'1px solid rgba(255,255,255,.4)',borderRadius:10,backdropFilter:'blur(10px)'}}>
        🏰 Panel de administración →
      </a>
      <p style=${{marginTop:40,fontSize:11,opacity:.4}}>Hecho con ✨ y sin Horcruxes</p>
    </div>`;
}

   APP ROOT
══════════════════════════════════════════════ */
function App() {
  const [user, setUser] = useState(null);

  if (!SALA_PARAM && !IS_ADMIN) return html`<${Landing} />`;
  if (IS_ADMIN) return html`<${Admin} />`;
  if (!user)    return html`<${Login} onJoin=${setUser} />`;
  return html`<${RetroBoard} user=${user} />`;
}

render(html`<${App} />`, document.getElementById('app'));
</script>
