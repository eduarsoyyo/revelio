  const [editCal, setEditCal] = useState(null);  // {id,name,holidays:[{date,name}]}
  const [newCal,  setNewCal]  = useState({name:'', holidays:[]});
  const [showAdd, setShowAdd] = useState(false);
  const [newHol,  setNewHol]  = useState({date:'', name:''});
  const [saving,  setSaving]  = useState(false);

  const [calMembers, setCalMembers] = useState([]);
  useEffect(() => {
    sbLoadCalendars().then(data => {
      setCals(data); setLoading(false);

      setMembers(prev => prev.some(x=>x.id===m.id) ? prev.map(x=>x.id===m.id?m:x) : [...prev,m]);

/* ═══ VACPAGINATED — vacation bars with dot pagination ═══ */
function VacPaginated({ members, cntD, thisYr }) {
  const PAGE_SIZE = 4;
  const totalPages = Math.ceil(members.length / PAGE_SIZE);
  const [page, setPage] = useState(0);
  const visible = members.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);
  return html`
    <div style=${{ marginBottom:8 }}>
      <div style=${{ display:'flex', flexDirection:'column', gap:4 }}>
        ${visible.map(m => {
          const cap = (m.annual_vac_days ?? 22) + (m.prev_year_pending ?? 0);
          const used = cntD(m.vacations || [], m.id, thisYr);
          const mp = cap > 0 ? Math.min(100, Math.round((used / cap) * 100)) : 0;
          return html`
            <div key=${m.id} style=${{ display:'flex', alignItems:'center', gap:6 }}>
              <span style=${{ fontSize:13, width:18, textAlign:'center' }}>${m.avatar || '👤'}</span>
              <span style=${{ fontSize:9, color:'#1D1D1F', fontWeight:500, minWidth:60, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>${m.name?.split(' ')[0] || '—'}</span>
              <div style=${{ flex:1 }}>
                <div style=${{ background:'#F2F2F7', borderRadius:3, height:5, overflow:'hidden' }}>
                  <div style=${{ width:mp + '%', height:'100%', background:mp > 90 ? '#FF3B30' : mp > 70 ? '#FF9500' : '#34C759', borderRadius:3, transition:'width .3s' }}></div>
                </div>
              </div>
              <span style=${{ fontSize:9, color:'#86868B', minWidth:40, textAlign:'right' }}>${used}/${cap}d</span>
            </div>`;
        })}
      </div>
      ${totalPages > 1 && html`
        <div style=${{ display:'flex', justifyContent:'center', gap:5, marginTop:6 }}>
          ${Array.from({length:totalPages}).map((_,i) => html`
            <button key=${i} onClick=${() => setPage(i)}
              style=${{ width:page===i?16:6, height:6, borderRadius:3, border:'none', cursor:'pointer', transition:'all .2s',
                background:page===i ? '#007AFF' : '#D1D1D6' }}></button>`)}
        </div>`}
    </div>`;
}


function RoomPicker() {
  // ─── SUPABASE AUTH GATE ───
  const [authState,   setAuthState]   = useState('checking');
  const [authUser,    setAuthUser]    = useState(null);

  useEffect(() => {
    sbGetSession().then(session => {
      if (session) { setAuthUser(session.user); setAuthState('signed-in'); return; }
      // Check superuser localStorage session
      try {
        const stored = localStorage.getItem('rf-admin-session');
        if (stored) {
          const su = JSON.parse(stored);
          if (su?.isSuperuser) { setAuthUser({ email: su.email, _member: su }); setAuthState('signed-in'); return; }
        }
      } catch {}
      setAuthState('signed-out');
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_ev, session) => {
      if (session) {
        setAuthUser(session.user); setAuthState('signed-in');
        // Also sync rf-session so project navigation works without re-login
        sbLoadTeamMembers().then(members => {
          const m = members.find(x => x.email && x.email.toLowerCase() === (session.user.email||'').toLowerCase());
          if (m) {
            const u = { id:m.id, name:m.name, avatar:m.avatar||'🧙', color:m.color||'#5856D6',
              role:m.role_label||'Admin', username:m.username||m.name, isSuperuser:true };
            try { localStorage.setItem('rf-session', JSON.stringify(u)); } catch {}
          }
        }).catch(()=>{});
      }
      else {
        // Only sign out if no superuser session
        try {
          const stored = localStorage.getItem('rf-admin-session');
          if (stored && JSON.parse(stored)?.isSuperuser) return;
        } catch {}
        setAuthUser(null); setAuthState('signed-out');
      }
    });
    return () => subscription.unsubscribe();
  }, []);

  const handleSignOut = async () => {
    await sbSignOut();
    try {
      localStorage.removeItem('rf-admin-session');
      localStorage.removeItem('rf-session');
      // Clear all sala sessions too
      Object.keys(localStorage).filter(k=>k.startsWith('rf-user-')).forEach(k=>localStorage.removeItem(k));
    } catch {}
    setAuthState('signed-out'); setAuthUser(null);
  };

  // ─── ADMIN LOGIN FORM (shown when no Supabase session) ───
  // Allows both: (a) Supabase Auth email+pass, (b) team_members with is_superuser=true
  const [adminEmail,    setAdminEmail]    = useState('');
  const [adminPass,     setAdminPass]     = useState('');
  const [adminError,    setAdminError]    = useState('');
  const [adminLogging,  setAdminLogging]  = useState(false);

  const handleAdminLogin = async () => {
    const input = adminEmail.trim().toLowerCase();
    if (!input) { setAdminError('Introduce tu email o nombre de usuario'); return; }
    setAdminLogging(true); setAdminError('');

    // Try 1: Supabase Auth (email+password)
    if (input.includes('@') && adminPass) {
      const { session, error } = await sbSignIn(adminEmail.trim(), adminPass);
      if (session) { setAdminLogging(false); return; }
    }

    // Try 2: team_members — any of: is_superuser=true OR in local admin list
    const storedAdmins = (() => { try { return JSON.parse(localStorage.getItem('rf-admin-list')||'[]'); } catch { return []; } })();
    const members = await sbLoadTeamMembers();

    // Debug: log what we find for this input
    const candidate = members.find(m => {
      const nameMatch  = m.name    && m.name.toLowerCase()    === input;
      const userMatch  = m.username && m.username.toLowerCase() === input;
      const emailMatch = m.email   && (m.email.toLowerCase()   === input || m.email.split('@')[0].toLowerCase() === input);
      return nameMatch || userMatch || emailMatch;
    });

    if (!candidate) {
      setAdminError('Usuario "' + adminEmail + '" no encontrado. Verifica nombre, username o email.');
      setAdminLogging(false); return;
    }

    // Check access: is_superuser flag OR in local admin list
    const inLocalList = storedAdmins.includes(candidate.id) || storedAdmins.includes(candidate.username) || storedAdmins.includes(candidate.name?.toLowerCase());
    const isSU = candidate.is_superuser === true || candidate.is_superuser === 'true' || candidate.is_superuser === 1;

    if (!isSU && !inLocalList) {
      setAdminError('"' + candidate.name + '" existe pero necesita is_superuser=true en Supabase.');
      setAdminLogging(false); return;
    }

    // Grant access — save BOTH admin session and regular user session
    const superSession = { id:candidate.id, name:candidate.name, email:candidate.email||adminEmail,
      avatar:candidate.avatar||'🧙', color:candidate.color||'#5856D6',
      role:candidate.role_label||'Admin', username:candidate.username||candidate.name,
      isSuperuser:true };
    try {
      localStorage.setItem('rf-admin-session', JSON.stringify(superSession));
      // Also save as regular session so projects work without re-login
      localStorage.setItem('rf-session', JSON.stringify(superSession));
    } catch {}
    setAuthUser({ email: candidate.email||adminEmail, _member: candidate });
    setAuthState('signed-in');
    setAdminLogging(false);
  };

  if (authState === 'checking') return html`
    <div style=${{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'#F5F5F7' }}>
      <div style=${{ textAlign:'center', color:'#86868B' }}>
        <div style=${{ fontSize:28, animation:'spin 1s linear infinite', display:'inline-block', marginBottom:8 }}>⏳</div>
        <p style=${{ fontSize:14 }}>Verificando sesión…</p>
      </div>
    </div>`;

  if (authState === 'signed-out') return html`

/* ═══ PROJECT LIST — muestra proyectos del usuario y permite cambiar ═══ */
function ProjectList({ currentSala, userId }) {
  const [rooms,   setRooms]   = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    Promise.all([sbLoadRooms(), sbLoadTeamMembers(), sbGetSession()]).then(([allRooms, members, session]) => {
      // Match by id first, then by email (covers admin session users)
      const me = members.find(m => m.id === userId) ||
        (session?.user ? members.find(m => m.email && m.email.toLowerCase() === session.user.email.toLowerCase()) : null);
      if (!me) {
        // No team_members record — if admin session exists, show all rooms
        if (session?.user) setRooms(allRooms||[]);
        setLoading(false); return;
      }
      const myRooms = me.is_superuser
        ? (allRooms||[])
        : (allRooms||[]).filter(r => (me.rooms||[]).includes(r.slug));
      setRooms(myRooms); setLoading(false);
    });
  }, [userId]);

  if (loading) return html`<div style=${{ textAlign:'center', padding:12, color:'#86868B', fontSize:12 }}>⏳ Cargando…</div>`;
  if (!rooms.length) return html`<p style=${{ fontSize:12, color:'#C7C7CC', textAlign:'center', padding:8 }}>Sin proyectos asignados</p>`;

  return html`
    <div style=${{ display:'flex', flexDirection:'column', gap:6 }}>
      ${rooms.map(r => {
        const isCurrent = r.slug === currentSala;
        const tInfo = TASK_TEMPLATES[r.tipo] || TASK_TEMPLATES.agile;
        return html`
          <button key=${r.slug}
            onClick=${()=>{ if(!isCurrent) window.location.href = window.location.pathname + '?sala=' + encodeURIComponent(r.slug); }}
            style=${{ display:'flex', alignItems:'center', gap:10, padding:'10px 14px', borderRadius:12,
              border: isCurrent ? '2px solid #007AFF' : '1.5px solid #E5E5EA',
              background: isCurrent ? '#EEF5FF' : '#FFF',
              cursor: isCurrent ? 'default' : 'pointer', textAlign:'left' }}>
            <span style=${{ fontSize:20 }}>${tInfo.icon}</span>
            <div style=${{ flex:1 }}>
              <p style=${{ fontSize:13, fontWeight:700, color: isCurrent ? '#007AFF' : '#1D1D1F', margin:0 }}>${r.name}</p>

}


function Login({ onJoin, isModal }) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [members,  setMembers]  = useState([]);
  const [error,    setError]    = useState('');
  const [loading,  setLoading]  = useState(false);

  useEffect(() => { sbLoadTeamMembers().then(m => setMembers(m||[])); }, []);

  const handleLogin = async () => {
    if (!username.trim()) { setError('Introduce tu usuario o email'); return; }
    setLoading(true); setError('');

    // Load members fresh from Supabase (always, to ensure latest data)
    const allMembers = await sbLoadTeamMembers();

    const uq = username.trim().toLowerCase();
    const member = allMembers.find(m =>
      (m.username && m.username.toLowerCase() === uq) ||
      (m.email    && m.email.toLowerCase()    === uq) ||
      (m.email    && m.email.split('@')[0].toLowerCase() === uq) ||
      (m.name     && m.name.toLowerCase()     === uq)
    );

    if (!member) {
      // Fallback: try Supabase Auth if password given
      if (password.trim()) {
        const { session } = await sbSignIn(username.trim(), password);
        if (session) {
          // Supabase auth users also go to homepage
          const u = { id: session.user.id, name: username.trim(), avatar: '👤', color: '#007AFF', role: '', isSuperuser: false };
          try { localStorage.setItem('rf-session', JSON.stringify(u)); } catch {}
          setLoading(false); onJoin(u); return;
        }
      }
      setLoading(false); setError('No se encontró el usuario "' + username.trim() + '"'); return;
    }

    // Password check — only if member has one set
    const storedPw = member.pin || member.password || '';
    if (storedPw && storedPw !== password.trim()) {
      setLoading(false); setError('Contraseña incorrecta'); return;
    }

    // Build session — EVERYONE goes to homepage (superusers use ← Centro de control from there)
    const userSession = {
      id: member.id, name: member.name,
      avatar: member.avatar || '👤', color: member.color || '#007AFF',
      role: member.role_label || '', calendarId: member.calendar_id || null,
      username: member.username || member.name,
      isSuperuser: !!member.is_superuser,
    };
    try {
      localStorage.setItem('rf-session', JSON.stringify(userSession));
      if (member.is_superuser) localStorage.setItem('rf-admin-session', JSON.stringify(userSession));
    } catch {}

    setLoading(false);
    onJoin(userSession);
  };
  return html`
    <div style=${{ ...(!isModal ? { minHeight:'100vh', background:'linear-gradient(135deg,#0057FF,#00C6FF)', display:'flex', alignItems:'center', justifyContent:'center', padding:20 } : {}) }}>
      <div style=${{ background:'#FFF', borderRadius:24, padding:'36px 32px', maxWidth:420, width:'100%', ...(!isModal ? { boxShadow:'0 20px 60px rgba(0,0,0,.15)' } : {}) }}>

        <div style=${{ textAlign:'center', marginBottom:28 }}>
          <h1 style=${{ fontFamily:"'Comfortaa',sans-serif", fontSize:32, fontWeight:400, letterSpacing:2, background:'linear-gradient(90deg,#007AFF,#5856D6)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent', backgroundClip:'text' }}>revelio</h1>
          <p style=${{ color:'#86868B', fontSize:13, marginTop:4 }}>Accede con tu cuenta</p>
        </div>

        <div style=${{ display:'flex', flexDirection:'column', gap:10 }}>
          <div>
            <label style=${{ fontSize:11, fontWeight:700, color:'#86868B', textTransform:'uppercase', display:'block', marginBottom:4 }}>Usuario o email</label>
            <input value=${username} onInput=${e=>{setUsername(e.target.value);setError('');}}
              onKeyDown=${e=>e.key==='Enter'&&handleLogin()}
              placeholder="tu_usuario o email@..."
              style=${{ ...iS, fontSize:14 }} />
          </div>

          <div>
            <label style=${{ fontSize:11, fontWeight:700, color:'#86868B', textTransform:'uppercase', display:'block', marginBottom:4 }}>Contraseña <span style=${{fontWeight:400,color:'#C7C7CC'}}>(opcional)</span></label>
            <input type="password" value=${password} onInput=${e=>{setPassword(e.target.value);setError('');}}
              onKeyDown=${e=>e.key==='Enter'&&handleLogin()}
              placeholder="••••••••"
              style=${{ ...iS, fontSize:14 }} />
          </div>



          ${error && html`
            <div style=${{ background:'#FFF5F5', border:'1px solid #FF3B3025', borderRadius:10, padding:'10px 14px', fontSize:13, color:'#FF3B30', fontWeight:600 }}>
              ${error}
            </div>
          `}

          <button onClick=${handleLogin} disabled=${loading}
            style=${{ ...bP, padding:14, fontSize:15, marginTop:4, opacity:loading?.6:1 }}>
            ${loading ? '⏳ Verificando…' : '🪄 Entrar'}
          </button>
        </div>

        <p style=${{ textAlign:'center', fontSize:11, color:'#C7C7CC', marginTop:20 }}>
          ¿No tienes acceso? Contacta con tu Scrum Master.
        </p>
      </div>
    </div>
  `;
}

function saveTeamLocal(t) {

}
function loadVacsData() {
  try { return JSON.parse(localStorage.getItem('rf-vac-'+SALA)||'[]'); } catch { return []; }
}
function saveVacsLocal(v) {

async function saveTeamSupabase(team, vacs) {
  // Save team to room metadata (names/roles for this sala)
  try { await sbUpdateRoomMeta(SALA, { team }); } catch {}
  // Save vacations globally per team_member
  // Group vacs by memberId and save to each member
  const byMember = {};
  vacs.forEach(v => { if (v.memberId) { if(!byMember[v.memberId]) byMember[v.memberId]=[]; byMember[v.memberId].push(v); } });
  await Promise.all(Object.entries(byMember).map(([id, mv]) => sbSaveMemberVacs(id, mv)));
}

function PEquipo() {
  const [team,    setTeam]   = useState([]);
  const [loading, setLoading]= useState(true);
  const [subTab,  setSubTab] = useState('perfiles');
  const [org,     setOrg]    = useState({});
  const [orgData, setOrgData]= useState([]);
  const [orgSaving, setOrgSaving] = useState(false);

  // Skill Matrix state
  const [profiles, setProfiles] = useState([]);
  const [skills,   setSkills]   = useState([]);
  const [profSkills, setProfSkills] = useState([]);
  const [memSkills,  setMemSkills]  = useState([]);
  const [memProfiles, setMemProfiles] = useState([]);
  const [catalog, setCatalog] = useState([]);
  const [actions, setActions] = useState([]);

  // Modals
  const [editProfile, setEditProfile] = useState(null);
  const [editSkill, setEditSkill] = useState(null);
  const [editCategory, setEditCategory] = useState(null);
  const [evalMember, setEvalMember] = useState(null);

  useEffect(() => {
    Promise.all([
      sbLoadTeamMembers(),
      sbLoadOrgChart(SALA),
      sbLoadSkillProfiles(SALA),
      sbLoadSkills(SALA),
      sbLoadAllProfileSkills(SALA),
      sbLoadMemberSkills(SALA),
      sbLoadMemberProfiles(SALA),
      sbLoadTrainingCatalog(),
      sbLoadSkillActions(SALA),
    ]).then(([members, chart, profs, sks, ps, ms, mp, cat, acts]) => {
      const salaM = members.filter(m=>(m.rooms||[]).includes(SALA));
      setTeam(salaM.length>0?salaM:members);
      const orgMap = {};
      chart.forEach(n => { orgMap[n.member_id] = n.manager_id||null; });
      setOrg(orgMap); setOrgData(chart);
      setProfiles(profs); setSkills(sks); setProfSkills(ps); setMemSkills(ms); setMemProfiles(mp);
      setCatalog(cat); setActions(acts);
      setLoading(false);
    });
  }, []);

  const setManager = async (memberId, managerId) => {
    setOrgSaving(true);
    setOrg(prev=>({...prev,[memberId]:managerId||null}));
    await sbSaveOrgNode(SALA, memberId, managerId||null);
    setOrgSaving(false);
  };

  // ── Skill Matrix helpers ──
  const LEVEL_COLORS = {1:'#FF3B30',2:'#FF9500',3:'#34C759',4:'#007AFF'};
  const LEVEL_LABELS = {1:'Introducción',2:'Asistido',3:'Independiente',4:'Experto'};
  const LEVEL_ICONS  = {1:'📖',2:'🤝',3:'🎯',4:'⭐'};
  const categories = [...new Set(skills.map(s=>s.category))].sort();

  const profileSkillsFor = (pid) => profSkills.filter(ps=>ps.profile_id===pid);
  const memberSkillLevel = (mid, sid) => memSkills.find(ms=>ms.member_id===mid&&ms.skill_id===sid)?.current_level||0;
  const memberProfile = (mid) => {
    const mp = memProfiles.find(mp=>mp.member_id===mid);
    return mp ? profiles.find(p=>p.id===mp.profile_id) : null;
  };
  const memberFit = (mid) => {
    const prof = memberProfile(mid);
    if(!prof) return null;
    const reqs = profileSkillsFor(prof.id);
    if(!reqs.length) return null;
    const totalReq = reqs.reduce((s,r)=>s+r.required_level,0);
    const totalAct = reqs.reduce((s,r)=>s+Math.min(memberSkillLevel(mid,r.skill_id),r.required_level),0);
    return Math.round(totalAct/totalReq*100);
  };
  const fitColor = (pct) => pct>=90?'#34C759':pct>=70?'#FF9500':'#FF3B30';

  // ── CRUD actions ──
  const saveProfile = async (p) => {
    const saved = await sbSaveSkillProfile({...p, sala:SALA});
    if(saved) setProfiles(prev=>prev.find(x=>x.id===saved.id)?prev.map(x=>x.id===saved.id?saved:x):[...prev,saved]);
    return saved;
  };
  const deleteProfile = async (id) => {
    await sbDeleteSkillProfile(id);
    setProfiles(prev=>prev.filter(x=>x.id!==id));
    setProfSkills(prev=>prev.filter(x=>x.profile_id!==id));
    setMemProfiles(prev=>prev.filter(x=>x.profile_id!==id));
  };
  const saveSkill = async (s) => {
    const saved = await sbSaveSkill({...s, sala:SALA});
    if(saved) setSkills(prev=>prev.find(x=>x.id===saved.id)?prev.map(x=>x.id===saved.id?saved:x):[...prev,saved]);
    return saved;
  };
  const deleteSkill = async (id) => {
    await sbDeleteSkill(id);
    setSkills(prev=>prev.filter(x=>x.id!==id));
    setProfSkills(prev=>prev.filter(x=>x.skill_id!==id));
    setMemSkills(prev=>prev.filter(x=>x.skill_id!==id));
  };
  const saveProfSkill = async (profileId, skillId, level) => {
    const saved = await sbSaveProfileSkill({profile_id:profileId, skill_id:skillId, required_level:level});
    if(saved) setProfSkills(prev=>{
      const ex = prev.findIndex(x=>x.profile_id===profileId&&x.skill_id===skillId);
      return ex>=0 ? prev.map((x,i)=>i===ex?saved:x) : [...prev,saved];
    });
  };
  const removeProfSkill = async (profileId, skillId) => {
    const row = profSkills.find(x=>x.profile_id===profileId&&x.skill_id===skillId);
    if(row) { await sbDeleteProfileSkill(row.id); setProfSkills(prev=>prev.filter(x=>x.id!==row.id)); }
  };
  const saveMemSkill = async (memberId, skillId, level) => {
    const saved = await sbSaveMemberSkill({member_id:memberId, skill_id:skillId, current_level:level, assessed_at:new Date().toISOString()});
    if(saved) setMemSkills(prev=>{
      const ex = prev.findIndex(x=>x.member_id===memberId&&x.skill_id===skillId);
      return ex>=0 ? prev.map((x,i)=>i===ex?saved:x) : [...prev,saved];
    });
  };
  const assignProfile = async (memberId, profileId) => {
    // Remove existing assignment first
    const old = memProfiles.find(x=>x.member_id===memberId&&x.sala===SALA);
    if(old) { await sbDeleteMemberProfile(old.id); setMemProfiles(prev=>prev.filter(x=>x.id!==old.id)); }
    if(!profileId) return;
    const saved = await sbSaveMemberProfile({member_id:memberId, profile_id:profileId, sala:SALA});
    if(saved) setMemProfiles(prev=>[...prev,saved]);
  };

  // ── Skill Actions & Training CRUD ──
  const saveAction = async (a) => {
    const saved = await sbSaveSkillAction({...a, sala:SALA});
    if(saved) setActions(prev=>prev.find(x=>x.id===saved.id)?prev.map(x=>x.id===saved.id?saved:x):[...prev,saved]);
  };
  const deleteAction = async (id) => { await sbDeleteSkillAction(id); setActions(prev=>prev.filter(x=>x.id!==id)); };
  const saveCatalogItem = async (t) => {
    const saved = await sbSaveTraining(t);
    if(saved) setCatalog(prev=>prev.find(x=>x.id===saved.id)?prev.map(x=>x.id===saved.id?saved:x):[...prev,saved]);
  };
  const deleteCatalogItem = async (id) => { await sbDeleteTraining(id); setCatalog(prev=>prev.filter(x=>x.id!==id)); };

  // All gaps across team (sorted by severity)
  const allGaps = team.flatMap(m => {
    const prof = memberProfile(m.id);
    if(!prof) return [];
    return profileSkillsFor(prof.id).map(r => {
      const cur = memberSkillLevel(m.id, r.skill_id);
      const gap = r.required_level - cur;
      if(gap <= 0) return null;
      const sk = skills.find(s=>s.id===r.skill_id);
      return { member:m, skill:sk, required:r.required_level, current:cur, gap, profileName:prof.name };
    }).filter(Boolean);
  }).sort((a,b) => b.gap - a.gap);

  // Suggest trainings for a skill
  const suggestTraining = (skillName, cat) => {
    const q = (skillName||'').toLowerCase();
    const qc = (cat||'').toLowerCase();
    return catalog.filter(t =>
      t.name.toLowerCase().includes(q) || (t.subcategory||'').toLowerCase().includes(q) ||

        <button key=${t.id} onClick=${()=>setSubTab(t.id)}
          style=${{padding:'8px 16px',fontSize:12,fontWeight:subTab===t.id?700:500,background:subTab===t.id?'#1D1D1F':'#FFF',color:subTab===t.id?'#FFF':'#6E6E73',border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:5}}>
          <${Icon} name=${t.icon} size=${13} color=${subTab===t.id?'#FFF':'#86868B'} /> ${t.label}
        </button>`)}
    </div>

    ${subTab==='perfiles' && html`

            <button onClick=${()=>{if(editCategory.trim()){setEditSkill({name:'',category:editCategory.trim(),icon:'📘'});setEditCategory(null)}}}
              style=${{padding:'8px 20px',borderRadius:10,border:'none',background:'#1D1D1F',color:'#FFF',fontSize:12,fontWeight:600,cursor:'pointer'}}>Crear y añadir skill</button>

    ${evalMember && html`
      <div style=${{position:'fixed',inset:0,zIndex:15000,display:'flex',alignItems:'center',justifyContent:'center',padding:24}}>

            <div>

            </div>
            <div style=${{marginLeft:'auto'}}>
              ${(()=>{const f=memberFit(evalMember.id);return f!==null?html`<div style=${{fontSize:24,fontWeight:800,color:fitColor(f)}}>${f}%</div>`:''})()}
            </div>
            <button onClick=${()=>setEvalMember(null)} style=${{border:'none',background:'#F2F2F7',borderRadius:10,width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:14}}>✕</button>
          </div>
          ${(()=>{
            const prof = memberProfile(evalMember.id);
            const reqs = prof ? profileSkillsFor(prof.id) : [];
            if(!reqs.length) return html`<p style=${{color:'#86868B',textAlign:'center',padding:20}}>Asigna un perfil primero</p>`;
            const n = reqs.length;
            const cx=130,cy=130,maxR=105;
            const angleStep = Math.PI*2/n;
            const reqPts = reqs.map((r,i)=>{
              const a = -Math.PI/2+i*angleStep;
              const rv = r.required_level/4*maxR;
              return [cx+Math.cos(a)*rv,cy+Math.sin(a)*rv];
            });
            const actPts = reqs.map((r,i)=>{
              const a = -Math.PI/2+i*angleStep;
              const lv = memberSkillLevel(evalMember.id,r.skill_id);
              const rv = lv/4*maxR;
              return [cx+Math.cos(a)*rv,cy+Math.sin(a)*rv];
            });
            const reqPath = reqPts.map((p,i)=>(i===0?'M':'L')+p[0]+','+p[1]).join(' ')+'Z';
            const actPath = actPts.map((p,i)=>(i===0?'M':'L')+p[0]+','+p[1]).join(' ')+'Z';
            const labels = reqs.map((r,i)=>{
              const sk = skills.find(s=>s.id===r.skill_id);
              const a = -Math.PI/2+i*angleStep;
              const lx = cx+Math.cos(a)*(maxR+18);
              const ly = cy+Math.sin(a)*(maxR+18);
              return {name:sk?.name||'?',x:lx,y:ly,anchor:lx<cx-5?'end':lx>cx+5?'start':'middle'};
            });
            return html`
              <div style=${{display:'grid',gridTemplateColumns:'260px 1fr',gap:16,alignItems:'start'}}>
                <div style=${{background:'#FAFAFA',borderRadius:14,padding:8,textAlign:'center'}}>

                    ${[1,2,3,4].map(l=>html`<polygon key=${l} points=${reqs.map((_,i)=>{const a=-Math.PI/2+i*angleStep;return (cx+Math.cos(a)*maxR*l/4)+','+(cy+Math.sin(a)*maxR*l/4)}).join(' ')} fill="none" stroke="#E5E5EA" stroke-width=${l===4?1.5:.5} />`)}
                    ${reqs.map((_,i)=>{const a=-Math.PI/2+i*angleStep;return html`<line key=${i} x1=${cx} y1=${cy} x2=${cx+Math.cos(a)*maxR} y2=${cy+Math.sin(a)*maxR} stroke="#F2F2F7" stroke-width=".5" />`})}
                    <polygon points=${reqPath} fill="rgba(0,122,255,.08)" stroke="#007AFF" stroke-width="2" stroke-dasharray="6 3" />
                    <polygon points=${actPath} fill="rgba(88,86,214,.15)" stroke="#5856D6" stroke-width="2.5" />
                    ${actPts.map((p,i)=>html`<circle key=${i} cx=${p[0]} cy=${p[1]} r="4" fill="#5856D6" stroke="#FFF" stroke-width="1.5" />`)}
                    ${labels.map((lb,i)=>html`<text key=${i} x=${lb.x} y=${lb.y} font-size="9" font-weight="600" fill="#6E6E73" text-anchor=${lb.anchor} dominant-baseline="middle">${lb.name}</text>`)}
                  </svg>
                  <div style=${{display:'flex',justifyContent:'center',gap:12,fontSize:10,marginTop:4}}>
                    <span style=${{display:'flex',alignItems:'center',gap:4}}><span style=${{width:12,height:3,background:'#007AFF',borderRadius:2,display:'inline-block'}}></span> Requerido</span>
                    <span style=${{display:'flex',alignItems:'center',gap:4}}><span style=${{width:12,height:3,background:'#5856D6',borderRadius:2,display:'inline-block'}}></span> Actual</span>
                  </div>
                </div>
                <div style=${{display:'flex',flexDirection:'column',gap:5,maxHeight:'60vh',overflowY:'auto'}}>
                  ${reqs.map(r => {
                    const sk = skills.find(s=>s.id===r.skill_id);
                    if(!sk) return null;
                    const cur = memberSkillLevel(evalMember.id,r.skill_id);
                    const gap = r.required_level - cur;
                    return html`<div key=${r.id} style=${{padding:'10px 12px',borderRadius:10,background:'#FAFAFA',border:'1px solid #F2F2F7'}}>
                      <div style=${{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                        <span style=${{fontSize:12,fontWeight:700,flex:1}}>${sk.name}</span>
                        <span style=${{fontSize:9,color:'#86868B'}}>Req: ${LEVEL_LABELS[r.required_level]}</span>
                        <span style=${{fontSize:10,fontWeight:700,color:LEVEL_COLORS[r.required_level]}}>${r.required_level}</span>
                      </div>
                      <div style=${{display:'flex',gap:4}}>
                        ${[1,2,3,4].map(l=>html`<button key=${l} onClick=${async()=>await saveMemSkill(evalMember.id,r.skill_id,l)}
                          style=${{flex:1,padding:'6px 4px',borderRadius:8,border:cur===l?'2px solid '+LEVEL_COLORS[l]:'1.5px solid #E5E5EA',background:cur===l?LEVEL_COLORS[l]+'15':'#FFF',cursor:'pointer',textAlign:'center'}}>
                          <div style=${{fontSize:12}}>${LEVEL_ICONS[l]}</div>

                      ${gap>0 && html`<div style=${{marginTop:4,fontSize:10,color:gap>=2?'#FF3B30':'#FF9500'}}>
                        ${gap>=2?'🔴':'🔶'} Gap: ${gap} — ${gap>=2?'Formación requerida':'Práctica/mentoring'}

      </div>`}

function PFTEs({ team, org, orgData: orgDataProp }) {
  const FTE_VIEWS = ['mes', 'anual'];
  const [fteView, setFteView] = useState('mes');
  const [orgDataLocal, setOrgDataLocal] = useState([]);
  const [loading, setLoading] = useState(false);
  const orgData = orgDataProp && orgDataProp.length > 0 ? orgDataProp : orgDataLocal;
  const today = new Date();
  const [viewYear,  setViewYear]  = useState(today.getFullYear());
  const [viewMonth, setViewMonth] = useState(today.getMonth());
  const MONTH_NAMES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const days = Array.from({length:daysInMonth},(_,i)=>i+1);
  const todayStr = today.toISOString().slice(0,10);

  useEffect(() => {
    if (!orgDataProp || orgDataProp.length === 0) {
      setLoading(true);
      sbLoadOrgChart(SALA).then(rows => { setOrgDataLocal(rows); setLoading(false); });
    }
  }, [orgDataProp]);

  const isWeekend = (d) => { const w=new Date(viewYear,viewMonth,d).getDay(); return w===0||w===6; };
  const isOnVac = (memberId, d) => {
    const m=team.find(x=>x.id===memberId); if(!m) return false;
    const ds=viewYear+'-'+String(viewMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    return (m.vacations||[]).some(v=>v.from<=ds&&(!v.to||v.to>=ds));
  };
  const isActive = (row, d) => {
    const ds=viewYear+'-'+String(viewMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    return ds>=(row.start_date||'2000-01-01') && ds<=(row.end_date||'2099-12-31');
  };
  const fteDay = (d) => isWeekend(d) ? 0 : orgData.reduce((s,r)=>{
    if(!isActive(r,d)||isOnVac(r.member_id,d)) return s;
    return s+(r.dedication??1);
  },0);
  const maxFTE = Math.max(1,...days.map(d=>fteDay(d)));
  const prevM = () => { if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1); };
  const nextM = () => { if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1); };
  const updateOrgField = async (memberId, managerId, field, val) => {
    const {data:_pf}=await supabase.from('org_chart').select('id').eq('sala',SALA).eq('member_id',memberId).single(); if(_pf?.id){await supabase.from('org_chart').update({[field]:val}).eq('id',_pf.id);}else{await supabase.from('org_chart').insert({sala:SALA,member_id:memberId,manager_id:managerId||null,[field]:val});}
    setOrgData(prev=>prev.map(r=>r.member_id===memberId?{...r,[field]:val}:r));
  };

  // Annual view: current month -3 to +12 (16 months total)
  const annualMonths = Array.from({length:16},(_,i)=>{
    const d=new Date(today.getFullYear(),today.getMonth()-3+i,1);
    return {year:d.getFullYear(), month:d.getMonth()};
  });

  const fteForMonth = (memberId, yr, mo, dedication) => {
    const daysInMo = new Date(yr,mo+1,0).getDate();
    const ds = Array.from({length:daysInMo},(_,i)=>i+1);
    return ds.filter(d=>!isWeekend(d)&&isOnVac(memberId,d)===false).length; // simplified
  };

  return html`<div>

    <div style=${{ marginBottom:12 }}>
      <h3 style=${{ fontSize:15, fontWeight:700 }}>📊 FTEs del proyecto — Vista anual</h3>
      <p style=${{ fontSize:11, color:'#86868B', marginTop:2 }}>Mes actual + 12 meses. Configura fechas y dedicación en la pestaña Lista.</p>
    </div>
    ${loading ? html`<div style=${{ textAlign:'center',padding:40,color:'#86868B' }}>⏳</div>` : html`

      <div style=${{ background:'#FFF', borderRadius:14, border:'1.5px solid #E5E5EA', padding:'16px', marginBottom:16 }}>
        <h4 style=${{ fontSize:11, fontWeight:700, color:'#86868B', marginBottom:10, textTransform:'uppercase', letterSpacing:.5 }}>FTEs totales · ${MONTH_NAMES[viewMonth]}</h4>
        <div style=${{ display:'flex', alignItems:'flex-end', gap:2, height:72 }}>
          ${days.map(d => {
            const wknd=isWeekend(d); const fte=fteDay(d);
            const isT=todayStr===viewYear+'-'+String(viewMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
            const h=wknd?3:Math.max(3,Math.round((fte/maxFTE)*64));
            return html`<div key=${d} title=${wknd?'Fin semana':fte.toFixed(2)+' FTEs'}
              style=${{ display:'flex', flexDirection:'column', alignItems:'center', gap:1, flex:1, minWidth:12 }}>
              ${!wknd&&fte>0&&html`<span style=${{ fontSize:6,color:'#86868B' }}>${fte.toFixed(1)}</span>`}
              <div style=${{ width:'80%', height:h+'px', borderRadius:'3px 3px 0 0',
                background:wknd?'#E5E5EA':isT?'#007AFF':fte>0?'#34C759':'#F2F2F7' }}></div>
              <span style=${{ fontSize:6, color:isT?'#007AFF':'#C7C7CC' }}>${d}</span>
            </div>`;
          })}
        </div>
      </div>


        <div style=${{ background:'#FFF', borderRadius:14, border:'1.5px solid #E5E5EA', overflow:'auto', marginBottom:16 }}>
          <table style=${{ width:'100%', borderCollapse:'collapse', minWidth:900 }}>
            <thead><tr style=${{ background:'#F9F9FB', borderBottom:'2px solid #E5E5EA' }}>
              <th style=${{ padding:'10px 14px', textAlign:'left', fontSize:11, fontWeight:700, color:'#86868B', minWidth:130, position:'sticky', left:0, background:'#F9F9FB', zIndex:2 }}>Miembro</th>
              ${annualMonths.map(({year,month})=>html`
                <th key=${year+'-'+month} style=${{ padding:'8px 6px', textAlign:'center', fontSize:10, fontWeight:700,
                  color: year===today.getFullYear()&&month===today.getMonth()?'#007AFF':'#86868B',
                  background: year===today.getFullYear()&&month===today.getMonth()?'#EEF5FF':'#F9F9FB',
                  minWidth:52, borderBottom: year===today.getFullYear()&&month===today.getMonth()?'2px solid #007AFF':'none' }}>
                  ${MONTH_NAMES[month].slice(0,3)}<br/><span style=${{ fontSize:9, fontWeight:400 }}>${year}</span>
                </th>`)}
            </tr></thead>
            <tbody>
              ${team.map((m,mi) => {
                const row=orgData.find(r=>r.member_id===m.id)||{};
                return html`<tr key=${m.id} style=${{ borderBottom:'1px solid #F2F2F7', background:mi%2===0?'#FFF':'#FAFAFA' }}>
                  <td style=${{ padding:'8px 14px', position:'sticky', left:0, background:mi%2===0?'#FFF':'#FAFAFA', zIndex:1 }}>
                    <div style=${{ display:'flex', alignItems:'center', gap:6 }}>
                      <span style=${{ fontSize:16 }}>${m.avatar||'👤'}</span>
                      <div><div style=${{ fontSize:11, fontWeight:600 }}>${m.name}</div>${m.role_label&&html`<div style=${{ fontSize:9, color:'#86868B' }}>${m.role_label}</div>`}</div>
                    </div>
                  </td>
                  ${annualMonths.map(({year,month}) => {
                    const start = row.start_date||'2000-01-01';
                    const end   = row.end_date||'2099-12-31';
                    const monthStart = year+'-'+String(month+1).padStart(2,'0')+'-01';
                    const monthEnd   = year+'-'+String(month+1).padStart(2,'0')+'-'+String(new Date(year,month+1,0).getDate()).padStart(2,'0');
                    const active = monthEnd >= start && monthStart <= end;
                    const ded    = row.dedication ?? 1;
                    const isNow  = year===today.getFullYear()&&month===today.getMonth();
                    return html`<td key=${year+'-'+month} style=${{ padding:'6px', textAlign:'center',
                      background:isNow?(active?'#EEF5FF':'#F8FAFF'):(active?'#FFF':'#F9F9FB') }}>
                      ${active ? html`
                        <div style=${{ padding:'3px 4px', borderRadius:6, background:isNow?'#007AFF':ded>=1?'#34C75920':'#FF950015',
                          border:'1px solid '+(isNow?'transparent':ded>=1?'#34C75930':'#FF950030') }}>
                          <div style=${{ fontSize:11, fontWeight:700, color:isNow?'#FFF':ded>=1?'#34C759':'#FF9500' }}>${ded}</div>
                          <div style=${{ fontSize:8, color:isNow?'rgba(255,255,255,.8)':'#86868B' }}>FTE</div>
                        </div>` : html`<span style=${{ color:'#E5E5EA', fontSize:10 }}>—</span>`}
                    </td>`;
                  })}
                </tr>`;
              })}

              <tr style=${{ background:'#F0F7FF', borderTop:'2px solid #007AFF20' }}>
                <td style=${{ padding:'10px 14px', fontSize:11, fontWeight:700, color:'#007AFF', position:'sticky', left:0, background:'#F0F7FF' }}>Total FTEs</td>
                ${annualMonths.map(({year,month}) => {
                  const total = team.reduce((sum,m) => {
                    const row=orgData.find(r=>r.member_id===m.id)||{};
                    const start=row.start_date||'2000-01-01', end=row.end_date||'2099-12-31';
                    const ms=year+'-'+String(month+1).padStart(2,'0')+'-01';
                    const me=year+'-'+String(month+1).padStart(2,'0')+'-'+String(new Date(year,month+1,0).getDate()).padStart(2,'0');
                    return me>=start&&ms<=end ? sum+(row.dedication??1) : sum;
                  },0);
                  return html`<td key=${year+'-'+month} style=${{ padding:'8px 6px', textAlign:'center' }}>
                    <span style=${{ fontSize:12, fontWeight:800, color:total>0?'#007AFF':'#C7C7CC' }}>${total>0?total.toFixed(1):'—'}</span>
                  </td>`;
                })}
              </tr>
            </tbody>
          </table>
        </div>

/* ═══ CONFIRM MODAL — custom replacement for browser confirm() ═══ */
function ConfirmModal({ title, message, confirmLabel, cancelLabel, confirmColor, icon, onConfirm, onCancel }) {
  return html`
    <div style=${{position:'fixed',inset:0,zIndex:20000,display:'flex',alignItems:'center',justifyContent:'center',padding:'24px'}}>
      <div onClick=${()=>onCancel&&onCancel()} style=${{position:'absolute',inset:0,background:'rgba(0,0,0,.15)',backdropFilter:'blur(6px)',WebkitBackdropFilter:'blur(6px)'}}></div>
      <div style=${{position:'relative',zIndex:1,background:'#FFF',borderRadius:18,width:'100%',maxWidth:420,boxShadow:'0 12px 40px rgba(0,0,0,.12), 0 0 0 1px rgba(0,0,0,.04)',animation:'fadeIn .15s ease'}}>
        <div style=${{padding:'28px 28px 16px',textAlign:'center'}}>
          ${icon&&html`<div style=${{fontSize:40,marginBottom:14}}>${icon}</div>`}
          <h3 style=${{fontSize:17,fontWeight:700,margin:'0 0 10px',color:'#1D1D1F'}}>${title||'Confirmar'}</h3>
          <p style=${{fontSize:13,color:'#6E6E73',lineHeight:1.6,margin:0}} dangerouslySetInnerHTML=${{__html:typeof message==='string'?message:''}}></p>
          ${typeof message!=='string'&&html`<p style=${{fontSize:13,color:'#6E6E73',lineHeight:1.6,margin:0}}>${message}</p>`}
        </div>
        <div style=${{padding:'8px 28px 24px',display:'flex',gap:10}}>
          <button onClick=${()=>onCancel&&onCancel()}
            style=${{flex:1,padding:'12px 16px',borderRadius:12,border:'1.5px solid #E5E5EA',background:'#FFF',color:'#6E6E73',fontSize:14,fontWeight:500,cursor:'pointer',transition:'all .15s'}}>
            ${cancelLabel||'No'}
          </button>
          <button onClick=${()=>onConfirm&&onConfirm()}
            style=${{flex:1,padding:'12px 16px',borderRadius:12,border:'none',background:confirmColor||'#007AFF',color:'#FFF',fontSize:14,fontWeight:600,cursor:'pointer',transition:'all .15s'}}>
            ${confirmLabel||'Sí'}
          </button>
        </div>
      </div>
    </div>`;
}


/* ═══ GLOBAL CONFIRM — any component can call window.__confirm({...}) ═══ */
const __confirmState = { set: null };
function GlobalConfirm() {
  const [cfg, setCfg] = useState(null);
  __confirmState.set = setCfg;
  if (!cfg) return null;
  return html`<${ConfirmModal}
    icon=${cfg.icon||'🗑️'}
    title=${cfg.title||'Confirmar'}
    message=${cfg.message||'¿Estás seguro?'}
    confirmLabel=${cfg.confirmLabel||'Sí, eliminar'}
    cancelLabel=${cfg.cancelLabel||'Cancelar'}
    confirmColor=${cfg.confirmColor||'#FF3B30'}
    onConfirm=${()=>{setCfg(null);cfg.onConfirm&&cfg.onConfirm();}}
    onCancel=${()=>{setCfg(null);cfg.onCancel&&cfg.onCancel();}} />`;
}
window.__confirm = (opts) => __confirmState.set && __confirmState.set(opts);

/* ═══ RICH TEXT EDITOR — contentEditable with toolbar ═══ */
function RichTextEditor({ value, onChange, placeholder }) {
  const editorRef = useRef(null);
  const [editing, setEditing] = useState(false);
  const [original, setOriginal] = useState(value||'');
  
  const exec = (cmd, val) => { document.execCommand(cmd, false, val||null); editorRef.current?.focus(); };
  
  const startEdit = () => { setOriginal(value||''); setEditing(true); };
  const saveEdit = () => {
    const html = editorRef.current?.innerHTML || '';
    // Basic sanitization: strip scripts
    const clean = html.replace(/<script[\s\S]*?<\/script>/gi,'').replace(/on\w+="[^"]*"/gi,'');
    onChange(clean);
    setEditing(false);
  };
  const cancelEdit = () => {
    if(editorRef.current) editorRef.current.innerHTML = original;
    onChange(original);
    setEditing(false);
  };
  
  // Set initial content
  useEffect(() => {
    if(editorRef.current && !editing) editorRef.current.innerHTML = value||'';
  }, [value, editing]);
  
  const TB = ({cmd,icon,label,val}) => html`
    <button type="button" onClick=${()=>exec(cmd,val)} title=${label}
      style=${{border:'none',background:'none',cursor:'pointer',padding:'3px 6px',borderRadius:4,color:'#6E6E73',fontSize:13}}>
      <${Icon} name=${icon} size=${14} color="#6E6E73" />
    </button>`;
  
  if (!editing && !value) {
    return html`<div onClick=${startEdit}
      style=${{border:'1.5px solid #E5E5EA',borderRadius:10,padding:'10px 14px',fontSize:13,color:'#C7C7CC',cursor:'pointer',minHeight:40}}>
      ${placeholder||'Añadir descripción…'}
    </div>`;
  }
  
  if (!editing) {
    return html`<div onClick=${startEdit}
      style=${{border:'1.5px solid #E5E5EA',borderRadius:10,padding:'10px 14px',fontSize:13,cursor:'pointer',minHeight:40,lineHeight:1.5}}
      dangerouslySetInnerHTML=${{__html:value}} />`;
  }
  
  return html`<div style=${{border:'1.5px solid #007AFF',borderRadius:10,overflow:'hidden'}}>

    <div style=${{padding:'4px 8px',borderBottom:'1px solid #E5E5EA',background:'#F9F9FB',display:'flex',gap:2,alignItems:'center',flexWrap:'wrap'}}>
      <${TB} cmd="bold" icon="Bold" label="Negrita" />
      <${TB} cmd="italic" icon="Italic" label="Cursiva" />
      <span style=${{width:1,height:16,background:'#E5E5EA',margin:'0 4px'}}></span>
      <${TB} cmd="insertUnorderedList" icon="List" label="Lista" />
      <${TB} cmd="insertOrderedList" icon="ListOrdered" label="Lista numerada" />
      <span style=${{width:1,height:16,background:'#E5E5EA',margin:'0 4px'}}></span>
      <button type="button" onClick=${()=>{const url=prompt('URL:');if(url)exec('createLink',url);}} title="Enlace"
        style=${{border:'none',background:'none',cursor:'pointer',padding:'3px 6px',borderRadius:4,color:'#6E6E73',fontSize:13}}>
        <${Icon} name="Link" size=${14} color="#6E6E73" />
      </button>
    </div>

    <div ref=${editorRef} contentEditable=${true}
      onInput=${()=>{}}
      style=${{padding:'10px 14px',minHeight:80,fontSize:13,fontFamily:'inherit',outline:'none',lineHeight:1.6}} />

    <div style=${{padding:'6px 10px',borderTop:'1px solid #E5E5EA',background:'#F9F9FB',display:'flex',gap:6}}>
      <button type="button" onClick=${saveEdit}
        style=${{padding:'5px 14px',borderRadius:7,border:'none',background:'#007AFF',color:'#FFF',fontSize:11,fontWeight:600,cursor:'pointer'}}>Guardar</button>
      <button type="button" onClick=${cancelEdit}
        style=${{padding:'5px 14px',borderRadius:7,border:'1px solid #E5E5EA',background:'#FFF',color:'#6E6E73',fontSize:11,cursor:'pointer'}}>Cancelar</button>
    </div>
  </div>`;
}

/* ═══ CHECKLIST — Jira-style with progress, hide, assign, dates ═══ */
function ChecklistEditor({ value, onChange }) {
  const parse = (v) => { try { return JSON.parse(v)||[]; } catch { return []; }};
  const [items, setItems] = useState(()=>parse(value));
  const [newText, setNewText] = useState('');
  const [hideChecked, setHideChecked] = useState(false);
  
  useEffect(() => { setItems(parse(value)); }, [value]);
  
  const sync = (updated) => { setItems(updated); onChange(JSON.stringify(updated)); };
  const add = () => { if(!newText.trim())return; sync([...items,{id:uid(),text:newText.trim(),checked:false,assignee:'',dueDate:''}]); setNewText(''); };
  const toggle = (id) => sync(items.map(i=>i.id===id?{...i,checked:!i.checked}:i));
  const updateText = (id,text) => sync(items.map(i=>i.id===id?{...i,text}:i));
  const remove = (id) => sync(items.filter(i=>i.id!==id));
  const setAssignee = (id,a) => sync(items.map(i=>i.id===id?{...i,assignee:a}:i));
  const setDue = (id,d) => sync(items.map(i=>i.id===id?{...i,dueDate:d}:i));
  const clearAll = () => { window.__confirm({title:'Eliminar checklist',message:'Se borrarán todos los elementos.',onConfirm:()=>sync([])}); };
  
  const total=items.length, done=items.filter(i=>i.checked).length, pct=total>0?Math.round((done/total)*100):0;
  const visible = hideChecked ? items.filter(i=>!i.checked) : items;
  const today = new Date().toISOString().slice(0,10);
  
  if(total===0 && !newText) return html`
    <button type="button" onClick=${()=>setNewText(' ')}
      style=${{padding:'8px 14px',borderRadius:9,border:'1.5px dashed #007AFF40',background:'#F0F7FF',color:'#007AFF',fontSize:12,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:6,width:'100%',justifyContent:'center'}}>
      <${Icon} name="CheckSquare" size=${14} color="#007AFF" /> Añadir checklist
    </button>`;
  
  return html`<div style=${{border:'1.5px solid #E5E5EA',borderRadius:12,overflow:'hidden'}}>
    <div style=${{display:'flex',alignItems:'center',gap:8,padding:'10px 14px',background:'#FAFAFA',borderBottom:'1px solid #E5E5EA'}}>
      <${Icon} name="CheckSquare" size=${14} color="#1D1D1F" />
      <span style=${{fontSize:13,fontWeight:700,flex:1}}>Checklist</span>
      ${total>0&&html`<button type="button" onClick=${()=>setHideChecked(!hideChecked)}
        style=${{fontSize:10,border:'1px solid #E5E5EA',borderRadius:6,padding:'3px 8px',background:'#FFF',cursor:'pointer',color:'#6E6E73'}}>
        ${hideChecked?'Mostrar marcados':'Ocultar marcados'}
      </button>`}
      ${total>0&&html`<button type="button" onClick=${clearAll}
        style=${{fontSize:10,border:'1px solid #E5E5EA',borderRadius:6,padding:'3px 8px',background:'#FFF',cursor:'pointer',color:'#FF3B30'}}>Eliminar</button>`}
    </div>
    ${total>0&&html`<div style=${{padding:'8px 14px',display:'flex',alignItems:'center',gap:8}}>
      <span style=${{fontSize:11,fontWeight:700,color:pct===100?'#34C759':'#1D1D1F',minWidth:30}}>${pct}%</span>
      <div style=${{flex:1,height:6,borderRadius:3,background:'#E5E5EA'}}>
        <div style=${{width:pct+'%',height:'100%',borderRadius:3,background:pct===100?'#34C759':'#007AFF',transition:'width .3s'}}></div>
      </div>
    </div>`}
    <div style=${{padding:'4px 10px'}}>
      ${visible.map(item=>html`
        <div key=${item.id} style=${{display:'flex',alignItems:'flex-start',gap:8,padding:'6px 4px',borderBottom:'1px solid #F2F2F7'}}>
          <input type="checkbox" checked=${item.checked} onChange=${()=>toggle(item.id)}
            style=${{accentColor:'#007AFF',cursor:'pointer',width:16,height:16,marginTop:2,flexShrink:0}} />
          <div style=${{flex:1,minWidth:0}}>
            <input value=${item.text} onInput=${e=>updateText(item.id,e.target.value)}
              style=${{width:'100%',border:'none',padding:'2px 0',fontSize:13,fontFamily:'inherit',outline:'none',background:'transparent',
                textDecoration:item.checked?'line-through':'none',color:item.checked?'#86868B':'#1D1D1F',boxSizing:'border-box'}} />
            ${(item.assignee||item.dueDate)&&html`<div style=${{display:'flex',gap:8,marginTop:2}}>
              ${item.assignee&&html`<span style=${{fontSize:9,color:'#007AFF',fontWeight:600}}>${item.assignee}</span>`}
              ${item.dueDate&&html`<span style=${{fontSize:9,color:item.dueDate<today?'#FF3B30':'#86868B'}}>${fd(item.dueDate)}</span>`}
            </div>`}
          </div>
          <div style=${{display:'flex',gap:2,flexShrink:0,marginTop:2}}>
            <button type="button" onClick=${()=>{const n=prompt('Responsable:',item.assignee||'');if(n!==null)setAssignee(item.id,n);}} title="Asignar"
              style=${{border:'none',background:'none',cursor:'pointer',padding:2,opacity:.5}}><${Icon} name="User" size=${12} color="#86868B" /></button>
            <button type="button" onClick=${()=>{const d=prompt('Fecha (YYYY-MM-DD):',item.dueDate||today);if(d)setDue(item.id,d);}} title="Fecha"
              style=${{border:'none',background:'none',cursor:'pointer',padding:2,opacity:.5}}><${Icon} name="Calendar" size=${12} color="#86868B" /></button>
            <button type="button" onClick=${()=>remove(item.id)} title="Quitar"
              style=${{border:'none',background:'none',cursor:'pointer',padding:2,opacity:.3}}><${Icon} name="X" size=${12} color="#86868B" /></button>
          </div>
        </div>`)}
    </div>
    <div style=${{padding:'8px 14px',display:'flex',gap:6,borderTop:'1px solid #E5E5EA'}}>
      <input value=${newText===' '?'':newText} onInput=${e=>setNewText(e.target.value)}
        onKeyDown=${e=>{if(e.key==='Enter'){e.preventDefault();add();}}}
        placeholder="Añade un elemento"
        style=${{flex:1,border:'1.5px solid #E5E5EA',borderRadius:8,padding:'7px 10px',fontSize:12,fontFamily:'inherit',outline:'none'}} />
      <button type="button" onClick=${add}
        style=${{padding:'7px 14px',borderRadius:8,border:'none',background:'#007AFF',color:'#FFF',fontSize:12,fontWeight:600,cursor:'pointer'}}>Añadir</button>
    </div>
  </div>`;
}


/* ═══ TASK DETAIL MODAL — JIRA-style ═══ */
function TaskDetailModal({ task, onSave, onClose, onDelete, onMitigateRisk, onGoToRisk, teamMembers, tags, tagAssignments, onToggleTag }) {
  const [f, setF] = useState({...task});

  const pr = PRIS.find(p=>p.id===f.priority)||PRIS[1];
  const st = STS.find(s=>s.id===f.status)||STS[0];
  const entityTags = tags.filter(t=>(tagAssignments||[]).some(a=>a.tag_id===t.id&&a.entity_type==='action'&&a.entity_id===task.id));
  const availTags = tags.filter(t=>!entityTags.some(et=>et.id===t.id));

  const save = () => {
    const updated = {...f, updatedAt:new Date().toISOString()};
    onSave(updated);
    // If completing a task linked to a risk, trigger parent's mitigation modal

        <div style=${{padding:'18px 24px',borderBottom:'1px solid #F2F2F7',display:'flex',alignItems:'center',gap:10,flexShrink:0,background:'#FAFAFA'}}>

                  ${(()=>{const allR=window.__currentRisks||[]; const rsk=allR.find(r=>r.id===f.riskId); const rNum=rsk?allR.filter(x=>(x.type||'riesgo')===(rsk.type||'riesgo')).indexOf(rsk)+1:0; const prefix=(rsk?.type||'riesgo')==='problema'?'P':'R'; return html`

                </div>` : null}
              <select value="" onChange=${e=>{if(e.target.value)setF({...f, riskId:e.target.value, source:'risk'}); e.target.value='';}}
                style=${{width:'100%',border:'1.5px dashed #FF950040',borderRadius:9,padding:'8px 10px',fontSize:12,fontFamily:'inherit',outline:'none',color:'#FF9500',background:'#FFF9E6',cursor:'pointer'}}>

                ${(window.__currentRisks||[]).filter(r=>r.status!=='mitigated'&&r.id!==f.riskId).map((r,i)=>{

          <div style=${{width:240,borderLeft:'1px solid #E5E5EA',padding:'16px',overflowY:'auto',background:'#FAFAFA',display:'flex',flexDirection:'column',gap:12,flexShrink:0}}>

            <div>

                <option value="">— Sin asignar —</option>
                ${f.owner && !teamMembers.some(m=>m.name===f.owner) && html`<option value=${f.owner}>${f.owner}</option>`}
                ${teamMembers.map(m=>html`<option key=${m.id} value=${m.name}>${m.avatar||'👤'} ${m.name}</option>`)}

            </div>
            <div>
              ${fieldLabel('Fecha inicio')}
              <input type="date" value=${f.startDate||''} onInput=${e=>setF({...f,startDate:e.target.value})}

            </div>
            <div>
              ${fieldLabel('Fecha límite')}
              <input type="date" value=${f.date||''} onInput=${e=>setF({...f,date:e.target.value})}
                style=${{width:'100%',border:'1.5px solid #E5E5EA',borderRadius:9,padding:'8px 10px',fontSize:12,fontFamily:'inherit',outline:'none',boxSizing:'border-box'}} />
            </div>

            <div style=${{borderTop:'1px solid #E5E5EA',paddingTop:12}}>
              ${fieldLabel('Story Points')}
              <input type="number" min="0" step="1" value=${f.storyPoints||''} onInput=${e=>setF({...f,storyPoints:e.target.value?parseInt(e.target.value):null})}
                placeholder="—"
                style=${{width:'100%',border:'1.5px solid #E5E5EA',borderRadius:9,padding:'8px 10px',fontSize:12,fontFamily:'inherit',outline:'none',boxSizing:'border-box'}} />
            </div>
            <div>
              ${fieldLabel('Sprint')}
              <input value=${f.sprint||''} onInput=${e=>setF({...f,sprint:e.target.value})}
                placeholder="Ej: Sprint 3"
                style=${{width:'100%',border:'1.5px solid #E5E5EA',borderRadius:9,padding:'8px 10px',fontSize:12,fontFamily:'inherit',outline:'none',boxSizing:'border-box'}} />
            </div>
            <div>
              ${fieldLabel('Epic Link')}
              <input value=${f.epicLink||''} onInput=${e=>setF({...f,epicLink:e.target.value})}
                placeholder="Ej: Migración v2"
                style=${{width:'100%',border:'1.5px solid #E5E5EA',borderRadius:9,padding:'8px 10px',fontSize:12,fontFamily:'inherit',outline:'none',boxSizing:'border-box'}} />
            </div>
            <div>
              ${fieldLabel('Origen de demanda')}
              ${fieldSelect(f.demandOrigin||'', e=>setF({...f,demandOrigin:e.target.value}), DEMAND_ORIGINS, '— Sin especificar —')}
            </div>
          </div>
        </div>

        <div style=${{padding:'14px 24px',borderTop:'1px solid #F2F2F7',display:'flex',gap:8,justifyContent:'space-between',flexShrink:0,background:'#FAFAFA'}}>
          <button onClick=${()=>window.__confirm({title:'Eliminar tarea',message:html`¿Eliminar <b>${task.text?.slice(0,50)}</b>?<br/>Esta acción no se puede deshacer.`,onConfirm:()=>onDelete(task.id)})}
            style=${{padding:'8px 16px',borderRadius:10,border:'1.5px solid #FF3B3015',background:'#FFF5F5',color:'#FF3B30',fontSize:12,fontWeight:600,cursor:'pointer'}}>Eliminar</button>

            <button onClick=${save} style=${{padding:'8px 24px',borderRadius:10,border:'none',background:'linear-gradient(135deg,#007AFF,#5856D6)',color:'#FFF',fontSize:12,fontWeight:600,cursor:'pointer'}}>Guardar</button>
          </div>
        </div>
      </div>

    </div>`;
}


/* ═══════════════════════════════════════════════════════════
   PTrabajo — JIRA-like work management module
   Sub-views: Backlog, Board, Lista, Mis tareas, Historial
═══════════════════════════════════════════════════════════ */
function PTrabajo({ actions, sA, risks, user }) {
  const [teamMembers, setTeamMembers] = useState([]);
  const [tags, setTags] = useState([]);
  const [tagAssignments, setTagAssignments] = useState([]);
  const [activeTagFilter, setActiveTagFilter] = useState(null);
  useEffect(() => {
    sbLoadTeamMembers().then(data => {
      const f = data.filter(m=>(m.rooms||[]).includes(SALA));
      setTeamMembers(f.length > 0 ? f : data);
    });
    sbLoadTags(SALA).then(t => setTags(t||[]));
    sbLoadTagAssignments(SALA).then(a => setTagAssignments(a||[]));
  }, []);
  const hasTagA = (tagId, entityId) => tagAssignments.some(a=>a.tag_id===tagId&&a.entity_type==='action'&&a.entity_id===entityId);
  const actionTagList = (id) => tags.filter(t=>hasTagA(t.id,id));
  const quickToggleActionTag = async (tagId, actionId) => {
    const added = await sbToggleTagAssignment(tagId, 'action', actionId, SALA);
    if (added) setTagAssignments(prev=>[...prev,{tag_id:tagId,entity_type:'action',entity_id:actionId,sala:SALA}]);
    else setTagAssignments(prev=>prev.filter(a=>!(a.tag_id===tagId&&a.entity_type==='action'&&a.entity_id===actionId)));
  };

  // ── State ──
  const [subView, setSubView] = useState('board');
  const [form, setForm] = useState({text:'',description:'',owner:'',date:'',priority:'medium',type:'tarea',demandOrigin:'',storyPoints:null,sprint:'',epicLink:''});
  const [eId, setEId] = useState(null);
  const [eF, setEF] = useState({});
  const [detailTask, setDetailTask] = useState(null); // Task for modal view
  // Check if another component wants to open a specific task
  useEffect(() => {
    if (window.__pendingTaskDetail) {
      const t = window.__pendingTaskDetail;
      window.__pendingTaskDetail = null;
      // Find the actual task in actions (the passed one might be stale)
      const fresh = actions.find(a=>a.id===t.id) || t;
      setDetailTask({...fresh});
    }
  }, []);
  const [mitigateModal, setMitigateModal] = useState(null);
  const [deleteConfirm, setDeleteConfirm] = useState(null); // {id, text, type:'task'} // {riskId, taskText}
  const [showTagManager, setShowTagManager] = useState(false);
  const [searchQ, setSearchQ] = useState('');
  const [sortBy, setSortBy] = useState('priority');
  const [filterOwner, setFilterOwner] = useState('all');
  const [dragAct, setDragAct] = useState(null);
  const [overCol, setOverCol] = useState(null);

  const today = new Date().toISOString().slice(0,10);
  // Expose risks/actions for cross-component callbacks (TaskDetailModal, PRiesgos link dialog)
  useEffect(() => { window.__currentRisks = risks||[]; window.__currentActions = actions||[]; }, [risks, actions]);
  // Callback for risk mitigation from task completion
  useEffect(() => { window.__mitigateRisk = (riskId) => {
    // Find the risk update function — we need sR but PTrabajo doesn't have it
    // Instead, dispatch a custom event that PRiesgos can listen to
    window.dispatchEvent(new CustomEvent('mitigate-risk', {detail:{riskId}}));
  }; return ()=>{ window.__mitigateRisk=null; }; }, []);
  const priO = {critical:4,high:3,medium:2,low:1};

  // ── Helpers ──
  const upSt = (id,st) => {
    sA(actions.map(a=>a.id===id?{...a,status:st,updatedAt:new Date().toISOString()}:a));
    // If completing a task linked to a risk, show mitigation modal
    if (st==='done') {
      const task = actions.find(a=>a.id===id);
      if (task?.riskId) {
        const rsk = (window.__currentRisks||[]).find(r=>r.id===task.riskId);
        setMitigateModal({riskId:task.riskId, riskText:rsk?.text||'Riesgo vinculado'});
      }
    }
  };
  const delA = id => sA(actions.filter(a=>a.id!==id));
  const saveEdit = () => { sA(actions.map(a=>a.id===eId?{...a,...eF,updatedAt:new Date().toISOString()}:a)); setEId(null); };

  const addTask = () => {
    if (!form.text.trim()) return;
    sA([...actions, {
      id: uid(), text: form.text.trim(), description: form.description||'',
      owner: form.owner||'Sin asignar', date: form.date||'',
      status: 'backlog', priority: form.priority, type: form.type||'tarea',
      voteScore: 0, createdBy: user.id, source: 'manual',
      storyPoints: form.storyPoints||null, sprint: form.sprint||'', epicLink: form.epicLink||'', demandOrigin: form.demandOrigin||'',
      fromCategory: null, noteId: null, riskId: null, parentId: null,
      createdAt: new Date().toISOString(), updatedAt: new Date().toISOString(),
    }]);
    setForm({text:'',description:'',owner:'',date:'',priority:'medium',type:'tarea'});
    setShowForm(false);
  };

  // ── Filtered/sorted data ──
  const filterActions = (arr) => {
    let filtered = arr;
    if (filterOwner === 'mine') filtered = filtered.filter(a => a.owner === user.name || a.createdBy === user.id);
    else if (filterOwner && filterOwner !== 'all') filtered = filtered.filter(a => a.owner === filterOwner);
    if (searchQ) {
      const q = searchQ.toLowerCase();
      filtered = filtered.filter(a => a.text.toLowerCase().includes(q) || (a.owner||'').toLowerCase().includes(q) || (a.description||'').toLowerCase().includes(q));
    }
    if (activeTagFilter) {
      filtered = filtered.filter(a => tagAssignments.some(ta=>ta.tag_id===activeTagFilter&&ta.entity_type==='action'&&ta.entity_id===a.id));
    }
    return filtered;
  };

  const sortActions = (arr) => {
    const sorted = [...arr];
    if (sortBy==='priority') sorted.sort((a,b)=>(priO[b.priority]||0)-(priO[a.priority]||0));
    else if (sortBy==='date') sorted.sort((a,b)=>(a.date||'9').localeCompare(b.date||'9'));
    else if (sortBy==='type') sorted.sort((a,b)=>(a.type||'tarea').localeCompare(b.type||'tarea'));
    else if (sortBy==='status') sorted.sort((a,b)=>(a.status||'').localeCompare(b.status||''));
    return sorted;
  };

  const openItems = actions.filter(a=>a.status!=='done'&&a.status!=='cancelled');
  const doneItems = actions.filter(a=>a.status==='done'||a.status==='cancelled');
  const myItems = actions.filter(a=>(a.owner===user.name||a.createdBy===user.id)&&a.status!=='done'&&a.status!=='cancelled');
  const overdueCount = openItems.filter(a=>a.date&&a.date<today).length;
  const blockedCount = openItems.filter(a=>a.status==='blocked').length;

  const KAN_COLS = [
    {id:'pending',    label:'Pendiente',  color:'#FF9500', bg:'#FFF9E6'},
    {id:'inprogress', label:'En proceso', color:'#007AFF', bg:'#EEF5FF'},
    {id:'blocked',    label:'Bloqueado',  color:'#FF3B30', bg:'#FFF5F5'},
    {id:'done',       label:'Completado', color:'#34C759', bg:'#F0FFF4'},
    {id:'cancelled',  label:'Cancelado',  color:'#C7C7CC', bg:'#F9F9F9'},
  ];

  const VIEWS = [
    {id:'backlog', label:'Backlog',    lucide:'List'},
    {id:'board',   label:'Board',      lucide:'LayoutGrid'},
    {id:'list',    label:'Lista',      lucide:'AlignJustify'},
    {id:'mine',    label:'Mis tareas', lucide:'User'},
    {id:'history', label:'Historial',  lucide:'Clock'},
  ];

  // ── Task card renderer ──
  const renderTask = (a, compact) => {
    const pr = PRIS.find(p=>p.id===a.priority)||PRIS[2];
    const tp = ITEM_TYPE_MAP[a.type||'tarea']||ITEM_TYPES[0];
    const overdue = a.status!=='done'&&a.status!=='cancelled'&&a.date&&a.date<today;
    const memberAvatar = teamMembers.find(m=>m.name===a.owner)?.avatar||'👤';
    const isEditing = eId===a.id;

    // Inline edit removed — uses TaskDetailModal instead

    return html`
      <div key=${a.id}
        draggable=${subView==='board'}
        onDragStart=${()=>setDragAct(a.id)}
        onDragEnd=${()=>{setDragAct(null);setOverCol(null)}}
        onClick=${()=>setDetailTask({...a})}
        style=${{ background:'#FFF', borderRadius:compact?8:12, padding:compact?'7px 9px':'10px 12px',
          border:'1px solid '+(overdue?'#FF3B3025':'#E5E5EA'),
          borderLeft:'3px solid '+tp.color,
          boxShadow:'0 1px 3px rgba(0,0,0,.03)', cursor:'pointer',
          opacity:dragAct===a.id?.4:a.status==='cancelled'?.5:1,
          marginBottom:compact?4:6, transition:'all .12s' }}>
        <div style=${{ display:'flex', alignItems:'flex-start', gap:8 }}>

          <div style=${{ display:'flex', flexDirection:'column', gap:3, alignItems:'center', flexShrink:0, minWidth:20 }}>
            <span title=${tp.label}><${Icon} name=${tp.lucide} size=${compact?12:14} color=${tp.color} /></span>
            <span style=${{ fontSize:9, fontWeight:800, color:pr.color }}>${pr.icon}</span>
          </div>

          <div style=${{ flex:1, minWidth:0 }}>
            <p onClick=${(e)=>{e.stopPropagation();setDetailTask({...a})}} style=${{ fontSize:compact?11:13, fontWeight:600, lineHeight:1.3, margin:0, cursor:'pointer',
              textDecoration:a.status==='done'?'line-through':'none',
              color:a.status==='done'||a.status==='cancelled'?'#86868B':'#1D1D1F' }}>
              ${a.text}
            </p>
            ${a.description && !compact && html`<p style=${{ fontSize:11, color:'#86868B', marginTop:3, lineHeight:1.3 }}>${a.description.slice(0,100)}${a.description.length>100?'…':''}</p>`}
            <div style=${{ display:'flex', gap:8, marginTop:4, alignItems:'center', flexWrap:'wrap' }}>
              ${a.owner && a.owner!=='Sin asignar' ? html`
                <span style=${{ display:'flex', alignItems:'center', gap:3, fontSize:10, color:'#007AFF', fontWeight:600 }}>
                  <span style=${{ fontSize:12 }}>${memberAvatar}</span> ${a.owner}
                </span>` : html`<span style=${{ fontSize:10, color:'#C7C7CC' }}>Sin asignar</span>`}
              ${a.date && html`<span style=${{ fontSize:9, color:overdue?'#FF3B30':'#86868B', fontWeight:overdue?700:400 }}>📅 ${fd(a.date)}</span>`}
              ${overdue && html`<span style=${{ fontSize:8, fontWeight:700, color:'#FF3B30', background:'#FF3B3010', padding:'1px 5px', borderRadius:4 }}>VENCIDO</span>`}
              ${!compact && html`<span style=${{ fontSize:8, fontWeight:600, color:KAN_COLS.find(s=>s.id===a.status)?.color||'#86868B', background:(KAN_COLS.find(s=>s.id===a.status)?.color||'#86868B')+'12', padding:'1px 5px', borderRadius:4 }}>${KAN_COLS.find(s=>s.id===a.status)?.label||a.status}</span>`}
              ${a.source==='retro' && html`<span style=${{ fontSize:8, fontWeight:500, color:'#86868B', background:'#F2F2F7', padding:'1px 5px', borderRadius:4 }}>retro</span>`}
              ${a.source==='risk' && html`<span style=${{ fontSize:8, fontWeight:500, color:'#86868B', background:'#F2F2F7', padding:'1px 5px', borderRadius:4 }}>riesgo</span>`}
              ${a.storyPoints && html`<span style=${{ fontSize:8, fontWeight:700, color:'#5856D6', background:'#5856D610', padding:'1px 5px', borderRadius:4 }}>${a.storyPoints} SP</span>`}

      ${subView==='mine' && html`

            ? html`<div style=${{ textAlign:'center', padding:40, color:'#C7C7CC' }}>

      ${detailTask && html`<${TaskDetailModal}

        onSave=${(updated) => { sA(actions.map(a=>a.id===updated.id?{...a,...updated}:a)); setDetailTask(null); }}

}


function PAccionables({ actions, sA, risks, user }) {
  const [teamMembers, setTeamMembers] = useState([]);
  const [tags, setTags] = useState([]);
  const [tagAssignments, setTagAssignments] = useState([]);
  const [activeTagFilter, setActiveTagFilter] = useState(null);
  useEffect(() => {
    sbLoadTeamMembers().then(data => {
      const f = data.filter(m=>(m.rooms||[]).includes(SALA));
      setTeamMembers(f.length > 0 ? f : data);
    });
    sbLoadTags(SALA).then(t => setTags(t||[]));
    sbLoadTagAssignments(SALA).then(a => setTagAssignments(a||[]));
  }, []);
  const hasTagA = (tagId, entityId) => tagAssignments.some(a=>a.tag_id===tagId&&a.entity_type==='action'&&a.entity_id===entityId);
  const actionTagList = (id) => tags.filter(t=>hasTagA(t.id,id));
  const quickToggleActionTag = async (tagId, actionId) => {
    const added = await sbToggleTagAssignment(tagId, 'action', actionId, SALA);
    if (added) setTagAssignments(prev=>[...prev,{tag_id:tagId,entity_type:'action',entity_id:actionId,sala:SALA}]);
    else setTagAssignments(prev=>prev.filter(a=>!(a.tag_id===tagId&&a.entity_type==='action'&&a.entity_id===actionId)));
  };

  const [form,       setForm]      = useState({text:'',owner:'',date:'',priority:'medium'});
  const [eId,        setEId]       = useState(null);
  const [eF,         setEF]        = useState({});
  const [actFilter,  setActFilter] = useState('all');
  const [viewMode,   setViewMode]  = useState('kanban');
  const [dragAct,    setDragAct]   = useState(null);
  const [overCol,    setOverCol]   = useState(null);
  const touchActRef = useRef(null);
  const [touchPos,   setTouchPos]  = useState(null);

  const upSt = (id,st) => sA(actions.map(a=>a.id===id?{...a,status:st}:a));
  const delA  = id => sA(actions.filter(a=>a.id!==id));
  const saveEA = () => { sA(actions.map(a=>a.id===eId?{...a,...eF}:a)); setEId(null); };
  const tagFilteredActions = activeTagFilter
    ? actions.filter(a=>tagAssignments.some(ta=>ta.tag_id===activeTagFilter&&ta.entity_type==='action'&&ta.entity_id===a.id))
    : actions;
  const addA  = () => {
    if (!form.text.trim()) return;
    sA([...actions,{id:uid(),text:form.text.trim(),owner:form.owner||'Sin asignar',date:form.date||'',status:'backlog',priority:form.priority,voteScore:0,createdBy:user.id,fromCategory:null,noteId:null,riskId:null}]);
    setForm({text:'',owner:'',date:'',priority:'medium'});
  };
  const priO = {high:3,medium:2,low:1};

  const onActDragStart = id => setDragAct(id);
  const onActDrop = colId => { if(dragAct) upSt(dragAct,colId); setDragAct(null); setOverCol(null); };
  const onActTouchStart = (e,id) => { touchActRef.current=id; setTouchPos({x:e.touches[0].clientX,y:e.touches[0].clientY}); e.stopPropagation(); };
  const onActTouchMove = (e) => {
    if(!touchActRef.current) return; e.preventDefault();
    const t=e.touches[0]; setTouchPos({x:t.clientX,y:t.clientY});
    const col=document.elementFromPoint(t.clientX,t.clientY)?.closest('[data-kanban-col]');
    setOverCol(col?col.getAttribute('data-kanban-col'):null);
  };
  const onActTouchEnd = (e) => {
    if(!touchActRef.current) return;
    const t=e.changedTouches[0];
    const col=document.elementFromPoint(t.clientX,t.clientY)?.closest('[data-kanban-col]');
    if(col) upSt(touchActRef.current, col.getAttribute('data-kanban-col'));
    touchActRef.current=null; setTouchPos(null); setOverCol(null);
  };

  const today = new Date().toISOString().slice(0,10);
  const openRisks = (risks||[]).filter(r=>r.status!=='mitigated');
  const overdueCount = actions.filter(a=>a.status!=='done'&&a.status!=='discarded'&&a.date&&a.date<today).length;

  const KAN_COLS = [
    {id:'pending',    label:'Pendiente',  color:'#FF9500', bg:'#FFF9E6'},
    {id:'inprogress', label:'En proceso', color:'#007AFF', bg:'#EEF5FF'},
    {id:'blocked',    label:'Bloqueado',  color:'#FF3B30', bg:'#FFF5F5'},
    {id:'done',       label:'Completado', color:'#34C759', bg:'#F0FFF4'},
    {id:'cancelled',  label:'Cancelado',  color:'#C7C7CC', bg:'#F9F9F9'},
  ];

  return html`
    <div style=${{ maxWidth:'100%' }}>

      <div style=${{ display:'flex', alignItems:'center', gap:10, marginBottom:14, flexWrap:'wrap' }}>
        <h2 style=${{ fontSize:18, fontWeight:700 }}>Trabajo</h2>
        <span style=${{ fontSize:11, background:'#F2F2F7', color:'#86868B', padding:'2px 8px', borderRadius:8 }}>
          ${actions.filter(a=>a.status!=='done'&&a.status!=='discarded').length} abiertos
        </span>
        ${overdueCount>0&&html`<span style=${{ fontSize:11, background:'#FF3B30', color:'#FFF', fontWeight:700, padding:'2px 8px', borderRadius:8 }}>⚠️ ${overdueCount} vencidos</span>`}
        <div style=${{ flex:1 }}/>

        ${[{id:'all',label:'Todos'},{id:'mine',label:'👤 Míos'},{id:'done',label:'✅ Hechos'}].map(f=>html`
          <button key=${f.id} onClick=${()=>setActFilter(f.id)}
            style=${{ padding:'4px 10px', borderRadius:7, border:actFilter===f.id?'none':'1px solid #E5E5EA', background:actFilter===f.id?'#1D1D1F':'#FFF', color:actFilter===f.id?'#FFF':'#6E6E73', fontSize:10, fontWeight:600, cursor:'pointer' }}>${f.label}</button>`)}
        <button onClick=${()=>setViewMode('kanban')} style=${{ padding:'4px 10px', borderRadius:7, border:viewMode==='kanban'?'none':'1px solid #E5E5EA', background:viewMode==='kanban'?'#1D1D1F':'#FFF', color:viewMode==='kanban'?'#FFF':'#6E6E73', fontSize:10, fontWeight:600, cursor:'pointer' }}>⬜ Kanban</button>
        <button onClick=${()=>setViewMode('list')} style=${{ padding:'4px 10px', borderRadius:7, border:viewMode==='list'?'none':'1px solid #E5E5EA', background:viewMode==='list'?'#1D1D1F':'#FFF', color:viewMode==='list'?'#FFF':'#6E6E73', fontSize:10, fontWeight:600, cursor:'pointer' }}>☰ Lista</button>
      </div>
      ${tags.length>0 && html`
        <div style=${{display:'flex',gap:4,marginBottom:10,flexWrap:'wrap',alignItems:'center'}}>
          <${Icon} name='Tag' size=${12} color='#86868B' />
          <button onClick=${()=>setActiveTagFilter(null)}
            style=${{padding:'3px 10px',borderRadius:20,border:'1.5px solid '+(activeTagFilter===null?'#1D1D1F':'#E5E5EA'),
              background:activeTagFilter===null?'#1D1D1F':'#FFF',color:activeTagFilter===null?'#FFF':'#6E6E73',
              fontSize:10,fontWeight:600,cursor:'pointer'}}>Todos</button>
          ${tags.map(t=>html`

                      </div>
                    </div>
                    <select value=${a.status} onChange=${e=>upSt(a.id,e.target.value)}

            ? html`<p style=${{ fontSize:11, color:'#C7C7CC', textAlign:'center', padding:'16px 0' }}>Sin riesgos activos</p>`

                const isEsc = !!r.escalation;
                const linked = actions.some(a=>a.riskId===r.id&&a.status!=='discarded');
                const sc = (v=>{const vs=Object.values(v||{});return vs.length?vs.reduce((a,b)=>a+b,0)/vs.length*3:0})(r.impactVotes||{});
                const imp = sc>6?{id:'alto',label:'Alto',color:'#FF3B30'}:sc>3?{id:'medio',label:'Medio',color:'#FF9500'}:{id:'bajo',label:'Bajo',color:'#34C759'};

                  if (linked) { sA(actions.filter(a=>a.riskId!==r.id)); }
                  else {

                  }
                };
                return html`
                  <button key=${r.id} onClick=${toggleRiskAction}
                    style=${{ width:'100%', textAlign:'left', padding:'8px 10px', borderRadius:10, marginBottom:5, cursor:'pointer',

                      <span style=${{ fontSize:10, fontWeight:700, color:linked?'#34C759':imp.color }}>⚠️ ${imp.label}</span>

                    <p style=${{ fontSize:11, fontWeight:600, lineHeight:1.3, color:linked?'#FFF':'#1D1D1F', marginBottom:2 }}>${r.text}</p>
                    <div style=${{ fontSize:9, display:'flex', gap:6 }}>
                      ${r.owner&&html`<span style=${{ color:linked?'#AAA':'#007AFF' }}>${r.owner}</span>`}
