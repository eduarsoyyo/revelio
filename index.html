/* ═══ REALTIME STATE ═══ */
function useRealtime(user) {
  const [state, setState] = useState({ notes:[], tasks:[], actions:[], obj:{text:'',met:null} });
  const [online, setOnline] = useState({});
  const [cursors, setCursors] = useState({});
  const chRef = useRef(null);
  const stRef = useRef(state);
  const cursRef = useRef({});
  stRef.current = state;

  useEffect(() => {
    if (!user) return;
    const ch = supabase.channel('retroflow-live', { config:{ presence:{ key:user.id } } });

    // Presence: only for online users
    ch.on('presence', { event:'sync' }, () => {
      const ps = ch.presenceState();
      const u = {};
      Object.entries(ps).forEach(([k, arr]) => {
        if (arr.length > 0) {
          u[k] = { name:arr[0].name, avatar:arr[0].avatar, color:arr[0].color };
        }
      });
      setOnline(u);
    });

    // Broadcast: cursor positions (fast, no rate limit)
    ch.on('broadcast', { event:'cursor' }, ({ payload }) => {
      if (payload.id === user.id) return;
      cursRef.current = { ...cursRef.current, [payload.id]: { x:payload.x, y:payload.y, name:payload.name, avatar:payload.avatar, color:payload.color, ts:Date.now() } };
      setCursors({ ...cursRef.current });
    });

    // Broadcast: state sync
    ch.on('broadcast', { event:'sync' }, ({ payload }) => {
      if (payload.from === user.id) return;
      setState(prev => ({ ...prev, [payload.key]: payload.data }));
    });

    ch.on('broadcast', { event:'req' }, ({ payload }) => {
      if (payload.from === user.id) return;
      const s = stRef.current;
      Object.keys(s).forEach(k => {
        ch.send({ type:'broadcast', event:'sync', payload:{ key:k, data:s[k], from:user.id } });
      });
    });

    ch.subscribe(async (status) => {
      if (status === 'SUBSCRIBED') {
        await ch.track({ name:user.name, avatar:user.avatar, color:user.color });
        setTimeout(() => ch.send({ type:'broadcast', event:'req', payload:{ from:user.id } }), 600);
      }
    });

    // Clean stale cursors every 3s
    const cleanIv = setInterval(() => {
      const now = Date.now();
      let changed = false;
      const c = { ...cursRef.current };
      Object.keys(c).forEach(k => { if (now - c[k].ts > 5000) { delete c[k]; changed = true; } });
      if (changed) { cursRef.current = c; setCursors(c); }
    }, 3000);

    chRef.current = ch;
    return () => { supabase.removeChannel(ch); clearInterval(cleanIv); };
  }, [user]);

  const upd = useCallback((key, data) => {
    setState(prev => ({ ...prev, [key]:data }));
    if (chRef.current && user) chRef.current.send({ type:'broadcast', event:'sync', payload:{ key, data, from:user.id } });
  }, [user]);

  const moveCursor = useCallback((x, y) => {
    if (chRef.current && user) {
      chRef.current.send({ type:'broadcast', event:'cursor', payload:{ id:user.id, x, y, name:user.name, avatar:user.avatar, color:user.color } });
    }
  }, [user]);

  return { state, upd, online, cursors, moveCursor };
}

/* ═══ RETRO BOARD ═══ */
function RetroBoard({ user }) {
  const { state, upd, online, cursors, moveCursor } = useRealtime(user);
  const [phase, setPhase] = useState(0);
  const [timer, setTimer] = useState(900);
  const [running, setRunning] = useState(false);
  const tRef = useRef(null);
  const bRef = useRef(null);

  useEffect(() => {
    if (!running) return;
    tRef.current = setInterval(() => setTimer(p => { if(p<=0){setRunning(false);return 0} return p-1 }), 1000);
    return () => clearInterval(tRef.current);
  }, [running]);

  useEffect(() => {
    if (!bRef.current) return;
    let last = 0;
    const h = e => {
      if (Date.now()-last<400) return; last=Date.now();
      const r = bRef.current.getBoundingClientRect();
      const x = ((e.clientX-r.left)/r.width)*100, y = ((e.clientY-r.top)/r.height)*100;
      if (x>=0&&x<=100&&y>=0&&y<=100) moveCursor(x,y);
    };
    const el = bRef.current;
    el.addEventListener('mousemove',h);
    return () => el.removeEventListener('mousemove',h);
  }, [moveCursor, phase]);

  const fmt = s => Math.floor(s/60).toString().padStart(2,'0')+':'+(s%60).toString().padStart(2,'0');
  const uList = Object.entries(online);
  const sN = d => upd('notes',d);
  const sT = d => upd('tasks',d);
  const sA = d => upd('actions',d);
  const sO = d => upd('obj',d);

  const content = () => {
    if (phase===0) return html`<${P1} tasks=${state.tasks} sT=${sT} obj=${state.obj} sO=${sO} user=${user} />`;
    if (phase===1) return html`<${Board} notes=${state.notes} sN=${sN} user=${user} filter="all" />`;
    if (phase===2) return html`<${P3} notes=${state.notes} sN=${sN} user=${user} />`;
    if (phase===3) return html`<${P4} notes=${state.notes} actions=${state.actions} sA=${sA} user=${user} />`;
    if (phase===4) return html`<${P5} notes=${state.notes} actions=${state.actions} users=${online} user=${user} obj=${state.obj} tasks=${state.tasks} />`;
    return null;
  };

  return html`
    <div ref=${bRef} style=${{ display:'flex', flexDirection:'column', height:'100vh', position:'relative' }}>
      ${Object.entries(cursors).map(([id,c])=>html`
        <div key=${id} style=${{ position:'fixed', left:c.x+'%', top:c.y+'%', pointerEvents:'none', zIndex:9999, transition:'left .4s ease-out, top .4s ease-out' }}>
          <svg width="16" height="16" viewBox="0 0 20 20"><path d="M3 2L17 10L10 11L7 18L3 2Z" fill=${c.color} stroke="#FFF" stroke-width="1.5"/></svg>
          <span style=${{ position:'absolute', left:14, top:10, background:c.color, color:'#FFF', fontSize:9, fontWeight:700, padding:'1px 6px', borderRadius:4, whiteSpace:'nowrap' }}>${c.avatar} ${c.name}</span>
        </div>
      `)}
      <header style=${{ ...gl, padding:'9px 18px', display:'flex', alignItems:'center', justifyContent:'space-between', borderBottom:'1px solid rgba(0,0,0,0.06)', flexShrink:0, zIndex:100 }}>
        <div style=${{ display:'flex', alignItems:'center', gap:10 }}>
          <span style=${{ fontSize:22 }}>🔄</span>
          <div>
            <h2 style=${{ fontSize:16, fontWeight:700 }}>RetroFlow</h2>
            <span style=${{ fontSize:11, color:'#86868B' }}>${fd(new Date().toISOString())}</span>
          </div>
        </div>
        <div style=${{ display:'flex', alignItems:'center', gap:6 }}>
          <div style=${{ background:running?'#1D1D1F':'#F2F2F7', color:running?'#FFF':'#1D1D1F', borderRadius:10, padding:'6px 14px', display:'flex', alignItems:'center', gap:6 }}>
            <span style=${{ fontSize:18, fontWeight:700, fontVariantNumeric:'tabular-nums' }}>${fmt(timer)}</span>
            <button onClick=${()=>setRunning(!running)} style=${{ width:26, height:26, borderRadius:13, border:'none', background:running?'#FF3B30':'#34C759', color:'#FFF', fontSize:11, display:'flex', alignItems:'center', justifyContent:'center' }}>${running?'⏸':'▶'}</button>
            <button onClick=${()=>{setTimer(900);setRunning(false)}} style=${{ width:26, height:26, borderRadius:13, border:'none', background:'rgba(128,128,128,0.12)', fontSize:10, display:'flex', alignItems:'center', justifyContent:'center' }}>↺</button>
          </div>
        </div>
        <div style=${{ display:'flex', alignItems:'center' }}>
          ${uList.slice(0,8).map(([id,u],i)=>html`<div key=${id} title=${u.name} style=${{ width:28, height:28, borderRadius:14, background:u.color, border:'2px solid #FFF', display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, marginLeft:i>0?-5:0, zIndex:10-i }}>${u.avatar}</div>`)}
          ${uList.length>0 && html`<span style=${{ fontSize:11, color:'#86868B', marginLeft:8 }}>${uList.length} online</span>`}
        </div>
      </header>
      <div style=${{ padding:'8px 18px', display:'flex', gap:4, flexShrink:0, background:'#FFF', borderBottom:'1px solid #E5E5EA', overflowX:'auto' }}>

          <h3 style=${{ fontSize:15, fontWeight:700, marginBottom:14 }}>📋 Progreso</h3>
          ${[{l:'Tareas',d:tD,t:tasks.length,c:'#007AFF'},{l:'Accionables',d:aD,t:actions.length,c:'#34C759'}].map((r,i)=>html`
            <div key=${i} style=${{ marginBottom:12 }}><div style=${{ display:'flex', justifyContent:'space-between', marginBottom:4 }}><span style=${{ fontSize:13, fontWeight:600 }}>${r.l}</span><span style=${{ fontSize:12, fontWeight:700, color:r.c }}>${r.d}/${r.t}</span></div><div style=${{ height:8, background:'#F2F2F7', borderRadius:4, overflow:'hidden' }}><div style=${{ height:'100%', width:(r.t>0?(r.d/r.t)*100:0)+'%', background:r.c, borderRadius:4, transition:'width .5s' }} /></div></div>`)}
        </div>
      </div>
      <div style=${{ ...cS, padding:24 }}>
        <h3 style=${{ fontSize:18, fontWeight:700, marginBottom:4 }}>🏆 Ranking</h3>
        <p style=${{ fontSize:11, color:'#86868B', marginBottom:18 }}>Notas ×10 · Votos rec. ×8 · Votos dados ×3 · Acciones ×15 · Bonus 4cats +20</p>
        <div style=${{ display:'flex', flexDirection:'column', gap:8 }}>
          ${ranking.map((r,i)=>{const isMe=r.id===user.id;const bw=mx>0?(r.score/mx)*100:0;
            const bg=i===0?'linear-gradient(90deg,#FFD60A,#FF9500)':i===1?'linear-gradient(90deg,#C0C0C0,#999)':i===2?'linear-gradient(90deg,#CD7F32,#B8860B)':'#007AFF';
            return html`
              <div key=${r.id} style=${{ display:'flex', alignItems:'center', gap:12, padding:'14px 18px', borderRadius:14, background:isMe?'#007AFF06':i<3?'#FFFBEB':'#F9F9FB', border:isMe?'2px solid #007AFF25':i<3?'1.5px solid #FFD60A25':'1.5px solid #E5E5EA' }}>
                <div style=${{ width:32, textAlign:'center', fontSize:i<3?22:14, fontWeight:700, color:'#86868B' }}>${i<3?medals[i]:(i+1)+'º'}</div>
                <div style=${{ width:36, height:36, borderRadius:18, background:r.color, display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, flexShrink:0, border:'2px solid #FFF', boxShadow:'0 2px 6px rgba(0,0,0,0.06)' }}>${r.avatar}</div>
                <div style=${{ flex:1 }}>
                  <div style=${{ display:'flex', alignItems:'center', gap:6, marginBottom:4 }}><span style=${{ fontSize:14, fontWeight:700 }}>${r.name}</span><span style=${{ fontSize:18, fontWeight:800, color:i<3?'#FFB800':'#86868B' }}>${r.score}</span><span style=${{ fontSize:10, color:'#86868B' }}>pts</span></div>
                  <div style=${{ height:5, background:'#E5E5EA', borderRadius:3, overflow:'hidden', marginBottom:5 }}><div style=${{ height:'100%', width:bw+'%', background:bg, borderRadius:3, transition:'width .5s' }} /></div>
                  <div style=${{ display:'flex', gap:10, flexWrap:'wrap' }}><span style=${{ fontSize:10, color:'#86868B' }}>📝 ${r.tn}</span><span style=${{ fontSize:10, color:'#86868B' }}>⬆️ ${r.vr}</span><span style=${{ fontSize:10, color:'#86868B' }}>👍 ${r.vg}</span><span style=${{ fontSize:10, color:'#86868B' }}>⚡ ${r.ac}</span><span style=${{ fontSize:10, color:'#86868B' }}>📊 ${r.cats}/4</span></div>
                </div>
              </div>`})}
        </div>
        <h4 style=${{ fontSize:15, fontWeight:700, marginTop:24, marginBottom:12 }}>🏅 Logros</h4>
        <div style=${{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(120px,1fr))', gap:8 }}>
          ${BADGES.map(b=>{const ms={n:notes.filter(n=>n.userId===user.id).length,vg:notes.reduce((s,n)=>s+(n.voters?.includes(user.id)?1:0),0),a:actions.filter(a=>a.createdBy===user.id).length,cats:new Set(notes.filter(n=>n.userId===user.id).map(n=>n.category)).size};
            return html`<div key=${b.id} style=${{ textAlign:'center', padding:'14px 10px', borderRadius:14, background:b.c(ms)?'#FFD60A08':'#F2F2F7', border:b.c(ms)?'1.5px solid #FFD60A28':'1.5px solid transparent', opacity:b.c(ms)?1:0.3 }}><div style=${{ fontSize:28 }}>${b.icon}</div><div style=${{ fontSize:11, fontWeight:700, marginTop:4 }}>${b.label}</div></div>`})}
        </div>
      </div>
    </div>
  `;
}

render(html`<${App} />`, document.getElementById('app'));
</script>
</body>
</html>
