/* ═══ REALTIME STATE ═══ */
function useRealtime(user) {
  const [state, setState] = useState({ notes:[], tasks:DEFAULT_TASKS.map(t=>({...t,id:uid()})), actions:[], obj:{text:'',met:null} });
  const [online, setOnline] = useState({});
  const [cursors, setCursors] = useState({});
  const chRef = useRef(null);
  const stRef = useRef(state);
  const cursRef = useRef({});
  stRef.current = state;

  useEffect(() => {
    if (!user) return;
    const ch = supabase.channel('retro-' + SALA, { config:{ presence:{ key:user.id } } });

    // Presence: only for online users
    ch.on('presence', { event:'sync' }, () => {
      const ps = ch.presenceState();
      const u = {};
      Object.entries(ps).forEach(([k, arr]) => {
        if (arr.length > 0) {
          u[k] = { name:arr[0].name, avatar:arr[0].avatar, color:arr[0].color };
        }
      });
      setOnline(u);
    });

    // Broadcast: cursor positions (fast, no rate limit)
    ch.on('broadcast', { event:'cursor' }, ({ payload }) => {
      if (payload.id === user.id) return;
      cursRef.current = { ...cursRef.current, [payload.id]: { x:payload.x, y:payload.y, name:payload.name, avatar:payload.avatar, color:payload.color, ts:Date.now() } };
      setCursors({ ...cursRef.current });
    });

    // Broadcast: state sync
    ch.on('broadcast', { event:'sync' }, ({ payload }) => {
      if (payload.from === user.id) return;
      setState(prev => ({ ...prev, [payload.key]: payload.data }));
    });

    ch.on('broadcast', { event:'req' }, ({ payload }) => {
      if (payload.from === user.id) return;
      const s = stRef.current;
      Object.keys(s).forEach(k => {
        ch.send({ type:'broadcast', event:'sync', payload:{ key:k, data:s[k], from:user.id } });
      });
    });

    ch.subscribe(async (status) => {
      if (status === 'SUBSCRIBED') {
        await ch.track({ name:user.name, avatar:user.avatar, color:user.color });
        setTimeout(() => ch.send({ type:'broadcast', event:'req', payload:{ from:user.id } }), 600);
      }
    });

    // Clean stale cursors every 3s
    const cleanIv = setInterval(() => {
      const now = Date.now();
      let changed = false;
      const c = { ...cursRef.current };
      Object.keys(c).forEach(k => { if (now - c[k].ts > 5000) { delete c[k]; changed = true; } });
      if (changed) { cursRef.current = c; setCursors(c); }
    }, 3000);

    chRef.current = ch;
    return () => { supabase.removeChannel(ch); clearInterval(cleanIv); };
  }, [user]);

  const upd = useCallback((key, data) => {
    setState(prev => ({ ...prev, [key]:data }));
    if (chRef.current && user) chRef.current.send({ type:'broadcast', event:'sync', payload:{ key, data, from:user.id } });
  }, [user]);

  const moveCursor = useCallback((x, y) => {
    if (chRef.current && user) {
      chRef.current.send({ type:'broadcast', event:'cursor', payload:{ id:user.id, x, y, name:user.name, avatar:user.avatar, color:user.color } });
    }
  }, [user]);

  const reset = useCallback(() => {
    const fresh = { notes:[], tasks:DEFAULT_TASKS.map(t=>({...t,id:uid()})), actions:[], obj:{text:'',met:null} };
    setState(fresh);
    if (chRef.current && user) {
      Object.keys(fresh).forEach(k => {
        chRef.current.send({ type:'broadcast', event:'sync', payload:{ key:k, data:fresh[k], from:user.id } });
      });
    }
  }, [user]);

  return { state, upd, online, cursors, moveCursor, reset };
}

/* ═══ RETRO BOARD ═══ */
function RetroBoard({ user }) {
  const { state, upd, online, cursors, moveCursor, reset } = useRealtime(user);
  const [phase, setPhase] = useState(0);
  const [timer, setTimer] = useState(900);
  const [running, setRunning] = useState(false);
  const [showReset, setShowReset] = useState(false);
  const tRef = useRef(null);
  const bRef = useRef(null);

  useEffect(() => {
    if (!running) return;
    tRef.current = setInterval(() => setTimer(p => { if(p<=0){setRunning(false);return 0} return p-1 }), 1000);
    return () => clearInterval(tRef.current);
  }, [running]);

  useEffect(() => {
    if (!bRef.current) return;
    let last = 0;
    const h = e => {
      if (Date.now()-last<400) return; last=Date.now();
      const r = bRef.current.getBoundingClientRect();
      const x = ((e.clientX-r.left)/r.width)*100, y = ((e.clientY-r.top)/r.height)*100;
      if (x>=0&&x<=100&&y>=0&&y<=100) moveCursor(x,y);
    };
    const el = bRef.current;
    el.addEventListener('mousemove',h);
    return () => el.removeEventListener('mousemove',h);
  }, [moveCursor, phase]);

  const fmt = s => Math.floor(s/60).toString().padStart(2,'0')+':'+(s%60).toString().padStart(2,'0');
  const uList = Object.entries(online);
  const sN = d => upd('notes',d);
  const sT = d => upd('tasks',d);
  const sA = d => upd('actions',d);
  const sO = d => upd('obj',d);

  const fileRef = useRef(null);

  const saveRetro = () => {
    const data = { sala: SALA, date: new Date().toISOString(), ...state };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'retro-' + SALA + '-' + new Date().toISOString().split('T')[0] + '.json';
    a.click();
    URL.revokeObjectURL(a.href);

    // Log metrics for admin dashboard
    try {
      const metrics = JSON.parse(localStorage.getItem('retroflow-metrics') || '{}');
      if (!metrics[SALA]) metrics[SALA] = [];
      const participants = [...new Set(state.notes.map(n => n.userId))];
      const participantNames = [...new Set(state.notes.map(n => n.userName))];
      metrics[SALA].push({
        date: new Date().toISOString(),
        notes: state.notes.length,
        participants: participants.length,
        participantNames,
        actions: state.actions.length,
        actionsDone: state.actions.filter(a => a.status === 'done').length,
        votes: state.notes.reduce((s, n) => s + (n.voters?.length || 0), 0),
        objective: state.obj?.met || null,
        tasksDone: state.tasks.filter(t => t.done).length,
        tasksTotal: state.tasks.length,
      });
      localStorage.setItem('retroflow-metrics', JSON.stringify(metrics));
    } catch {}
  };

  const loadRetro = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.notes) upd('notes', data.notes);
        if (data.tasks) upd('tasks', data.tasks);
        if (data.actions) upd('actions', data.actions);
        if (data.obj) upd('obj', data.obj);
      } catch (err) { console.error('Error cargando retro:', err); }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const content = () => {
    if (phase===0) return html`<${P1} tasks=${state.tasks} sT=${sT} obj=${state.obj} sO=${sO} user=${user} />`;
    if (phase===1) return html`<${Board} notes=${state.notes} sN=${sN} user=${user} filter="all" />`;
    if (phase===2) return html`<${P3} notes=${state.notes} sN=${sN} user=${user} />`;
    if (phase===3) return html`<${P4} notes=${state.notes} actions=${state.actions} sA=${sA} user=${user} />`;
    if (phase===4) return html`<${P5} notes=${state.notes} actions=${state.actions} users=${online} user=${user} obj=${state.obj} tasks=${state.tasks} />`;
    return null;
  };

  return html`
    <div ref=${bRef} style=${{ display:'flex', flexDirection:'column', height:'100vh', position:'relative' }}>
      ${Object.entries(cursors).map(([id,c])=>html`
        <div key=${id} style=${{ position:'fixed', left:c.x+'%', top:c.y+'%', pointerEvents:'none', zIndex:9999, transition:'left .4s ease-out, top .4s ease-out' }}>
          <svg width="16" height="16" viewBox="0 0 20 20"><path d="M3 2L17 10L10 11L7 18L3 2Z" fill=${c.color} stroke="#FFF" stroke-width="1.5"/></svg>
          <span style=${{ position:'absolute', left:14, top:10, background:c.color, color:'#FFF', fontSize:9, fontWeight:700, padding:'1px 6px', borderRadius:4, whiteSpace:'nowrap' }}>${c.avatar} ${c.name}</span>
        </div>
      `)}
      <header style=${{ ...gl, padding:'9px 18px', display:'flex', alignItems:'center', justifyContent:'space-between', borderBottom:'1px solid rgba(0,0,0,0.06)', flexShrink:0, zIndex:100 }}>
        <div style=${{ display:'flex', alignItems:'center', gap:10 }}>
          <span style=${{ fontSize:22 }}>🔄</span>
          <div>
            <h2 style=${{ fontSize:16, fontWeight:700 }}>RetroFlow <span style=${{ fontSize:12, fontWeight:500, color:'#007AFF', background:'#007AFF10', padding:'2px 8px', borderRadius:6, marginLeft:4 }}>${SALA_DISPLAY}</span> <span style=${{ fontSize:10, fontWeight:500, color:TIPO_INFO.color, background:TIPO_INFO.color+'10', padding:'2px 6px', borderRadius:5, marginLeft:2 }}>${TIPO_INFO.icon} ${TIPO_INFO.label}</span></h2>
            <span style=${{ fontSize:11, color:'#86868B' }}>${fd(new Date().toISOString())}</span>
          </div>
          <button onClick=${()=>setShowReset(true)} style=${{ marginLeft:12, padding:'5px 10px', borderRadius:8, border:'1.5px solid #FF3B3040', background:'#FFF', color:'#FF3B30', fontSize:11, fontWeight:600 }}>🗑 Nueva</button>
          <button onClick=${saveRetro} style=${{ padding:'5px 10px', borderRadius:8, border:'1.5px solid #34C75940', background:'#FFF', color:'#34C759', fontSize:11, fontWeight:600 }}>💾 Guardar</button>
          <button onClick=${()=>fileRef.current.click()} style=${{ padding:'5px 10px', borderRadius:8, border:'1.5px solid #007AFF40', background:'#FFF', color:'#007AFF', fontSize:11, fontWeight:600 }}>📂 Cargar</button>
          <input ref=${fileRef} type="file" accept=".json" onChange=${loadRetro} style=${{ display:'none' }} />
        </div>
        ${showReset && html`
          <div style=${{ position:'fixed', top:0, left:0, right:0, bottom:0, background:'rgba(0,0,0,0.3)', zIndex:200, display:'flex', alignItems:'center', justifyContent:'center' }} onClick=${()=>setShowReset(false)}>
            <div onClick=${e=>e.stopPropagation()} style=${{ background:'#FFF', borderRadius:20, padding:'28px 32px', maxWidth:380, width:'90%', boxShadow:'0 20px 60px rgba(0,0,0,0.15)', textAlign:'center' }}>
              <div style=${{ fontSize:36, marginBottom:12 }}>🗑</div>
              <h3 style=${{ fontSize:18, fontWeight:700, marginBottom:8 }}>¿Nueva retrospectiva?</h3>
              <p style=${{ fontSize:13, color:'#86868B', marginBottom:20 }}>Se borrarán todas las notas, tareas y accionables para todos los participantes.</p>
              <div style=${{ display:'flex', gap:8, justifyContent:'center' }}>
                <button onClick=${()=>setShowReset(false)} style=${{ ...bS, padding:'10px 20px' }}>Cancelar</button>
                <button onClick=${()=>{reset();setShowReset(false);setPhase(0);setTimer(900);setRunning(false)}} style=${{ ...bP, padding:'10px 20px', background:'#FF3B30' }}>Borrar y empezar</button>
              </div>
            </div>
          </div>
        `}
        <div style=${{ display:'flex', alignItems:'center', gap:6 }}>
          <div style=${{ background:running?'#1D1D1F':'#F2F2F7', color:running?'#FFF':'#1D1D1F', borderRadius:10, padding:'6px 10px', display:'flex', alignItems:'center', gap:5 }}>

/* ═══ PHASE 1: REVIEW ═══ */
function P1({ tasks, sT, obj, sO, user }) {
  const [nt, setNt] = useState('');
  const [eId, setEId] = useState(null);
  const [eVal, setEVal] = useState('');
  const add = () => { if(!nt.trim())return; sT([...tasks,{id:uid(),text:nt.trim(),done:false}]); setNt(''); };
  const tog = id => sT(tasks.map(t=>t.id===id?{...t,done:!t.done}:t));
  const del = id => sT(tasks.filter(t=>t.id!==id));
  const saveE = () => { if(!eVal.trim())del(eId); else sT(tasks.map(t=>t.id===eId?{...t,text:eVal.trim()}:t)); setEId(null); };
  const dc = tasks.filter(t=>t.done).length;

  return html`
    <div style=${{ maxWidth:860, margin:'0 auto', display:'flex', flexDirection:'column', gap:14 }}>

        <textarea value=${obj.text} onInput=${e=>sO({...obj,text:e.target.value})} placeholder="¿Cuál era el objetivo principal?" style=${{ ...iS, height:52, resize:'none' }} />
        <div style=${{ display:'flex', gap:6, marginTop:10 }}>
          ${[{v:true,l:'✅ Cumplido',c:'#34C759'},{v:false,l:'❌ No cumplido',c:'#FF3B30'},{v:'partial',l:'⚠️ Parcial',c:'#FF9500'}].map(o=>html`
            <button key=${String(o.v)} onClick=${()=>sO({...obj,met:o.v})} style=${{ padding:'7px 14px', borderRadius:9, border:obj.met===o.v?'2px solid '+o.c:'1.5px solid #E5E5EA', background:obj.met===o.v?o.c+'10':'#FFF', fontSize:12, fontWeight:600, color:obj.met===o.v?o.c:'#6E6E73' }}>${o.l}</button>
          `)}
        </div>
      </div>
      <div style=${{ ...cS, padding:22 }}>
        <div style=${{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12 }}>
          <h3 style=${{ fontSize:15, fontWeight:700 }}>📋 Tareas de la iteración</h3>
          <span style=${{ fontSize:11, fontWeight:700, color:dc===tasks.length&&tasks.length>0?'#34C759':'#86868B', background:'#F2F2F7', padding:'3px 8px', borderRadius:6 }}>${dc}/${tasks.length}</span>
        </div>
        ${tasks.length>0 && html`<div style=${{ height:5, background:'#F2F2F7', borderRadius:3, marginBottom:12, overflow:'hidden' }}><div style=${{ height:'100%', width:(tasks.length?(dc/tasks.length)*100:0)+'%', background:'linear-gradient(90deg,#34C759,#007AFF)', borderRadius:3, transition:'width .3s' }} /></div>`}
        <div style=${{ display:'flex', gap:6, marginBottom:12 }}><input value=${nt} onInput=${e=>setNt(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&add()} placeholder="Añadir tarea..." style=${{ ...iS, flex:1 }} /><button onClick=${add} style=${{ ...bP, padding:'10px 14px' }}>+</button></div>
        <div style=${{ display:'flex', flexDirection:'column', gap:5 }}>
          ${tasks.map(t=>html`
            <div key=${t.id} style=${{ display:'flex', alignItems:'center', gap:8, padding:'9px 12px', borderRadius:10, background:t.done?'#F0FFF4':'#F9F9FB', border:'1px solid '+(t.done?'#34C75922':'#E5E5EA') }}>
              <div onClick=${()=>tog(t.id)} style=${{ width:20, height:20, borderRadius:6, border:t.done?'none':'2px solid #C7C7CC', background:t.done?'#34C759':'#FFF', display:'flex', alignItems:'center', justifyContent:'center', color:'#FFF', fontSize:11, flexShrink:0, cursor:'pointer' }}>${t.done&&'✓'}</div>
              ${eId===t.id
                ? html`<div style=${{ flex:1, display:'flex', gap:4 }}><input autofocus value=${eVal} onInput=${e=>setEVal(e.target.value)} onKeyDown=${e=>{if(e.key==='Enter')saveE();if(e.key==='Escape')setEId(null)}} style=${{ ...iS, padding:'6px 10px', fontSize:13, flex:1 }} /><button onClick=${saveE} style=${{ ...bP, padding:'6px 12px', fontSize:12 }}>✓</button></div>`
                : html`<span onDblClick=${()=>{setEId(t.id);setEVal(t.text)}} style=${{ fontSize:13, color:t.done?'#86868B':'#1D1D1F', textDecoration:t.done?'line-through':'none', flex:1, cursor:'text' }} title="Doble clic para editar">${t.text}</span>`}
              <button onClick=${()=>del(t.id)} style=${{ border:'none', background:'none', fontSize:14, color:'#C7C7CC', padding:'2px 4px', flexShrink:0 }}>✕</button>

}

/* ═══ BOARD ═══ */
function Board({ notes, sN, user, filter }) {
  const [act, setAct] = useState(null);
  const [txt, setTxt] = useState('');
  const [eId, setEId] = useState(null);
  const [eVal, setEVal] = useState('');
  const [dragId, setDragId] = useState(null);
  const [overCat, setOverCat] = useState(null);

  const addN = c => { if(!txt.trim())return; sN([...notes,{id:uid(),text:txt.trim(),category:c,userId:user.id,userName:user.name,userAvatar:user.avatar,userColor:user.color,voters:[]}]); setTxt(''); setAct(null); };
  const vote = nid => sN(notes.map(n=>{if(n.id!==nid)return n;const v=n.voters||[];return{...n,voters:v.includes(user.id)?v.filter(x=>x!==user.id):[...v,user.id]}}));
  const delN = nid => sN(notes.filter(n=>n.id!==nid));
  const saveE = () => { if(!eVal.trim())delN(eId); else sN(notes.map(n=>n.id===eId?{...n,text:eVal.trim()}:n)); setEId(null); };
  const drop = (e,c) => { e.preventDefault(); setOverCat(null); if(dragId)sN(notes.map(n=>n.id===dragId?{...n,category:c}:n)); setDragId(null); };

  let fil = notes;
  if(filter==='mine') fil=notes.filter(n=>n.userId===user.id);
  else if(CATS.some(c=>c.id===filter)) fil=notes.filter(n=>n.category===filter);
  const cats2 = CATS.some(c=>c.id===filter)?CATS.filter(c=>c.id===filter):CATS;

  return html`
    <div style=${{ display:'grid', gridTemplateColumns:cats2.length===1?'1fr':'repeat(4,1fr)', gap:10, height:'100%' }}>
      ${cats2.map(cat => {
        const cn = fil.filter(n=>n.category===cat.id).sort((a,b)=>(b.voters?.length||0)-(a.voters?.length||0));
        return html`
          <div key=${cat.id} onDragOver=${e=>{e.preventDefault();setOverCat(cat.id)}} onDragLeave=${()=>setOverCat(null)} onDrop=${e=>drop(e,cat.id)}
            style=${{ ...cS, display:'flex', flexDirection:'column', borderColor:overCat===cat.id?'#007AFF':'#E5E5EA', background:overCat===cat.id?'#007AFF04':'#FFF', transition:'all .2s' }}>
            <div style=${{ padding:'12px 14px 9px', background:cat.color+'06', borderBottom:'2.5px solid '+cat.color }}>
              <div style=${{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                <div style=${{ display:'flex', alignItems:'center', gap:6 }}><span style=${{ fontSize:16 }}>${cat.emoji}</span><span style=${{ fontSize:14, fontWeight:700 }}>${cat.label}</span></div>
                <span style=${{ background:cat.color+'15', color:cat.color, fontSize:11, fontWeight:700, padding:'2px 8px', borderRadius:6 }}>${cn.length}</span>
              </div>
            </div>
            <div style=${{ flex:1, padding:'7px 8px', overflowY:'auto', display:'flex', flexDirection:'column', gap:6, minHeight:60 }}>
              ${cn.map(note => {
                const voted=note.voters?.includes(user.id); const mine=note.userId===user.id;
                return html`
                  <div key=${note.id} draggable=${true} onDragStart=${e=>{setDragId(note.id);e.dataTransfer.effectAllowed='move'}}
                    style=${{ background:cat.bg, borderRadius:12, padding:'10px 12px', border:'1px solid '+cat.color+'15', borderLeft:mine?'3px solid '+cat.color:'1px solid '+cat.color+'15', cursor:'grab', opacity:dragId===note.id?0.4:1 }}>
                    ${eId===note.id
                      ? html`<div>
                          <textarea autofocus value=${eVal} onInput=${e=>setEVal(e.target.value)} onKeyDown=${e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();saveE()}if(e.key==='Escape')setEId(null)}} style=${{ ...iS, height:48, resize:'none', fontSize:12, padding:'8px 10px' }} />
                          <div style=${{ display:'flex', gap:4, marginTop:4 }}>
                            <button onClick=${saveE} style=${{ ...bP, padding:'5px 12px', fontSize:11, background:cat.color }}>Guardar</button>
                            <button onClick=${()=>setEId(null)} style=${{ ...bS, padding:'5px 10px', fontSize:11 }}>Cancelar</button>
                          </div>
                        </div>`
                      : html`
                        <p style=${{ marginBottom:7, fontSize:12, lineHeight:1.4 }}>${note.text}</p>
                        <div style=${{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                          <div style=${{ display:'flex', alignItems:'center', gap:4 }}>
                            <span style=${{ fontSize:12 }}>${note.userAvatar}</span>
                            <span style=${{ fontSize:10, color:'#86868B' }}>${note.userName}</span>
                          </div>
                          <div style=${{ display:'flex', alignItems:'center', gap:4 }}>
                            <button onClick=${()=>vote(note.id)} style=${{ display:'flex', alignItems:'center', gap:3, padding:'2px 8px', borderRadius:6, border:'none', background:voted?cat.color:cat.color+'12', color:voted?'#FFF':cat.color, fontSize:10, fontWeight:700 }}>👍 ${note.voters?.length||0}</button>
                            ${mine && html`
                              <button onClick=${()=>{setEId(note.id);setEVal(note.text)}} style=${{ border:'none', background:'none', fontSize:12, cursor:'pointer', color:'#86868B', padding:'2px' }} title="Editar">✏️</button>
                              <button onClick=${()=>delN(note.id)} style=${{ border:'none', background:'none', fontSize:12, cursor:'pointer', color:'#C7C7CC', padding:'2px' }} title="Eliminar">✕</button>
                            `}
                          </div>
                        </div>
                      `
                    }
                  </div>`;
              })}
            </div>
            ${act===cat.id
              ? html`<div style=${{ padding:'7px 8px 8px', borderTop:'1px solid #F2F2F7' }}><textarea autofocus value=${txt} onInput=${e=>setTxt(e.target.value)} onKeyDown=${e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addN(cat.id)}}} placeholder="Tu reflexión..." style=${{ ...iS, height:52, resize:'none', fontSize:12 }} /><div style=${{ display:'flex', gap:5, marginTop:5 }}><button onClick=${()=>addN(cat.id)} style=${{ ...bP, flex:1, padding:'7px', fontSize:12, background:cat.color }}>Añadir</button><button onClick=${()=>{setAct(null);setTxt('')}} style=${{ ...bS, padding:'7px 10px', fontSize:11 }}>✕</button></div></div>`
              : html`<button onClick=${()=>{setAct(cat.id);setTxt('')}} style=${{ margin:'5px 8px 8px', padding:'8px', borderRadius:9, border:'1.5px dashed '+cat.color+'30', background:'transparent', color:cat.color, fontSize:12, fontWeight:600 }}>+ Añadir nota</button>`}
          </div>`;
      })}
    </div>
  `;
}

/* ═══ PHASE 4: ACTIONS ═══ */
function P4({ notes, actions, sA, user }) {
  const [form, setForm] = useState({text:'',owner:'',date:'',priority:'medium'});
  const [eId, setEId] = useState(null);
  const [eF, setEF] = useState({});
  const topN = [...notes].sort((a,b)=>(b.voters?.length||0)-(a.voters?.length||0)).slice(0,12);
  const addA = fn => {
    const t=fn?fn.text:form.text; if(!t.trim())return;
    const vs=fn?(fn.voters?.length||0):0; const pri=fn?(vs>=5?'high':vs>=2?'medium':'low'):form.priority;
    sA([...actions,{id:uid(),text:t.trim(),owner:form.owner||'Sin asignar',date:form.date||'',status:'pending',priority:pri,voteScore:vs,createdBy:user.id,fromCategory:fn?.category||null,noteId:fn?.id||null}]);
    if(!fn)setForm({text:'',owner:'',date:'',priority:'medium'});
  };
  const togN = n => { const ex=actions.find(a=>a.noteId===n.id); if(ex)sA(actions.filter(a=>a.noteId!==n.id)); else addA(n); };
  const upSt = (id,st) => sA(actions.map(a=>a.id===id?{...a,status:st}:a));
  const delA = id => sA(actions.filter(a=>a.id!==id));
  const saveEA = () => { sA(actions.map(a=>a.id===eId?{...a,...eF}:a)); setEId(null); };
  const priO = {high:3,medium:2,low:1};

  return html`
    <div style=${{ maxWidth:1000, margin:'0 auto' }}>
      <div style=${{ display:'grid', gridTemplateColumns:'1fr 320px', gap:14 }}>

          <div style=${{ display:'flex', gap:6, marginBottom:16, flexWrap:'wrap' }}>
            <input value=${form.text} onInput=${e=>setForm({...form,text:e.target.value})} placeholder="Acción concreta..." style=${{ ...iS, flex:2, minWidth:150 }} />
            <input value=${form.owner} onInput=${e=>setForm({...form,owner:e.target.value})} placeholder="Responsable" style=${{ ...iS, flex:1, minWidth:80 }} />
            <input type="date" value=${form.date} onInput=${e=>setForm({...form,date:e.target.value})} style=${{ ...iS, width:120, flex:'none' }} />
            <select value=${form.priority} onChange=${e=>setForm({...form,priority:e.target.value})} style=${{ ...iS, width:100, flex:'none' }}>${PRIS.map(p=>html`<option key=${p.id} value=${p.id}>${p.icon} ${p.label}</option>`)}</select>
            <button onClick=${()=>addA(null)} style=${bP}>+ Añadir</button>
          </div>
          ${actions.length===0&&html`<div style=${{ textAlign:'center', padding:'28px 0', color:'#C7C7CC' }}><p style=${{ fontSize:13 }}>Crea accionables o selecciona notas votadas →</p></div>`}
          <div style=${{ display:'flex', flexDirection:'column', gap:7 }}>
            ${[...actions].sort((a,b)=>(priO[b.priority]||0)-(priO[a.priority]||0)).map(a=>{
              const pr=PRIS.find(p=>p.id===a.priority)||PRIS[1]; const st=STS.find(s=>s.id===a.status); const ct=a.fromCategory?CATS.find(c=>c.id===a.fromCategory):null;
              if(eId===a.id) return html`
                <div key=${a.id} style=${{ padding:'14px 16px', borderRadius:13, background:'#F9F9FB', border:'2px solid #007AFF30', animation:'fadeIn .2s' }}>
                  <div style=${{ display:'flex', gap:6, flexWrap:'wrap', marginBottom:8 }}>
                    <input autofocus value=${eF.text} onInput=${e=>setEF({...eF,text:e.target.value})} style=${{ ...iS, flex:2, minWidth:140, fontSize:13 }} />
                    <input value=${eF.owner} onInput=${e=>setEF({...eF,owner:e.target.value})} style=${{ ...iS, flex:1, minWidth:80, fontSize:13 }} />
                    <input type="date" value=${eF.date} onInput=${e=>setEF({...eF,date:e.target.value})} style=${{ ...iS, width:120, flex:'none', fontSize:13 }} />
                    <select value=${eF.priority} onChange=${e=>setEF({...eF,priority:e.target.value})} style=${{ ...iS, width:90, flex:'none', fontSize:13 }}>${PRIS.map(p=>html`<option key=${p.id} value=${p.id}>${p.icon} ${p.label}</option>`)}</select>
                  </div>
                  <div style=${{ display:'flex', gap:6 }}><button onClick=${saveEA} style=${{ ...bP, padding:'8px 16px', fontSize:12 }}>Guardar</button><button onClick=${()=>setEId(null)} style=${{ ...bS, padding:'8px 14px', fontSize:12 }}>Cancelar</button></div>
                </div>`;
              return html`
                <div key=${a.id} class="hl" style=${{ padding:'12px 14px', borderRadius:13, background:'#FFF', border:'1.5px solid #E5E5EA', display:'flex', alignItems:'center', gap:10 }}>
                  <div style=${{ display:'flex', flexDirection:'column', alignItems:'center', gap:1, minWidth:40 }}><span style=${{ fontSize:14 }}>${pr.icon}</span><span style=${{ fontSize:8, fontWeight:700, color:pr.color, textTransform:'uppercase' }}>${pr.label}</span></div>
                  <div style=${{ flex:1 }}>
                    ${ct&&html`<span style=${{ fontSize:9, fontWeight:700, color:ct.color, background:ct.color+'10', padding:'1px 5px', borderRadius:3, display:'inline-block', marginBottom:2 }}>${ct.emoji} ${ct.label}</span>`}
                    <p style=${{ fontSize:13, fontWeight:600 }}>${a.text}</p>
                    <div style=${{ display:'flex', alignItems:'center', gap:6, marginTop:3 }}><span style=${{ fontSize:11, color:'#007AFF', fontWeight:600 }}>${a.owner}</span>${a.date&&html`<span style=${{ fontSize:10, color:'#86868B' }}>📅 ${fd(a.date)}</span>`}</div>

        </div>
        <div style=${{ ...cS, padding:18 }}>

          <p style=${{ fontSize:10, color:'#86868B', marginBottom:12 }}>Clic para añadir / quitar</p>
          <div style=${{ display:'flex', flexDirection:'column', gap:6 }}>
            ${topN.map(n=>{const ct=CATS.find(c=>c.id===n.category); const lk=actions.some(a=>a.noteId===n.id);
              return html`<button key=${n.id} onClick=${()=>togN(n)} style=${{ padding:'9px 10px', borderRadius:10, background:lk?'#1D1D1F':ct.bg, border:'1px solid '+(lk?'#1D1D1F':ct.color+'18'), textAlign:'left', transition:'all .2s' }}>

                <p style=${{ fontSize:11, color:lk?'#CCC':'#1D1D1F', lineHeight:1.35 }}>${n.text}</p>
              </button>`})}

/* ═══ PHASE 5: DASHBOARD + PDF ═══ */
function P5({ notes, actions, users, user, obj, tasks }) {
  // Build ranking from notes (not from online users — so it works even if someone disconnects)
  const authorMap = {};
  notes.forEach(n => {
    if (!authorMap[n.userId]) authorMap[n.userId] = { name: n.userName, avatar: n.userAvatar, color: n.userColor || '#007AFF', tarjetas: 0, votosRecibidos: 0 };
    authorMap[n.userId].tarjetas++;
    authorMap[n.userId].votosRecibidos += (n.voters?.length || 0);
  });
  const ranking = Object.entries(authorMap).map(([id, d]) => ({
    id, name: d.name, avatar: d.avatar, color: d.color,
    tarjetas: d.tarjetas, votosRecibidos: d.votosRecibidos,
    score: d.tarjetas + d.votosRecibidos,
  })).sort((a, b) => b.score - a.score);
  const mx=ranking[0]?.score||1;
  const tN=notes.length; const tV=notes.reduce((s,n)=>s+(n.voters?.length||0),0);
  const tD=tasks.filter(t=>t.done).length; const aD=actions.filter(a=>a.status==='done').length;
  const medals=['🥇','🥈','🥉']; const priO={high:3,medium:2,low:1};
  const objL=obj.met===true?'Cumplido ✅':obj.met===false?'No cumplido ❌':obj.met==='partial'?'Parcial ⚠️':'Sin evaluar';

  const exportPDF = () => {
    const nc=CATS.map(c=>({...c,notes:notes.filter(n=>n.category===c.id).sort((a,b)=>(b.voters?.length||0)-(a.voters?.length||0))}));
    const sa=[...actions].sort((a,b)=>(priO[b.priority]||0)-(priO[a.priority]||0));
    const doc=`<!DOCTYPE html><html><head><meta charset="utf-8"><title>RetroFlow - Informe</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,'Segoe UI',sans-serif;color:#1D1D1F;padding:40px;max-width:900px;margin:0 auto;font-size:13px;line-height:1.5}h1{font-size:26px;font-weight:700;margin-bottom:4px}h2{font-size:18px;font-weight:700;margin:28px 0 12px;padding-bottom:6px;border-bottom:2px solid #E5E5EA}.sum{display:flex;gap:12px;margin-bottom:24px}.cd{flex:1;background:#F9F9FB;border-radius:12px;padding:16px;text-align:center;border:1px solid #E5E5EA}.cd .v{font-size:22px;font-weight:800}.cd .l{font-size:11px;color:#86868B;margin-top:2px}.ct{margin-bottom:20px;padding:14px;border-radius:12px;border-left:4px solid}.good{border-color:#34C759;background:#F0FFF4}.bad{border-color:#FF3B30;background:#FFF5F5}.start{border-color:#007AFF;background:#EBF5FF}.stop{border-color:#FF9500;background:#FFF8EB}.nt{padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.06);display:flex;justify-content:space-between}.nt:last-child{border-bottom:none}.ac{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #E5E5EA}.ac:last-child{border-bottom:none}.bg{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600}.rk{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #F2F2F7}.rk:last-child{border-bottom:none}.tk{padding:4px 0}.tk.dn{text-decoration:line-through;color:#86868B}.br{height:6px;background:#E5E5EA;border-radius:3px;margin:4px 0 12px;overflow:hidden}.fl{height:100%;border-radius:3px}@media print{body{padding:20px}}</style></head><body>
<div style="text-align:center;margin-bottom:8px"><span style="font-size:32px">🔄</span></div>
<h1 style="text-align:center">RetroFlow — ${SALA_DISPLAY}</h1>
<p style="text-align:center;color:#86868B;font-size:13px;margin-bottom:24px">${fd(new Date())}</p>
<div class="sum"><div class="cd"><div class="v" style="color:#007AFF">${tN}</div><div class="l">Notas</div></div><div class="cd"><div class="v" style="color:#FF9500">${tV}</div><div class="l">Votos</div></div><div class="cd"><div class="v" style="color:#34C759">${aD}/${actions.length}</div><div class="l">Accionables</div></div><div class="cd"><div class="v" style="color:${obj.met===true?'#34C759':obj.met===false?'#FF3B30':'#FF9500'};font-size:14px">${objL}</div><div class="l">Objetivo</div></div></div>
${obj.text?'<h2>🎯 Objetivo</h2><p style="margin-bottom:16px">'+obj.text+'</p>':''}
<h2>📋 Tareas (${tD}/${tasks.length})</h2><div class="br"><div class="fl" style="width:${tasks.length?(tD/tasks.length)*100:0}%;background:linear-gradient(90deg,#34C759,#007AFF)"></div></div>
${tasks.map(t=>'<div class="tk'+(t.done?' dn':'')+'">'+(t.done?'✅':'⬜')+' '+t.text+'</div>').join('')}
<h2>📝 Notas del equipo</h2>
${nc.map(c=>c.notes.length===0?'':'<div class="ct '+c.id+'"><h3 style="font-size:14px;font-weight:700;margin-bottom:8px">'+c.emoji+' '+c.label+' ('+c.notes.length+')</h3>'+c.notes.map(n=>'<div class="nt"><div style="flex:1">'+n.text+'</div><div style="font-size:11px;color:#86868B;white-space:nowrap;margin-left:12px">'+n.userAvatar+' '+n.userName+' · 👍 '+(n.voters?.length||0)+'</div></div>').join('')+'</div>').join('')}
<h2>🎯 Accionables</h2>
${sa.length===0?'<p style="color:#86868B">No se definieron accionables</p>':sa.map(a=>{const pr=PRIS.find(p=>p.id===a.priority)||PRIS[1];const st=STS.find(s=>s.id===a.status);return'<div class="ac"><div style="font-size:16px;width:24px;text-align:center">'+pr.icon+'</div><div style="flex:1"><strong>'+a.text+'</strong><div style="font-size:11px;color:#86868B">'+a.owner+(a.date?' · 📅 '+fd(a.date):'')+'</div></div><span class="bg" style="background:'+st.bg+';color:'+st.color+'">'+st.label+'</span></div>'}).join('')}
<h2>🏆 Ranking</h2><p style="font-size:11px;color:#86868B;margin-bottom:12px">Tarjetas aportadas + votos recibidos</p>
${ranking.map((r,i)=>'<div class="rk"><div style="width:28px;text-align:center;font-size:18px">'+(i<3?medals[i]:(i+1)+'º')+'</div><div><strong>'+r.avatar+' '+r.name+'</strong> <span style="font-weight:800;color:#FFB800">'+r.score+' pts</span><div style="font-size:10px;color:#86868B">📝 '+r.tarjetas+' tarjetas · 👍 '+r.votosRecibidos+' votos recibidos</div></div></div>').join('')}
<div style="margin-top:32px;text-align:center;color:#C7C7CC;font-size:11px">RetroFlow · ${new Date().toLocaleString('es-ES')}</div>
<script>window.onload=function(){window.print()}<\/script></body></html>`;
    const w=window.open('','_blank');
    if(w){w.document.write(doc);w.document.close()}
  };

  return html`
    <div style=${{ maxWidth:960, margin:'0 auto', display:'flex', flexDirection:'column', gap:14 }}>
      <div style=${{ display:'flex', justifyContent:'flex-end' }}>
        <button onClick=${exportPDF} style=${{ ...bP, background:'#007AFF', display:'flex', alignItems:'center', gap:6 }}>📄 Descargar informe PDF</button>
      </div>
      <div style=${{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:10 }}>
        ${[{l:'Notas',v:tN,i:'📝',c:'#007AFF'},{l:'Votos',v:tV,i:'👍',c:'#FF9500'},{l:'Accionables',v:aD+'/'+actions.length,i:'🎯',c:'#34C759'},{l:'Objetivo',v:objL,i:'🏁',c:obj.met===true?'#34C759':obj.met===false?'#FF3B30':'#FF9500'}].map((s,i)=>html`
          <div key=${i} style=${{ ...cS, padding:18, textAlign:'center' }}><div style=${{ fontSize:24, marginBottom:6 }}>${s.i}</div><div style=${{ fontSize:24, fontWeight:800, color:s.c }}>${s.v}</div><div style=${{ fontSize:11, color:'#86868B', marginTop:2 }}>${s.l}</div></div>`)}
      </div>
      <div style=${{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:14 }}>
        <div style=${{ ...cS, padding:22 }}>
          <h3 style=${{ fontSize:15, fontWeight:700, marginBottom:14 }}>📊 Notas por categoría</h3>
          ${CATS.map(c=>{const cnt=notes.filter(n=>n.category===c.id).length;const pct=tN>0?(cnt/tN)*100:0;return html`
            <div key=${c.id} style=${{ marginBottom:10 }}><div style=${{ display:'flex', justifyContent:'space-between', marginBottom:4 }}><span style=${{ fontSize:13, fontWeight:600 }}>${c.emoji} ${c.label}</span><span style=${{ fontSize:12, fontWeight:700, color:c.color }}>${cnt}</span></div><div style=${{ height:8, background:'#F2F2F7', borderRadius:4, overflow:'hidden' }}><div style=${{ height:'100%', width:pct+'%', background:c.color, borderRadius:4, transition:'width .5s' }} /></div></div>`})}
        </div>
        <div style=${{ ...cS, padding:22 }}>
          <h3 style=${{ fontSize:15, fontWeight:700, marginBottom:14 }}>📋 Progreso</h3>
          ${[{l:'Tareas',d:tD,t:tasks.length,c:'#007AFF'},{l:'Accionables',d:aD,t:actions.length,c:'#34C759'}].map((r,i)=>html`
            <div key=${i} style=${{ marginBottom:12 }}><div style=${{ display:'flex', justifyContent:'space-between', marginBottom:4 }}><span style=${{ fontSize:13, fontWeight:600 }}>${r.l}</span><span style=${{ fontSize:12, fontWeight:700, color:r.c }}>${r.d}/${r.t}</span></div><div style=${{ height:8, background:'#F2F2F7', borderRadius:4, overflow:'hidden' }}><div style=${{ height:'100%', width:(r.t>0?(r.d/r.t)*100:0)+'%', background:r.c, borderRadius:4, transition:'width .5s' }} /></div></div>`)}
        </div>
      </div>
      <div style=${{ ...cS, padding:24 }}>
        <h3 style=${{ fontSize:18, fontWeight:700, marginBottom:4 }}>🏆 Ranking</h3>
        <p style=${{ fontSize:11, color:'#86868B', marginBottom:18 }}>Tarjetas aportadas + votos recibidos en ellas</p>
        <div style=${{ display:'flex', flexDirection:'column', gap:8 }}>
          ${ranking.map((r,i)=>{const isMe=r.id===user.id;const bw=mx>0?(r.score/mx)*100:0;
            const bg=i===0?'linear-gradient(90deg,#FFD60A,#FF9500)':i===1?'linear-gradient(90deg,#C0C0C0,#999)':i===2?'linear-gradient(90deg,#CD7F32,#B8860B)':'#007AFF';
            return html`
              <div key=${r.id} style=${{ display:'flex', alignItems:'center', gap:12, padding:'14px 18px', borderRadius:14, background:isMe?'#007AFF06':i<3?'#FFFBEB':'#F9F9FB', border:isMe?'2px solid #007AFF25':i<3?'1.5px solid #FFD60A25':'1.5px solid #E5E5EA' }}>
                <div style=${{ width:32, textAlign:'center', fontSize:i<3?22:14, fontWeight:700, color:'#86868B' }}>${i<3?medals[i]:(i+1)+'º'}</div>
                <div style=${{ width:36, height:36, borderRadius:18, background:r.color, display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, flexShrink:0, border:'2px solid #FFF', boxShadow:'0 2px 6px rgba(0,0,0,0.06)' }}>${r.avatar}</div>
                <div style=${{ flex:1 }}>
                  <div style=${{ display:'flex', alignItems:'center', gap:6, marginBottom:4 }}><span style=${{ fontSize:14, fontWeight:700 }}>${r.name}</span><span style=${{ fontSize:18, fontWeight:800, color:i<3?'#FFB800':'#86868B' }}>${r.score}</span><span style=${{ fontSize:10, color:'#86868B' }}>pts</span></div>
                  <div style=${{ height:5, background:'#E5E5EA', borderRadius:3, overflow:'hidden', marginBottom:5 }}><div style=${{ height:'100%', width:bw+'%', background:bg, borderRadius:3, transition:'width .5s' }} /></div>
                  <div style=${{ display:'flex', gap:10 }}><span style=${{ fontSize:11, color:'#86868B' }}>📝 ${r.tarjetas} tarjetas</span><span style=${{ fontSize:11, color:'#86868B' }}>👍 ${r.votosRecibidos} votos recibidos</span></div>
                </div>
              </div>`})}
        </div>
      </div>
    </div>
  `;
}

render(html`<${App} />`, document.getElementById('app'));
</script>
