/* ═══ RETRO PERSISTENCE ═══ */
function retroStateKey()  { return 'rf-retro-state-'  + SALA; }
function retroPhaseKey()  { return 'rf-retro-phase-'  + SALA; }
function retroTimesKey()  { return 'rf-retro-times-'  + SALA; }

function loadRetroState() {
  try { const s = localStorage.getItem(retroStateKey()); return s ? JSON.parse(s) : null; } catch { return null; }
}
function saveRetroState(state) {
  try { localStorage.setItem(retroStateKey(), JSON.stringify(state)); } catch {}
}
function loadRetroPhase() {
  try { const p = localStorage.getItem(retroPhaseKey()); return p !== null ? parseInt(p) : 0; } catch { return 0; }
}
function saveRetroPhase(phase) {
  try { localStorage.setItem(retroPhaseKey(), String(phase)); } catch {}
}
function loadPhaseTimes() {
  try { const t = localStorage.getItem(retroTimesKey()); return t ? JSON.parse(t) : {}; } catch { return {}; }
}
function savePhaseTimes(times) {
  try { localStorage.setItem(retroTimesKey(), JSON.stringify(times)); } catch {}
}
function clearRetroStorage() {
  [retroStateKey(), retroPhaseKey(), retroTimesKey()].forEach(k => localStorage.removeItem(k));
}

/* ═══ REALTIME STATE ═══ */
function useRealtime(user) {
  const [state, setState] = useState(() => {
    const saved = loadRetroState();
    if (saved) return { notes:[], tasks:DEFAULT_TASKS.map(t=>({...t,id:uid()})), actions:[], obj:{text:'',met:null}, risks:loadRisks(), ...saved };
    return { notes:[], tasks:DEFAULT_TASKS.map(t=>({...t,id:uid()})), actions:[], obj:{text:'',met:null}, risks:loadRisks() };
  });
  const [online, setOnline] = useState({});
  const [cursors, setCursors] = useState({});
  const chRef = useRef(null);
  const stRef = useRef(state);
  const cursRef = useRef({});
  stRef.current = state;

  useEffect(() => {
    if (!user) return;
    const ch = supabase.channel('retro-' + SALA, { config:{ presence:{ key:user.id } } });

    // Presence: only for online users
    ch.on('presence', { event:'sync' }, () => {
      const ps = ch.presenceState();
      const u = {};
      Object.entries(ps).forEach(([k, arr]) => {
        if (arr.length > 0) {
          u[k] = { name:arr[0].name, avatar:arr[0].avatar, color:arr[0].color };
        }
      });
      setOnline(u);
    });

    // Broadcast: cursor positions (fast, no rate limit)
    ch.on('broadcast', { event:'phase' }, ({ payload }) => {
        if (payload.from !== user.id && window.__phaseRecv) window.__phaseRecv(payload.phase);
      });
      ch.on('broadcast', { event:'cursor' }, ({ payload }) => {
      if (payload.id === user.id) return;
      cursRef.current = { ...cursRef.current, [payload.id]: { x:payload.x, y:payload.y, name:payload.name, avatar:payload.avatar, color:payload.color, ts:Date.now() } };
      setCursors({ ...cursRef.current });
    });

    // Broadcast: state sync
    ch.on('broadcast', { event:'sync' }, ({ payload }) => {
      if (payload.from === user.id) return;
      setState(prev => {
        const next = { ...prev, [payload.key]: payload.data };
        saveRetroState(next);
        return next;
      });
    });

    ch.on('broadcast', { event:'timer' }, ({ payload }) => {
      if (payload.from === user.id) return;
      if (window.__timerRecv) window.__timerRecv(payload.secs, payload.isRunning, payload.startedAt);
    });

    ch.on('broadcast', { event:'req' }, ({ payload }) => {
      if (payload.from === user.id) return;
      const s = stRef.current;
      Object.keys(s).forEach(k => {
        ch.send({ type:'broadcast', event:'sync', payload:{ key:k, data:s[k], from:user.id } });
      });
    });

    ch.subscribe(async (status) => {
      if (status === 'SUBSCRIBED') {
        await ch.track({ name:user.name, avatar:user.avatar, color:user.color });
        setTimeout(() => ch.send({ type:'broadcast', event:'req', payload:{ from:user.id } }), 600);
      }
    });

    // Clean stale cursors every 3s
    const cleanIv = setInterval(() => {
      const now = Date.now();
      let changed = false;
      const c = { ...cursRef.current };
      Object.keys(c).forEach(k => { if (now - c[k].ts > 5000) { delete c[k]; changed = true; } });
      if (changed) { cursRef.current = c; setCursors(c); }
    }, 3000);

    chRef.current = ch;
    return () => { supabase.removeChannel(ch); clearInterval(cleanIv); };
  }, [user]);

  const upd = useCallback((key, data) => {
    setState(prev => {
      const next = { ...prev, [key]:data };
      saveRetroState(next);
      return next;
    });
    if (chRef.current && user) chRef.current.send({ type:'broadcast', event:'sync', payload:{ key, data, from:user.id } });
  }, [user]);

  const moveCursor = useCallback((x, y) => {
    if (chRef.current && user) {
      chRef.current.send({ type:'broadcast', event:'cursor', payload:{ id:user.id, x, y, name:user.name, avatar:user.avatar, color:user.color } });
    }
  }, [user]);

  const reset = useCallback(() => {
    const currentRisks = stRef.current.risks || [];
    const openActions = (stRef.current.actions || []).filter(a => a.status !== 'done' && a.status !== 'discarded');
    const fresh = { notes:[], tasks:DEFAULT_TASKS.map(t=>({...t,id:uid()})), actions:openActions, obj:{text:'',met:null}, risks:currentRisks };
    clearRetroStorage();
    setState(fresh);
    if (chRef.current && user) {
      Object.keys(fresh).forEach(k => {
        chRef.current.send({ type:'broadcast', event:'sync', payload:{ key:k, data:fresh[k], from:user.id } });
      });
    }
  }, [user]);

  const broadcastTimer = useCallback((secs, isRunning, startedAt) => {
    if (chRef.current && user) {
      chRef.current.send({ type:'broadcast', event:'timer', payload:{ secs, isRunning, startedAt: startedAt||null, from:user.id } });
    }
  }, [user]);

  const broadcastPhase = useCallback((phaseIdx) => {
    if (chRef.current && user) {
      chRef.current.send({ type:'broadcast', event:'phase', payload:{ phase: phaseIdx, from:user.id, name:user.name } });
    }
  }, [user]);

  return { state, upd, online, cursors, moveCursor, reset, broadcastTimer, broadcastPhase };
}

// ── User identity: persist per sala so you don't duplicate ──
function loadUser() {
  try { const s = localStorage.getItem('rf-user-' + SALA); return s ? JSON.parse(s) : null; } catch { return null; }
}
function saveUser(user) {
  try { localStorage.setItem('rf-user-' + SALA, JSON.stringify(user)); } catch {}
}
function clearUser() {
  try { localStorage.removeItem('rf-user-' + SALA); } catch {}
}

// ── User registry per sala (for admin visibility + duplicate prevention) ──
function loadUserRegistry(sala) {
  try { const s = localStorage.getItem('rf-reg-' + (sala || SALA)); return s ? JSON.parse(s) : []; } catch { return []; }
}
function registerUser(user) {
  try {
    const reg = loadUserRegistry();
    const existing = reg.findIndex(u => u.id === user.id);
    if (existing >= 0) reg[existing] = { ...reg[existing], name: user.name, avatar: user.avatar, color: user.color, lastSeen: new Date().toISOString() };
    else reg.push({ id: user.id, name: user.name, avatar: user.avatar, color: user.color, firstSeen: new Date().toISOString(), lastSeen: new Date().toISOString() });
    localStorage.setItem('rf-reg-' + SALA, JSON.stringify(reg));
  } catch {}
}
function isNameTaken(name) {
  const reg = loadUserRegistry();
  const saved = loadUser();
  return reg.some(u => u.name.toLowerCase() === name.toLowerCase() && (!saved || u.id !== saved.id));
}

const RISK_LEVELS = [
  { id: 'alto', label: 'Alto', color: '#FF3B30', val: 3 },
  { id: 'medio', label: 'Medio', color: '#FF9500', val: 2 },
  { id: 'bajo', label: 'Bajo', color: '#34C759', val: 1 },
];
const RISK_STATUS = [
  { id: 'open', label: 'Abierto', color: '#FF3B30' },
  { id: 'mitigating', label: 'Mitigando', color: '#FF9500' },
  { id: 'mitigated', label: 'Mitigado', color: '#34C759' },
  { id: 'accepted', label: 'Aceptado', color: '#8E8E93' },
];

function getRiskLevel(votes) {
  if (!votes || Object.keys(votes).length === 0) return RISK_LEVELS[1];
  const counts = { alto: 0, medio: 0, bajo: 0 };
  Object.values(votes).forEach(v => { if (counts[v] !== undefined) counts[v]++; });
  const max = Math.max(counts.alto, counts.medio, counts.bajo);
  if (counts.alto === max) return RISK_LEVELS[0];
  if (counts.medio === max) return RISK_LEVELS[1];
  return RISK_LEVELS[2];
}

function getHeatColor(impLvl, probLvl) {
  const score = impLvl.val * probLvl.val;
  if (score >= 6) return '#FF3B30';
  if (score >= 3) return '#FF9500';
  return '#34C759';
}

    setRoles(r);
    localStorage.setItem('rf-admin-roles', JSON.stringify(r));

  const addRole = () => { const t=newRole.trim(); if(!t||roles.includes(t)) return; saveRoles([...roles,t]); setNewRole(''); };

    setSaving(memberId);
    const m=members.find(x=>x.id===memberId); if(!m){setSaving(null);return;}

    setMembers(prev=>prev.map(x=>x.id===memberId?u:x)); setSaving(null);

/* ═══ CAL FORM — top-level to avoid remount on every render ═══ */
function CalForm({ cal, setCal, saving, onSave, onCancel }) {
  const [nh, setNh] = useState({date:'', name:''});
  const addH = () => {
    if (!nh.date||!nh.name.trim()) return;
    setCal({...cal, holidays:[...(cal.holidays||[]),{...nh}].sort((a,b)=>a.date<b.date?-1:1)});
    setNh({date:'', name:''});
  };
  const delH = (i) => setCal({...cal, holidays:(cal.holidays||[]).filter((_,idx)=>idx!==i)});
  return html`
    <div style=${{ display:'flex', flexDirection:'column', gap:12 }}>
      <div>
        <label style=${{ fontSize:11, color:'#86868B', fontWeight:600, display:'block', marginBottom:4 }}>Nombre del calendario</label>
        <input value=${cal.name||''} onInput=${e=>setCal({...cal,name:e.target.value})} placeholder="Ej: España, Andalucía, Cliente Endesa…"
          style=${{ ...iS, fontSize:14 }} />
      </div>
      <div>
        <label style=${{ fontSize:11, color:'#86868B', fontWeight:600, display:'block', marginBottom:6 }}>📅 Festivos (${(cal.holidays||[]).length})</label>
        <div style=${{ display:'flex', flexDirection:'column', gap:4, marginBottom:8, maxHeight:200, overflowY:'auto' }}>
          ${(cal.holidays||[]).length===0 && html`<p style=${{ fontSize:11, color:'#C7C7CC' }}>Sin festivos añadidos</p>`}
          ${(cal.holidays||[]).map((h,i) => html`
            <div key=${i} style=${{ display:'flex', alignItems:'center', gap:8, padding:'5px 10px', borderRadius:8, background:'#F9F9FB', border:'1px solid #E5E5EA' }}>
              <span style=${{ fontSize:11, fontWeight:700, color:'#5856D6', minWidth:80 }}>${h.date}</span>
              <span style=${{ fontSize:12, flex:1 }}>${h.name}</span>
              <button onClick=${()=>delH(i)} style=${{ border:'none', background:'none', color:'#FF3B30', fontSize:14, cursor:'pointer' }}>✕</button>
            </div>`)}
        </div>
        <div style=${{ display:'grid', gridTemplateColumns:'120px 1fr auto', gap:6 }}>
          <input type="date" value=${nh.date} onInput=${e=>setNh({...nh,date:e.target.value})}
            style=${{ border:'1.5px solid #E5E5EA', borderRadius:8, padding:'7px 8px', fontSize:12, fontFamily:'inherit', outline:'none' }} />
          <input value=${nh.name} onInput=${e=>setNh({...nh,name:e.target.value})} placeholder="Nombre del festivo"
            onKeyDown=${e=>e.key==='Enter'&&addH()}
            style=${{ border:'1.5px solid #E5E5EA', borderRadius:8, padding:'7px 10px', fontSize:12, fontFamily:'inherit', outline:'none' }} />
          <button onClick=${addH} style=${{ padding:'7px 12px', borderRadius:8, border:'none', background:'#5856D6', color:'#FFF', fontSize:12, fontWeight:600, cursor:'pointer' }}>+</button>
        </div>
      </div>
      <div style=${{ display:'flex', gap:8, justifyContent:'flex-end', marginTop:4 }}>
        <button onClick=${onCancel} style=${{ padding:'9px 18px', borderRadius:9, border:'1.5px solid #E5E5EA', background:'#FFF', fontSize:12, cursor:'pointer' }}>Cancelar</button>
        <button onClick=${()=>onSave(cal)} disabled=${saving||!(cal.name||'').trim()}
          style=${{ padding:'9px 18px', borderRadius:9, border:'none', background:'#1D1D1F', color:'#FFF', fontSize:12, fontWeight:600, cursor:'pointer', opacity:(saving||!(cal.name||'').trim())?.5:1 }}>

function RoomPicker() {
  // ─── SUPABASE AUTH GATE ───
  const [authState,   setAuthState]   = useState('checking');
  const [authUser,    setAuthUser]    = useState(null);

  useEffect(() => {
    sbGetSession().then(session => {
      if (session) { setAuthUser(session.user); setAuthState('signed-in'); }
      else { setAuthState('signed-out'); }
    });
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_ev, session) => {
      if (session) { setAuthUser(session.user); setAuthState('signed-in'); }
      else { setAuthUser(null); setAuthState('signed-out'); }
    });
    return () => subscription.unsubscribe();
  }, []);

  const handleSignOut = async () => { await sbSignOut(); setAuthState('signed-out'); setAuthUser(null); };

  if (authState === 'checking') return html`
    <div style=${{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'#F5F5F7' }}>
      <div style=${{ textAlign:'center', color:'#86868B' }}>
        <div style=${{ fontSize:28, animation:'spin 1s linear infinite', display:'inline-block', marginBottom:8 }}>⏳</div>
        <p style=${{ fontSize:14 }}>Verificando sesión…</p>
      </div>
    </div>`;

  if (authState === 'signed-out') {
    // No active session — redirect to unified login
    window.location.href = window.location.pathname;
    return null;
  }

  // ─── ADMIN PANEL (autenticado) ───
  const [room, setRoom] = useState('');
  const [slug, setSlug] = useState('');
  const [tipo, setTipo] = useState('agile');
  const [slugTouched, setSlugTouched] = useState(false);
  const [rooms, setRooms] = useState(loadRooms);
  const [tab, setTab] = useState('dashboard');
  const [filterProject, setFilterProject] = useState('all');
  const [sbRetros, setSbRetros] = useState([]);
  const [loadingSb, setLoadingSb] = useState(true);

  // Load rooms from Supabase (override localStorage if available)
  useEffect(() => {
    sbLoadRooms().then(sbRooms => {
      if (sbRooms) { setRooms(sbRooms); saveRooms(sbRooms); }
    });
    sbLoadRetros().then(data => { setSbRetros(data); setLoadingSb(false); });
    sbLoadCalendars().then(cals => { window.__calendars = cals; });
    sbLoadTeamMembers().then(members => { window.__allMembers = members||[]; });
  }, []);

  const go = (slug, t) => { window.location.href = window.location.pathname + '?sala=' + encodeURIComponent(slug) + '&tipo=' + (t || 'agile'); };
  const create = () => {
    if (!room.trim() || !slug.trim()) return;
    const cleanSlug = slug.trim().toLowerCase().replace(/[^a-z0-9-]/g, '-').replace(/-+/g, '-');
    if (rooms.find(r => r.slug === cleanSlug)) { alert('Ya existe una sala con ese slug.'); return; }
    const u = [...rooms, { name: room.trim(), slug: cleanSlug, tipo }];
    setRooms(u); saveRooms(u);
    sbSaveRoom(cleanSlug, room.trim(), tipo);
    setRoom(''); setSlug(''); setSlugTouched(false);
    go(cleanSlug, tipo);
  };
  const [confirmDelete, setConfirmDelete] = useState(null); // slug to delete
  const [editRoom,      setEditRoom]      = useState(null); // {slug, name, tipo}

  const remove = (slug) => setConfirmDelete(slug);

  const saveEdit = async () => {
    if (!editRoom || !editRoom.name.trim()) return;
    const updated = rooms.map(r => r.slug === editRoom.slug ? {...r, name:editRoom.name.trim(), tipo:editRoom.tipo} : r);
    setRooms(updated); saveRooms(updated);
    await sbSaveRoom(editRoom.slug, editRoom.name.trim(), editRoom.tipo);
    setEditRoom(null);
  };

  const doDelete = async () => {
    const slug = confirmDelete;
    setConfirmDelete(null);
    const u = rooms.filter(r => r.slug !== slug);
    setRooms(u); saveRooms(u);
    await sbDeleteRoom(slug);
    await sbDeleteRoomData(slug);
    // Refresh retros list
    sbLoadRetros().then(data => setSbRetros(data));
  };

  // Build stats — Supabase ONLY (no localStorage fallback)
  const salaStats = rooms.map(r => {
    const sbSala  = sbRetros.filter(rt => rt.sala === r.slug);
    const notes   = sbSala.reduce((s, rt) => s + (rt.data?.notes?.length || 0), 0);
    const votes   = sbSala.reduce((s, rt) => s + ((rt.data?.notes || []).reduce((a, n) => a + (n.voters?.length || 0), 0)), 0);
    const actions = sbSala.reduce((s, rt) => s + (rt.data?.actions?.length || 0), 0);
    const done    = sbSala.reduce((s, rt) => s + ((rt.data?.actions || []).filter(a => a.status === 'done').length), 0);
    const parts   = [...new Set(sbSala.flatMap(rt => (rt.data?.notes || []).map(n => n.userName)))];
    const risks   = sbSala.flatMap(rt => rt.data?.risks || []);
    const risksOpen      = risks.filter(x => x.status !== 'mitigated').length;
    const risksMitigated = risks.filter(x => x.status === 'mitigated').length;
    const rTipo   = TASK_TEMPLATES[r.tipo] || TASK_TEMPLATES.agile;
    const last    = sbSala[0] || null;
    return {
      ...r, rTipo,
      retros: sbSala.length,
      notes, votes, actions, done, parts,
      risksOpen, risksMitigated, risksTotal: risks.length,
      avgP: sbSala.length > 0 ? (parts.length / sbSala.length).toFixed(1) : 0,
      last, entries: sbSala,
    };
  });

  const filteredStats    = filterProject === 'all' ? salaStats : salaStats.filter(s => s.slug === filterProject);
  const totalRetros      = filteredStats.reduce((s, x) => s + x.retros, 0);
  const totalNotes       = filteredStats.reduce((s, x) => s + x.notes, 0);
  const totalActions     = filteredStats.reduce((s, x) => s + x.actions, 0);
  const totalActionsDone = filteredStats.reduce((s, x) => s + x.done, 0);
  const totalVotes       = filteredStats.reduce((s, x) => s + x.votes, 0);
  const allParticipants  = [...new Set(filteredStats.flatMap(s => s.parts))];
  const actionRate       = totalActions > 0 ? Math.round((totalActionsDone / totalActions) * 100) : 0;
  const totalRisksOpen   = filteredStats.reduce((s, x) => s + x.risksOpen, 0);
  const allRisks         = filteredStats.flatMap(s => s.entries.flatMap(rt => rt.data?.risks || []));

  // Trend: chronological retros from Supabase
  const trend = [...sbRetros].sort((a,b) => new Date(a.created_at) - new Date(b.created_at)).slice(-12);
  const trendMax = Math.max(...trend.map(t => t.data?.notes?.length || 0), 1);
  const partMax  = Math.max(...trend.map(t => [...new Set((t.data?.notes||[]).map(n=>n.userName))].length), 1);
  const bc = (i) => ['#007AFF','#34C759','#FF9500','#AF52DE','#FF2D55','#5856D6','#00C7BE','#FF3B30'][i % 8];

  return html`
    <div style=${{ minHeight:'100vh', background:'#F5F5F7', padding:'24px 16px' }}>
      <div style=${{ maxWidth:980, margin:'0 auto' }}>
        <div style=${{ position:'relative', textAlign:'center', marginBottom:20 }}>
          <h1 class="wm" style=${{ fontSize:28, marginBottom:2 }}>revelio</h1>
          <p style=${{ color:'#86868B', fontSize:13 }}>Panel de administración</p>
          <div style=${{ position:'absolute', right:0, top:'50%', transform:'translateY(-50%)', display:'flex', alignItems:'center', gap:8 }}>
            ${authUser && html`<span style=${{ fontSize:11, color:'#86868B' }}>${authUser.email}</span>`}
            <button onClick=${handleSignOut} style=${{ ...bS, padding:'5px 12px', fontSize:11, color:'#FF3B30', borderColor:'#FF3B3030' }}>🔒 Cerrar sesión</button>
          </div>
        </div>

        <div style=${{ display:'flex', gap:4, marginBottom:20, justifyContent:'center' }}>
          ${[{id:'dashboard',label:'📊 Dashboard'},{id:'salas',label:'📂 Proyectos'},{id:'usuarios',label:'👥 Usuarios'},{id:'roles',label:'🏷️ Roles · ⏱ Escalado'},{id:'calendarios',label:'📅 Calendarios'}].map(t => html`
            <button key=${t.id} onClick=${()=>setTab(t.id)} style=${{ padding:'9px 20px', borderRadius:10, border:tab===t.id?'none':'1.5px solid #E5E5EA', background:tab===t.id?'#1D1D1F':'#FFF', color:tab===t.id?'#FFF':'#6E6E73', fontSize:13, fontWeight:600 }}>${t.label}</button>
          `)}
        </div>

        ${tab === 'roles' ? html`<${AdminRoles} />` : tab === 'calendarios' ? html`<${AdminCalendarios} />` : tab === 'usuarios' ? html`<${AdminUsuarios} rooms=${rooms} sbRetros=${sbRetros} />` : tab === 'dashboard' ? html`
          <!-- Project filter -->
          <div style=${{ display:'flex', alignItems:'center', gap:6, marginBottom:16, flexWrap:'wrap' }}>
            <span style=${{ fontSize:11, color:'#86868B', fontWeight:600 }}>Filtrar:</span>
            <button onClick=${()=>setFilterProject('all')} style=${{ padding:'5px 12px', borderRadius:8, border:filterProject==='all'?'none':'1.5px solid #E5E5EA', background:filterProject==='all'?'#1D1D1F':'#FFF', color:filterProject==='all'?'#FFF':'#6E6E73', fontSize:11, fontWeight:600 }}>Todos</button>
            ${rooms.map(r => html`
              <button key=${r.slug} onClick=${()=>setFilterProject(r.slug)} style=${{ padding:'5px 12px', borderRadius:8, border:filterProject===r.slug?'none':'1.5px solid #E5E5EA', background:filterProject===r.slug?'#007AFF':'#FFF', color:filterProject===r.slug?'#FFF':'#6E6E73', fontSize:11, fontWeight:600 }}>${r.name}</button>
            `)}
          </div>

          ${loadingSb ? html`<div style=${{ textAlign:'center', padding:40, color:'#86868B' }}>⏳ Cargando datos de Supabase…</div>` :
          totalRetros === 0 ? html`
            <div style=${{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:8, marginBottom:16 }}>
              ${[{l:'Proyectos',i:'📂'},{l:'Retros',i:'📊'},{l:'Notas',i:'📝'},{l:'Votos',i:'👍'},
                 {l:'Accionables',i:'🎯'},{l:'Completados',i:'✅'},{l:'Riesgos',i:'⚠️'},{l:'Personas',i:'👥'}].map((k,i) => html`
                <div key=${i} style=${{ ...cS, padding:'14px 8px', textAlign:'center', opacity:0.5 }}>
                  <div style=${{ fontSize:18, marginBottom:4 }}>${k.i}</div>
                  <div style=${{ fontSize:22, fontWeight:800, color:'#C7C7CC' }}>—</div>
                  <div style=${{ fontSize:9, color:'#C7C7CC', marginTop:2 }}>${k.l}</div>
                </div>
              `)}
            </div>
            <div style=${{ ...cS, padding:22, textAlign:'center', color:'#C7C7CC' }}>
              <p style=${{ fontSize:14, marginBottom:8 }}>📊 Sin datos aún</p>
              <p style=${{ fontSize:12 }}>Guarda retros con "🆕 Nueva retro" para ver métricas</p>
            </div>
          ` : html`

            <!-- KPI grid: Retro + Equipo + Riesgos + Vacaciones -->
            ${(() => {
              const allMembers = window.__allMembers || [];
              const salaMembers = filterProject==='all' ? allMembers : allMembers.filter(m=>(m.rooms||[]).includes(filterProject));
              const today = new Date().toISOString().slice(0,10);
              const onVacToday = salaMembers.filter(m=>(m.vacations||[]).some(v=>v.from<=today&&(!v.to||v.to>=today))).length;
              const totalRisksFromRetros = filteredStats.reduce((s,x)=>s+x.risksOpen,0);
              const totalProblemas = filteredStats.flatMap(s=>s.entries.flatMap(rt=>(rt.data?.risks||[]).filter(r=>(r.type||'riesgo')==='problema'&&r.status!=='mitigated'))).length;

              return html`
                <!-- Row 1: Retro metrics -->
                <p style=${{ fontSize:10, fontWeight:700, color:'#86868B', textTransform:'uppercase', letterSpacing:1, marginBottom:6 }}>📋 Retro</p>
                <div style=${{ display:'grid', gridTemplateColumns:'repeat(6,1fr)', gap:8, marginBottom:14 }}>
                  ${[
                    {l:'Proyectos',  v:rooms.length,    i:'📂', c:'#5856D6'},
                    {l:'Retros',     v:totalRetros,     i:'📊', c:'#007AFF'},
                    {l:'Notas',      v:totalNotes,      i:'📝', c:'#FF9500'},
                    {l:'Accionables',v:totalActions,    i:'🎯', c:'#34C759'},
                    {l:'% Hecho',    v:Math.round(actionRate)+'%', i:'✅', c:actionRate>=75?'#34C759':actionRate>=40?'#FF9500':'#FF3B30'},
                    {l:'Personas',   v:allParticipants.length, i:'👥', c:'#AF52DE'},
                  ].map((k,i) => html`
                    <div key=${i} style=${{ ...cS, padding:'12px 8px', textAlign:'center' }}>
                      <div style=${{ fontSize:18, marginBottom:3 }}>${k.i}</div>
                      <div style=${{ fontSize:20, fontWeight:800, color:k.c, lineHeight:1.1 }}>${k.v}</div>
                      <div style=${{ fontSize:9, color:'#86868B', marginTop:2 }}>${k.l}</div>
                    </div>`)}
                </div>

                <!-- Row 2: Equipo + Riesgos + Vacaciones -->
                <div style=${{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:10, marginBottom:14 }}>

                  <!-- Equipo -->
                  <div style=${{ ...cS, padding:'14px 16px' }}>
                    <h4 style=${{ fontSize:12, fontWeight:700, marginBottom:10 }}>👥 Equipo</h4>
                    <div style=${{ display:'flex', gap:8, marginBottom:8 }}>
                      <div style=${{ flex:1, textAlign:'center' }}>
                        <div style=${{ fontSize:22, fontWeight:800, color:'#5856D6' }}>${salaMembers.length}</div>
                        <div style=${{ fontSize:9, color:'#86868B' }}>miembros</div>
                      </div>
                      <div style=${{ flex:1, textAlign:'center' }}>
                        <div style=${{ fontSize:22, fontWeight:800, color:onVacToday>0?'#FF9500':'#34C759' }}>${onVacToday}</div>
                        <div style=${{ fontSize:9, color:'#86868B' }}>de vacaciones hoy</div>
                      </div>
                    </div>
                    <div style=${{ display:'flex', flexWrap:'wrap', gap:4 }}>
                      ${salaMembers.slice(0,8).map(m=>html`
                        <div title=${m.name} style=${{ width:28, height:28, borderRadius:8, background:m.color||'#E5E5EA', display:'flex', alignItems:'center', justifyContent:'center', fontSize:15 }}>${m.avatar||'👤'}</div>`)}
                      ${salaMembers.length>8&&html`<div style=${{ width:28, height:28, borderRadius:8, background:'#F2F2F7', display:'flex', alignItems:'center', justifyContent:'center', fontSize:10, color:'#86868B', fontWeight:700 }}>+${salaMembers.length-8}</div>`}
                    </div>
                  </div>

                  <!-- Riesgos -->
                  <div style=${{ ...cS, padding:'14px 16px' }}>
                    <h4 style=${{ fontSize:12, fontWeight:700, marginBottom:10 }}>⚠️ Riesgos</h4>
                    <div style=${{ display:'flex', gap:6 }}>
                      ${[
                        {l:'Riesgos',     v:totalRisksFromRetros, c:'#FF9500', i:'⚠️'},
                        {l:'Problemas',   v:totalProblemas,       c:'#FF3B30', i:'🔴'},
                        {l:'Mitigados',   v:filteredStats.flatMap(s=>s.entries.flatMap(rt=>(rt.data?.risks||[]).filter(r=>r.status==='mitigated'))).length, c:'#34C759', i:'✅'},
                      ].map(k=>html`
                        <div style=${{ flex:1, textAlign:'center', padding:'6px 4px', borderRadius:8, background:k.c+'10' }}>
                          <div style=${{ fontSize:9, marginBottom:2 }}>${k.i}</div>
                          <div style=${{ fontSize:18, fontWeight:800, color:k.c }}>${k.v}</div>
                          <div style=${{ fontSize:8, color:'#86868B' }}>${k.l}</div>
                        </div>`)}
                    </div>
                  </div>

                  <!-- Vacaciones -->
                  <div style=${{ ...cS, padding:'14px 16px' }}>
                    <h4 style=${{ fontSize:12, fontWeight:700, marginBottom:10 }}>🏖️ Vacaciones</h4>
                    ${(() => {
                      const vacToday = salaMembers.filter(m=>(m.vacations||[]).some(v=>v.from<=today&&(!v.to||v.to>=today)));
                      const nextMonth = new Date(); nextMonth.setMonth(nextMonth.getMonth()+1);
                      const vacSoon = salaMembers.filter(m=>(m.vacations||[]).some(v=>{
                        const d=new Date(v.from); return d>new Date()&&d<=nextMonth;
                      }));
                      return html`
                        ${vacToday.length>0
                          ? html`<div style=${{ marginBottom:6 }}>
                              <span style=${{ fontSize:10, color:'#FF9500', fontWeight:700 }}>Hoy: </span>
                              ${vacToday.map(m=>html`<span key=${m.id} style=${{ fontSize:11, marginRight:4 }}>${m.avatar||'👤'} ${m.name}</span>`)}
                            </div>`
                          : html`<p style=${{ fontSize:11, color:'#C7C7CC', marginBottom:6 }}>Nadie de vacaciones hoy</p>`}
                        ${vacSoon.length>0 && html`<div>
                          <span style=${{ fontSize:10, color:'#86868B', fontWeight:700 }}>Próximo mes: </span>
                          ${vacSoon.slice(0,3).map(m=>html`<span key=${m.id} style=${{ fontSize:11, marginRight:4 }}>${m.avatar||'👤'} ${m.name}</span>`)}
                        </div>`}
                      `;
                    })()}
                  </div>
                </div>
              `;
            })()}

            <!-- Sparklines row -->
            <div style=${{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:12 }}>

              <!-- Notas por retro -->
              <div style=${{ ...cS, padding:'18px' }}>
                <h3 style=${{ fontSize:13, fontWeight:700, marginBottom:4 }}>📈 Notas por retro</h3>
                <p style=${{ fontSize:10, color:'#86868B', marginBottom:12 }}>Últimas ${trend.length} sesiones</p>
                ${trend.length === 0
                  ? html`<p style=${{ color:'#C7C7CC', fontSize:12, textAlign:'center', padding:20 }}>Sin datos</p>`
                  : html`
                    <div style=${{ display:'flex', alignItems:'flex-end', gap:4, height:90 }}>
                      ${trend.map((t,i) => {
                        const v = t.data?.notes?.length || 0;
                        const h = Math.max((v/trendMax)*100, 4);
                        const sala = rooms.find(r => r.slug === t.sala);
                        return html`<div key=${i} style=${{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:2 }} title=${(sala?.name||t.sala)+': '+v+' notas'}>
                          <span style=${{ fontSize:9, color:'#86868B', fontWeight:700 }}>${v||''}</span>
                          <div style=${{ width:'100%', height:h+'%', minHeight:4, background:'linear-gradient(180deg,#007AFF,#5856D6)', borderRadius:'3px 3px 0 0' }} />
                          <span style=${{ fontSize:8, color:'#C7C7CC', marginTop:2 }}>${fd(t.created_at).split(' ')[0]}</span>
                        </div>`;
                      })}
                    </div>`}
              </div>

              <!-- Participantes por retro -->
              <div style=${{ ...cS, padding:'18px' }}>
                <h3 style=${{ fontSize:13, fontWeight:700, marginBottom:4 }}>👥 Participantes por retro</h3>
                <p style=${{ fontSize:10, color:'#86868B', marginBottom:12 }}>Últimas ${trend.length} sesiones</p>
                ${trend.length === 0
                  ? html`<p style=${{ color:'#C7C7CC', fontSize:12, textAlign:'center', padding:20 }}>Sin datos</p>`
                  : html`
                    <div style=${{ display:'flex', alignItems:'flex-end', gap:4, height:90 }}>
                      ${trend.map((t,i) => {
                        const p = [...new Set((t.data?.notes||[]).map(n=>n.userName))].length;
                        const h = Math.max((p/partMax)*100, 4);
                        const sala = rooms.find(r => r.slug === t.sala);
                        return html`<div key=${i} style=${{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', gap:2 }} title=${(sala?.name||t.sala)+': '+p+' personas'}>
                          <span style=${{ fontSize:9, color:'#86868B', fontWeight:700 }}>${p||''}</span>
                          <div style=${{ width:'100%', height:h+'%', minHeight:4, background:'linear-gradient(180deg,#34C759,#30d158)', borderRadius:'3px 3px 0 0' }} />
                          <span style=${{ fontSize:8, color:'#C7C7CC', marginTop:2 }}>${fd(t.created_at).split(' ')[0]}</span>
                        </div>`;
                      })}
                    </div>`}
              </div>
            </div>

            <!-- Donut + Notas por proyecto -->
            <div style=${{ display:'grid', gridTemplateColumns:'200px 1fr', gap:12, marginBottom:12 }}>

              <!-- Donut % accionables -->
              <div style=${{ ...cS, padding:'20px', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', textAlign:'center' }}>
                <h3 style=${{ fontSize:12, fontWeight:700, marginBottom:12 }}>🎯 Accionables</h3>
                ${(() => {
                  const r=46, circ=2*Math.PI*r;
                  const dash = (actionRate/100)*circ;
                  const col = actionRate>=75?'#34C759':actionRate>=40?'#FF9500':'#FF3B30';
                  return html`
                    <svg width="110" height="110" viewBox="0 0 110 110" style=${{ display:'block', margin:'0 auto' }}>
                      <circle cx="55" cy="55" r=${r} fill="none" stroke="#F2F2F7" stroke-width="12"/>
                      <circle cx="55" cy="55" r=${r} fill="none" stroke=${col} stroke-width="12"
                        stroke-dasharray="${dash} ${circ}" stroke-dashoffset=${circ/4} stroke-linecap="round"/>
                      <text x="55" y="50" text-anchor="middle" dominant-baseline="middle" font-size="18" font-weight="800" fill="#1D1D1F">${Math.round(actionRate)}%</text>
                      <text x="55" y="66" text-anchor="middle" font-size="9" fill="#86868B">completado</text>
                    </svg>
                    <div style=${{ fontSize:12, color:'#86868B', marginTop:10, lineHeight:1.8 }}>
                      <div><span style=${{ color:'#34C759', fontWeight:700 }}>${totalActionsDone}</span> completados</div>
                      <div><span style=${{ color:col, fontWeight:700 }}>${totalActions - totalActionsDone}</span> pendientes</div>
                    </div>`;
                })()}
              </div>

              <!-- Notas por proyecto -->
              <div style=${{ ...cS, padding:'20px' }}>
                <h3 style=${{ fontSize:13, fontWeight:700, marginBottom:16 }}>📝 Notas por proyecto</h3>
                ${(() => {
                  const mx = Math.max(...salaStats.map(s=>s.notes), 1);
                  return salaStats.map((s,i) => html`
                    <div key=${s.slug} style=${{ marginBottom:12 }}>
                      <div style=${{ display:'flex', justifyContent:'space-between', marginBottom:4, alignItems:'center' }}>
                        <div style=${{ display:'flex', alignItems:'center', gap:7 }}>
                          <button onClick=${()=>go(s.slug,s.tipo)} style=${{ background:'none',border:'none',cursor:'pointer',fontSize:12,fontWeight:600,color:'#007AFF',padding:0 }}>${s.name}</button>
                          <span style=${{ fontSize:9, color:s.rTipo.color, background:s.rTipo.color+'15', padding:'1px 5px', borderRadius:4, fontWeight:700 }}>${s.rTipo.icon}</span>
                        </div>
                        <span style=${{ fontSize:11, fontWeight:700, color:bc(i) }}>${s.notes}</span>
                      </div>
                      <div style=${{ height:7, background:'#F2F2F7', borderRadius:4, overflow:'hidden' }}>
                        <div style=${{ height:'100%', width:(s.notes/mx)*100+'%', background:bc(i), borderRadius:4, transition:'width .5s' }} />
                      </div>
                    </div>`);
                })()}
              </div>
            </div>

            <!-- Portfolio table -->
            <div style=${{ ...cS }}>
              <div style=${{ padding:'16px 18px', borderBottom:'1px solid #E5E5EA', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                <h3 style=${{ fontSize:14, fontWeight:700 }}>📋 Portfolio de proyectos</h3>
                <span style=${{ fontSize:11, color:'#86868B' }}>${salaStats.length} proyectos</span>
              </div>
              <div style=${{ overflowX:'auto' }}>
                <table style=${{ width:'100%', borderCollapse:'collapse', fontSize:11 }}>
                  <thead>
                    <tr style=${{ borderBottom:'1.5px solid #E5E5EA', background:'#F9F9FB' }}>
                      ${['Proyecto','Tipo','Retros','Notas','Votos','Accionables','% Hecho','Riesgos','Participantes','Última'].map(h=>html`
                        <th key=${h} style=${{ padding:'8px 12px', textAlign:'left', fontWeight:700, color:'#86868B', fontSize:9, textTransform:'uppercase', whiteSpace:'nowrap' }}>${h}</th>
                      `)}
                    </tr>
                  </thead>

/* ═══ PROJECT LIST — muestra proyectos del usuario y permite cambiar ═══ */
function ProjectList({ currentSala, userId }) {
  const [rooms,   setRooms]   = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    Promise.all([sbLoadRooms(), sbLoadTeamMembers(), sbGetSession()]).then(([allRooms, members, session]) => {
      // Match by id first, then by email (covers admin session users)
      const me = members.find(m => m.id === userId) ||
        (session?.user ? members.find(m => m.email && m.email.toLowerCase() === session.user.email.toLowerCase()) : null);
      if (!me) {
        // No team_members record — if admin session exists, show all rooms
        if (session?.user) setRooms(allRooms||[]);
        setLoading(false); return;
      }
      const myRooms = me.is_superuser
        ? (allRooms||[])
        : (allRooms||[]).filter(r => (me.rooms||[]).includes(r.slug));
      setRooms(myRooms); setLoading(false);
    });
  }, [userId]);

  if (loading) return html`<div style=${{ textAlign:'center', padding:12, color:'#86868B', fontSize:12 }}>⏳ Cargando…</div>`;
  if (!rooms.length) return html`<p style=${{ fontSize:12, color:'#C7C7CC', textAlign:'center', padding:8 }}>Sin proyectos asignados</p>`;

  return html`
    <div style=${{ display:'flex', flexDirection:'column', gap:6 }}>
      ${rooms.map(r => {
        const isCurrent = r.slug === currentSala;
        const tInfo = TASK_TEMPLATES[r.tipo] || TASK_TEMPLATES.agile;
        return html`
          <button key=${r.slug}
            onClick=${()=>{ if(!isCurrent) window.location.href = window.location.pathname + '?sala=' + encodeURIComponent(r.slug); }}
            style=${{ display:'flex', alignItems:'center', gap:10, padding:'10px 14px', borderRadius:12,
              border: isCurrent ? '2px solid #007AFF' : '1.5px solid #E5E5EA',
              background: isCurrent ? '#EEF5FF' : '#FFF',
              cursor: isCurrent ? 'default' : 'pointer', textAlign:'left' }}>
            <span style=${{ fontSize:20 }}>${tInfo.icon}</span>
            <div style=${{ flex:1 }}>
              <p style=${{ fontSize:13, fontWeight:700, color: isCurrent ? '#007AFF' : '#1D1D1F', margin:0 }}>${r.name}</p>
              <p style=${{ fontSize:10, color:'#86868B', margin:0 }}>${tInfo.label}</p>
            </div>
            ${isCurrent
              ? html`<span style=${{ fontSize:10, color:'#007AFF', fontWeight:700, background:'#007AFF20', padding:'2px 8px', borderRadius:10 }}>Aquí</span>`
              : html`<span style=${{ fontSize:12, color:'#C7C7CC' }}>→</span>`}
          </button>`;
      })}
    </div>`;
}


function Login({ onJoin, isModal }) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [rooms,    setRooms]    = useState([]);
  const [selRoom,  setSelRoom]  = useState(SALA !== 'general' ? SALA : '');
  const [members,  setMembers]  = useState([]);
  const [error,    setError]    = useState('');
  const [loading,  setLoading]  = useState(false);
  const [step,     setStep]     = useState('credentials'); // credentials | sala

  // Load rooms and team_members on mount
  useEffect(() => {
    sbLoadRooms().then(r => {
      setRooms(r||[]);
      // If URL has sala param, pre-select it
      if (SALA && SALA !== 'general') setSelRoom(SALA);
    });
    sbLoadTeamMembers().then(m => setMembers(m||[]));
  }, []);

  const handleLogin = async () => {
    if (!username.trim() || !password.trim()) { setError('Introduce usuario y contraseña'); return; }
    setLoading(true); setError('');

    // Try Supabase Auth first (admin path)
    const { session } = await sbSignIn(username.trim(), password);
    if (session) {
      setLoading(false);
      window.location.href = window.location.pathname + '?admin';
      return;
    }

    // Regular team member login — search by username, email prefix, or name
    const uq = username.trim().toLowerCase();
    const member = members.find(m =>
      (m.username && m.username.toLowerCase() === uq) ||
      (m.email    && m.email.toLowerCase()    === uq) ||
      (m.email    && m.email.split('@')[0].toLowerCase() === uq) ||
      (m.name     && m.name.toLowerCase()     === uq)
    );
    if (!member) { setLoading(false); setError('❌ Usuario no encontrado'); return; }
    // Support both pin and password fields
    const storedPw = member.pin || member.password || '';
    if (!storedPw || storedPw !== password) { setLoading(false); setError('❌ Contraseña incorrecta'); return; }

    // Superuser → try Supabase Auth with their stored email (bypasses pin requirement)
    if (member.is_superuser) {
      if (!storedPw) {
        // No pin set — try Supabase Auth with member's email
        const { session: s2 } = await sbSignIn(member.email||username.trim(), password);
        if (!s2) { setLoading(false); setError('❌ Contraseña incorrecta'); return; }
      }
      setLoading(false);
      window.location.href = window.location.pathname + '?admin';
      return;
    }

    // Check if member is in the selected sala
    const targetSala = selRoom || SALA;
    if (!(member.rooms||[]).includes(targetSala)) {
      setLoading(false);
      setError('❌ No tienes acceso a este proyecto');
      return;
    }

    setLoading(false);
    onJoin({
      id: member.id, name: member.name,
      avatar: member.avatar||'👤', color: member.color||'#007AFF',
      role: member.role_label||'', calendarId: member.calendar_id||null,
      username: member.username, sala: targetSala,
    });
  };

  // Rooms this member has access to (shown after typing username)
  const memberRooms = username.trim()
    ? (() => {
        const uq2 = username.trim().toLowerCase();
        const m = members.find(x=>
          (x.username||'').toLowerCase()===uq2 ||
          (x.email||'').toLowerCase()===uq2 ||
          ((x.email||'').split('@')[0].toLowerCase())===uq2 ||
          (x.name||'').toLowerCase()===uq2
        );
        return (m?.rooms||[]).map(slug=>rooms.find(r=>r.slug===slug)).filter(Boolean);
      })()
    : [];

  return html`
    <div style=${{ ...(!isModal ? { minHeight:'100vh', background:'linear-gradient(135deg,#0057FF,#00C6FF)', display:'flex', alignItems:'center', justifyContent:'center', padding:20 } : {}) }}>
      <div style=${{ background:'#FFF', borderRadius:24, padding:'36px 32px', maxWidth:420, width:'100%', ...(!isModal ? { boxShadow:'0 20px 60px rgba(0,0,0,.15)' } : {}) }}>

        <div style=${{ textAlign:'center', marginBottom:28 }}>
          <h1 style=${{ fontFamily:"'Comfortaa',sans-serif", fontSize:32, fontWeight:400, letterSpacing:2, background:'linear-gradient(90deg,#007AFF,#5856D6)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent', backgroundClip:'text' }}>revelio</h1>
          <p style=${{ color:'#86868B', fontSize:13, marginTop:4 }}>Accede con tu cuenta</p>
        </div>

        <div style=${{ display:'flex', flexDirection:'column', gap:10 }}>
          <div>
            <label style=${{ fontSize:11, fontWeight:700, color:'#86868B', textTransform:'uppercase', display:'block', marginBottom:4 }}>Usuario o email</label>
            <input value=${username} onInput=${e=>{setUsername(e.target.value);setError('');}}
              onKeyDown=${e=>e.key==='Enter'&&handleLogin()}
              placeholder="tu_usuario o email@..."
              style=${{ ...iS, fontSize:14 }} />
          </div>

          <div>
            <label style=${{ fontSize:11, fontWeight:700, color:'#86868B', textTransform:'uppercase', display:'block', marginBottom:4 }}>Contraseña</label>
            <input type="password" value=${password} onInput=${e=>{setPassword(e.target.value);setError('');}}
              onKeyDown=${e=>e.key==='Enter'&&handleLogin()}
              placeholder="••••••••"
              style=${{ ...iS, fontSize:14 }} />
          </div>

          <!-- Room selector (if member has multiple rooms) -->
          ${memberRooms.length > 1 && html`
            <div>
              <label style=${{ fontSize:11, fontWeight:700, color:'#86868B', textTransform:'uppercase', display:'block', marginBottom:4 }}>Proyecto</label>
              <select value=${selRoom} onChange=${e=>setSelRoom(e.target.value)}
                style=${{ ...iS, fontSize:13, background:'#FFF' }}>
                <option value="">— Selecciona proyecto —</option>
                ${memberRooms.map(r=>html`<option key=${r.slug} value=${r.slug}>${r.name}</option>`)}
              </select>
            </div>
          `}

          ${memberRooms.length === 1 && selRoom !== memberRooms[0].slug && html`
            <div style=${{ padding:'8px 12px', background:'#F0F7FF', borderRadius:8, fontSize:12, color:'#007AFF' }}>
              📂 Proyecto: <strong>${memberRooms[0].name}</strong>
              ${(()=>{ if(selRoom!==memberRooms[0].slug) setSelRoom(memberRooms[0].slug); })()}
            </div>
          `}

          ${error && html`
            <div style=${{ background:'#FFF5F5', border:'1px solid #FF3B3025', borderRadius:10, padding:'10px 14px', fontSize:13, color:'#FF3B30', fontWeight:600 }}>
              ${error}
            </div>
          `}

          <button onClick=${handleLogin} disabled=${loading}
            style=${{ ...bP, padding:14, fontSize:15, marginTop:4, opacity:loading?.6:1 }}>
            ${loading ? '⏳ Verificando…' : '🪄 Entrar'}
          </button>
        </div>

        <p style=${{ textAlign:'center', fontSize:11, color:'#C7C7CC', marginTop:20 }}>
          ¿No tienes acceso? Contacta con tu Scrum Master.
        </p>
      </div>
    </div>
  `;
}

function loadTeamData() {
  try { return JSON.parse(localStorage.getItem('rf-team-'+SALA)||'[]'); } catch { return []; }
}
function saveTeamLocal(t) {
  try { localStorage.setItem('rf-team-'+SALA, JSON.stringify(t)); } catch {}
}
function loadVacsData() {
  try { return JSON.parse(localStorage.getItem('rf-vac-'+SALA)||'[]'); } catch { return []; }
}
function saveVacsLocal(v) {
  try { localStorage.setItem('rf-vac-'+SALA, JSON.stringify(v)); } catch {}
}
async function saveTeamSupabase(team, vacs) {
  // Save team to room metadata (names/roles for this sala)
  try { await sbUpdateRoomMeta(SALA, { team }); } catch {}
  // Save vacations globally per team_member
  // Group vacs by memberId and save to each member
  const byMember = {};
  vacs.forEach(v => { if (v.memberId) { if(!byMember[v.memberId]) byMember[v.memberId]=[]; byMember[v.memberId].push(v); } });
  await Promise.all(Object.entries(byMember).map(([id, mv]) => sbSaveMemberVacs(id, mv)));
}

      chart.forEach(n => { orgMap[n.member_id] = n.manager_id || null; });

  const rc = (r) => ROLE_COLORS[r] || '#5856D6';

  // Build org tree
  const buildTree = (managerId) => team.filter(m => (org[m.id]||null) === managerId);
  const roots = buildTree(null);

  return html`

      ${loading ? html`<div style=${{ textAlign:'center', padding:40, color:'#86868B' }}>⏳ Cargando equipo…</div>` : html`

              <div style=${{ textAlign:'center', padding:'48px 20px', color:'#C7C7CC', border:'2px dashed #E5E5EA', borderRadius:16 }}>

                    <span style=${{ flex:1, fontSize:13, fontWeight:600 }}>${m.name}</span>

                    <select value=${org[m.id]||''} onChange=${e=>setManager(m.id, e.target.value||null)}

                      <option value="">— Nadie (raíz) —</option>
                      ${team.filter(x=>x.id!==m.id).map(x=>html`<option key=${x.id} value=${x.id}>${x.name}</option>`)}
                    </select>
                  </div>`)}
              </div>
            </div>

            <!-- Visual org chart -->
            ${roots.length===0 ? html`
              <div style=${{ textAlign:'center', padding:32, color:'#C7C7CC', border:'2px dashed #E5E5EA', borderRadius:14 }}>
                <p style=${{ fontSize:28, marginBottom:8 }}>🏢</p>
                <p style=${{ fontSize:13 }}>Asigna reportes arriba para ver el organigrama</p>
              </div>` :
              html`<${OrgTree} nodes=${roots} all=${team} org=${org} rc=${rc} depth=${0} />`}
          </div>
        `}
      `}
    </div>`;
}

/* ─── OrgTree — recursive org chart renderer ─── */
function OrgTree({ nodes, all, org, rc, depth }) {
  if (!nodes.length) return null;
  return html`
    <div style=${{ display:'flex', gap:24, justifyContent:'center', position:'relative', padding:'0 8px' }}>
      ${nodes.map((m, i) => {
        const children = all.filter(x => org[x.id] === m.id);
        const color = rc(m.role_label||'');
        return html`
          <div key=${m.id} style=${{ display:'flex', flexDirection:'column', alignItems:'center', gap:0 }}>
            <!-- Connector line from parent -->
            ${depth > 0 && html`<div style=${{ width:2, height:24, background:'#E5E5EA' }}></div>`}
            <!-- Card -->
            <div style=${{ background:'#FFF', borderRadius:14, border:'2px solid '+(depth===0?'#1D1D1F':'#E5E5EA'),
              padding:'12px 14px', minWidth:130, textAlign:'center', boxShadow:depth===0?'0 4px 16px rgba(0,0,0,.08)':'0 2px 8px rgba(0,0,0,.04)',
              position:'relative' }}>
              <div style=${{ width:44, height:44, borderRadius:12, background:m.color||'#E5E5EA',
                display:'flex', alignItems:'center', justifyContent:'center', fontSize:24,
                margin:'0 auto 6px' }}>${m.avatar||'👤'}</div>
              <p style=${{ fontSize:12, fontWeight:700, margin:'0 0 4px' }}>${m.name}</p>
              ${m.role_label && html`
                <span style=${{ fontSize:9, color:'#FFF', background:color, padding:'2px 8px', borderRadius:8, fontWeight:700, display:'inline-block' }}>${m.role_label}</span>`}
              ${m.company && html`
                <p style=${{ fontSize:9, color:'#86868B', marginTop:4 }}>🏢 ${m.company}</p>`}
              ${children.length > 0 && html`
                <div style=${{ position:'absolute', left:'50%', transform:'translateX(-50%)',
                  width:2, height:24, background:'#E5E5EA', bottom:-24 }}></div>`}
            </div>
            <!-- Children -->
            ${children.length > 0 && html`
              <div style=${{ marginTop:24, position:'relative' }}>
                ${children.length > 1 && html`
                  <div style=${{ position:'absolute', top:0, left:'50%', width:'80%', height:2, background:'#E5E5EA', transform:'translateX(-50%)' }}></div>`}
                <${OrgTree} nodes=${children} all=${all} org=${org} rc=${rc} depth=${depth+1} />
              </div>`}
          </div>`;
      })}
    </div>`;
}

/* ═══ SUGGESTED ESCALATIONS ═══ */
function SuggestedEscalations({ risks, allRisks, getAlerts, upd, setSubTab, setEscalForm }) {
  if (!risks.length) return html`
    <div style=${{ textAlign:'center', padding:'48px 20px', color:'#C7C7CC', border:'2px dashed #E5E5EA', borderRadius:16 }}>
      <p style=${{ fontSize:36, marginBottom:8 }}>🔔</p>
      <p style=${{ fontSize:14 }}>Sin escalados sugeridos</p>
      <p style=${{ fontSize:12, marginTop:6 }}>Los riesgos que lleven más de 5 días sin actualizar, aparezcan en 2+ retros o tengan accionables vencidos aparecerán aquí</p>
    </div>`;

  const ALERT_COLORS = { stale:'#FF9500', retros:'#FF3B30', overdue:'#FF3B30' };
  const ALERT_ICONS  = { stale:'⏱', retros:'🔁', overdue:'⚠️' };
  const ALERT_DESC   = {
    stale: 'No se ha actualizado en varios días — nadie lo está gestionando activamente.',
    retros: 'Ha aparecido en múltiples retros consecutivas — el equipo no puede resolverlo solo.',

  return html`
    <div style=${{ display:'flex', flexDirection:'column', gap:10 }}>
      <div style=${{ padding:'12px 16px', borderRadius:12, background:'#FFF9E6', border:'1.5px solid #FF950040', marginBottom:4 }}>
        <p style=${{ fontSize:12, fontWeight:700, color:'#FF9500', marginBottom:2 }}>🔔 Escalados sugeridos automáticamente</p>

      </div>

      ${risks.map(r => {
        const alerts = getAlerts(r);
        const rn = allRisks.filter(x=>(x.type||'riesgo')===(r.type||'riesgo')).indexOf(r)+1;
        const prefix = (r.type||'riesgo')==='problema'?'P':'R';

        return html`

            <div style=${{ display:'flex', alignItems:'flex-start', gap:10, marginBottom:10 }}>
              <span style=${{ fontSize:13, fontWeight:800, color:color }}>${prefix}${rn}</span>
              <div style=${{ flex:1 }}>

                ${r.owner && html`<span style=${{ fontSize:11, color:'#007AFF' }}>👤 ${r.owner}</span>`}

            <!-- Alert pills with explanation -->
            <div style=${{ display:'flex', flexDirection:'column', gap:4, marginBottom:12 }}>
              ${alerts.map(a => html`
                <div key=${a.type} style=${{ display:'flex', alignItems:'flex-start', gap:8, padding:'6px 10px', borderRadius:9, background:ALERT_COLORS[a.type]+'10', border:'1px solid '+ALERT_COLORS[a.type]+'25' }}>
                  <span style=${{ fontSize:14 }}>${ALERT_ICONS[a.type]}</span>
                  <div>
                    <span style=${{ fontSize:11, fontWeight:700, color:ALERT_COLORS[a.type] }}>${a.label}</span>
                    <p style=${{ fontSize:10, color:'#86868B', margin:'2px 0 0' }}>${ALERT_DESC[a.type]}</p>
                  </div>
                </div>`)}
            </div>

            <!-- Actions -->
            <div style=${{ display:'flex', gap:8 }}>
              <button onClick=${()=>{ setSubTab('escalado'); setEscalForm({riskId:r.id, memberId:'', deadline:'', note:'', status:'pendiente'}); }}

              <button onClick=${()=>upd(r.id,{updatedAt:new Date().toISOString(),_snoozed:true})}
