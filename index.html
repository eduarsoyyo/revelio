async function sbSaveEscalationConfig(cfg) {
  try {
    const { data: rooms } = await supabase.from('rooms').select('slug,metadata');
    if (!rooms) return;
    for (const room of rooms) {
      const meta = { ...(room.metadata || {}), escalation_config: cfg };
      await supabase.from('rooms').update({ metadata: meta }).eq('slug', room.slug);
    }
  } catch(e) { console.warn('sbSaveEscalationConfig:', e); }
}

}
// Debounce helper
function debounce(fn, ms) {
  let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

async function sbSaveRetroSnapshot(sala, tipo, stateData, userId, status) {
  try {
    // Try to update existing active snapshot first (avoids row explosion from auto-save)
    const st = status || 'active';
    if (st === 'active') {
      const { data: existing } = await supabase.from('retros')
        .select('id')
        .eq('sala', sala)
        .eq('status', 'active')
        .order('created_at', { ascending: false })
        .limit(1);
      if (existing && existing[0]) {
        const { error } = await supabase.from('retros')
          .update({ data: stateData, updated_at: new Date().toISOString() })
          .eq('id', existing[0].id);
        if (error) console.warn('sbSaveRetroSnapshot update:', error.message);
        return;
      }
    }
    // No existing active snapshot — insert new
    const {error} = await supabase.from('retros').insert({ sala, tipo, status:st, data:stateData, created_by:userId });
    if (error) console.warn('sbSaveRetroSnapshot insert:', error.message);
  } catch(e) { console.warn('sbSaveRetroSnapshot:', e); }
}

// Explicit snapshot for history (always inserts new row)
async function sbCreateRetroArchive(sala, tipo, stateData, userId) {
  try {

}

function getAllRoles(extraRoles) {
  // Use in-memory cache or localStorage fallback (sync, no await)
  const cache = _rolesCache || (() => {
    try { const c = JSON.parse(localStorage.getItem('rf-admin-roles')||'null'); return c ? [...new Set([...ROLES,...c])] : null; } catch { return null; }

  return extraRoles ? [...new Set([...base, ...extraRoles])] : [...base];
}

function playCelebration() {
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;inset:0;z-index:99999;pointer-events:none';
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const c = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2;
  const maxR = Math.sqrt(cx*cx + cy*cy);
  document.body.appendChild(canvas);
  let frame = 0;
  const particles = [];

  // Noise seed for irregular edges
  const noiseSeed = Array.from({length:64},()=>Math.random()*40+10);
  function noisyR(baseR, angle, time) {
    const idx = ((angle/Math.PI/2)*noiseSeed.length+noiseSeed.length)%noiseSeed.length;
    const i0 = Math.floor(idx), i1 = (i0+1)%noiseSeed.length;
    const t = idx-i0;
    const n = noiseSeed[i0]*(1-t)+noiseSeed[i1]*t;
    const wave = Math.sin(angle*3+time*.04)*15 + Math.sin(angle*7-time*.06)*8;
    return baseR + n*.6 + wave;
  }

  // Draw irregular iris (filled outside the noisy circle)
  function drawIris(baseR, time) {
    c.beginPath();
    c.rect(0,0,W,H);
    c.moveTo(cx+noisyR(baseR,0,time),cy);
    for(let a=0;a<=Math.PI*2+.1;a+=.05){
      const r=Math.max(0,noisyR(baseR,a,time));
      c.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    }
    c.closePath();
    c.fillStyle='#06041a';
    c.fill('evenodd');
    // Glow edge
    if(baseR>5){
      for(let a=0;a<Math.PI*2;a+=.08){
        const r=Math.max(0,noisyR(baseR,a,time));
        const g=c.createRadialGradient(cx+Math.cos(a)*r,cy+Math.sin(a)*r,0,cx+Math.cos(a)*r,cy+Math.sin(a)*r,22);
        g.addColorStop(0,'rgba(120,100,255,.25)');g.addColorStop(1,'rgba(0,0,0,0)');
        c.fillStyle=g;c.fillRect(cx+Math.cos(a)*r-22,cy+Math.sin(a)*r-22,44,44);
      }
    }
  }

  // Sound: dark whoosh
  function playDark(){
    try{
      const a=new(window.AudioContext||window.webkitAudioContext)(),t=a.currentTime;
      const o=a.createOscillator(),g=a.createGain();
      o.type='sawtooth';o.frequency.setValueAtTime(250,t);o.frequency.exponentialRampToValueAtTime(30,t+1.2);
      g.gain.setValueAtTime(.04,t);g.gain.exponentialRampToValueAtTime(.001,t+1.3);
      o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+1.5);
      const o2=a.createOscillator(),g2=a.createGain();
      o2.type='sine';o2.frequency.value=40;
      g2.gain.setValueAtTime(0,t);g2.gain.linearRampToValueAtTime(.06,t+.5);g2.gain.exponentialRampToValueAtTime(.001,t+1.3);
      o2.connect(g2);g2.connect(a.destination);o2.start(t);o2.stop(t+1.5);
      setTimeout(()=>a.close(),3000);
    }catch(e){}
  }

  // Sound: magical whisper "revelio" (filtered noise burst)
  function playWhisper(){
    try{
      const a=new(window.AudioContext||window.webkitAudioContext)(),t=a.currentTime;
      const bufLen=a.sampleRate*1.2,buf=a.createBuffer(1,bufLen,a.sampleRate),d=buf.getChannelData(0);
      // Shape noise like syllables: re-VE-li-o
      const env=[0,.3,.15,.6,.8,.7,.4,.5,.3,.1,0];
      for(let i=0;i<bufLen;i++){
        const pos=i/bufLen*10;const idx=Math.floor(pos);const frac=pos-idx;
        const e=(env[idx]||0)*(1-frac)+(env[Math.min(idx+1,env.length-1)]||0)*frac;
        d[i]=(Math.random()*2-1)*e;
      }
      const src=a.createBufferSource();src.buffer=buf;
      const filt=a.createBiquadFilter();filt.type='bandpass';filt.frequency.value=2500;filt.Q.value=1.5;
      const g=a.createGain();g.gain.value=.15;
      src.connect(filt);filt.connect(g);g.connect(a.destination);
      src.start(t);src.stop(t+1.2);
      setTimeout(()=>a.close(),3000);
    }catch(e){}
  }

  // Sound: reveal explosion
  function playReveal(){
    try{
      const a=new(window.AudioContext||window.webkitAudioContext)(),t=a.currentTime;
      const rev=a.createConvolver(),rl=a.sampleRate*2.5,rb=a.createBuffer(2,rl,a.sampleRate);
      for(let ch=0;ch<2;ch++){const d=rb.getChannelData(ch);for(let i=0;i<rl;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/rl,2.5);}
      rev.buffer=rb;rev.connect(a.destination);
      [392,523.25,659.25,783.99,1046.50,1318.51,1567.98,2093].forEach((f,i)=>{
        const o=a.createOscillator(),g=a.createGain();
        o.type=i<4?'triangle':'sine';o.frequency.value=f;
        g.gain.setValueAtTime(0,t+i*.03);g.gain.linearRampToValueAtTime(.06/(i*.5+1),t+i*.03+.01);
        g.gain.exponentialRampToValueAtTime(.001,t+i*.03+2);
        o.connect(g);g.connect(rev);g.connect(a.destination);o.start(t+i*.03);o.stop(t+i*.03+2.5);
      });
      const boom=a.createOscillator(),bg=a.createGain();
      boom.type='sine';boom.frequency.setValueAtTime(100,t);boom.frequency.exponentialRampToValueAtTime(35,t+.6);
      bg.gain.setValueAtTime(.08,t);bg.gain.exponentialRampToValueAtTime(.001,t+.7);
      boom.connect(bg);bg.connect(a.destination);boom.start(t);boom.stop(t+.9);
      setTimeout(()=>a.close(),5000);
    }catch(e){}
  }

  playDark();

  function animate(){
    frame++;
    c.clearRect(0,0,W,H);

    // PHASE 1: Distortion + irregular iris close (1-90)
    if(frame<=90){
      const p=frame/90,e=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;
      const iR=maxR*(1-e);
      if(frame>8){
        const d=Math.min(1,(frame-8)/30)*(1-e);
        for(let y=0;y<H;y+=2){c.fillStyle='rgba(88,86,214,'+(0.04*d)+')';c.fillRect(Math.sin(y*.06+frame*.18)*6*d,y,W,1.5);}
        if(frame%3<2&&d>.2){c.fillStyle='rgba(120,60,255,'+(0.015*d)+')';c.fillRect(0,0,W,H);}
      }
      drawIris(iR,frame);
    }

    // PHASE 2: Black + whisper (91-150)
    if(frame>90&&frame<=150){
      c.fillStyle='#06041a';c.fillRect(0,0,W,H);
      if(frame===105)playWhisper();
      if(frame>115){
        const b=Math.min(1,(frame-115)/35);
        const bg=c.createRadialGradient(cx,cy,0,cx,cy,Math.max(1,90*b));
        bg.addColorStop(0,'rgba(140,120,255,'+Math.min(.35,b*.35)+')');
        bg.addColorStop(.4,'rgba(88,86,214,'+Math.min(.12,b*.12)+')');
        bg.addColorStop(1,'rgba(0,0,0,0)');
        c.fillStyle=bg;c.beginPath();c.arc(cx,cy,Math.max(1,90*b),0,Math.PI*2);c.fill();
      }
    }

    // PHASE 3: Irregular explosive reveal (151-240)
    if(frame>150&&frame<=240){
      if(frame===151)playReveal();
      const rP=(frame-150)/70,rE=1-Math.pow(1-Math.min(1,rP),2.5),revR=maxR*rE;
      if(frame<160){c.fillStyle='rgba(200,190,255,'+((160-frame)/10*.4)+')';c.fillRect(0,0,W,H);}
      drawIris(maxR-revR,frame);
      // Ripple rings (irregular)
      for(let i=0;i<4;i++){
        const rr=revR-i*30;if(rr<1)continue;
        const ra=Math.max(0,(.3-i*.06))*(1-rE);
        c.beginPath();
        for(let a=0;a<=Math.PI*2+.1;a+=.06){
          const nr=noisyR(rr,a,frame)*.3+rr*.7;
          if(a===0)c.moveTo(cx+Math.cos(a)*nr,cy+Math.sin(a)*nr);
          else c.lineTo(cx+Math.cos(a)*nr,cy+Math.sin(a)*nr);
        }
        c.closePath();c.strokeStyle='rgba(160,140,255,'+ra+')';c.lineWidth=1.5;c.stroke();
      }
      if(frame%2===0&&revR<maxR*.85){
        for(let i=0;i<8;i++){
          const ang=Math.random()*Math.PI*2,nr=noisyR(revR,ang,frame);
          particles.push({x:cx+Math.cos(ang)*nr,y:cy+Math.sin(ang)*nr,vx:Math.cos(ang)*2+(Math.random()-.5)*2,vy:Math.sin(ang)*2-Math.random()*2.5,life:35+Math.random()*35,maxLife:35+Math.random()*35,size:1+Math.random()*2.5,hue:230+Math.random()*70});
        }
      }
    }

    // PHASE 4: "revelio" + subtitle — LONGER display (200-400)
    if(frame>195&&frame<=400){
      const tIn=Math.min(1,(frame-195)/25),tOut=frame>360?Math.max(0,(400-frame)/40):1,tA=tIn*tOut;
      const scale=.92+tIn*.08;
      const wave=Math.sin(frame*.05)*4*Math.max(0,1-(frame-195)/80);
      c.save();c.globalAlpha=tA;c.translate(cx,cy);c.scale(scale,scale);
      c.font='700 60px Comfortaa,sans-serif';c.textAlign='center';c.textBaseline='middle';
      // Triple glow
      c.shadowColor='#5856D6';c.shadowBlur=60;c.fillStyle='rgba(88,86,214,.06)';c.fillText('revelio',0,wave);
      c.shadowBlur=35;c.fillText('revelio',0,wave);
      // Gradient text
      const tg=c.createLinearGradient(-130,0,130,0);
      tg.addColorStop(0,'#007AFF');tg.addColorStop(.3,'#5856D6');tg.addColorStop(.6,'#AF52DE');tg.addColorStop(1,'#007AFF');
      c.shadowColor='#8B7FFF';c.shadowBlur=25;c.fillStyle=tg;c.fillText('revelio',0,wave);
      // Subtitle
      c.shadowBlur=0;c.font='500 15px Comfortaa,sans-serif';
      const sw=Math.sin(frame*.05+.8)*2.5*Math.max(0,1-(frame-195)/80);
      c.fillStyle='rgba(140,135,155,'+tA*.75+')';
      c.fillText('travesura realizada \u2728',0,42+sw);
      c.restore();
      // Ambient sparkles
      if(frame%6===0&&frame<360){
        for(let i=0;i<2;i++){
          particles.push({x:cx+(Math.random()-.5)*280,y:cy+(Math.random()-.5)*90,vx:(Math.random()-.5)*.3,vy:-Math.random()*1.2-.3,life:30+Math.random()*25,maxLife:30+Math.random()*25,size:.7+Math.random()*1.5,hue:250+Math.random()*50});
        }
      }
    }

    // Particles
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vx*=.97;p.vy*=.97;p.vy-=.008;p.life--;
      const a=Math.min(1,p.life/p.maxLife*2);
      const g=c.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*3.5);
      g.addColorStop(0,'hsla('+p.hue+',75%,75%,'+a*.6+')');g.addColorStop(.5,'hsla('+p.hue+',60%,55%,'+a*.12+')');g.addColorStop(1,'hsla(0,0%,0%,0)');
      c.fillStyle=g;c.fillRect(p.x-p.size*3.5,p.y-p.size*3.5,p.size*7,p.size*7);
    });
    for(let i=particles.length-1;i>=0;i--){if(particles[i].life<=0)particles.splice(i,1);}

    if(frame<410)requestAnimationFrame(animate);
    else canvas.remove();
  }
  requestAnimationFrame(animate);
}

function retroPhaseKey()  { return 'rf-retro-phase-'  + SALA; }

/* ═══ REALTIME STATE ═══ */
function useRealtime(user) {
  const [state, setState] = useState(() => {
    const saved = loadRetroState();
    if (saved) return { notes:[], tasks:DEFAULT_TASKS.map(t=>({...t,id:uid()})), actions:[], obj:{text:'',met:null}, risks:loadRisks(), ...saved };
    return { notes:[], tasks:DEFAULT_TASKS.map(t=>({...t,id:uid()})), actions:[], obj:{text:'',met:null}, risks:loadRisks() };
  });
  const [online, setOnline] = useState({});
  const [cursors, setCursors] = useState({});
  const chRef = useRef(null);
  const stRef = useRef(state);
  const cursRef = useRef({});
  const supabaseSaveTimer = useRef(null);
  const initialLoaded = useRef(false);
  stRef.current = state;

  // ── SUPABASE FALLBACK: always recover missing data ──
  useEffect(() => {
    const hasActions = (state.actions||[]).length > 0;
    const hasRisks = (state.risks||[]).length > 0;
    if (hasActions && hasRisks) { initialLoaded.current = true; return; }
    console.log('[revelio] Data missing — loading from Supabase...', {hasActions, hasRisks});
    (async () => {
      try {
        // Try active first, then any snapshot
        let { data } = await supabase.from('retros')
          .select('data')
          .eq('sala', SALA)
          .eq('status', 'active')
          .order('updated_at', { ascending: false })
          .limit(1);
        if (!data?.length) {
          const res = await supabase.from('retros')
            .select('data')
            .eq('sala', SALA)
            .order('updated_at', { ascending: false })
            .limit(1);
          data = res.data;
        }
        if (data?.[0]?.data) {
          const snap = data[0].data;
          console.log('[revelio] Recovered from Supabase:', {actions:snap.actions?.length||0, risks:snap.risks?.length||0});
          setState(prev => {
            const merged = { ...prev };
            if (snap.actions?.length > 0 && !prev.actions?.length) merged.actions = snap.actions;
            if (snap.risks?.length > 0 && !prev.risks?.length) merged.risks = snap.risks;
            if (snap.notes?.length > 0 && !prev.notes?.length) merged.notes = snap.notes;
            if (snap.tasks?.length > 0) merged.tasks = snap.tasks;
            if (snap.obj) merged.obj = snap.obj;
            saveRetroState(merged);
            if (merged.risks?.length > 0) saveRisks(merged.risks);
            return merged;
          });
        } else {
          console.warn('[revelio] No snapshot found for:', SALA);
        }
      } catch(e) { console.warn('[revelio] Supabase fallback failed:', e); }
      initialLoaded.current = true;
    })();
  }, []);

  // ── DEBOUNCED AUTO-SAVE TO SUPABASE on every state change ──
  const lastSavedActions = useRef(0);
  useEffect(() => {
    if (!user || !initialLoaded.current) return;
    if (supabaseSaveTimer.current) clearTimeout(supabaseSaveTimer.current);
    supabaseSaveTimer.current = setTimeout(() => {
      if (!initialLoaded.current) return;
      const s = stRef.current;
      const actLen = (s.actions||[]).length;
      // Never overwrite if actions disappeared (guard against corruption)
      if (actLen === 0 && lastSavedActions.current > 0) {
        console.warn('[revelio] Auto-save blocked: actions empty but previously had', lastSavedActions.current);
        return;
      }
      if (actLen > 0 || (s.risks||[]).length > 0 || (s.notes||[]).length > 0) {
        lastSavedActions.current = Math.max(lastSavedActions.current, actLen);
        sbSaveRetroSnapshot(SALA, TIPO, s, user.id, 'active').catch(() => {});
      }
    }, 5000); // 5 second debounce
    return () => { if (supabaseSaveTimer.current) clearTimeout(supabaseSaveTimer.current); };
  }, [state, user]);

  useEffect(() => {
    if (!user) return;
    const ch = supabase.channel('retro-' + SALA, { config:{ presence:{ key:user.id } } });

    // Presence: only for online users
    ch.on('presence', { event:'sync' }, () => {
      const ps = ch.presenceState();
      const u = {};
      Object.entries(ps).forEach(([k, arr]) => {
        if (arr.length > 0) {
          u[k] = { name:arr[0].name, avatar:arr[0].avatar, color:arr[0].color };
        }
      });
      setOnline(u);
    });

    // Broadcast: cursor positions (fast, no rate limit)
    ch.on('broadcast', { event:'phase' }, ({ payload }) => {
        if (payload.from !== user.id && window.__phaseRecv) window.__phaseRecv(payload.phase);
      });
      ch.on('broadcast', { event:'cursor' }, ({ payload }) => {
      if (payload.id === user.id) return;
      cursRef.current = { ...cursRef.current, [payload.id]: { x:payload.x, y:payload.y, name:payload.name, avatar:payload.avatar, color:payload.color, ts:Date.now() } };
      setCursors({ ...cursRef.current });
    });

    // Broadcast: state sync
    ch.on('broadcast', { event:'sync' }, ({ payload }) => {
      if (payload.from === user.id) return;
      setState(prev => {
        const next = { ...prev, [payload.key]: payload.data };
        saveRetroState(next);
        return next;
      });
    });

    ch.on('broadcast', { event:'timer' }, ({ payload }) => {
      if (payload.from === user.id) return;
      if (window.__timerRecv) window.__timerRecv(payload.secs, payload.isRunning, payload.startedAt);
    });

    ch.on('broadcast', { event:'req' }, ({ payload }) => {
      if (payload.from === user.id) return;
      const s = stRef.current;
      Object.keys(s).forEach(k => {
        ch.send({ type:'broadcast', event:'sync', payload:{ key:k, data:s[k], from:user.id } });
      });
    });

    ch.subscribe(async (status) => {
      if (status === 'SUBSCRIBED') {
        await ch.track({ name:user.name, avatar:user.avatar, color:user.color });
        setTimeout(() => ch.send({ type:'broadcast', event:'req', payload:{ from:user.id } }), 600);
      }
    });

    // Clean stale cursors every 3s
    const cleanIv = setInterval(() => {
      const now = Date.now();
      let changed = false;
      const c = { ...cursRef.current };
      Object.keys(c).forEach(k => { if (now - c[k].ts > 5000) { delete c[k]; changed = true; } });
      if (changed) { cursRef.current = c; setCursors(c); }
    }, 3000);

    chRef.current = ch;
    return () => { supabase.removeChannel(ch); clearInterval(cleanIv); };
  }, [user]);

  const upd = useCallback((key, data) => {
    setState(prev => {
      const next = { ...prev, [key]:data };
      saveRetroState(next);
      return next;
    });
    if (chRef.current && user) chRef.current.send({ type:'broadcast', event:'sync', payload:{ key, data, from:user.id } });
  }, [user]);

  const moveCursor = useCallback((x, y) => {
    if (chRef.current && user) {
      chRef.current.send({ type:'broadcast', event:'cursor', payload:{ id:user.id, x, y, name:user.name, avatar:user.avatar, color:user.color } });
    }
  }, [user]);

  const reset = useCallback(() => {
    const currentRisks = stRef.current.risks || [];
    const openActions = (stRef.current.actions || []).filter(a => a.status !== 'done' && a.status !== 'discarded');
    const fresh = { notes:[], tasks:DEFAULT_TASKS.map(t=>({...t,id:uid()})), actions:openActions, obj:{text:'',met:null}, risks:currentRisks };
    clearRetroStorage();
    setState(fresh);
    if (chRef.current && user) {
      Object.keys(fresh).forEach(k => {
        chRef.current.send({ type:'broadcast', event:'sync', payload:{ key:k, data:fresh[k], from:user.id } });
      });
    }
  }, [user]);

  const broadcastTimer = useCallback((secs, isRunning, startedAt) => {
    if (chRef.current && user) {
      chRef.current.send({ type:'broadcast', event:'timer', payload:{ secs, isRunning, startedAt: startedAt||null, from:user.id } });
    }
  }, [user]);

  const broadcastPhase = useCallback((phaseIdx) => {
    if (chRef.current && user) {
      chRef.current.send({ type:'broadcast', event:'phase', payload:{ phase: phaseIdx, from:user.id, name:user.name } });
    }
  }, [user]);

  // Auto-save debounced (every 3s after last change)
  const autoSave = useCallback(debounce((st) => {
    sbSaveRetroSnapshot(SALA, TIPO, st, null);
  }, 3000), []);
  useEffect(() => { autoSave(state); }, [state]);

  return { state, upd, online, cursors, moveCursor, reset, broadcastTimer, broadcastPhase };
}

/* ═══ APP ═══ */
function App() {
  const [user,      setUser]      = useState(() => loadUser()); // always try to restore session
  const [salaValid, setSalaValid] = useState(null);
  const [showLogin, setShowLogin] = useState(false);

  const handleJoin = (u) => {
    saveUser(u); registerUser(u); setUser(u);
    setShowLogin(false);
    // If on a sala page with different sala, redirect
    if (u.sala && params.has('sala') && params.get('sala') !== u.sala) {
      window.location.href = window.location.pathname + '?sala=' + encodeURIComponent(u.sala);
    }
    // Otherwise just re-render (homepage will show)
  };
  const handleLogout = () => { clearUser(); setUser(null); };

  // No sala param → admin, homepage, or landing
  if (!params.has('sala')) {
    if (IS_ADMIN) return html`<${RoomPicker} />`;
    // Any logged-in user (including superusers) gets homepage first
    if (user) {
      return html`<${UserHomePage} user=${user}
        onLogout=${()=>{ clearUser(); setUser(null); }}
        onSelectProject=${(sala,tipo)=>{ window.location.href=window.location.pathname+'?sala='+encodeURIComponent(sala)+'&tipo='+(tipo||'agile'); }} />`;
    }
    // Not logged in — show login
    return html`<${Login} onJoin=${handleJoin} />`;
  }

  // Validate sala + auto-login admin via Supabase session
  useEffect(() => {
    sbLoadRooms().then(rooms => {
      if (!rooms) { setSalaValid(true); return; }
      const exists = rooms.some(r => r.slug === SALA);
      setSalaValid(exists);
    });

    // Always check for active Supabase session — admin should always use their real identity
    sbGetSession().then(async session => {
      if (!session?.user) return;
      // Try to find real team_members record by email
      const members = await sbLoadTeamMembers();
      const realMember = members.find(m =>
        m.email && m.email.toLowerCase() === session.user.email.toLowerCase()
      );
      const adminUser = realMember
        ? {
            id: realMember.id,
            name: realMember.name,
            avatar: realMember.avatar || '🧙',
            color: realMember.color || '#5856D6',
            role: realMember.role_label || 'Admin',
            username: realMember.username || realMember.email,
            sala: SALA,
            _isAdmin: true,
          }
        : {
            id: session.user.id,
            name: session.user.email,
            avatar: '🧙',
            color: '#5856D6',
            role: 'Admin',
            username: session.user.email,
            sala: SALA,
            _isAdmin: true,
          };
      saveUser(adminUser);
      registerUser(adminUser);
      setUser(adminUser);
    });
  }, []);

  if (salaValid === null) return html`
    <div style=${{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'#F5F5F7' }}>
      <div style=${{ textAlign:'center', color:'#86868B' }}>
        <div style=${{ fontSize:32, marginBottom:8, animation:'spin 1s linear infinite', display:'inline-block' }}>⏳</div>
        <p style=${{ fontSize:14 }}>Verificando proyecto…</p>
      </div>
    </div>`;

  if (salaValid === false) return html`
    <div style=${{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'#F5F5F7' }}>
      <div style=${{ background:'#FFF', borderRadius:24, padding:'44px 40px', maxWidth:420, width:'90%', textAlign:'center', boxShadow:'0 8px 40px rgba(0,0,0,0.08)' }}>
        <div style=${{ fontSize:52, marginBottom:12 }}>🚫</div>
        <h2 style=${{ fontSize:20, fontWeight:700, marginBottom:8 }}>Proyecto no encontrado</h2>
        <p style=${{ fontSize:14, color:'#86868B', marginBottom:6, lineHeight:1.5 }}>
          El proyecto <code style=${{ background:'#F2F2F7', padding:'2px 8px', borderRadius:5, fontSize:13 }}>${SALA}</code> no existe o no está registrado.
        </p>
        <a href="/" style=${{ display:'inline-block', padding:'11px 24px', background:'linear-gradient(135deg,#007AFF,#5856D6)', color:'#FFF', borderRadius:12, fontSize:14, fontWeight:600, textDecoration:'none' }}>← Volver al inicio</a>
      </div>
    </div>`;

  if (!user) {
    // Last chance: check global session (user may have logged in from homepage)
    const sess = (() => { try { const s=localStorage.getItem('rf-session'); return s?JSON.parse(s):null; } catch { return null; }})();
    if (sess && !sess._isAdmin) {
      // Auto-accept: save for this sala and proceed
      try { localStorage.setItem('rf-user-'+SALA, JSON.stringify(sess)); } catch {}
      return html`<${RetroBoard} user=${sess} onLogout=${handleLogout} />`;
    }
    return html`<${Login} onJoin=${handleJoin} />`;
  }
  return html`<${RetroBoard} user=${user} onLogout=${handleLogout} />`;
}

/* ╣═══ LUCIDE ICON HELPER ╣═══ */
function Icon({ name, size=18, color='currentColor', strokeWidth=1.75 }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide) return;
    ref.current.innerHTML = '';
    const iconFn = window.lucide[name] || window.lucide.HelpCircle;
    if (!iconFn) return;
    const svg = window.lucide.createElement(iconFn);
    svg.setAttribute('width', size); svg.setAttribute('height', size);
    svg.setAttribute('stroke', color); svg.setAttribute('stroke-width', strokeWidth);
    svg.setAttribute('fill', 'none'); svg.setAttribute('stroke-linecap', 'round'); svg.setAttribute('stroke-linejoin', 'round');
    ref.current.appendChild(svg);
  }, [name, size, color, strokeWidth]);
  return html`<span ref=${ref} style=${{display:'inline-flex',alignItems:'center',justifyContent:'center',flexShrink:0}}></span>`;
}

/* ═══ HOME VACACIONES ═══ */
function HomeVacaciones({ profile, user }) {
  const [vacs,    setVacs]   = useState(() => {
    const v = profile?.vacations;
    if (!v) return [];
    if (Array.isArray(v)) return v;
    try { return JSON.parse(v)||[]; } catch { return []; }
  });
  const [newVac,  setNewVac] = useState({from:'', to:'', type:'vacaciones', reason:'', note:'', label:''});
  const [saving,  setSaving] = useState(false);
  const [viewYear,setViewYear]=useState(new Date().getFullYear());
  const today = new Date().toISOString().slice(0,10);
  const thisYear = new Date().getFullYear();
  const HOLS_MAP = {'01-01':'Año Nuevo','01-06':'Reyes Magos','05-01':'Día del Trabajo','08-15':'Asunción','10-12':'Fiesta Nacional','11-01':'Todos los Santos','12-06':'Día de la Constitución','12-08':'Inmaculada Concepción','12-25':'Navidad'};
  const HOLS = Object.keys(HOLS_MAP);

  const annualDays = profile?.annual_vac_days ?? 22;
  const prevPend   = profile?.prev_year_pending ?? 0;
  const totalVac   = annualDays + prevPend;
  const countDays  = (from, to) => {
    if (!from) return 0;
    let d=new Date(from), end=new Date(to||from), cnt=0;
    while(d<=end){
      const dow=d.getDay(), mm=String(d.getMonth()+1).padStart(2,'0'), dd2=String(d.getDate()).padStart(2,'0');
      if(dow!==0&&dow!==6&&!HOLS.includes(mm+'-'+dd2)) cnt++;
      d.setDate(d.getDate()+1);
    }
    return cnt;
  };
  const vacUsed = vacs.filter(v=>v.type==='vacaciones'||!v.type).reduce((s,v)=>{
    const yr=new Date(v.from||'').getFullYear();
    return yr===thisYear ? s+countDays(v.from,v.to) : s;
  },0);
  const remainVac = Math.max(0,totalVac-vacUsed);
  const vacPct = totalVac>0?Math.min(100,Math.round((vacUsed/totalVac)*100)):0;

  const addVac = async () => {
    if (!newVac.from) return;
    setSaving(true);
    const entry = {
      id: Math.random().toString(36).slice(2),
      memberId: profile?.id||user?.id,
      name: user?.name,
      from: newVac.from,
      to: newVac.to||newVac.from,
      type: newVac.type,
      reason: newVac.reason||'',
      label: newVac.label||'',
      note: newVac.note||'',
    };
    const updated = [...vacs, entry];
    setVacs(updated);
    setNewVac({from:'',to:'',type:'vacaciones',reason:'',note:'',label:''});
    if (profile?.id) await sbSaveMemberVacs(profile.id, updated);
    setSaving(false);
  };

  const delVac = async (id) => {
    const updated = vacs.filter(v=>v.id!==id);
    setVacs(updated);
    if (profile?.id) await sbSaveMemberVacs(profile.id, updated);
  };

  // Only show legend for types actually used
  const usedTypes = [...new Set(vacs.map(v=>v.type||'vacaciones'))];
  const legendItems = ABSENCE_TYPES.filter(t=>usedTypes.includes(t.id));
  const MONTHS_S = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const getEntry = (yr,mo,d) => {
    const ds=yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    return vacs.find(v=>v.from<=ds&&(!v.to||v.to>=ds));
  };
  const isWknd = (yr,mo,d) => { const dow=new Date(yr,mo,d).getDay(); return dow===0||dow===6; };
  const isHol  = (mo,d) => HOLS.includes(String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'));
  const holName = (mo,d) => HOLS_MAP[String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0')]||'Festivo';
  const infoFor = (e) => e ? (ABSENCE_TYPES.find(t=>t.id===e.type)||ABSENCE_TYPES[0]) : null;

  return html`<div style=${{display:'flex',flexDirection:'column',gap:14}}>

    <div style=${{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
      ${[[annualDays,'Días/año','#1D1D1F'],[prevPend,'Año anterior','#5856D6'],[totalVac,'Total disp.','#007AFF'],[remainVac,'Restantes',remainVac<=5?'#FF3B30':remainVac<=10?'#FF9500':'#34C759']].map(([v,l,c])=>html`
        <div style=${{background:'#FFF',borderRadius:14,border:'1.5px solid #E5E5EA',padding:'14px 12px',textAlign:'center'}}>
          <div style=${{fontSize:26,fontWeight:800,color:c,lineHeight:1}}>${v}</div>
          <div style=${{fontSize:10,color:'#86868B',marginTop:4}}>${l}</div>
        </div>`)}
    </div>

    <div style=${{background:'#FFF',borderRadius:14,border:'1.5px solid #E5E5EA',padding:'14px 16px'}}>
      <div style=${{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:6}}>
        <span style=${{color:'#86868B'}}>${vacUsed} días consumidos de ${totalVac}</span>
        <span style=${{fontWeight:700,color:vacPct>80?'#FF3B30':vacPct>60?'#FF9500':'#34C759'}}>${vacPct}%</span>
      </div>
      <div style=${{background:'#F2F2F7',borderRadius:6,height:10,overflow:'hidden'}}>
        <div style=${{width:vacPct+'%',height:'100%',borderRadius:6,transition:'width .5s',background:vacPct>80?'linear-gradient(90deg,#FF9500,#FF3B30)':vacPct>60?'linear-gradient(90deg,#FF9500,#FF6B00)':'linear-gradient(90deg,#34C759,#00C7BE)'}}></div>
      </div>
    </div>

    <div style=${{background:'#FFF',borderRadius:14,border:'1.5px solid #E5E5EA',padding:'16px'}}>

        <h4 style=${{fontSize:13,fontWeight:700}}>Calendario ${viewYear}</h4>

          <button onClick=${()=>setViewYear(y=>y+1)} style=${{border:'none',background:'#F2F2F7',borderRadius:8,width:28,height:28,cursor:'pointer',color:'#86868B',display:'flex',alignItems:'center',justifyContent:'center'}}>›</button>

          const firstDow=(new Date(viewYear,mo,1).getDay()+6)%7;

            <div style=${{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:1}}>

              ${Array.from({length:firstDow},(_,i)=>html`<div key=${'e'+i}></div>`)}

                return html`<div title=${tip}

            <select value=${newVac.reason||''} onChange=${e=>setNewVac({...newVac,reason:e.target.value})}

              <option value="">Seleccionar…</option>

            </select>
          </div>`:html``}
      </div>
      <button onClick=${addVac} disabled=${!newVac.from||saving}
        style=${{width:'100%',padding:'11px',borderRadius:10,border:'none',background:newVac.from?'#1D1D1F':'#E5E5EA',color:newVac.from?'#FFF':'#86868B',fontSize:13,fontWeight:600,cursor:newVac.from?'pointer':'default',transition:'all .15s'}}>
        ${saving?'Guardando…':'+ Registrar ausencia'}
      </button>
    </div>

    ${vacs.filter(v=>new Date(v.from||'').getFullYear()===thisYear).length>0&&html`
      <div style=${{background:'#FFF',borderRadius:14,border:'1.5px solid #E5E5EA',padding:'16px'}}>

          ${vacs.filter(v=>new Date(v.from||'').getFullYear()===thisYear).sort((a,b)=>b.from>a.from?1:-1).map((v,i)=>{
            const info=ABSENCE_TYPES.find(t=>t.id===v.type)||ABSENCE_TYPES[0];

            </div>`;
          })}
        </div>
      </div>`}
  </div>`;
}

/* ═══ GOBIERNO PANEL (SM homepage) ═══ */
function GobiernoPanel({ rooms, allData, myActions, myRisks }) {
  const totalActions = Object.values(allData).flatMap(d=>d.actions||[]);
  const openActions = totalActions.filter(a=>a.status!=='done'&&a.status!=='discarded'&&a.status!=='cancelled');
  const doneActions = totalActions.filter(a=>a.status==='done');
  const totalRisks = Object.values(allData).flatMap(d=>d.risks||[]);
  const openRisks = totalRisks.filter(r=>r.status!=='mitigated');
  const today = new Date().toISOString().slice(0,10);
  const overdue = openActions.filter(a=>a.date&&a.date<today);
  const completionRate = totalActions.length>0?Math.round((doneActions.length/totalActions.length)*100):0;

  return html`<div>

    <div style=${{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10,marginBottom:18}}>
      ${[
        {l:'Tareas abiertas',v:openActions.length,c:'#007AFF',i:'CheckSquare'},
        {l:'Completadas',v:doneActions.length,c:'#34C759',i:'CheckCircle2'},
        {l:'Vencidas',v:overdue.length,c:overdue.length>0?'#FF3B30':'#86868B',i:'AlertCircle'},
        {l:'Riesgos activos',v:openRisks.length,c:openRisks.length>0?'#FF9500':'#86868B',i:'AlertTriangle'},
      ].map((k,i)=>html`
        <div key=${i} style=${{background:'#FFF',borderRadius:16,border:'1.5px solid #E5E5EA',padding:'16px',textAlign:'center'}}>
          <div style=${{width:32,height:32,borderRadius:10,background:k.c+'15',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 8px'}}>
            <${Icon} name=${k.i} size=${16} color=${k.c} />
          </div>
          <div style=${{fontSize:24,fontWeight:800,color:k.c,lineHeight:1}}>${k.v}</div>
          <div style=${{fontSize:10,color:'#86868B',marginTop:4}}>${k.l}</div>
        </div>`)}
    </div>

    <div style=${{background:'#FFF',borderRadius:16,border:'1.5px solid #E5E5EA',padding:'18px',marginBottom:14}}>
      <div style=${{display:'flex',justifyContent:'space-between',marginBottom:8}}>
        <span style=${{fontSize:13,fontWeight:700}}>Cumplimiento global</span>
        <span style=${{fontSize:13,fontWeight:800,color:completionRate>=70?'#34C759':completionRate>=40?'#FF9500':'#FF3B30'}}>${completionRate}%</span>
      </div>
      <div style=${{background:'#F2F2F7',borderRadius:6,height:10,overflow:'hidden'}}>
        <div style=${{width:completionRate+'%',height:'100%',borderRadius:6,background:completionRate>=70?'#34C759':completionRate>=40?'#FF9500':'#FF3B30',transition:'width .5s'}}></div>
      </div>
      <div style=${{display:'flex',justifyContent:'space-between',fontSize:10,color:'#86868B',marginTop:6}}>
        <span>${doneActions.length} completadas de ${totalActions.length}</span>
        <span>${rooms.length} proyectos</span>
      </div>
    </div>

    <div style=${{background:'#FFF',borderRadius:16,border:'1.5px solid #E5E5EA',padding:'18px'}}>
      <h3 style=${{fontSize:14,fontWeight:700,marginBottom:12}}>Estado por proyecto</h3>
      ${rooms.map(r=>{
        const d=allData[r.slug]||{};
        const acts=d.actions||[];
        const open=acts.filter(a=>a.status!=='done'&&a.status!=='discarded'&&a.status!=='cancelled').length;
        const done=acts.filter(a=>a.status==='done').length;
        const risks=(d.risks||[]).filter(x=>x.status!=='mitigated').length;
        const pct=acts.length>0?Math.round((done/acts.length)*100):0;
        return html`
          <div key=${r.slug} style=${{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid #F2F2F7'}}>
            <div style=${{flex:1}}>
              <div style=${{fontSize:12,fontWeight:600}}>${r.name}</div>
              <div style=${{display:'flex',gap:8,fontSize:10,color:'#86868B',marginTop:3}}>
                <span>${open} abiertas</span>
                <span style=${{color:'#34C759'}}>${done} hechas</span>
                ${risks>0&&html`<span style=${{color:'#FF9500'}}>⚠ ${risks} riesgos</span>`}
              </div>
            </div>
            <div style=${{width:80}}>
              <div style=${{display:'flex',alignItems:'center',gap:4}}>
                <div style=${{flex:1,height:5,background:'#F2F2F7',borderRadius:3,overflow:'hidden'}}>
                  <div style=${{height:'100%',width:pct+'%',background:pct>=70?'#34C759':pct>=40?'#FF9500':'#FF3B30',borderRadius:3}}></div>
                </div>
                <span style=${{fontSize:10,fontWeight:700,color:pct>=70?'#34C759':pct>=40?'#FF9500':'#FF3B30',minWidth:28}}>${pct}%</span>
              </div>
            </div>
          </div>`;
      })}
    </div>
  </div>`;
}


function UserHomePage({ user, onLogout, onSelectProject }) {
  const [section,      setSection]      = useState('dashboard');
  const [miTrabajoTab, setMiTrabajoTab] = useState('hoy');
  const [rooms,        setRooms]        = useState([]);
  const [profile,      setProfile]      = useState(null);
  const [allData,      setAllData]      = useState({});
  const [roomsLoaded,  setRoomsLoaded]  = useState(false);
  const [profileLoaded,setProfileLoaded]= useState(false);
  const [editProfile,  setEditProfile]  = useState(() => profile ? {...profile} : {name:user.name,username:'',email:'',company:'',phone:'',role_label:''});
  const [savingProfile,setSavingProfile]= useState(false);
  const [showNotifs,   setShowNotifs]   = useState(false);
  const [homeNotifs,   setHomeNotifs]   = useState([]);
  const [rolesList,    setRolesList]    = useState(getAllRoles);
  const today    = new Date().toISOString().slice(0,10);
  const thisYear = new Date().getFullYear();

  useEffect(() => {
    sbLoadRooms().then(r => { setRooms(r||[]); setRoomsLoaded(true); }).catch(()=>setRoomsLoaded(true));
  }, []);
  // Load roles from Supabase + stay in sync with storage changes
  useEffect(() => {
    sbLoadRoles().then(r => setRolesList(r));
    const onStorage = () => setRolesList(getAllRoles());
    window.addEventListener('storage', onStorage);
    return () => window.removeEventListener('storage', onStorage);
  }, []);

  useEffect(() => {
    sbLoadTeamMembers().then(members => {
      window.__allMembers = members||[];
      const uq=(user.username||user.name||'').toLowerCase().trim(), uid=user.id||'';
      const me=(members||[]).find(m=>(uid&&m.id===uid)||(m.username&&m.username.toLowerCase().trim()===uq)||(m.email&&m.email.toLowerCase().trim()===uq)||(m.email&&m.email.split('@')[0].toLowerCase().trim()===uq)||(m.name&&m.name.toLowerCase().trim()===uq));
      setProfile(me||null); setEditProfile(me?{...me}:null); setProfileLoaded(true);
    }).catch(()=>setProfileLoaded(true));
  }, []);
  useEffect(() => {
    if (!roomsLoaded) return;
    // Load from localStorage first (fast path)
    const data={};
    rooms.forEach(r=>{ try{ const s=localStorage.getItem('rf-retro-state-'+r.slug); if(s) data[r.slug]=JSON.parse(s); }catch{} });
    // Always enrich from Supabase retros (covers admins with no localStorage)
    sbLoadRetros().then(snaps => {
      const bySala={};
      (snaps||[]).forEach(s=>{ if(!bySala[s.sala]||s.created_at>bySala[s.sala].created_at) bySala[s.sala]=s; });
      const merged={...data};
      Object.entries(bySala).forEach(([sala,snap])=>{ if(snap.data) merged[sala]=snap.data; });
      setAllData(merged);
    }).catch(()=>{ setAllData(data); });
  }, [roomsLoaded, rooms.length]);

  // Build notifications whenever allData changes
  useEffect(() => {
    const today = new Date().toISOString().slice(0,10);
    const notifs = [];
    // Overdue actions
    Object.entries(allData).forEach(([slug,d]) => {
      const roomName = rooms.find(r=>r.slug===slug)?.name||slug;
      (d.actions||[]).filter(a=>
        (a.owner===user.name||a.createdBy===user.id) &&
        a.status!=='done' && a.status!=='discarded' && a.date && a.date<today
      ).forEach(a => notifs.push({id:'adl-'+a.id,msg:'Tarea vencida: '+a.text.slice(0,50),room:roomName,type:'overdue',ts:Date.now()}));
      // Escalated risks — check if user is assigned to the escalation level
      (d.risks||[]).filter(r=>{
        if(!r.escalation) return false;
        if(r.escalation.memberName===user.name||r.escalation.memberId===user.id||r.owner===user.name) return true;
        try{const lm=JSON.parse(localStorage.getItem('rf-level-members-'+slug)||'{}');return (lm[r.escalation.level]||[]).includes(user.name)}catch{return false}
      }).forEach(r =>
        notifs.push({id:'esc-'+r.id,msg:'Riesgo escalado: '+r.text.slice(0,50),room:roomName,type:'escalado',ts:Date.now()})
      );
    });
    if (notifs.length>0) setHomeNotifs(notifs);
  }, [allData]);

  // Superusers see all rooms; regular users only their assigned rooms
  const isSuperUser = user?.isSuperuser || user?._isAdmin;
  const myRooms = isSuperUser
    ? rooms
    : rooms.filter(r=>profile?(profile.rooms||[]).includes(r.slug):false);
  const myActions = Object.entries(allData).flatMap(([slug,d])=>{
    const roomName = rooms.find(r=>r.slug===slug)?.name||slug;
    return (d.actions||[]).filter(a=>a.owner===user.name||a.createdBy===user.id).map(a=>({...a,_room:roomName}));
  });
  const myRisks = isSuperUser
    // Superusers see ALL open risks
    ? Object.entries(allData).flatMap(([slug,d])=>{
        const roomName = rooms.find(r=>r.slug===slug)?.name||slug;
        return (d.risks||[]).filter(r=>r.status!=='mitigated').map(r=>({...r,_room:roomName}));
      })

// ── User identity: persist per sala so you don't duplicate ──
function loadUser() {
  try {
    // Try sala-specific first, then global session, then admin session
    const s = localStorage.getItem('rf-user-' + SALA) 
           || localStorage.getItem('rf-session')
           || localStorage.getItem('rf-admin-session');
    if (!s) return null;
    const u = JSON.parse(s);
    // If loaded from admin session, mark as admin user so UI adapts
    if (u?.isSuperuser && !localStorage.getItem('rf-session')) {
      return { ...u, _isAdmin: false, role: u.role || 'Admin' };
    }
    return u;
  } catch { return null; }
}
function saveUser(user) {
  try {
    // Save globally AND sala-specific so both paths work
    const serialized = JSON.stringify(user);
    localStorage.setItem('rf-session', serialized);
    localStorage.setItem('rf-user-' + SALA, serialized);
  } catch {}
}
function clearUser() {
  try {
    localStorage.removeItem('rf-session');
    localStorage.removeItem('rf-admin-session');
    localStorage.removeItem('rf-user-' + SALA);
    Object.keys(localStorage).filter(k=>k.startsWith('rf-user-')).forEach(k=>localStorage.removeItem(k));
  } catch {}
}

// ── User registry per sala (for admin visibility + duplicate prevention) ──
function loadUserRegistry(sala) {
  try { const s = localStorage.getItem('rf-reg-' + (sala || SALA)); return s ? JSON.parse(s) : []; } catch { return []; }
}
function registerUser(user) {
  try {
    const reg = loadUserRegistry();
    const existing = reg.findIndex(u => u.id === user.id);
    if (existing >= 0) reg[existing] = { ...reg[existing], name: user.name, avatar: user.avatar, color: user.color, lastSeen: new Date().toISOString() };
    else reg.push({ id: user.id, name: user.name, avatar: user.avatar, color: user.color, firstSeen: new Date().toISOString(), lastSeen: new Date().toISOString() });
    localStorage.setItem('rf-reg-' + SALA, JSON.stringify(reg));
  } catch {}
}
function isNameTaken(name) {
  const reg = loadUserRegistry();
  const saved = loadUser();
  return reg.some(u => u.name.toLowerCase() === name.toLowerCase() && (!saved || u.id !== saved.id));
}

const RISK_LEVELS = [
  { id: 'alto', label: 'Alto', color: '#FF3B30', val: 3 },
  { id: 'medio', label: 'Medio', color: '#FF9500', val: 2 },
  { id: 'bajo', label: 'Bajo', color: '#34C759', val: 1 },
];
const RISK_STATUS = [
  { id: 'open', label: 'Abierto', color: '#FF3B30' },
  { id: 'mitigating', label: 'Mitigando', color: '#FF9500' },
  { id: 'mitigated', label: 'Mitigado', color: '#34C759' },
  { id: 'accepted', label: 'Aceptado', color: '#8E8E93' },
];

function getRiskLevel(votes) {
  if (!votes || Object.keys(votes).length === 0) return RISK_LEVELS[1];
  const counts = { alto: 0, medio: 0, bajo: 0 };
  Object.values(votes).forEach(v => { if (counts[v] !== undefined) counts[v]++; });
  const max = Math.max(counts.alto, counts.medio, counts.bajo);
  if (counts.alto === max) return RISK_LEVELS[0];
  if (counts.medio === max) return RISK_LEVELS[1];
  return RISK_LEVELS[2];
}

function getHeatColor(impLvl, probLvl) {
  const score = impLvl.val * probLvl.val;
  if (score >= 6) return '#FF3B30';
  if (score >= 3) return '#FF9500';
  return '#34C759';
}

/* ═══ ESCALATION CONFIG HELPERS ═══ */
const DEFAULT_ESCALATION_CONFIG = {
  critico:  { days: 2,  label: 'Crítico' },
  moderado: { days: 5,  label: 'Moderado' },
  bajo:     { days: 10, label: 'Bajo' },
};
function getEscalationConfig() {
  try { return JSON.parse(localStorage.getItem('rf-escalation-config')||'null') || DEFAULT_ESCALATION_CONFIG; }
  catch { return DEFAULT_ESCALATION_CONFIG; }
}
function saveEscalationConfig(cfg) {
  localStorage.setItem('rf-escalation-config', JSON.stringify(cfg));
  sbSaveEscalationConfig(cfg).catch(() => {});
}
// Load from Supabase on startup and cache locally
sbLoadEscalationConfig().then(cfg => {
  if (cfg) localStorage.setItem('rf-escalation-config', JSON.stringify(cfg));
});


/* ═══ ADMIN ROLES ═══ */
function AdminRoles() {
  const [members,  setMembers]  = useState([]);
  const [loading,  setLoading]  = useState(true);
  const [roles,    setRoles]    = useState(getAllRoles);
  const [newRole,  setNewRole]  = useState('');
  const [expanded, setExpanded] = useState(null);
  const [saving,   setSaving]   = useState(null);

  useEffect(() => {
    sbLoadTeamMembers().then(data => { setMembers(data||[]); setLoading(false); });
    // Load roles from Supabase on mount
    sbLoadRoles().then(r => { setRoles(r); window.dispatchEvent(new Event('storage')); });
  }, []);

  const saveRoles = async (r) => {
    setRoles(r);
    try { localStorage.setItem('rf-admin-roles', JSON.stringify(r.filter(x=>!ROLES.includes(x)))); } catch {}
    window.dispatchEvent(new Event('storage'));
  };
  const addRole = async () => {
    const t = newRole.trim();
    if (!t || roles.includes(t)) return;
    await sbSaveRole(t);
    const updated = [...roles, t];
    saveRoles(updated);
    setNewRole('');
  };
  const delRole = async (role) => {
    if (ROLES.includes(role)) return;
    await sbDeleteRole(role);
    saveRoles(roles.filter(r=>r!==role));
  };

  const assignRole = async (memberId, role) => {
    setSaving(memberId);
    const m=members.find(x=>x.id===memberId); if(!m){setSaving(null);return;}
    const u={...m,role_label:role}; await sbSaveTeamMember(u);
    setMembers(prev=>prev.map(x=>x.id===memberId?u:x)); setSaving(null);
  };
  const removeRole = async (memberId) => {
    setSaving(memberId);
    const m=members.find(x=>x.id===memberId); if(!m){setSaving(null);return;}
    const u={...m,role_label:''}; await sbSaveTeamMember(u);
    setMembers(prev=>prev.map(x=>x.id===memberId?u:x)); setSaving(null);
  };

  const byRole = (role) => members.filter(m=>m.role_label===role);
  const unassigned = members.filter(m=>!m.role_label);
  const allRoles = [...new Set([...roles, ...members.map(m=>m.role_label).filter(Boolean)])];
  const RC = {'Scrum Master':'#007AFF','Product Owner':'#5856D6','Desarrollador/a':'#34C759','QA / Tester':'#FF9500','Diseñador/a':'#FF2D55','DevOps':'#00C7BE','Tech Lead':'#FF3B30','Analista':'#AF52DE','Project Manager':'#007AFF','Stakeholder':'#86868B','Otro':'#C7C7CC'};
  const rc = (r) => RC[r]||'#5856D6';

  return html`
    <div>
      <div style=${{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16 }}>
        <div>
          <h3 style=${{ fontSize:16, fontWeight:700 }}>🏷️ Gestión de roles</h3>
          <p style=${{ fontSize:12, color:'#86868B', marginTop:2 }}>${allRoles.length} roles · ${members.length} usuarios</p>
        </div>
      </div>

      ${loading ? html`<div style=${{ textAlign:'center', padding:40, color:'#86868B' }}>⏳ Cargando…</div>` : html`
        <div style=${{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))', gap:10, marginBottom:20 }}>
          ${allRoles.map(role => {
            const mems=byRole(role); const color=rc(role); const isBuiltin=ROLES.includes(role); const isExp=expanded===role;
            return html`
              <div key=${role} style=${{ background:'#FFF', borderRadius:14, border:'1.5px solid '+(isExp?color:'#E5E5EA'), overflow:'hidden' }}>
                <div onClick=${()=>setExpanded(isExp?null:role)} style=${{ padding:'12px 14px', display:'flex', alignItems:'center', gap:10, cursor:'pointer', background:isExp?color+'08':'#FFF' }}>
                  <div style=${{ width:36, height:36, borderRadius:10, background:color+'18', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                    <span style=${{ fontSize:18, fontWeight:800, color:color }}>${role.charAt(0)}</span>
                  </div>
                  <div style=${{ flex:1 }}>
                    <div style=${{ display:'flex', alignItems:'center', gap:6 }}>
                      <span style=${{ fontSize:13, fontWeight:700 }}>${role}</span>
                      ${!isBuiltin && html`<span style=${{ fontSize:9, color:'#86868B', background:'#F2F2F7', padding:'1px 5px', borderRadius:4 }}>personalizado</span>`}
                    </div>
                    <div style=${{ fontSize:11, marginTop:1 }}>
                      ${mems.length===0 ? html`<span style=${{ color:'#C7C7CC' }}>Sin asignar</span>` : html`<span style=${{ color:color, fontWeight:600 }}>${mems.length} ${mems.length===1?'persona':'personas'}</span>`}
                    </div>
                  </div>
                  <div style=${{ display:'flex' }}>
                    ${mems.slice(0,4).map((m,i)=>html`<div key=${m.id} title=${m.name} style=${{ width:26, height:26, borderRadius:8, background:m.color||'#E5E5EA', display:'flex', alignItems:'center', justifyContent:'center', fontSize:14, marginLeft:i>0?-6:0, border:'2px solid #FFF', zIndex:4-i }}>${m.avatar||'👤'}</div>`)}
                    ${mems.length>4 && html`<div style=${{ width:26, height:26, borderRadius:8, background:'#F2F2F7', display:'flex', alignItems:'center', justifyContent:'center', fontSize:9, fontWeight:700, color:'#86868B', marginLeft:-6, border:'2px solid #FFF' }}>+${mems.length-4}</div>`}
                  </div>
                  <span style=${{ fontSize:12, color:isExp?color:'#C7C7CC', display:'inline-block', transform:isExp?'rotate(180deg)':'none', transition:'transform .2s' }}>▾</span>
                  ${!isBuiltin && html`<button onClick=${e=>{e.stopPropagation();delRole(role)}} style=${{ border:'none', background:'none', color:'#FF3B30', fontSize:14, cursor:'pointer', padding:'2px 4px' }}>✕</button>`}
                </div>
                ${isExp && html`
                  <div style=${{ borderTop:'1px solid #F2F2F7', padding:'10px 14px' }}>
                    ${mems.length===0 ? html`<p style=${{ fontSize:11, color:'#C7C7CC', marginBottom:10 }}>Nadie tiene este rol aún</p>` :
                      html`<div style=${{ display:'flex', flexDirection:'column', gap:5, marginBottom:10 }}>
                        ${mems.map(m=>html`
                          <div key=${m.id} style=${{ display:'flex', alignItems:'center', gap:8, padding:'6px 8px', borderRadius:8, background:color+'08' }}>
                            <div style=${{ width:28, height:28, borderRadius:8, background:m.color||'#E5E5EA', display:'flex', alignItems:'center', justifyContent:'center', fontSize:15 }}>${m.avatar||'👤'}</div>
                            <span style=${{ flex:1, fontSize:12, fontWeight:600 }}>${m.name}</span>
                            <button onClick=${()=>removeRole(m.id)} disabled=${saving===m.id} style=${{ border:'none', background:'none', color:'#C7C7CC', fontSize:12, cursor:'pointer' }}>✕</button>
                          </div>`)}
                      </div>`}
                    <p style=${{ fontSize:10, fontWeight:700, color:'#86868B', marginBottom:6, textTransform:'uppercase' }}>Asignar a…</p>
                    <div style=${{ display:'flex', flexWrap:'wrap', gap:4 }}>
                      ${members.filter(m=>m.role_label!==role).map(m=>html`
                        <button key=${m.id} onClick=${()=>assignRole(m.id,role)} disabled=${saving===m.id}
                          style=${{ display:'flex', alignItems:'center', gap:4, padding:'3px 8px 3px 4px', borderRadius:20, border:'1.5px solid #E5E5EA', background:'#FFF', cursor:'pointer', fontSize:11, opacity:saving===m.id?.4:1 }}>
                          <span style=${{ fontSize:14 }}>${m.avatar||'👤'}</span><span>${m.name}</span>
                        </button>`)}
                    </div>
                  </div>`}
              </div>`;
          })}
          ${unassigned.length>0 && html`
            <div style=${{ background:'#F9F9FB', borderRadius:14, border:'1.5px solid #E5E5EA', padding:'12px 14px' }}>
              <div style=${{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
                <div style=${{ width:36, height:36, borderRadius:10, background:'#F2F2F7', display:'flex', alignItems:'center', justifyContent:'center', fontSize:18 }}>❓</div>
                <div><span style=${{ fontSize:13, fontWeight:700, color:'#86868B' }}>Sin rol</span><div style=${{ fontSize:11, color:'#C7C7CC' }}>${unassigned.length} personas</div></div>
              </div>
              <div style=${{ display:'flex', flexWrap:'wrap', gap:4 }}>
                ${unassigned.map(m=>html`
                  <span key=${m.id} style=${{ display:'flex', alignItems:'center', gap:4, padding:'3px 8px 3px 4px', borderRadius:20, background:'#FFF', border:'1px solid #E5E5EA', fontSize:11 }}>
                    <span style=${{ fontSize:14 }}>${m.avatar||'👤'}</span><span style=${{ color:'#86868B' }}>${m.name}</span>
                  </span>`)}
              </div>
            </div>`}
        </div>
        <div style=${{ display:'flex', gap:8, padding:'12px 14px', borderRadius:12, background:'#F9F9FB', border:'1.5px solid #E5E5EA' }}>
          <input value=${newRole} onInput=${e=>setNewRole(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&addRole()}
            placeholder="Nombre del nuevo rol personalizado…"
            style=${{ flex:1, border:'1.5px solid #E5E5EA', borderRadius:9, padding:'8px 12px', fontSize:13, fontFamily:'inherit', outline:'none', background:'#FFF' }} />
          <button onClick=${addRole} disabled=${!newRole.trim()||roles.includes(newRole.trim())}
            style=${{ padding:'8px 18px', borderRadius:9, border:'none', background:'#1D1D1F', color:'#FFF', fontSize:13, fontWeight:600, cursor:'pointer', opacity:(!newRole.trim()||roles.includes(newRole.trim()))?.4:1 }}>
            + Añadir
          </button>
        </div>
        <p style=${{ fontSize:11, color:'#C7C7CC', marginTop:10, textAlign:'center' }}>Los roles predefinidos no se pueden eliminar · Los roles personalizados se guardan localmente</p>
      `}
    </div>`;
}

/* ═══ CAL FORM — top-level to avoid remount on every render ═══ */
function CalForm({ cal, setCal, saving, onSave, onCancel }) {
  const [viewYear, setViewYear] = useState(new Date().getFullYear());
  const [pendingDate, setPendingDate] = useState(null); // date clicked, awaiting name
  const [pendingName, setPendingName] = useState('');
  const nameRef = useRef(null);

  const allHolidays = cal.holidays || [];
  const years = [...new Set(allHolidays.map(h=>h.date.slice(0,4)))].sort();
  const [calYear, setCalYear] = useState(()=>years.length>0?years[years.length-1]:String(new Date().getFullYear()));
  const holidays = allHolidays.filter(h=>h.date.startsWith(calYear));
  const holSet = new Set(holidays.map(h=>h.date));
  const MONTHS_S = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

  const addH = (date, name) => {
    if (!date || !name.trim()) return;
    const updated = [...holidays.filter(h=>h.date!==date), {date, name: name.trim()}].sort((a,b)=>a.date<b.date?-1:1);
    setCal({...cal, holidays: updated});
    setPendingDate(null); setPendingName('');
  };
  const delH = (date) => setCal({...cal, holidays: holidays.filter(h=>h.date!==date)});

  const clickDay = (ds, isWknd) => {
    if (isWknd) return;
    if (holSet.has(ds)) { delH(ds); return; } // toggle off
    setPendingDate(ds); setPendingName('');
    setTimeout(()=>nameRef.current?.focus(), 50);
  };

  return html`
    <div style=${{ display:'flex', flexDirection:'column', gap:12 }}>
      <div>
        <label style=${{ fontSize:11, color:'#86868B', fontWeight:600, display:'block', marginBottom:4 }}>Nombre del calendario</label>
        <input value=${cal.name||''} onInput=${e=>setCal({...cal,name:e.target.value})} placeholder="Ej: España, Andalucía, Cliente Endesa…"
          style=${{ ...iS, fontSize:14 }} />
      </div>

      <div>
        <div style=${{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8 }}>
          <div style=${{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:4 }}>
            <label style=${{ fontSize:11, color:'#86868B', fontWeight:600 }}>📅 Festivos (${holidays.length})</label>

            <div style=${{ display:'flex', gap:4, alignItems:'center' }}>
              ${years.map(y=>html`
                <button key=${y} onClick=${()=>setCalYear(y)}
                  style=${{ padding:'3px 10px', borderRadius:6, border:calYear===y?'none':'1px solid #E5E5EA',
                    background:calYear===y?'#1D1D1F':'#FFF', color:calYear===y?'#FFF':'#6E6E73',
                    fontSize:10, fontWeight:600, cursor:'pointer' }}>${y}</button>`)}
              ${holidays.length>0 && html`<button onClick=${()=>{
                const nextYear = parseInt(calYear) + 1;
                const nextYearStr = String(nextYear);
                const existing = new Set(allHolidays.map(h=>h.date));
                const newHols = holidays.map(h=>({
                  date: nextYearStr + h.date.slice(4),
                  name: h.name
                })).filter(h=>!existing.has(h.date));
                if(newHols.length===0){alert('Ya existen los festivos para '+nextYear); return;}
                setCal({...cal, holidays: [...allHolidays, ...newHols].sort((a,b)=>a.date<b.date?-1:1)});
                setCalYear(nextYearStr);
              }} style=${{ fontSize:10, fontWeight:600, padding:'3px 10px', borderRadius:6, border:'1.5px solid #5856D620', background:'#F8F5FF', color:'#5856D6', cursor:'pointer' }}>
                📋 Duplicar a ${parseInt(calYear)+1}
              </button>`}
            </div>
          </div>
          <div style=${{ display:'flex', gap:4 }}>
            <button onClick=${()=>setViewYear(y=>y-1)} style=${{ border:'none', background:'#F2F2F7', borderRadius:8, width:28, height:28, cursor:'pointer', color:'#86868B', display:'flex', alignItems:'center', justifyContent:'center' }}>‹</button>
            <span style=${{ fontSize:13, fontWeight:700, minWidth:40, textAlign:'center', lineHeight:'28px' }}>${viewYear}</span>
            <button onClick=${()=>setViewYear(y=>y+1)} style=${{ border:'none', background:'#F2F2F7', borderRadius:8, width:28, height:28, cursor:'pointer', color:'#86868B', display:'flex', alignItems:'center', justifyContent:'center' }}>›</button>
          </div>
        </div>

        ${pendingDate && html`
          <div style=${{ display:'flex', gap:6, marginBottom:8, padding:'8px 10px', background:'#5856D610', borderRadius:10, border:'1.5px solid #5856D630', alignItems:'center' }}>
            <span style=${{ fontSize:12, fontWeight:700, color:'#5856D6', minWidth:80 }}>${pendingDate}</span>
            <input ref=${nameRef} value=${pendingName} onInput=${e=>setPendingName(e.target.value)}
              onKeyDown=${e=>{ if(e.key==='Enter') addH(pendingDate, pendingName); if(e.key==='Escape') setPendingDate(null); }}
              placeholder="Nombre del festivo…"
              style=${{ flex:1, border:'1.5px solid #E5E5EA', borderRadius:7, padding:'6px 10px', fontSize:12, fontFamily:'inherit', outline:'none' }} />
            <button onClick=${()=>addH(pendingDate, pendingName)} disabled=${!pendingName.trim()}
              style=${{ padding:'6px 12px', borderRadius:7, border:'none', background:pendingName.trim()?'#5856D6':'#E5E5EA', color:'#FFF', fontSize:11, fontWeight:600, cursor:'pointer' }}>Añadir</button>
            <button onClick=${()=>setPendingDate(null)}
              style=${{ border:'none', background:'none', color:'#86868B', cursor:'pointer', fontSize:14 }}>✕</button>
          </div>`}

        <div style=${{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:8 }}>
          ${MONTHS_S.map((mName,mo) => {
            const dim = new Date(viewYear,mo+1,0).getDate();
            const firstDow = (new Date(viewYear,mo,1).getDay()+6)%7;
            return html`<div key=${mo} style=${{ background:'#FAFAFA', borderRadius:10, border:'1px solid #E5E5EA', padding:'6px 5px 5px' }}>
              <div style=${{ fontSize:9, fontWeight:700, color:'#86868B', marginBottom:4, textTransform:'uppercase', letterSpacing:.6, textAlign:'center' }}>${mName}</div>
              <div style=${{ display:'grid', gridTemplateColumns:'repeat(7,1fr)', gap:1 }}>
                ${['L','M','X','J','V','S','D'].map((d,i)=>html`<div style=${{ fontSize:7, color:i>=5?'#C0C0C0':'#A0A0A0', textAlign:'center', marginBottom:1, fontWeight:600 }}>${d}</div>`)}
                ${Array.from({length:firstDow},(_,i)=>html`<div key=${'e'+i}></div>`)}
                ${Array.from({length:dim},(_,i)=>i+1).map(d => {
                  const ds = viewYear+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
                  const isH = holSet.has(ds);
                  const wk = new Date(viewYear,mo,d).getDay()===0 || new Date(viewYear,mo,d).getDay()===6;
                  const isPending = pendingDate===ds;
                  const hName = holidays.find(h=>h.date===ds)?.name||'';
                  return html`<div title=${isH?hName:wk?'Fin de semana':'Clic para añadir festivo'}
                    onClick=${()=>clickDay(ds, wk)}
                    style=${{ height:22, borderRadius:3, display:'flex', alignItems:'center', justifyContent:'center',
                      fontSize:8, fontWeight:isH?800:500, cursor:wk?'default':'pointer',
                      background:isPending?'#5856D6':isH?'#5856D6':wk?'#EFEFEF':'transparent',
                      color:isPending||isH?'#FFF':wk?'#BBBBBB':'#555',
                      border:isPending?'2px solid #007AFF':'none',
                      transition:'all .1s' }}>
                    ${d}
                  </div>`;
                })}
              </div>
            </div>`;
          })}
        </div>
      </div>

      ${holidays.length > 0 && html`
        <div style=${{ maxHeight:180, overflowY:'auto' }}>
          <div style=${{ display:'flex', flexDirection:'column', gap:3 }}>
            ${holidays.map(h => html`
              <div key=${h.date} style=${{ display:'flex', alignItems:'center', gap:8, padding:'5px 10px', borderRadius:8, background:'#F9F9FB', border:'1px solid #E5E5EA' }}>
                <span style=${{ fontSize:11, fontWeight:700, color:'#5856D6', minWidth:80 }}>${fd(h.date)}</span>

      <div style=${{ display:'flex', gap:8, justifyContent:'flex-end', marginTop:4 }}>

        </button>
      </div>
    </div>`;
}

function AdminConvenio() {
  const [members, setMembers] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving,  setSaving]  = useState(null);
  const [globalDays, setGlobalDays] = useState(22);

  useEffect(() => {
    sbLoadTeamMembers().then(data => { setMembers(data||[]); setLoading(false); });
    sbLoadRoles().then(custom => {
      if (custom.length > 0) {
        setRoles(prev => [...new Set([...ROLES, ...custom, ...prev.filter(r=>!ROLES.includes(r))])]);
      }
    });
  }, []);

  const updateMember = async (m) => {
    setSaving(m.id);
    await sbSaveTeamMember(m);
    setMembers(prev=>prev.map(x=>x.id===m.id?m:x));
    setSaving(null);
  };

  const applyGlobal = async () => {
    for (const m of members) {
      const updated = {...m, annual_vac_days: globalDays};
      await sbSaveTeamMember(updated);
    }
    setMembers(prev=>prev.map(m=>({...m,annual_vac_days:globalDays})));
  };

  return html`
    <div>
      <div style=${{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16 }}>
        <div>
          <h3 style=${{ fontSize:16, fontWeight:700 }}>📋 Gestión de convenio</h3>
          <p style=${{ fontSize:12, color:'#86868B', marginTop:2 }}>Convenio Colectivo de Consultoría Informática — días de vacaciones por empleado</p>

      </div>

      <div style=${{ background:'#FFF', borderRadius:14, border:'1.5px solid #E5E5EA', padding:'16px', marginBottom:16 }}>
        <h4 style=${{ fontSize:13, fontWeight:700, marginBottom:4 }}>⚙️ Aplicar días globalmente</h4>
        <p style=${{ fontSize:11, color:'#86868B', marginBottom:12 }}>Establece los días anuales para todos los empleados a la vez</p>
        <div style=${{ display:'flex', gap:8, alignItems:'center' }}>
          <div style=${{ display:'flex', alignItems:'center', gap:6 }}>
            <input type="number" min="1" max="40" value=${globalDays} onInput=${e=>setGlobalDays(parseInt(e.target.value)||22)}
              style=${{ width:60, border:'1.5px solid #E5E5EA', borderRadius:8, padding:'7px 10px', fontSize:14, fontWeight:700, textAlign:'center', fontFamily:'inherit', outline:'none' }} />
            <span style=${{ fontSize:13, color:'#86868B' }}>días hábiles / año</span>
          </div>
          <button onClick=${applyGlobal} style=${{ padding:'8px 16px', borderRadius:9, border:'none', background:'#1D1D1F', color:'#FFF', fontSize:12, fontWeight:600, cursor:'pointer' }}>
            Aplicar a todos
          </button>
          <span style=${{ fontSize:11, color:'#86868B' }}>Estándar convenio: <strong>22 días</strong></span>

      </div>

      ${loading ? html`<div style=${{ textAlign:'center',padding:40,color:'#86868B' }}>⏳ Cargando…</div>` : html`
        <div style=${{ background:'#FFF', borderRadius:14, border:'1.5px solid #E5E5EA', overflow:'hidden' }}>
          <table style=${{ width:'100%', borderCollapse:'collapse' }}>
            <thead><tr style=${{ background:'#F9F9FB', borderBottom:'2px solid #E5E5EA' }}>
              <th style=${{ padding:'10px 14px', textAlign:'left', fontSize:11, fontWeight:700, color:'#86868B' }}>Empleado</th>
              <th style=${{ padding:'10px 12px', textAlign:'center', fontSize:11, fontWeight:700, color:'#86868B' }}>Días/año</th>
              <th style=${{ padding:'10px 12px', textAlign:'center', fontSize:11, fontWeight:700, color:'#86868B' }}>Pend. año ant.</th>
              <th style=${{ padding:'10px 12px', textAlign:'center', fontSize:11, fontWeight:700, color:'#86868B' }}>Total disp.</th>
              <th style=${{ padding:'10px 12px', textAlign:'center', fontSize:11, fontWeight:700, color:'#86868B' }}>Empresa</th>
            </tr></thead>
            <tbody>
              ${members.map((m,mi)=>{
                const annual = m.annual_vac_days ?? 22;
                const prev   = m.prev_year_pending ?? 0;
                const total  = annual + prev;
                return html`
                  <tr key=${m.id} style=${{ borderBottom:'1px solid #F2F2F7', background:mi%2===0?'#FFF':'#FAFAFA' }}>
                    <td style=${{ padding:'10px 14px' }}>
                      <div style=${{ display:'flex', alignItems:'center', gap:8 }}>

                        <div>

function AdminEscaladoGlobal({ rooms }) {
  const [members,   setMembers]   = useState([]);
  const [globalOrg, setGlobalOrg] = useState({});
  const [allRisks,  setAllRisks]  = useState([]);
  const [loading,   setLoading]   = useState(true);
  const [orgSaving, setOrgSaving] = useState(false);
  const [view,      setView]      = useState('riesgos');
  const [filterSala, setFilterSala] = useState('all');

  useEffect(() => {
    Promise.all([sbLoadTeamMembers(), sbLoadOrgChart('__global__'), sbLoadAllRetroRisks()]).then(([mbrs, chart, risks]) => {
      setMembers(mbrs||[]);
      const map = {};
      (chart||[]).forEach(n => { map[n.member_id] = n.manager_id||null; });
      setGlobalOrg(map);
      setAllRisks(risks||[]);
      setLoading(false);
    });
  }, []);

  const setGlobalManager = async (memberId, managerId) => {
    setOrgSaving(true);
    setGlobalOrg(prev=>({...prev,[memberId]:managerId||null}));
    await (async()=>{ const {data:_g}=await supabase.from('org_chart').select('id').eq('sala','__global__').eq('member_id',memberId).single(); if(_g?.id){await supabase.from('org_chart').update({manager_id:managerId||null}).eq('id',_g.id);}else{await supabase.from('org_chart').insert({sala:'__global__',member_id:memberId,manager_id:managerId||null});} })();
    setOrgSaving(false);
  };
  const addToOrg = async (memberId) => {
    if (Object.keys(globalOrg).includes(memberId)) return;
    setGlobalOrg(prev=>({...prev,[memberId]:null}));
    await (async()=>{ const {data:_g2}=await supabase.from('org_chart').select('id').eq('sala','__global__').eq('member_id',memberId).single(); if(_g2?.id){await supabase.from('org_chart').update({manager_id:null}).eq('id',_g2.id);}else{await supabase.from('org_chart').insert({sala:'__global__',member_id:memberId,manager_id:null});} })();
  };

  const LEVELS = [
    {id:'equipo',label:'Equipo',          color:'#34C759'},
    {id:'jp',    label:'Jefe Proyecto',   color:'#FF9500'},
    {id:'sm',    label:'Service Manager', color:'#FF3B30'},
    {id:'dt',    label:'Dir. Técnica',    color:'#5856D6'},
  ];
  const escalatedRisksAll = allRisks.flatMap(({sala,risks})=>
    (risks||[]).filter(r=>r.escalation).map(r=>({...r,_sala:sala,_salaName:rooms.find(x=>x.slug===sala)?.name||sala}))
  );
  const escalatedRisks = filterSala==='all'?escalatedRisksAll:escalatedRisksAll.filter(r=>r._sala===filterSala);
  const byLevel = (lid) => escalatedRisks.filter(r=>r.escalation?.level===lid);
  const orgMembers = members.filter(m=>Object.keys(globalOrg).includes(m.id));
  const roots = orgMembers.filter(m=>(globalOrg[m.id]||null)===null);

  const getRoleColor = (role) => {
    if(!role) return '#86868B';
    const r2=role.toLowerCase();
    if(r2.includes('pm2')||r2.includes('technical unit')||r2.includes('dirección')) return '#5856D6';
    if(r2.includes('senior')) return '#FF2D55';
    if(r2.includes('service manager')) return '#FF3B30';
    if(r2.includes('project manager')) return '#007AFF';
    return '#86868B';
  };

  function OrgNodeG({m, depth}) {
    const children = orgMembers.filter(x=>(globalOrg[x.id]||null)===m.id);
    const c = getRoleColor(m.role_label);
    return html`
      <div style=${{display:'flex',flexDirection:'column',alignItems:'center'}}>
        ${depth>0&&html`<div style=${{width:2,height:20,background:'#E5E5EA'}}></div>`}
        <div style=${{background:'#FFF',borderRadius:14,border:'2px solid '+(depth===0?'#1D1D1F':'#E5E5EA'),
          padding:'12px 14px',minWidth:120,textAlign:'center',
          boxShadow:depth===0?'0 4px 16px rgba(0,0,0,.08)':'0 2px 8px rgba(0,0,0,.04)'}}>
          <div style=${{width:40,height:40,borderRadius:12,background:m.color||'#E5E5EA',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22,margin:'0 auto 6px'}}>${m.avatar||'👤'}</div>
          <div style=${{fontSize:12,fontWeight:700,marginBottom:3}}>${m.name}</div>
          ${m.role_label&&html`<span style=${{fontSize:9,color:'#FFF',background:c,padding:'2px 7px',borderRadius:7,display:'inline-block',fontWeight:700}}>${m.role_label}</span>`}
        </div>
        ${children.length>0&&html`
          <div><div style=${{width:2,height:20,background:'#E5E5EA',margin:'0 auto'}}></div>
          <div style=${{display:'flex',gap:16,justifyContent:'center'}}>
            ${children.map(c2=>html`<${OrgNodeG} key=${c2.id} m=${c2} depth=${depth+1} />`)}
          </div></div>`}
      </div>`;
  }

  return html`
    <div>

      <${EscalThresholdsWidget} />

      <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
        <div>
          <h3 style=${{fontSize:16,fontWeight:700}}>📈 Escalado Global</h3>
          <p style=${{fontSize:12,color:'#86868B',marginTop:2}}>${escalatedRisks.length} riesgo${escalatedRisks.length!==1?'s':''} en ${rooms.length} proyectos</p>
        </div>
        <div style=${{display:'flex',gap:8,alignItems:'center'}}>
          <select value=${filterSala} onChange=${e=>setFilterSala(e.target.value)}
            style=${{border:'1.5px solid #E5E5EA',borderRadius:9,padding:'7px 10px',fontSize:12,fontFamily:'inherit',outline:'none',background:'#FFF'}}>
            <option value="all">Todos los proyectos</option>
            ${rooms.map(r=>html`<option key=${r.slug} value=${r.slug}>${r.name||r.slug}</option>`)}
          </select>
          <div style=${{display:'flex',gap:0,borderRadius:10,overflow:'hidden',border:'1.5px solid #E5E5EA'}}>
          ${[['riesgos','Riesgos'],['organigrama','Organigrama']].map(([vid,vl])=>html`
            <button key=${vid} onClick=${()=>setView(vid)}
              style=${{padding:'7px 16px',fontSize:12,fontWeight:view===vid?700:500,
                background:view===vid?'#1D1D1F':'#FFF',color:view===vid?'#FFF':'#6E6E73',
                border:'none',cursor:'pointer'}}>${vl}</button>`)}
        </div>
        </div>
      </div>

      ${loading?html`<div style=${{textAlign:'center',padding:40,color:'#86868B'}}>⏳ Cargando…</div>`:html`

        ${view==='riesgos'&&html`<div>
          <div style=${{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:8,marginBottom:16}}>
            ${LEVELS.map(l=>html`
              <div style=${{background:'#FFF',borderRadius:12,border:'1.5px solid #E5E5EA',padding:'12px 10px',textAlign:'center',borderTop:'3px solid '+l.color}}>
                <div style=${{fontSize:24,fontWeight:800,color:l.color}}>${byLevel(l.id).length||'—'}</div>
                <div style=${{fontSize:11,fontWeight:700,marginTop:2}}>${l.label}</div>
              </div>`)}
          </div>
          ${escalatedRisks.length===0?html`<div style=${{textAlign:'center',padding:'48px 20px',color:'#C7C7CC',border:'2px dashed #E5E5EA',borderRadius:16}}><p style=${{fontSize:36,marginBottom:8}}>✅</p><p>Sin riesgos escalados</p></div>`:
            LEVELS.map(l=>{
              const items=byLevel(l.id); if(!items.length) return null;
              return html`
                <div key=${l.id} style=${{marginBottom:14}}>
                  <div style=${{display:'flex',alignItems:'center',gap:8,marginBottom:8,paddingBottom:6,borderBottom:'2px solid '+l.color+'30'}}>
                    <div style=${{width:10,height:10,borderRadius:5,background:l.color}}></div>
                    <span style=${{fontSize:13,fontWeight:700,color:l.color}}>${l.label}</span>
                    <span style=${{fontSize:11,color:'#86868B'}}>${items.length} riesgo${items.length>1?'s':''}</span>
                  </div>
                  <div style=${{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:8}}>
                    ${items.map(r=>{
                      const st=r.escalation?.status||'pendiente';
                      const stC=st==='resuelto'?'#34C759':st==='en_curso'?'#007AFF':st==='bloqueado'?'#FF3B30':'#FF9500';
                      return html`
                        <div style=${{background:'#FFF',borderRadius:12,border:'1.5px solid #E5E5EA',borderLeft:'4px solid '+l.color,padding:'12px 14px'}}>
                          <p style=${{fontSize:12,fontWeight:600,lineHeight:1.3,marginBottom:4}}>${r.text}</p>
                          <div style=${{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center',marginBottom:3}}>
                            <span style=${{fontSize:9,background:'#F2F2F7',color:'#86868B',padding:'2px 7px',borderRadius:6}}>📂 ${r._salaName}</span>
                            ${r.owner&&html`<span style=${{fontSize:9,color:'#007AFF'}}>👤 ${r.owner}</span>`}
                            <span style=${{fontSize:9,fontWeight:700,color:stC,background:stC+'15',padding:'2px 7px',borderRadius:6}}>${st}</span>
                          </div>
                          ${r.escalation?.deadline&&html`<div style=${{fontSize:9,color:'#86868B'}}>📅 ${fd(r.escalation.deadline)}</div>`}

            })}
        </div>`}

        ${view==='organigrama'&&html`<div>
          <div style=${{background:'#FFF',borderRadius:14,border:'1.5px solid #E5E5EA',padding:'16px',marginBottom:16}}>
            <div style=${{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
              <div>
                <h4 style=${{fontSize:13,fontWeight:700}}>Jerarquía global de gestión</h4>
                <p style=${{fontSize:11,color:'#86868B',marginTop:2}}>SM → SM Senior → PM2 / Technical Unit Manager</p>
              </div>
              ${orgSaving&&html`<span style=${{fontSize:11,color:'#007AFF'}}>💾 Guardando…</span>`}
            </div>
            <div style=${{display:'flex',flexDirection:'column',gap:6,marginBottom:12}}>
              ${orgMembers.map(m=>html`
                <div key=${m.id} style=${{display:'flex',alignItems:'center',gap:10,padding:'8px 10px',borderRadius:10,background:'#F9F9FB'}}>
                  <div style=${{width:30,height:30,borderRadius:8,background:m.color||'#E5E5EA',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>${m.avatar||'👤'}</div>
                  <div style=${{flex:1}}><span style=${{fontSize:12,fontWeight:600}}>${m.name}</span>${m.role_label&&html`<span style=${{fontSize:9,color:'#86868B',marginLeft:6}}>${m.role_label}</span>`}</div>
                  <span style=${{fontSize:11,color:'#86868B'}}>Reporta a:</span>
                  <select value=${globalOrg[m.id]||''} onChange=${e=>setGlobalManager(m.id,e.target.value||null)}
                    style=${{border:'1.5px solid #E5E5EA',borderRadius:8,padding:'5px 8px',fontSize:11,fontFamily:'inherit',outline:'none',background:'#FFF',maxWidth:200}}>
                    <option value="">— Nadie (raíz) —</option>
                    ${members.filter(x=>x.id!==m.id).map(x=>html`<option key=${x.id} value=${x.id}>${x.name}${x.role_label?' ('+x.role_label+')':''}</option>`)}
                  </select>
                </div>`)}
            </div>
            <div>
              <p style=${{fontSize:10,color:'#86868B',marginBottom:6,fontWeight:600}}>Añadir al organigrama:</p>
              <div style=${{display:'flex',flexWrap:'wrap',gap:4}}>
                ${members.filter(m=>!Object.keys(globalOrg).includes(m.id)).map(m=>html`
                  <button key=${m.id} onClick=${()=>addToOrg(m.id)}

                  </button>`)}
              </div>
            </div>
          </div>
          ${roots.length===0?html`<div style=${{textAlign:'center',padding:32,color:'#C7C7CC',border:'2px dashed #E5E5EA',borderRadius:14}}><p style=${{fontSize:28,marginBottom:8}}>🏢</p><p>Añade personas arriba</p></div>`:

        </div>`}
      `}
    </div>`;
}
