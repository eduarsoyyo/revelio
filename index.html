/* ═══ REALTIME STATE ═══ */
function useRealtime(user, tipoParam) {
  const resolvedTipo = tipoParam || TIPO_URL;
  const tipoInfo = TASK_TEMPLATES[resolvedTipo] || TASK_TEMPLATES.agile;
  const defaultTasks = tipoInfo.tasks.map(t => ({ id: uid(), text: t, done: false }));
  const [state, setState] = useState({ notes:[], tasks:defaultTasks, actions:[], obj:{text:'',met:null}, risks:loadRisks() });
  const [online, setOnline] = useState({});
  const [cursors, setCursors] = useState({});
  const chRef = useRef(null);
  const stRef = useRef(state);
  const cursRef = useRef({});
  stRef.current = state;

  useEffect(() => {
    if (!user) return;
    const ch = supabase.channel('retro-' + SALA, { config:{ presence:{ key:user.id } } });

    // Presence: only for online users
    ch.on('presence', { event:'sync' }, () => {
      const ps = ch.presenceState();
      const u = {};
      Object.entries(ps).forEach(([k, arr]) => {
        if (arr.length > 0) {
          u[k] = { name:arr[0].name, avatar:arr[0].avatar, color:arr[0].color };
        }
      });
      setOnline(u);
    });

    // Broadcast: cursor positions (fast, no rate limit)
    ch.on('broadcast', { event:'cursor' }, ({ payload }) => {
      if (payload.id === user.id) return;
      cursRef.current = { ...cursRef.current, [payload.id]: { x:payload.x, y:payload.y, name:payload.name, avatar:payload.avatar, color:payload.color, ts:Date.now() } };
      setCursors({ ...cursRef.current });
    });

    // Broadcast: state sync
    ch.on('broadcast', { event:'sync' }, ({ payload }) => {
      if (payload.from === user.id) return;
      setState(prev => ({ ...prev, [payload.key]: payload.data }));
    });

    // Broadcast: timer sync
    ch.on('broadcast', { event:'timer' }, ({ payload }) => {
      if (payload.from === user.id) return;
      if (typeof payload.seconds === 'number') _timerSync && _timerSync(payload.seconds, payload.running);
    });

    ch.on('broadcast', { event:'req' }, ({ payload }) => {
      if (payload.from === user.id) return;
      const s = stRef.current;
      Object.keys(s).forEach(k => {
        ch.send({ type:'broadcast', event:'sync', payload:{ key:k, data:s[k], from:user.id } });
      });
    });

    ch.subscribe(async (status) => {
      if (status === 'SUBSCRIBED') {
        await ch.track({ name:user.name, avatar:user.avatar, color:user.color });
        setTimeout(() => ch.send({ type:'broadcast', event:'req', payload:{ from:user.id } }), 600);
      }
    });

    // Clean stale cursors every 3s
    const cleanIv = setInterval(() => {
      const now = Date.now();
      let changed = false;
      const c = { ...cursRef.current };
      Object.keys(c).forEach(k => { if (now - c[k].ts > 5000) { delete c[k]; changed = true; } });
      if (changed) { cursRef.current = c; setCursors(c); }
    }, 3000);

    chRef.current = ch;
    return () => { supabase.removeChannel(ch); clearInterval(cleanIv); };
  }, [user]);

  const upd = useCallback((key, data) => {
    setState(prev => ({ ...prev, [key]:data }));
    if (chRef.current && user) chRef.current.send({ type:'broadcast', event:'sync', payload:{ key, data, from:user.id } });
  }, [user]);

  const moveCursor = useCallback((x, y) => {
    if (chRef.current && user) {
      chRef.current.send({ type:'broadcast', event:'cursor', payload:{ id:user.id, x, y, name:user.name, avatar:user.avatar, color:user.color } });
    }
  }, [user]);

  const reset = useCallback(() => {
    const currentRisks = stRef.current.risks || [];
    const openActions = (stRef.current.actions || []).filter(a => a.status !== 'done' && a.status !== 'discarded');
    const fresh = { notes:[], tasks:defaultTasks.map(t=>({...t,id:uid()})), actions:openActions, obj:{text:'',met:null}, risks:currentRisks };
    setState(fresh);
    if (chRef.current && user) {
      Object.keys(fresh).forEach(k => {
        chRef.current.send({ type:'broadcast', event:'sync', payload:{ key:k, data:fresh[k], from:user.id } });
      });
    }
  }, [user]);

  const broadcastTimer = useCallback((seconds, running) => {
    if (chRef.current && user) {
      chRef.current.send({ type:'broadcast', event:'timer', payload:{ seconds, running, from:user.id } });
    }
  }, [user]);

  return { state, upd, online, cursors, moveCursor, reset, broadcastTimer };
}

  const handleJoin   = (u) => { saveUser(u); registerUser(u); setUser(u); };
  const handleLogout = () => { clearUser(); setUser(null); };

  // No sala → admin sees picker, others see landing
  if (!params.has('sala')) {
    if (IS_ADMIN) return html`<${RoomPicker} />`;
    return html`<${NeedLink} />`;
  }

  // Check sala exists in Supabase AND get its tipo (runs once on mount)
  useEffect(() => {
    sbLoadRooms().then(rooms => {
      if (!rooms) { setSalaValid(true); return; }
      const room = rooms.find(r => r.slug === SALA);
      if (!room) { setSalaValid(false); return; }
      setSalaValid(true);
      // Override tipo with Supabase value
      if (room.tipo && TASK_TEMPLATES[room.tipo]) setRoomTipo(room.tipo);
    });
  }, []);

  if (salaValid === null) return html`
    <div style=${{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'#F5F5F7' }}>
      <div style=${{ textAlign:'center', color:'#86868B' }}>

        <p style=${{ fontSize:14 }}>Verificando sala…</p>
      </div>
    </div>`;

  if (salaValid === false) return html`
    <div style=${{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center', background:'#F5F5F7' }}>
      <div style=${{ background:'#FFF', borderRadius:24, padding:'44px 40px', maxWidth:420, width:'90%', textAlign:'center', boxShadow:'0 8px 40px rgba(0,0,0,0.08)' }}>
        <div style=${{ fontSize:52, marginBottom:12 }}>🚫</div>

          La sala <code style=${{ background:'#F2F2F7', padding:'2px 8px', borderRadius:5, fontSize:13 }}>${SALA}</code> no existe o no está registrada.
        </p>
        <p style=${{ fontSize:13, color:'#C7C7CC', marginBottom:24 }}>Pide a tu Scrum Master el enlace correcto.</p>
        <a href="/" style=${{ display:'inline-block', padding:'11px 24px', background:'linear-gradient(135deg,#007AFF,#5856D6)', color:'#FFF', borderRadius:12, fontSize:14, fontWeight:600, textDecoration:'none' }}>← Volver al inicio</a>
      </div>
    </div>`;

  if (!user) return html`<${Login} onJoin=${handleJoin} />`;
  return html`<${RetroBoard} user=${user} onLogout=${handleLogout} roomTipo=${roomTipo} />`;
}

const DEFAULT_ROOMS = [
  { name: 'VWFS - Impulso Fleet', slug: 'vwfs', tipo: 'agile' },
  { name: 'Endesa - Billing Boost', slug: 'endesa', tipo: 'waterfall' },
  { name: 'ADA - OTDP', slug: 'ada', tipo: 'itil' },
];

function loadRooms() {
  try { const s = localStorage.getItem('rf-rooms'); return s ? JSON.parse(s) : DEFAULT_ROOMS; } catch { return DEFAULT_ROOMS; }
}
function saveRooms(rooms) {
  try { localStorage.setItem('rf-rooms', JSON.stringify(rooms)); } catch {}
}
function loadMetrics() {
  try { return JSON.parse(localStorage.getItem('rf-metrics') || '{}'); } catch { return {}; }
}
function saveMetricEntry(sala, entry) {
  try {
    const m = loadMetrics();
    if (!m[sala]) m[sala] = [];
    m[sala].push(entry);
    localStorage.setItem('rf-metrics', JSON.stringify(m));
  } catch {}
}

// ── User identity: persist per sala so you don't duplicate ──
function loadUser() {
  try { const s = localStorage.getItem('rf-user-' + SALA); return s ? JSON.parse(s) : null; } catch { return null; }
}
function saveUser(user) {
  try { localStorage.setItem('rf-user-' + SALA, JSON.stringify(user)); } catch {}
}
function clearUser() {
  try { localStorage.removeItem('rf-user-' + SALA); } catch {}
}

// ── User registry per sala (for admin visibility + duplicate prevention) ──
function loadUserRegistry(sala) {
  try { const s = localStorage.getItem('rf-reg-' + (sala || SALA)); return s ? JSON.parse(s) : []; } catch { return []; }
}
function registerUser(user) {
  try {
    const reg = loadUserRegistry();
    const existing = reg.findIndex(u => u.id === user.id);
    if (existing >= 0) reg[existing] = { ...reg[existing], name: user.name, avatar: user.avatar, color: user.color, lastSeen: new Date().toISOString() };
    else reg.push({ id: user.id, name: user.name, avatar: user.avatar, color: user.color, firstSeen: new Date().toISOString(), lastSeen: new Date().toISOString() });
    localStorage.setItem('rf-reg-' + SALA, JSON.stringify(reg));
  } catch {}
}
function isNameTaken(name) {
  const reg = loadUserRegistry();
  const saved = loadUser();
  return reg.some(u => u.name.toLowerCase() === name.toLowerCase() && (!saved || u.id !== saved.id));
}

// ── Risk persistence per sala (survives across retros) ──
function loadRisks() {
  try { const s = localStorage.getItem('rf-risks-' + SALA); return s ? JSON.parse(s) : []; } catch { return []; }
}
function saveRisks(risks) {
  try { localStorage.setItem('rf-risks-' + SALA, JSON.stringify(risks)); } catch {}
}

const RISK_LEVELS = [
  { id: 'alto', label: 'Alto', color: '#FF3B30', val: 3 },
  { id: 'medio', label: 'Medio', color: '#FF9500', val: 2 },
  { id: 'bajo', label: 'Bajo', color: '#34C759', val: 1 },
];
const RISK_STATUS = [
  { id: 'open', label: 'Abierto', color: '#FF3B30' },
  { id: 'mitigating', label: 'Mitigando', color: '#FF9500' },
  { id: 'mitigated', label: 'Mitigado', color: '#34C759' },
  { id: 'accepted', label: 'Aceptado', color: '#8E8E93' },
];

function getRiskLevel(votes) {
  if (!votes || Object.keys(votes).length === 0) return RISK_LEVELS[1];
  const counts = { alto: 0, medio: 0, bajo: 0 };
  Object.values(votes).forEach(v => { if (counts[v] !== undefined) counts[v]++; });
  const max = Math.max(counts.alto, counts.medio, counts.bajo);
  if (counts.alto === max) return RISK_LEVELS[0];
  if (counts.medio === max) return RISK_LEVELS[1];
  return RISK_LEVELS[2];
}

function getHeatColor(impLvl, probLvl) {
  const score = impLvl.val * probLvl.val;
  if (score >= 6) return '#FF3B30';
  if (score >= 3) return '#FF9500';
  return '#34C759';
}

  const [authState,  setAuthState]  = useState('checking'); // checking | signed-in | signed-out

  const [email,      setEmail]      = useState('');
  const [password,   setPassword]   = useState('');
  const [authError,  setAuthError]  = useState('');
  const [authLoading,setAuthLoading]= useState(false);

  // Check existing session on mount
  useEffect(() => {
    sbGetSession().then(session => {
      if (session) { setAuthUser(session.user); setAuthState('signed-in'); }
      else          { setAuthState('signed-out'); }
    });
    // Listen for auth changes (e.g. token refresh, sign out from another tab)
    const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
      if (session) { setAuthUser(session.user); setAuthState('signed-in'); }
      else          { setAuthUser(null); setAuthState('signed-out'); }
    });
    return () => subscription.unsubscribe();
  }, []);

  const handleSignIn = async () => {
    if (!email.trim() || !password.trim()) return;
    setAuthLoading(true); setAuthError('');
    const { session, error } = await sbSignIn(email.trim(), password.trim());
    setAuthLoading(false);
    if (error || !session) {
      setAuthError(error?.message === 'Invalid login credentials'
        ? '❌ Email o contraseña incorrectos'
        : '❌ ' + (error?.message || 'Error de conexión'));
    } else {
      setAuthUser(session.user); setAuthState('signed-in');
    }
  };

  const handleSignOut = async () => {

  };

/* ═══ LOGIN ═══ */
function Login({ onJoin }) {
  const [nm, setNm] = useState('');
  const [av, setAv] = useState(AVATARS[Math.floor(Math.random()*12)]);
  const [col, setCol] = useState(COLRS[Math.floor(Math.random()*8)]);
  const [warn, setWarn] = useState(null);

  const handleName = (val) => { setNm(val); setWarn(null); };

  const go = () => {
    if (!nm.trim()) return;
    const taken = isNameTaken(nm.trim());
    if (taken && !warn) {
      setWarn(nm.trim());
      return;
    }
    onJoin({ id: uid(), name: nm.trim(), avatar: av, color: col });
  };

  const recoverIdentity = () => {
    const reg = loadUserRegistry();
    const found = reg.find(u => u.name.toLowerCase() === nm.trim().toLowerCase());
    if (found) onJoin({ id: found.id, name: found.name, avatar: found.avatar, color: found.color });
  };

  return html`
    <div style=${{ minHeight:'100vh', display:'flex', alignItems:'center', justifyContent:'center' }}>
      <div style=${{ ...gl, borderRadius:28, padding:'44px 38px', maxWidth:420, width:'100%', boxShadow:'0 8px 60px rgba(0,0,0,0.06)' }}>
        <div style=${{ textAlign:'center', marginBottom:28 }}>
          <h1 class="wm" style=${{ fontSize:30, marginBottom:3 }}>revelio</h1>
          <p style=${{ color:'#86868B', fontSize:14 }}>Sala: <strong style=${{ color:'#007AFF' }}>${SALA_DISPLAY}</strong></p>
        </div>
        <input value=${nm} onInput=${e=>handleName(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&go()}
          placeholder="¿Cómo te llamas, mago?" style=${{ ...iS, marginBottom: warn ? 8 : 18, textAlign:'center', fontSize:16, background:'#FFF', borderColor: warn ? '#FF9500' : '#E5E5EA' }} />
        ${warn && html`
          <div style=${{ background:'#FFF8EB', border:'1.5px solid #FF950030', borderRadius:10, padding:'10px 14px', marginBottom:14 }}>
            <p style=${{ fontSize:12, color:'#FF9500', fontWeight:600, marginBottom:6 }}>⚠️ "${warn}" ya existe en esta sala</p>
            <div style=${{ display:'flex', gap:6 }}>
              <button onClick=${recoverIdentity} style=${{ ...bP, padding:'7px 14px', fontSize:11, background:'#007AFF', flex:1 }}>Soy yo, recuperar</button>
              <button onClick=${()=>{setWarn(null);go()}} style=${{ ...bS, padding:'7px 14px', fontSize:11, flex:1 }}>Entrar como nuevo</button>
            </div>
          </div>
        `}
        <p style=${{ fontSize:11, color:'#86868B', marginBottom:6, fontWeight:600, textTransform:'uppercase' }}>Tu patronus</p>
        <div style=${{ display:'flex', flexWrap:'wrap', gap:5, marginBottom:14 }}>
          ${AVATARS.map(a => html`<button key=${a} onClick=${()=>setAv(a)} style=${{ width:40, height:40, borderRadius:11, border:av===a?'2.5px solid '+col:'2px solid #E5E5EA', background:av===a?col+'10':'#FFF', fontSize:19, display:'flex', alignItems:'center', justifyContent:'center' }}>${a}</button>`)}
        </div>
        <p style=${{ fontSize:11, color:'#86868B', marginBottom:6, fontWeight:600, textTransform:'uppercase' }}>Casa</p>
        <div style=${{ display:'flex', gap:5, marginBottom:24 }}>
          ${COLRS.map(c => html`<button key=${c} onClick=${()=>setCol(c)} style=${{ width:28, height:28, borderRadius:14, background:c, border:col===c?'3px solid #1D1D1F':'3px solid transparent', transform:col===c?'scale(1.15)':'scale(1)', transition:'all .15s' }} />`)}
        </div>
        <button onClick=${go} style=${{ ...bP, width:'100%', padding:14, fontSize:16 }}>🪄 Revelio!</button>
      </div>
    </div>
  `;
}

/* ═══ RETRO BOARD ═══ */
function RetroBoard({ user, onLogout, roomTipo }) {
  const tipoResolved = roomTipo || TIPO_URL;
  const TIPO_INFO = TASK_TEMPLATES[tipoResolved] || TASK_TEMPLATES.agile;
  const { state, upd, online, cursors, moveCursor, reset, broadcastTimer } = useRealtime(user, tipoResolved);
  const [phase, setPhase] = useState(0);
  const [timer, setTimer] = useState(900);
  const [running, setRunning] = useState(false);

  // Register timer sync receiver
  useEffect(() => {
    window._timerSync = (secs, run) => { setTimer(secs); setRunning(run); };
    return () => { window._timerSync = null; };
  }, []);

  const syncTimer = (secs, run) => { setTimer(secs); setRunning(run); broadcastTimer(secs, run); };
  const [showReset, setShowReset] = useState(false);
  const [showGuide, setShowGuide] = useState(false);
  const [showHistorial, setShowHistorial] = useState(false);
  const [toast, setToast] = useState(null);
  const tRef = useRef(null);
  const bRef = useRef(null);

  const SAVE_QUOTES = [
    '✨ Mischief managed! Retro guardada.',
    '🪄 Accio backup! Archivo descargado.',
    '🧙 Dumbledore estaría orgulloso. Guardado.',
    '⚡ Más rápido que un Nimbus 2000. Listo.',
    '🦉 Una lechuza lleva tu retro a buen puerto.',
    '🔮 El Pensadero ha registrado esta sesión.',
  ];
  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

  useEffect(() => {
    if (!running) return;
    tRef.current = setInterval(() => setTimer(p => { if(p<=0){setRunning(false);return 0} return p-1 }), 1000);
    return () => clearInterval(tRef.current);
  }, [running]);

  useEffect(() => {
    if (!bRef.current) return;
    let last = 0;
    const h = e => {
      if (Date.now()-last<400) return; last=Date.now();
      const r = bRef.current.getBoundingClientRect();
      const x = ((e.clientX-r.left)/r.width)*100, y = ((e.clientY-r.top)/r.height)*100;
      if (x>=0&&x<=100&&y>=0&&y<=100) moveCursor(x,y);
    };
    const el = bRef.current;
    el.addEventListener('mousemove',h);
    return () => el.removeEventListener('mousemove',h);

function Board({ notes, sN, user, filter }) {
  const [act, setAct] = useState(null);
  const [txt, setTxt] = useState('');
  const [eId, setEId] = useState(null);
  const [eVal, setEVal] = useState('');
  const [dragId, setDragId] = useState(null);
  const [overCat, setOverCat] = useState(null);
  const [touchDrag, setTouchDrag] = useState(null); // {id, startX, startY, curX, curY}
  const touchRef = useRef(null);

  const addN = c => { if(!txt.trim())return; sN([...notes,{id:uid(),text:txt.trim(),category:c,userId:user.id,userName:user.name,userAvatar:user.avatar,userColor:user.color,voters:[],reactions:{}}]); setTxt(''); setAct(null); };
  const vote = nid => sN(notes.map(n=>{if(n.id!==nid)return n;const v=n.voters||[];return{...n,voters:v.includes(user.id)?v.filter(x=>x!==user.id):[...v,user.id]}}));
  const react = (nid, emoji) => sN(notes.map(n=>{if(n.id!==nid)return n;const r={...(n.reactions||{})};if(!r[emoji])r[emoji]=[];r[emoji]=r[emoji].includes(user.id)?r[emoji].filter(x=>x!==user.id):[...r[emoji],user.id];if(r[emoji].length===0)delete r[emoji];return{...n,reactions:r}}));
  const delN = nid => sN(notes.filter(n=>n.id!==nid));
  const saveE = () => { if(!eVal.trim())delN(eId); else sN(notes.map(n=>n.id===eId?{...n,text:eVal.trim()}:n)); setEId(null); };
  const drop = (e,c) => { e.preventDefault(); setOverCat(null); if(dragId)sN(notes.map(n=>n.id===dragId?{...n,category:c}:n)); setDragId(null); };

  // ── Touch drag & drop ──
  const onTouchStart = (e, noteId) => {
    const t = e.touches[0];
    touchRef.current = { id:noteId, startX:t.clientX, startY:t.clientY };
    setTouchDrag({ id:noteId, x:t.clientX, y:t.clientY });
  };
  const onTouchMove = (e) => {
    if (!touchRef.current) return;
    e.preventDefault();
    const t = e.touches[0];
    setTouchDrag(prev => prev ? {...prev, x:t.clientX, y:t.clientY} : null);
    // highlight target column
    const el = document.elementFromPoint(t.clientX, t.clientY);
    const col = el?.closest('[data-catid]');
    setOverCat(col ? col.getAttribute('data-catid') : null);
  };
  const onTouchEnd = (e) => {
    if (!touchRef.current) return;
    const t = e.changedTouches[0];
    const el = document.elementFromPoint(t.clientX, t.clientY);

      sN(notes.map(n => n.id===touchRef.current.id ? {...n, category:catId} : n));

    touchRef.current = null;
    setTouchDrag(null);
    setOverCat(null);
  };

  let fil = notes;

                    ${eId===note.id
                      ? html`<div>
                          <textarea autofocus value=${eVal} onInput=${e=>setEVal(e.target.value)} onKeyDown=${e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();saveE()}if(e.key==='Escape')setEId(null)}} style=${{ ...iS, height:48, resize:'none', fontSize:12, padding:'8px 10px' }} />

            ${act===cat.id

            <select value=${form.priority} onChange=${e=>setForm({...form,priority:e.target.value})} style=${{ ...iS, width:100, flex:'none' }}>${PRIS.map(p=>html`<option key=${p.id} value=${p.id}>${p.icon} ${p.label}</option>`)}</select>
            <button onClick=${()=>addA(null)} style=${bP}>+ Añadir</button>

          <div style=${{ display:'flex', flexDirection:'column', gap:7 }}>
            ${[...actions].filter(a => actFilter==='mine' ? a.createdBy===user.id : actFilter==='done' ? a.status==='done' : true).sort((a,b)=>(priO[b.priority]||0)-(priO[a.priority]||0)).map(a=>{
              const pr=PRIS.find(p=>p.id===a.priority)||PRIS[1]; const st=STS.find(s=>s.id===a.status); const ct=a.fromCategory?CATS.find(c=>c.id===a.fromCategory):null;
              if(eId===a.id) return html`
                <div key=${a.id} style=${{ padding:'14px 16px', borderRadius:13, background:'#F9F9FB', border:'2px solid #007AFF30', animation:'fadeIn .2s' }}>

                    <select value=${eF.priority} onChange=${e=>setEF({...eF,priority:e.target.value})} style=${{ ...iS, width:90, flex:'none', fontSize:13 }}>${PRIS.map(p=>html`<option key=${p.id} value=${p.id}>${p.icon} ${p.label}</option>`)}</select>
                  </div>
                  <div style=${{ display:'flex', gap:6 }}><button onClick=${saveEA} style=${{ ...bP, padding:'8px 16px', fontSize:12 }}>Guardar</button><button onClick=${()=>setEId(null)} style=${{ ...bS, padding:'8px 14px', fontSize:12 }}>Cancelar</button></div>
                </div>`;
              return html`

/* ═══ PHASE 5: RISKS ═══ */
function P5Risks({ risks, sR, notes, user }) {
  const [form, setForm] = useState({ text:'', mitigation:'', owner:'' });
  const [eId, setEId] = useState(null);
  const [eF, setEF] = useState({});
  const [riskFilter, setRiskFilter] = useState('all');

  const badStopNotes = notes.filter(n => n.category === 'bad' || n.category === 'stop').sort((a,b) => (b.voters?.length||0) - (a.voters?.length||0));

  const addRisk = (fromNote) => {
    const text = fromNote ? fromNote.text : form.text;
    if (!text.trim()) return;
    sR([...risks, { id:uid(), text:text.trim(), mitigation:form.mitigation||'', owner:form.owner||'Sin asignar', status:'open', impactVotes:{}, probVotes:{}, fromNote:fromNote?.id||null, createdBy:user.id }]);
    if (!fromNote) setForm({ text:'', mitigation:'', owner:'' });
  };

  const toggleFromNote = (note) => {
    const ex = risks.find(r => r.fromNote === note.id);
    if (ex) sR(risks.filter(r => r.fromNote !== note.id));
    else addRisk(note);
  };

  const voteImpact = (riskId, level) => {
    sR(risks.map(r => {
      if (r.id !== riskId) return r;
      const v = { ...(r.impactVotes||{}) };
      v[user.id] = v[user.id] === level ? undefined : level;
      if (!v[user.id]) delete v[user.id];
      return { ...r, impactVotes: v };
    }));
  };

  const voteProb = (riskId, level) => {
    sR(risks.map(r => {
      if (r.id !== riskId) return r;
      const v = { ...(r.probVotes||{}) };
      v[user.id] = v[user.id] === level ? undefined : level;
      if (!v[user.id]) delete v[user.id];
      return { ...r, probVotes: v };
    }));
  };

  const updateStatus = (id, st) => sR(risks.map(r => r.id===id ? {...r, status:st} : r));
  const delRisk = (id) => sR(risks.filter(r => r.id !== id));
  const saveEdit = () => { sR(risks.map(r => r.id===eId ? {...r,...eF} : r)); setEId(null); };

  const allOpen = risks.filter(r => r.status !== 'mitigated');
  const allMitigated = risks.filter(r => r.status === 'mitigated');
  const openRisks = riskFilter === 'mine' ? allOpen.filter(r => r.createdBy === user.id) : allOpen;
  const mitigatedRisks = riskFilter === 'mine' ? allMitigated.filter(r => r.createdBy === user.id) : allMitigated;

  // Heat map data
  const heatData = openRisks.map(r => ({
    ...r,
    impLvl: getRiskLevel(r.impactVotes),
    probLvl: getRiskLevel(r.probVotes),
  }));

  return html`
    <div style=${{ maxWidth:1100, margin:'0 auto' }}>
      <!-- Heat map full width -->
      <div style=${{ ...cS, padding:'22px', marginBottom:14 }}>
        <h3 style=${{ fontSize:16, fontWeight:700, marginBottom:14 }}>⚠️ Mapa de calor de riesgos</h3>
        <div style=${{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:20, alignItems:'start' }}>
          <div style=${{ position:'relative', paddingLeft:40 }}>
            <div style=${{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:3 }}>
              ${['alto','medio','bajo'].map(prob =>
                ['bajo','medio','alto'].map(imp => {
                  const probLvl = RISK_LEVELS.find(l=>l.id===prob);
                  const impLvl = RISK_LEVELS.find(l=>l.id===imp);
                  const color = getHeatColor(impLvl, probLvl);
                  const inCell = heatData.filter(r => r.impLvl.id===imp && r.probLvl.id===prob);
                  return html`
                    <div key=${prob+imp} style=${{ background:color+'20', border:'1.5px solid '+color+'30', borderRadius:10, padding:10, minHeight:90, display:'flex', flexWrap:'wrap', gap:5, alignContent:'flex-start' }}>
                      ${inCell.map((r,i) => html`
                        <div key=${r.id} style=${{ width:34, height:34, borderRadius:17, background:color, color:'#FFF', fontSize:11, fontWeight:800, display:'flex', alignItems:'center', justifyContent:'center', border:'2.5px solid #FFF', boxShadow:'0 2px 6px '+color+'40' }} title=${r.text}>R${risks.indexOf(r)+1}</div>
                      `)}
                    </div>`;
                })
              )}

  const sortedActs  = [...actions].sort((a,b) => (priO[b.priority]||0) - (priO[a.priority]||0));
  const medals      = ['🥇','🥈','🥉'];

    authorMap[n.userId].tarjetas++;
    authorMap[n.userId].votosRecibidos += (n.voters?.length||0);
  });
  const ranking = Object.entries(authorMap).map(([id,d]) => ({
    id, ...d, score: d.tarjetas + d.votosRecibidos
  })).sort((a,b) => b.score - a.score);
  const mx = ranking[0]?.score || 1;

  // risk helpers
  const riskScore = r => {
    const avg = v => { const vs=Object.values(v||{}); return vs.length ? vs.reduce((a,b)=>a+b,0)/vs.length : 0; };
    return avg(r.impactVotes) * avg(r.probVotes);
  };

          <div style=${{ ...cS, padding:20 }}>
            <h3 style=${{ fontSize:14, fontWeight:700, marginBottom:14 }}>📊 Notas por categoría</h3>
            ${CATS.map(c => {
              const cnt = notes.filter(n=>n.category===c.id).length;
              const pct = tN>0 ? (cnt/tN)*100 : 0;
              return html`
                <div key=${c.id} style=${{ marginBottom:10 }}>
                  <div style=${{ display:'flex', justifyContent:'space-between', marginBottom:4 }}>
                    <span style=${{ fontSize:12, fontWeight:600 }}>${c.emoji} ${c.label}</span>
                    <span style=${{ fontSize:12, fontWeight:700, color:c.color }}>${cnt}</span>
                  </div>
                  <div style=${{ height:8, background:'#F2F2F7', borderRadius:4, overflow:'hidden' }}>
                    <div style=${{ height:'100%', width:pct+'%', background:c.color, borderRadius:4, transition:'width .6s' }} />
                  </div>
                </div>`;
            })}
          </div>

          <!-- Progreso -->
          <div style=${{ ...cS, padding:20, display:'flex', flexDirection:'column', gap:16 }}>
            <div>
              <h3 style=${{ fontSize:14, fontWeight:700, marginBottom:14 }}>📋 Progreso</h3>
              ${[{l:'Tareas',d:tD,t:tasks.length,c:'#007AFF'},{l:'Accionables',d:aD,t:actions.length,c:'#34C759'}].map((r,i) => html`
                <div key=${i} style=${{ marginBottom:12 }}>
                  <div style=${{ display:'flex', justifyContent:'space-between', marginBottom:4 }}>
                    <span style=${{ fontSize:12, fontWeight:600 }}>${r.l}</span>
                    <span style=${{ fontSize:12, fontWeight:700, color:r.c }}>${r.d}/${r.t}</span>
                  </div>
                  <div style=${{ height:8, background:'#F2F2F7', borderRadius:4, overflow:'hidden' }}>
                    <div style=${{ height:'100%', width:(r.t>0?(r.d/r.t)*100:0)+'%', background:r.c, borderRadius:4, transition:'width .6s' }} />
                  </div>
                </div>`)}
            </div>

            <!-- Objetivo -->
            ${obj.text && html`
              <div style=${{ padding:'12px 14px', borderRadius:12, background:objColor+'10', border:'1.5px solid '+objColor+'30' }}>
                <p style=${{ fontSize:11, color:objColor, fontWeight:700, marginBottom:4 }}>🎯 Objetivo</p>
                <p style=${{ fontSize:12, lineHeight:1.45, marginBottom:6 }}>${obj.text}</p>
                <span style=${{ fontSize:11, fontWeight:700, color:objColor }}>${objL}</span>
              </div>
            `}

            <!-- Riesgos mini resumen -->
            <div style=${{ padding:'12px 14px', borderRadius:12, background:openRisks.length>0?'#FFF5F5':'#F0FFF4', border:'1.5px solid '+(openRisks.length>0?'#FF3B3020':'#34C75920') }}>
              <p style=${{ fontSize:11, fontWeight:700, color:openRisks.length>0?'#FF3B30':'#34C759', marginBottom:4 }}>⚠️ Riesgos</p>
              <div style=${{ display:'flex', gap:12, fontSize:12 }}>
                <span style=${{ color:'#FF3B30', fontWeight:700 }}>${openRisks.length} abiertos</span>
                <span style=${{ color:'#34C759' }}>${closedRisks.length} mitigados</span>
              </div>
              ${openRisks.slice(0,2).map(r => html`
                <div key=${r.id} style=${{ fontSize:11, color:'#86868B', marginTop:4, borderLeft:'3px solid '+riskColor(r), paddingLeft:6 }}>${r.text}</div>
              `)}
              ${openRisks.length>2 && html`<p style=${{ fontSize:10, color:'#86868B', marginTop:4 }}>+ ${openRisks.length-2} más → pestaña Riesgos</p>`}
            </div>
          </div>
        </div>

        <!-- Top notas -->
        ${topNotes.length > 0 && html`
          <div style=${{ ...cS, padding:20 }}>
            <h3 style=${{ fontSize:14, fontWeight:700, marginBottom:12 }}>🔥 Notas más votadas</h3>
            <div style=${{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:8 }}>
              ${topNotes.slice(0,6).map((n,i) => {
                const c = CATS.find(cat=>cat.id===n.category)||CATS[0];
                return html`
                  <div key=${n.id} style=${{ padding:'10px 12px', borderRadius:10, background:c.bg, borderLeft:'3px solid '+c.color, display:'flex', gap:8, alignItems:'flex-start' }}>
                    <span style=${{ fontSize:14, fontWeight:800, color:'#C7C7CC', minWidth:18 }}>${i+1}</span>
                    <div style=${{ flex:1 }}>
                      <p style=${{ fontSize:12, lineHeight:1.4 }}>${n.text}</p>
                      <div style=${{ display:'flex', gap:6, marginTop:4, fontSize:10, color:'#86868B' }}>
                        <span>${n.userAvatar} ${n.userName}</span>
                        <span style=${{ color:c.color, fontWeight:700 }}>▲ ${n.voters?.length||0}</span>
                      </div>
                    </div>
                  </div>`;
              })}
            </div>
          </div>
        `}
      `}

      <!-- ══ NOTAS ══ -->
      ${activeTab === 'notas' && html`
        <div style=${{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
          ${CATS.map(c => {
            const cn = [...notes.filter(n=>n.category===c.id)].sort((a,b)=>(b.voters?.length||0)-(a.voters?.length||0));
            return html`
              <div key=${c.id} style=${{ ...cS, padding:16 }}>
                <div style=${{ display:'flex', alignItems:'center', gap:7, marginBottom:12 }}>
                  <span style=${{ fontSize:16 }}>${c.emoji}</span>
                  <span style=${{ fontSize:14, fontWeight:700, color:c.color }}>${c.label}</span>
                  <span style=${{ marginLeft:'auto', background:c.color+'20', color:c.color, fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:6 }}>${cn.length}</span>
                </div>
                ${cn.length===0
                  ? html`<p style=${{ color:c.color, opacity:.4, fontSize:12, textAlign:'center', padding:'12px 0' }}>Sin notas</p>`
                  : cn.map(n => html`
                    <div key=${n.id} style=${{ padding:'8px 0', borderBottom:'1px solid #F2F2F7', display:'flex', gap:8, alignItems:'flex-start' }}>
                      <div style=${{ flex:1 }}>
                        <p style=${{ fontSize:12, lineHeight:1.4 }}>${n.text}</p>
                        <div style=${{ display:'flex', gap:5, marginTop:3, fontSize:10, color:'#86868B' }}>
                          <span>${n.userAvatar} ${n.userName}</span>
                          ${(n.voters?.length||0)>0 && html`<span style=${{ color:c.color, fontWeight:700 }}>▲ ${n.voters.length}</span>`}
                        </div>
                      </div>
                    </div>`)
                }
              </div>`;
          })}
        </div>
      `}

      <!-- ══ ACCIONABLES ══ -->
      ${activeTab === 'accionables' && html`
        <div style=${{ ...cS, padding:20 }}>
          <div style=${{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
            <h3 style=${{ fontSize:15, fontWeight:700 }}>🎯 Accionables (${actions.length})</h3>
            <div style=${{ display:'flex', gap:6, fontSize:11 }}>
              <span style=${{ color:'#34C759', fontWeight:700 }}>${aD} ✅ completados</span>
              <span style=${{ color:'#86868B' }}>·</span>
              <span style=${{ color:'#FF9500', fontWeight:700 }}>${actions.filter(a=>a.status==='pending').length} pendientes</span>
            </div>
          </div>
          <!-- Progress bar -->
          <div style=${{ height:8, background:'#F2F2F7', borderRadius:4, overflow:'hidden', marginBottom:16 }}>
            <div style=${{ height:'100%', width:(actions.length?(aD/actions.length)*100:0)+'%', background:'linear-gradient(90deg,#34C759,#30d158)', borderRadius:4, transition:'width .6s' }} />
          </div>
          ${sortedActs.length===0
            ? html`<p style=${{ color:'#C7C7CC', textAlign:'center', padding:20, fontSize:13 }}>Sin accionables</p>`
            : sortedActs.map(a => {
              const pr = PRIS.find(p=>p.id===a.priority)||PRIS[1];
              const st = STS.find(s=>s.id===a.status)||STS[0];
              const ct = a.fromCategory ? CATS.find(c=>c.id===a.fromCategory) : null;
              return html`
                <div key=${a.id} style=${{ display:'flex', alignItems:'center', gap:10, padding:'11px 12px', borderRadius:12, background:a.status==='done'?'#F9F9FB':'#FFF', border:'1.5px solid #E5E5EA', marginBottom:7, opacity:a.status==='discarded'?.5:1 }}>
                  <span style=${{ fontSize:16, flexShrink:0 }}>${pr.icon}</span>
                  <div style=${{ flex:1, minWidth:0 }}>
                    ${ct && html`<span style=${{ fontSize:9, fontWeight:700, color:ct.color, background:ct.color+'10', padding:'1px 5px', borderRadius:3, marginBottom:2, display:'inline-block' }}>${ct.emoji} ${ct.label}</span>`}
                    <p style=${{ fontSize:13, fontWeight:600, textDecoration:a.status==='done'?'line-through':'none', color:a.status==='done'?'#86868B':'#1D1D1F' }}>${a.text}</p>
                    <div style=${{ display:'flex', gap:8, marginTop:2, fontSize:11, color:'#86868B' }}>
                      <span style=${{ color:'#007AFF', fontWeight:600 }}>👤 ${a.owner}</span>
                      ${a.date && html`<span>📅 ${fd(a.date)}</span>`}
                    </div>
                  </div>
                  <span style=${{ padding:'3px 10px', borderRadius:8, background:st.bg, color:st.color, fontSize:10, fontWeight:700, whiteSpace:'nowrap', flexShrink:0 }}>${st.label}</span>
                </div>`;
            })
          }
        </div>
      `}

      <!-- ══ RIESGOS ══ -->
      ${activeTab === 'riesgos' && html`
        <div style=${{ display:'flex', flexDirection:'column', gap:12 }}>

          <!-- Resumen riesgos -->
          <div style=${{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8 }}>
            ${[
              {l:'Abiertos',   v:openRisks.filter(r=>riskScore(r)>=6).length,  c:'#FF3B30', sub:'Score alto (≥6)'},
              {l:'Medios',     v:openRisks.filter(r=>riskScore(r)>=2&&riskScore(r)<6).length, c:'#FF9500', sub:'Score medio (2-5)'},
              {l:'Bajos',      v:openRisks.filter(r=>riskScore(r)<2).length,   c:'#34C759', sub:'Score bajo (<2)'},
            ].map((s,i) => html`
              <div key=${i} style=${{ ...cS, padding:'14px', textAlign:'center' }}>
                <div style=${{ fontSize:22, fontWeight:800, color:s.c }}>${s.v}</div>
                <div style=${{ fontSize:12, fontWeight:600, marginTop:2 }}>${s.l}</div>
                <div style=${{ fontSize:10, color:'#86868B' }}>${s.sub}</div>
              </div>`)}
          </div>

          <!-- Lista riesgos abiertos -->
          ${openRisks.length > 0 && html`
            <div style=${{ ...cS, padding:20 }}>
              <h3 style=${{ fontSize:14, fontWeight:700, marginBottom:12, color:'#FF3B30' }}>⚠️ Riesgos abiertos (${openRisks.length})</h3>
              ${[...openRisks].sort((a,b) => riskScore(b)-riskScore(a)).map((r,idx) => {
                const imp  = getRiskLevel(r.impactVotes);
                const prob = getRiskLevel(r.probVotes);
                const hc   = getHeatColor(imp, prob);
                const st   = RISK_STATUS.find(s=>s.id===r.status)||RISK_STATUS[0];
                const sc   = Math.round(riskScore(r)*10)/10;
                return html`
                  <div key=${r.id} style=${{ padding:'12px 14px', borderRadius:12, border:'1.5px solid #E5E5EA', borderLeft:'5px solid '+hc, marginBottom:9, background:'#FAFAFA' }}>
                    <div style=${{ display:'flex', alignItems:'flex-start', gap:10, marginBottom:6 }}>
                      <div style=${{ background:hc, color:'#FFF', borderRadius:6, padding:'2px 8px', fontSize:10, fontWeight:800, whiteSpace:'nowrap', flexShrink:0 }}>R${idx+1} · ${sc}</div>
                      <div style=${{ flex:1 }}>
                        <p style=${{ fontSize:13, fontWeight:700, marginBottom:3 }}>${r.text}</p>
                        ${r.mitigation && html`<p style=${{ fontSize:11, color:'#86868B' }}>🛡️ ${r.mitigation}</p>`}
                      </div>
                      <span style=${{ fontSize:10, fontWeight:700, color:st.color, background:st.color+'18', padding:'2px 8px', borderRadius:6, flexShrink:0 }}>${st.label}</span>
                    </div>
                    <div style=${{ display:'flex', gap:12, fontSize:11, color:'#86868B' }}>
                      <span>⚡ Impacto: <b style=${{ color:hc }}>${imp.label}</b></span>
                      <span>🎲 Prob: <b style=${{ color:hc }}>${prob.label}</b></span>
                      <span>👤 ${r.owner}</span>
                    </div>
                  </div>`;
              })}
            </div>
          `}

          <!-- Riesgos mitigados -->
          ${closedRisks.length > 0 && html`
            <div style=${{ ...cS, padding:20 }}>
              <h3 style=${{ fontSize:14, fontWeight:700, marginBottom:10, color:'#34C759' }}>✅ Mitigados (${closedRisks.length})</h3>
              ${closedRisks.map(r => html`
                <div key=${r.id} style=${{ padding:'8px 12px', borderRadius:10, background:'#F0FFF4', border:'1px solid #34C75920', marginBottom:6, display:'flex', alignItems:'center', gap:8 }}>
                  <span style=${{ fontSize:16 }}>✅</span>
                  <div style=${{ flex:1 }}>
                    <p style=${{ fontSize:12, textDecoration:'line-through', color:'#86868B' }}>${r.text}</p>
                    ${r.mitigation && html`<p style=${{ fontSize:10, color:'#34C759' }}>🛡️ ${r.mitigation}</p>`}
                  </div>
                  <span style=${{ fontSize:10, color:'#86868B' }}>${r.owner}</span>
                </div>`)}
            </div>
          `}

          ${risks.length === 0 && html`
            <div style=${{ ...cS, padding:28, textAlign:'center', color:'#C7C7CC' }}>
              <p style=${{ fontSize:24, marginBottom:8 }}>✅</p>
              <p style=${{ fontSize:13 }}>Sin riesgos identificados</p>
            </div>
          `}
        </div>
      `}

      <!-- ══ RANKING ══ -->
      ${activeTab === 'ranking' && html`
        <div style=${{ ...cS, padding:22 }}>
          <h3 style=${{ fontSize:16, fontWeight:700, marginBottom:4 }}>🏆 Ranking</h3>
          <p style=${{ fontSize:11, color:'#86868B', marginBottom:18 }}>Tarjetas aportadas + votos recibidos</p>
          ${ranking.length === 0
            ? html`<p style=${{ color:'#C7C7CC', textAlign:'center', padding:20, fontSize:13 }}>Aún no hay notas en el tablero</p>`
            : html`<div style=${{ display:'flex', flexDirection:'column', gap:8 }}>
              ${ranking.map((r,i) => {
                const isMe = r.id === user.id;
                const bw   = mx>0?(r.score/mx)*100:0;
                const bg   = i===0?'linear-gradient(90deg,#FFD60A,#FF9500)':i===1?'linear-gradient(90deg,#C0C0C0,#999)':i===2?'linear-gradient(90deg,#CD7F32,#B8860B)':'#007AFF';
                return html`
                  <div key=${r.id} style=${{ display:'flex', alignItems:'center', gap:12, padding:'14px 18px', borderRadius:14, background:isMe?'#007AFF06':i<3?'#FFFBEB':'#F9F9FB', border:isMe?'2px solid #007AFF25':i<3?'1.5px solid #FFD60A25':'1.5px solid #E5E5EA' }}>
                    <div style=${{ width:32, textAlign:'center', fontSize:i<3?22:14, fontWeight:700, color:'#86868B' }}>${i<3?medals[i]:(i+1)+'º'}</div>
                    <div style=${{ width:36, height:36, borderRadius:18, background:r.color, display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, flexShrink:0, border:'2px solid #FFF', boxShadow:'0 2px 6px rgba(0,0,0,0.06)' }}>${r.avatar}</div>
                    <div style=${{ flex:1 }}>
                      <div style=${{ display:'flex', alignItems:'center', gap:6, marginBottom:4 }}>
                        <span style=${{ fontSize:14, fontWeight:700 }}>${r.name}</span>
                        <span style=${{ fontSize:18, fontWeight:800, color:i<3?'#FFB800':'#86868B' }}>${r.score}</span>
                        <span style=${{ fontSize:10, color:'#86868B' }}>pts</span>
                      </div>
                      <div style=${{ height:5, background:'#E5E5EA', borderRadius:3, overflow:'hidden', marginBottom:5 }}>
                        <div style=${{ height:'100%', width:bw+'%', background:bg, borderRadius:3, transition:'width .5s' }} />
                      </div>
                      <div style=${{ display:'flex', gap:10 }}>
                        <span style=${{ fontSize:11, color:'#86868B' }}>📝 ${r.tarjetas} tarjetas</span>
                        <span style=${{ fontSize:11, color:'#86868B' }}>👍 ${r.votosRecibidos} votos recibidos</span>
                      </div>
                    </div>
                  </div>`;
              })}
            </div>`
          }
        </div>
      `}

    </div>
  `;
}


render(html`<${App} />`, document.getElementById('app'));
</script>
</body>
</html>
