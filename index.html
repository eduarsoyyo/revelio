                    </div>
                  </div>
                  <span style=${{ padding:'3px 10px', borderRadius:8, background:st.bg, color:st.color, fontSize:10, fontWeight:700, whiteSpace:'nowrap', flexShrink:0 }}>${st.label}</span>
                </div>`;
            })
          }
        </div>
      `}

      ${activeTab === 'riesgos' && html`
        <div style=${{ display:'flex', flexDirection:'column', gap:12 }}>

          <div style=${{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8 }}>
            ${[
              {l:'Abiertos',   v:openRisks.filter(r=>riskScore(r)>=6).length,  c:'#FF3B30', sub:'Score alto (≥6)'},
              {l:'Medios',     v:openRisks.filter(r=>riskScore(r)>=2&&riskScore(r)<6).length, c:'#FF9500', sub:'Score medio (2-5)'},
              {l:'Bajos',      v:openRisks.filter(r=>riskScore(r)<2).length,   c:'#34C759', sub:'Score bajo (<2)'},
            ].map((s,i) => html`
              <div key=${i} style=${{ ...cS, padding:'14px', textAlign:'center' }}>
                <div style=${{ fontSize:22, fontWeight:800, color:s.c }}>${s.v}</div>
                <div style=${{ fontSize:12, fontWeight:600, marginTop:2 }}>${s.l}</div>
                <div style=${{ fontSize:10, color:'#86868B' }}>${s.sub}</div>
              </div>`)}
          </div>

          ${openRisks.length > 0 && html`
            <div style=${{ ...cS, padding:20 }}>
              <h3 style=${{ fontSize:14, fontWeight:700, marginBottom:12, color:'#FF3B30' }}>Riesgos abiertos (${openRisks.length})</h3>
              ${[...openRisks].sort((a,b) => riskScore(b)-riskScore(a)).map((r,idx) => {
                const imp  = getRiskLevel(r.impactVotes);
                const prob = getRiskLevel(r.probVotes);
                const hc   = getHeatColor(imp, prob);
                const st   = RISK_STATUS.find(s=>s.id===r.status)||RISK_STATUS[0];
                const sc   = Math.round(riskScore(r)*10)/10;
                return html`
                  <div key=${r.id} style=${{ padding:'12px 14px', borderRadius:12, border:'1.5px solid #E5E5EA', borderLeft:'5px solid '+hc, marginBottom:9, background:'#FAFAFA' }}>
                    <div style=${{ display:'flex', alignItems:'flex-start', gap:10, marginBottom:6 }}>
                      <div style=${{ background:hc, color:'#FFF', borderRadius:6, padding:'2px 8px', fontSize:10, fontWeight:800, whiteSpace:'nowrap', flexShrink:0 }}>R${idx+1} · ${sc}</div>
                      <div style=${{ flex:1 }}>
                        <p style=${{ fontSize:13, fontWeight:700, marginBottom:3 }}>${r.text}</p>
                        ${r.mitigation && html`<p style=${{ fontSize:11, color:'#86868B' }}>🛡️ ${r.mitigation}</p>`}
                      </div>
                      <span style=${{ fontSize:10, fontWeight:700, color:st.color, background:st.color+'18', padding:'2px 8px', borderRadius:6, flexShrink:0 }}>${st.label}</span>
                    </div>
                    <div style=${{ display:'flex', gap:12, fontSize:11, color:'#86868B' }}>
                      <span>⚡ Impacto: <b style=${{ color:hc }}>${imp.label}</b></span>
                      <span>🎲 Prob: <b style=${{ color:hc }}>${prob.label}</b></span>
                      <span>👤 ${r.owner}</span>
                    </div>
                  </div>`;
              })}
            </div>
          `}

          ${closedRisks.length > 0 && html`
            <div style=${{ ...cS, padding:20 }}>
              <h3 style=${{ fontSize:14, fontWeight:700, marginBottom:10, color:'#34C759' }}>✅ Mitigados (${closedRisks.length})</h3>
              ${closedRisks.map(r => html`
                <div key=${r.id} style=${{ padding:'8px 12px', borderRadius:10, background:'#F0FFF4', border:'1px solid #34C75920', marginBottom:6, display:'flex', alignItems:'center', gap:8 }}>
                  <span style=${{ fontSize:16 }}>✅</span>
                  <div style=${{ flex:1 }}>
                    <p style=${{ fontSize:12, textDecoration:'line-through', color:'#86868B' }}>${r.text}</p>
                    ${r.mitigation && html`<p style=${{ fontSize:10, color:'#34C759' }}>🛡️ ${r.mitigation}</p>`}
                  </div>
                  <span style=${{ fontSize:10, color:'#86868B' }}>${r.owner}</span>
                </div>`)}
            </div>
          `}

          ${risks.length === 0 && html`
            <div style=${{ ...cS, padding:28, textAlign:'center', color:'#C7C7CC' }}>
              <p style=${{ fontSize:24, marginBottom:8 }}>✅</p>
              <p style=${{ fontSize:13 }}>Sin riesgos identificados</p>
            </div>
          `}
        </div>
      `}

      ${activeTab === 'ranking' && html`
        <div style=${{ ...cS, padding:22 }}>
          <h3 style=${{ fontSize:16, fontWeight:700, marginBottom:4 }}>🏆 Ranking</h3>
          <p style=${{ fontSize:11, color:'#86868B', marginBottom:18 }}>Tarjetas aportadas + votos recibidos</p>
          ${ranking.length === 0
            ? html`<p style=${{ color:'#C7C7CC', textAlign:'center', padding:20, fontSize:13 }}>Aún no hay notas en el tablero</p>`
            : html`<div style=${{ display:'flex', flexDirection:'column', gap:8 }}>
              ${ranking.map((r,i) => {
                const isMe = r.id === user.id;
                const bw   = mx>0?(r.score/mx)*100:0;
                const bg   = i===0?'linear-gradient(90deg,#FFD60A,#FF9500)':i===1?'linear-gradient(90deg,#C0C0C0,#999)':i===2?'linear-gradient(90deg,#CD7F32,#B8860B)':'#007AFF';
                return html`
                  <div key=${r.id} style=${{ display:'flex', alignItems:'center', gap:12, padding:'14px 18px', borderRadius:14, background:isMe?'#007AFF06':i<3?'#FFFBEB':'#F9F9FB', border:isMe?'2px solid #007AFF25':i<3?'1.5px solid #FFD60A25':'1.5px solid #E5E5EA' }}>
                    <div style=${{ width:32, textAlign:'center', fontSize:i<3?22:14, fontWeight:700, color:'#86868B' }}>${i<3?medals[i]:(i+1)+'º'}</div>
                    <div style=${{ width:36, height:36, borderRadius:18, background:r.color, display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, flexShrink:0, border:'2px solid #FFF', boxShadow:'0 2px 6px rgba(0,0,0,0.06)' }}>${r.avatar}</div>
                    <div style=${{ flex:1 }}>
                      <div style=${{ display:'flex', alignItems:'center', gap:6, marginBottom:4 }}>
                        <span style=${{ fontSize:14, fontWeight:700 }}>${r.name}</span>
                        <span style=${{ fontSize:18, fontWeight:800, color:i<3?'#FFB800':'#86868B' }}>${r.score}</span>
                        <span style=${{ fontSize:10, color:'#86868B' }}>pts</span>
                      </div>
                      <div style=${{ height:5, background:'#E5E5EA', borderRadius:3, overflow:'hidden', marginBottom:5 }}>
                        <div style=${{ height:'100%', width:bw+'%', background:bg, borderRadius:3, transition:'width .5s' }} />
                      </div>
                      <div style=${{ display:'flex', gap:10 }}>
                        <span style=${{ fontSize:11, color:'#86868B' }}>📝 ${r.tarjetas} tarjetas</span>
                        <span style=${{ fontSize:11, color:'#86868B' }}>👍 ${r.votosRecibidos} votos recibidos</span>
                      </div>
                    </div>
                  </div>`;
              })}
            </div>`
          }
        </div>
      `}

    </div>
  `;
}


render(html`<div><${App} /><${GlobalConfirm} /></div>`, document.getElementById('app'));
</script>
</body>
</html>
