/* ═══ ESCALADO PANEL ═══ */
function EscaladoPanel({ risks, upd, escalForm, setEscalForm }) {
  const [team, setTeam]  = useState([]);
  const [org,  setOrg]   = useState({});  // { memberId: managerId }

  useEffect(() => {
    Promise.all([sbLoadTeamMembers(), sbLoadOrgChart(SALA)]).then(([members, chart]) => {
      const teamFiltered = members.filter(m=>(m.rooms||[]).includes(SALA));
      setTeam(teamFiltered.length > 0 ? teamFiltered : members);
      const map = {};
      chart.forEach(n => { map[n.member_id] = n.manager_id || null; });
      setOrg(map);
    });
  }, []);

  const STATUS = [
    { id:'pendiente', label:'Pendiente', color:'#FF9500' },
    { id:'en_curso',  label:'En curso',  color:'#007AFF' },
    { id:'resuelto',  label:'Resuelto',  color:'#34C759' },
    { id:'bloqueado', label:'Bloqueado', color:'#FF3B30' },
  ];

  const openRisks = risks.filter(r => r.status !== 'mitigated' && (r.type||'riesgo') !== 'oportunidad');
  const escalated = risks.filter(r => r.escalation);

  // Build chain from a member up the org tree
  const getChain = (memberId) => {
    const chain = [];
    let cur = memberId;
    const seen = new Set();
    while (cur && !seen.has(cur)) {
      seen.add(cur);
      const m = team.find(x=>x.id===cur);
      if (m) chain.push(m);
      cur = org[cur] || null;
    }
    return chain; // [self, manager, gm, ...]
  };

  // For a risk, determine next escalation step
  const getNextEscalation = (r) => {
    const ownerMember = team.find(m=>m.name===r.owner || m.id===r.owner);
    if (!ownerMember) return null;
    const currentLevel = r.escalation?.memberId;
    const chain = getChain(ownerMember.id);
    if (!currentLevel) return chain[1] || null; // first escalation: direct manager
    const idx = chain.findIndex(m=>m.id===currentLevel);
    return idx >= 0 && idx+1 < chain.length ? chain[idx+1] : null;
  };

  // Escalation chain visual
  const getRiskChain = (r) => {
    const ownerMember = team.find(m=>m.name===r.owner || m.id===r.owner);
    if (!ownerMember) return [];
    return getChain(ownerMember.id);
  };

  const saveEscalation = () => {
    if (!escalForm.riskId || !escalForm.memberId) return;
    const member = team.find(m=>m.id===escalForm.memberId);
    upd(escalForm.riskId, {
      escalation: {
        memberId: escalForm.memberId,
        memberName: member?.name || '',
        memberRole: member?.role_label || '',
        deadline: escalForm.deadline,
        note: escalForm.note,
        status: escalForm.status,
        createdAt: new Date().toISOString(),
      }
    });
    setEscalForm({riskId:'', memberId:'', deadline:'', note:'', status:'pendiente'});
  };
  const removeEscalation = (id) => upd(id, { escalation: null });
  const escalateNext = (r) => {
    const next = getNextEscalation(r);
    if (!next) return;
    upd(r.id, {
      escalation: {
        ...(r.escalation||{}),
        memberId: next.id,
        memberName: next.name,
        memberRole: next.role_label||'',
        status: 'pendiente',
        createdAt: new Date().toISOString(),
      }
    });
  };

  // Colors by org depth
  const DEPTH_COLORS = ['#34C759','#FF9500','#FF3B30','#5856D6','#1D1D1F'];
  const depthColor = (r) => {
    const ownerMember = team.find(m=>m.name===r.owner||m.id===r.owner);
    if (!ownerMember || !r.escalation?.memberId) return '#86868B';
    const chain = getChain(ownerMember.id);
    const idx = chain.findIndex(m=>m.id===r.escalation.memberId);
    return DEPTH_COLORS[Math.min(idx, DEPTH_COLORS.length-1)];
  };

  return html`
    <div>
      <!-- KPI: escalation by status -->
      <div style=${{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:8, marginBottom:16 }}>
        ${STATUS.map(s => {
          const cnt = escalated.filter(r=>r.escalation?.status===s.id).length;
          return html`
            <div style=${{ background:'#FFF', borderRadius:12, border:'1.5px solid #E5E5EA', padding:'12px 10px', textAlign:'center', borderTop:'3px solid '+s.color }}>
              <div style=${{ fontSize:22, fontWeight:800, color:s.color }}>${cnt||'—'}</div>
              <div style=${{ fontSize:11, fontWeight:700, color:'#1D1D1F', marginTop:2 }}>${s.label}</div>
            </div>`;
        })}
      </div>

      <div style=${{ display:'grid', gridTemplateColumns:'1fr 320px', gap:14, alignItems:'start' }}>

        <!-- Escalated risks list -->
        <div>
          ${escalated.length===0 ? html`
            <div style=${{ textAlign:'center', padding:32, color:'#C7C7CC', border:'2px dashed #E5E5EA', borderRadius:14 }}>
              <p style=${{ fontSize:28, marginBottom:8 }}>📈</p>
              <p style=${{ fontSize:13 }}>Sin riesgos escalados</p>
              <p style=${{ fontSize:11, marginTop:4 }}>Usa el formulario para escalar un riesgo</p>
            </div>` :
            escalated.map(r => {
              const esc = r.escalation;
              const st = STATUS.find(s=>s.id===esc.status)||STATUS[0];
              const rn = risks.filter(x=>(x.type||'riesgo')===(r.type||'riesgo')).indexOf(r)+1;
              const prefix = (r.type||'riesgo')==='problema'?'P':'R';
              const color = depthColor(r);
              const chain = getRiskChain(r);
              const curIdx = chain.findIndex(m=>m.id===esc.memberId);
              const next = getNextEscalation(r);
              return html`
                <div key=${r.id} style=${{ background:'#FFF', borderRadius:12, border:'1.5px solid #E5E5EA',
                  borderLeft:'4px solid '+color, padding:'12px 14px', marginBottom:8 }}>
                  <div style=${{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
                    <span style=${{ fontSize:12, fontWeight:800, color:color }}>${prefix}${rn}</span>
                    <span style=${{ fontSize:13, flex:1, fontWeight:600 }}>${r.text}</span>
                    <select value=${esc.status} onChange=${e=>upd(r.id,{escalation:{...esc,status:e.target.value}})}
                      style=${{ fontSize:9, padding:'3px 6px', borderRadius:5, border:'1px solid #E5E5EA', outline:'none', color:st.color, background:st.color+'10' }}>
                      ${STATUS.map(s=>html`<option key=${s.id} value=${s.id}>${s.label}</option>`)}
                    </select>
                    <button onClick=${()=>removeEscalation(r.id)} style=${{ border:'none', background:'none', color:'#C7C7CC', fontSize:12, cursor:'pointer' }}>✕</button>
                  </div>
                  <!-- Escalation chain visual -->
                  <div style=${{ display:'flex', alignItems:'center', gap:4, flexWrap:'wrap', marginBottom:8 }}>
                    ${chain.map((m,i) => html`
                      <div key=${m.id} style=${{ display:'flex', alignItems:'center', gap:4 }}>
                        ${i>0 && html`<span style=${{ color:'#C7C7CC', fontSize:10 }}>→</span>`}
                        <div style=${{ display:'flex', alignItems:'center', gap:4, padding:'3px 8px 3px 4px', borderRadius:20,
                          background: m.id===esc.memberId ? color+'18' : '#F9F9FB',
                          border:'1.5px solid '+(m.id===esc.memberId ? color : '#E5E5EA') }}>
                          <span style=${{ fontSize:14 }}>${m.avatar||'👤'}</span>
                          <div>
                            <div style=${{ fontSize:10, fontWeight:700, color:m.id===esc.memberId?color:'#1D1D1F' }}>${m.name}</div>
                            ${m.role_label && html`<div style=${{ fontSize:8, color:'#86868B' }}>${m.role_label}</div>`}
                          </div>
                          ${m.id===esc.memberId && html`<span style=${{ fontSize:9, background:color, color:'#FFF', borderRadius:4, padding:'1px 4px', fontWeight:700 }}>aquí</span>`}
                        </div>
                      </div>`)}
                  </div>
                  <div style=${{ display:'flex', gap:8, alignItems:'center', fontSize:10, color:'#86868B' }}>
                    ${esc.deadline && html`<span>📅 ${esc.deadline}</span>`}
                    ${esc.note && html`<span>📝 ${esc.note}</span>`}
                    ${next && html`
                      <button onClick=${()=>escalateNext(r)}
                        style=${{ marginLeft:'auto', fontSize:10, fontWeight:700, padding:'4px 10px', borderRadius:7,
                          border:'1.5px solid '+color+'30', background:color+'10', color:color, cursor:'pointer' }}>
                        ↑ Escalar a ${next.name}
                      </button>`}
                  </div>
                </div>`;
            })}
        </div>

        <!-- Add escalation form — org-chart based -->
        <div style=${{ background:'#FFF', borderRadius:14, border:'1.5px solid #E5E5EA', padding:'16px', position:'sticky', top:0 }}>
          <h4 style=${{ fontSize:13, fontWeight:700, marginBottom:4 }}>📈 Escalar riesgo</h4>
          <p style=${{ fontSize:10, color:'#86868B', marginBottom:12 }}>La cadena sigue el organigrama del proyecto</p>
          <div style=${{ display:'flex', flexDirection:'column', gap:8 }}>
            <select value=${escalForm.riskId} onChange=${e=>{
              const r=openRisks.find(x=>x.id===e.target.value);
              const next = r ? getNextEscalation(r) : null;
              setEscalForm({...escalForm, riskId:e.target.value, memberId:next?.id||''});
            }}
              style=${{ border:'1.5px solid #E5E5EA', borderRadius:8, padding:'8px 10px', fontSize:12, fontFamily:'inherit', outline:'none' }}>
              <option value="">— Selecciona riesgo —</option>
              ${openRisks.map((r,i) => {
                const prefix = (r.type||'riesgo')==='problema'?'P':'R';
                const n = risks.filter(x=>(x.type||'riesgo')===(r.type||'riesgo')).indexOf(r)+1;
                return html`<option key=${r.id} value=${r.id}>${prefix}${n}: ${r.text.slice(0,40)}${r.text.length>40?'…':''}</option>`;
              })}
            </select>

            <!-- Show chain for selected risk -->
            ${escalForm.riskId && (() => {
              const r = openRisks.find(x=>x.id===escalForm.riskId);
              if (!r) return null;
              const chain = getRiskChain(r);
              if (chain.length<2) return html`
                <div style=${{ padding:'10px 12px', borderRadius:10, background:'#FFF9E6', border:'1px solid #FF950030' }}>
                  <p style=${{ fontSize:11, color:'#FF9500', marginBottom:8 }}>⚠️ Sin jerarquía en el organigrama. Selecciona a quién escalar:</p>
                  <div style=${{ display:'flex', flexDirection:'column', gap:4 }}>
                    ${team.filter(m=>m.id!==ownerMember?.id).map(m=>html`
                      <label style=${{ display:'flex', alignItems:'center', gap:8, padding:'6px 10px', borderRadius:9,
                        background:escalForm.memberId===m.id?'#007AFF10':'#F9F9FB',
                        border:'1.5px solid '+(escalForm.memberId===m.id?'#007AFF':'#E5E5EA'), cursor:'pointer' }}
                        onClick=${()=>setEscalForm({...escalForm,memberId:m.id})}>
                        <span style=${{ fontSize:16 }}>${m.avatar||'👤'}</span>
                        <div style=${{ flex:1 }}>
                          <span style=${{ fontSize:12, fontWeight:600 }}>${m.name}</span>
                          ${m.role_label&&html`<span style=${{ fontSize:9, color:'#86868B', marginLeft:4 }}>${m.role_label}</span>`}
                        </div>
                        ${escalForm.memberId===m.id&&html`<span style=${{ fontSize:9, color:'#007AFF', fontWeight:700 }}>✓</span>`}
                      </label>`)}
                  </div>
                </div>`;
              return html`
                <div>
                  <p style=${{ fontSize:10, color:'#86868B', marginBottom:6, fontWeight:600 }}>Cadena de escalado:</p>
                  <div style=${{ display:'flex', flexDirection:'column', gap:4 }}>
                    ${chain.map((m,i) => html`
                      <label key=${m.id} style=${{ display:'flex', alignItems:'center', gap:8, padding:'6px 10px', borderRadius:9,
                        background:escalForm.memberId===m.id?'#007AFF10':'#F9F9FB',
                        border:'1.5px solid '+(escalForm.memberId===m.id?'#007AFF':'#E5E5EA'), cursor: i===0?'default':'pointer' }}
                        onClick=${()=>i>0&&setEscalForm({...escalForm,memberId:m.id})}>
                        <span style=${{ fontSize:11, color:'#C7C7CC', minWidth:14 }}>${i===0?'•':'L'+i}</span>
                        <span style=${{ fontSize:16 }}>${m.avatar||'👤'}</span>
                        <div style=${{ flex:1 }}>
                          <span style=${{ fontSize:12, fontWeight:600 }}>${m.name}</span>
                          ${m.role_label && html`<span style=${{ fontSize:9, color:'#86868B', marginLeft:4 }}>${m.role_label}</span>`}
                        </div>
                        ${i===0 && html`<span style=${{ fontSize:9, color:'#86868B' }}>origen</span>`}
                        ${escalForm.memberId===m.id && i>0 && html`<span style=${{ fontSize:9, color:'#007AFF', fontWeight:700 }}>✓ seleccionado</span>`}
                      </label>`)}
                  </div>
                </div>`;
            })()}

            <select value=${escalForm.status} onChange=${e=>setEscalForm({...escalForm,status:e.target.value})}
              style=${{ border:'1.5px solid #E5E5EA', borderRadius:8, padding:'8px 10px', fontSize:12, fontFamily:'inherit', outline:'none' }}>
              ${STATUS.map(s=>html`<option key=${s.id} value=${s.id}>${s.label}</option>`)}
            </select>
            <div>
              <label style=${{ fontSize:10, color:'#86868B', display:'block', marginBottom:3 }}>Fecha límite</label>
              <input type="date" value=${escalForm.deadline} onInput=${e=>setEscalForm({...escalForm,deadline:e.target.value})}
                style=${{ width:'100%', border:'1.5px solid #E5E5EA', borderRadius:8, padding:'7px 8px', fontSize:12, fontFamily:'inherit', outline:'none' }} />
            </div>
            <textarea value=${escalForm.note} onInput=${e=>setEscalForm({...escalForm,note:e.target.value})}
              placeholder="Nota / justificación…" rows="2"
              style=${{ border:'1.5px solid #E5E5EA', borderRadius:8, padding:'8px 10px', fontSize:12, fontFamily:'inherit', outline:'none', resize:'vertical' }}></textarea>
            <button onClick=${saveEscalation} disabled=${!escalForm.riskId||!escalForm.memberId}
              style=${{ padding:'9px', borderRadius:9, border:'none', background:'#1D1D1F', color:'#FFF', fontSize:13, fontWeight:700, cursor:'pointer',
                opacity:(escalForm.riskId&&escalForm.memberId)?1:.4 }}>
              📈 Escalar
            </button>
          </div>
        </div>
      </div>
    </div>`;
}


/* ═══ PFTEs — dedicación y FTEs del equipo ═══ */
function PFTEs({ team, org }) {
  const FTE_VIEWS = ['mes', 'anual'];
  const [fteView, setFteView] = useState('mes');
  const [orgData, setOrgData] = useState([]);
  const [loading, setLoading] = useState(true);
  const today = new Date();
  const [viewYear,  setViewYear]  = useState(today.getFullYear());
  const [viewMonth, setViewMonth] = useState(today.getMonth());
  const MONTH_NAMES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const days = Array.from({length:daysInMonth},(_,i)=>i+1);
  const todayStr = today.toISOString().slice(0,10);

  useEffect(() => { sbLoadOrgChart(SALA).then(rows => { setOrgData(rows); setLoading(false); }); }, []);

  const isWeekend = (d) => { const w=new Date(viewYear,viewMonth,d).getDay(); return w===0||w===6; };
  const isOnVac = (memberId, d) => {
    const m=team.find(x=>x.id===memberId); if(!m) return false;
    const ds=viewYear+'-'+String(viewMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    return (m.vacations||[]).some(v=>v.from<=ds&&(!v.to||v.to>=ds));
  };
  const isActive = (row, d) => {
    const ds=viewYear+'-'+String(viewMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    return ds>=(row.start_date||'2000-01-01') && ds<=(row.end_date||'2099-12-31');
  };
  const fteDay = (d) => isWeekend(d) ? 0 : orgData.reduce((s,r)=>{
    if(!isActive(r,d)||isOnVac(r.member_id,d)) return s;
    return s+(r.dedication??1);
  },0);
  const maxFTE = Math.max(1,...days.map(d=>fteDay(d)));
  const prevM = () => { if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1); };
  const nextM = () => { if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1); };
  const updateOrgField = async (memberId, managerId, field, val) => {
    await supabase.from('org_chart').upsert({sala:SALA,member_id:memberId,manager_id:managerId||null,[field]:val},{onConflict:'sala,member_id'});
    setOrgData(prev=>prev.map(r=>r.member_id===memberId?{...r,[field]:val}:r));
  };

  // Annual view: current month -3 to +12 (16 months total)
  const annualMonths = Array.from({length:16},(_,i)=>{
    const d=new Date(today.getFullYear(),today.getMonth()-3+i,1);
    return {year:d.getFullYear(), month:d.getMonth()};
  });

  const fteForMonth = (memberId, yr, mo, dedication) => {
    const daysInMo = new Date(yr,mo+1,0).getDate();
    const ds = Array.from({length:daysInMo},(_,i)=>i+1);
    return ds.filter(d=>!isWeekend(d)&&isOnVac(memberId,d)===false).length; // simplified
  };

  return html`<div>
    <!-- View toggle -->
    <div style=${{ display:'flex', gap:6, marginBottom:14 }}>
      <button onClick=${()=>setFteView('mes')} style=${{ padding:'6px 14px', borderRadius:8, border:'none', background:fteView==='mes'?'#1D1D1F':'#F2F2F7', color:fteView==='mes'?'#FFF':'#6E6E73', fontSize:11, fontWeight:600, cursor:'pointer' }}>Vista mensual</button>
      <button onClick=${()=>setFteView('anual')} style=${{ padding:'6px 14px', borderRadius:8, border:'none', background:fteView==='anual'?'#1D1D1F':'#F2F2F7', color:fteView==='anual'?'#FFF':'#6E6E73', fontSize:11, fontWeight:600, cursor:'pointer' }}>Vista anual</button>
    </div>
    <div style=${{ display:'flex', alignItems:'center', gap:10, marginBottom:16 }}>
      <button onClick=${prevM} style=${{ width:32,height:32,borderRadius:8,border:'1.5px solid #E5E5EA',background:'#FFF',fontSize:16,cursor:'pointer' }}>‹</button>
      <h3 style=${{ fontSize:16, fontWeight:700, flex:1 }}>${MONTH_NAMES[viewMonth]} ${viewYear}</h3>
      <button onClick=${nextM} style=${{ width:32,height:32,borderRadius:8,border:'1.5px solid #E5E5EA',background:'#FFF',fontSize:16,cursor:'pointer' }}>›</button>
    </div>
    ${loading ? html`<div style=${{ textAlign:'center',padding:40,color:'#86868B' }}>⏳</div>` : html`
      <!-- Bar chart -->
      <div style=${{ background:'#FFF', borderRadius:14, border:'1.5px solid #E5E5EA', padding:'16px', marginBottom:16 }}>
        <h4 style=${{ fontSize:11, fontWeight:700, color:'#86868B', marginBottom:10, textTransform:'uppercase', letterSpacing:.5 }}>FTEs totales · ${MONTH_NAMES[viewMonth]}</h4>
        <div style=${{ display:'flex', alignItems:'flex-end', gap:2, height:72 }}>
          ${days.map(d => {
            const wknd=isWeekend(d); const fte=fteDay(d);
            const isT=todayStr===viewYear+'-'+String(viewMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
            const h=wknd?3:Math.max(3,Math.round((fte/maxFTE)*64));
            return html`<div key=${d} title=${wknd?'Fin semana':fte.toFixed(2)+' FTEs'}
              style=${{ display:'flex', flexDirection:'column', alignItems:'center', gap:1, flex:1, minWidth:12 }}>
              ${!wknd&&fte>0&&html`<span style=${{ fontSize:6,color:'#86868B' }}>${fte.toFixed(1)}</span>`}
              <div style=${{ width:'80%', height:h+'px', borderRadius:'3px 3px 0 0',
                background:wknd?'#E5E5EA':isT?'#007AFF':fte>0?'#34C759':'#F2F2F7' }}></div>
              <span style=${{ fontSize:6, color:isT?'#007AFF':'#C7C7CC' }}>${d}</span>
            </div>`;
          })}
        </div>
      </div>
      <!-- Monthly view conditional -->
      ${fteView==='mes' && html`<div><!-- Bar chart is already above --></div>`}

      <!-- Annual timeline view -->
      ${fteView==='anual' && html`
        <div style=${{ background:'#FFF', borderRadius:14, border:'1.5px solid #E5E5EA', overflow:'auto', marginBottom:16 }}>
          <table style=${{ width:'100%', borderCollapse:'collapse', minWidth:900 }}>
            <thead><tr style=${{ background:'#F9F9FB', borderBottom:'2px solid #E5E5EA' }}>
              <th style=${{ padding:'10px 14px', textAlign:'left', fontSize:11, fontWeight:700, color:'#86868B', minWidth:130, position:'sticky', left:0, background:'#F9F9FB', zIndex:2 }}>Miembro</th>
              ${annualMonths.map(({year,month})=>html`
                <th key=${year+'-'+month} style=${{ padding:'8px 6px', textAlign:'center', fontSize:10, fontWeight:700,
                  color: year===today.getFullYear()&&month===today.getMonth()?'#007AFF':'#86868B',
                  background: year===today.getFullYear()&&month===today.getMonth()?'#EEF5FF':'#F9F9FB',
                  minWidth:52, borderBottom: year===today.getFullYear()&&month===today.getMonth()?'2px solid #007AFF':'none' }}>
                  ${MONTH_NAMES[month].slice(0,3)}<br/><span style=${{ fontSize:9, fontWeight:400 }}>${year}</span>
                </th>`)}
            </tr></thead>
            <tbody>
              ${team.map((m,mi) => {
                const row=orgData.find(r=>r.member_id===m.id)||{};
                return html`<tr key=${m.id} style=${{ borderBottom:'1px solid #F2F2F7', background:mi%2===0?'#FFF':'#FAFAFA' }}>
                  <td style=${{ padding:'8px 14px', position:'sticky', left:0, background:mi%2===0?'#FFF':'#FAFAFA', zIndex:1 }}>
                    <div style=${{ display:'flex', alignItems:'center', gap:6 }}>
                      <span style=${{ fontSize:16 }}>${m.avatar||'👤'}</span>
                      <div><div style=${{ fontSize:11, fontWeight:600 }}>${m.name}</div>${m.role_label&&html`<div style=${{ fontSize:9, color:'#86868B' }}>${m.role_label}</div>`}</div>
                    </div>
                  </td>
                  ${annualMonths.map(({year,month}) => {
                    const start = row.start_date||'2000-01-01';
                    const end   = row.end_date||'2099-12-31';
                    const monthStart = year+'-'+String(month+1).padStart(2,'0')+'-01';
                    const monthEnd   = year+'-'+String(month+1).padStart(2,'0')+'-'+String(new Date(year,month+1,0).getDate()).padStart(2,'0');
                    const active = monthEnd >= start && monthStart <= end;
                    const ded    = row.dedication ?? 1;
                    const isNow  = year===today.getFullYear()&&month===today.getMonth();
                    return html`<td key=${year+'-'+month} style=${{ padding:'6px', textAlign:'center',
                      background:isNow?(active?'#EEF5FF':'#F8FAFF'):(active?'#FFF':'#F9F9FB') }}>
                      ${active ? html`
                        <div style=${{ padding:'3px 4px', borderRadius:6, background:isNow?'#007AFF':ded>=1?'#34C75920':'#FF950015',
                          border:'1px solid '+(isNow?'transparent':ded>=1?'#34C75930':'#FF950030') }}>
                          <div style=${{ fontSize:11, fontWeight:700, color:isNow?'#FFF':ded>=1?'#34C759':'#FF9500' }}>${ded}</div>
                          <div style=${{ fontSize:8, color:isNow?'rgba(255,255,255,.8)':'#86868B' }}>FTE</div>
                        </div>` : html`<span style=${{ color:'#E5E5EA', fontSize:10 }}>—</span>`}
                    </td>`;
                  })}
                </tr>`;
              })}
              <!-- Totals row -->
              <tr style=${{ background:'#F0F7FF', borderTop:'2px solid #007AFF20' }}>
                <td style=${{ padding:'10px 14px', fontSize:11, fontWeight:700, color:'#007AFF', position:'sticky', left:0, background:'#F0F7FF' }}>Total FTEs</td>
                ${annualMonths.map(({year,month}) => {
                  const total = team.reduce((sum,m) => {
                    const row=orgData.find(r=>r.member_id===m.id)||{};
                    const start=row.start_date||'2000-01-01', end=row.end_date||'2099-12-31';
                    const ms=year+'-'+String(month+1).padStart(2,'0')+'-01';
                    const me=year+'-'+String(month+1).padStart(2,'0')+'-'+String(new Date(year,month+1,0).getDate()).padStart(2,'0');
                    return me>=start&&ms<=end ? sum+(row.dedication??1) : sum;
                  },0);
                  return html`<td key=${year+'-'+month} style=${{ padding:'8px 6px', textAlign:'center' }}>
                    <span style=${{ fontSize:12, fontWeight:800, color:total>0?'#007AFF':'#C7C7CC' }}>${total>0?total.toFixed(1):'—'}</span>
                  </td>`;
                })}
              </tr>
            </tbody>
          </table>
        </div>`}

      <!-- Table (monthly detail) -->
      <div style=${{ background:'#FFF', borderRadius:14, border:'1.5px solid #E5E5EA', overflow:'auto' }}>
        <table style=${{ width:'100%', borderCollapse:'collapse', minWidth:500 }}>
          <thead><tr style=${{ background:'#F9F9FB', borderBottom:'2px solid #E5E5EA' }}>
            <th style=${{ padding:'10px 14px', textAlign:'left', fontSize:11, fontWeight:700, color:'#86868B', minWidth:140 }}>Miembro</th>
            <th style=${{ padding:'10px 10px', textAlign:'center', fontSize:11, fontWeight:700, color:'#86868B' }}>Inicio</th>
            <th style=${{ padding:'10px 10px', textAlign:'center', fontSize:11, fontWeight:700, color:'#86868B' }}>Fin</th>
            <th style=${{ padding:'10px 10px', textAlign:'center', fontSize:11, fontWeight:700, color:'#86868B' }}>Dedicación</th>
            <th style=${{ padding:'10px 10px', textAlign:'center', fontSize:11, fontWeight:700, color:'#86868B' }}>FTE·días</th>
          </tr></thead>
          <tbody>
            ${team.map((m,mi) => {
              const row=orgData.find(r=>r.member_id===m.id)||{member_id:m.id};
              const workdays=days.filter(d=>!isWeekend(d)&&isActive(row,d)&&!isOnVac(m.id,d)).length;
              const mFTE=((workdays)*(row.dedication??1)).toFixed(1);
              return html`<tr key=${m.id} style=${{ borderBottom:'1px solid #F2F2F7', background:mi%2===0?'#FFF':'#FAFAFA' }}>
                <td style=${{ padding:'8px 14px' }}>
                  <div style=${{ display:'flex', alignItems:'center', gap:8 }}>
                    <div style=${{ width:30,height:30,borderRadius:8,background:m.color||'#E5E5EA',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16 }}>${m.avatar||'👤'}</div>
                    <div><div style=${{ fontSize:12,fontWeight:600 }}>${m.name}</div>${m.role_label&&html`<div style=${{ fontSize:9,color:'#86868B' }}>${m.role_label}</div>`}</div>
                  </div>
                </td>
                <td style=${{ padding:'6px 10px', textAlign:'center' }}>
                  <input type="date" value=${row.start_date||''} onInput=${e=>updateOrgField(m.id,row.manager_id,'start_date',e.target.value||null)}
                    style=${{ border:'1px solid #E5E5EA',borderRadius:6,padding:'3px 5px',fontSize:10,fontFamily:'inherit',outline:'none',width:110 }} />
                </td>
                <td style=${{ padding:'6px 10px', textAlign:'center' }}>
                  <input type="date" value=${row.end_date||''} onInput=${e=>updateOrgField(m.id,row.manager_id,'end_date',e.target.value||null)}
                    style=${{ border:'1px solid #E5E5EA',borderRadius:6,padding:'3px 5px',fontSize:10,fontFamily:'inherit',outline:'none',width:110 }} />
                </td>
                <td style=${{ padding:'6px 10px', textAlign:'center' }}>
                  <div style=${{ display:'flex',alignItems:'center',gap:4,justifyContent:'center' }}>
                    <input type="number" min="0.1" max="1" step="0.1" value=${row.dedication??1}
                      onInput=${e=>updateOrgField(m.id,row.manager_id,'dedication',parseFloat(e.target.value)||1)}
                      style=${{ width:44,border:'1px solid #E5E5EA',borderRadius:6,padding:'3px 6px',fontSize:12,fontWeight:700,textAlign:'center',fontFamily:'inherit',outline:'none' }} />
                    <span style=${{ fontSize:10,color:'#86868B' }}>FTE</span>
                  </div>
                </td>
                <td style=${{ padding:'6px 10px', textAlign:'center' }}>
                  <span style=${{ fontSize:13,fontWeight:700,color:parseFloat(mFTE)>0?'#34C759':'#C7C7CC' }}>${mFTE}</span>
                  <span style=${{ fontSize:9,color:'#86868B',display:'block' }}>${workdays}d</span>
                </td>
              </tr>`;
            })}
            <tr style=${{ background:'#F0F7FF', borderTop:'2px solid #007AFF20' }}>
              <td style=${{ padding:'10px 14px', fontSize:12, fontWeight:700, color:'#007AFF' }}>TOTAL MES</td>
              <td colspan="3"></td>
              <td style=${{ padding:'10px 10px', textAlign:'center' }}>
                <span style=${{ fontSize:16,fontWeight:800,color:'#007AFF' }}>${days.filter(d=>!isWeekend(d)).reduce((s,d)=>s+fteDay(d),0).toFixed(1)}</span>
                <span style=${{ fontSize:9,color:'#86868B',display:'block' }}>FTE·días</span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    `}
  </div>`;
}


/* ═══ PHASE 8 — VACACIONES (calendar view) ═══ */

/* ═══ PACCIONABLES — Gestión entre retros ═══ */
function PAccionables({ actions, sA, risks, user }) {
  const [teamMembers, setTeamMembers] = useState([]);
  const [viewMode,   setViewMode]   = useState('kanban');
  const [filterOwner, setFilterOwner] = useState('all');
  const [dragAct,    setDragAct]    = useState(null);
  const [overCol,    setOverCol]    = useState(null);
  const today = new Date().toISOString().slice(0,10);

  useEffect(() => {
    sbLoadTeamMembers().then(data => {
      const f = data.filter(m=>(m.rooms||[]).includes(SALA));
      setTeamMembers(f.length > 0 ? f : data);
    });
  }, []);

  const upSt = (id, st) => sA(actions.map(a=>a.id===id?{...a,status:st}:a));
  const delA  = (id) => sA(actions.filter(a=>a.id!==id));
  const updA  = (id, patch) => sA(actions.map(a=>a.id===id?{...a,...patch}:a));
  const priO  = {high:3, medium:2, low:1};

  const filtered = [...actions]
    .filter(a => filterOwner==='all' ? true : filterOwner==='mine' ? (a.owner===user.name||a.createdBy===user.id) : a.owner===filterOwner)
    .sort((a,b) => (priO[b.priority]||0)-(priO[a.priority]||0));

  const STS_COLS = [
    { id:'pending',  label:'Pendiente', color:'#FF9500', bg:'#FFF8EB' },
    { id:'progress', label:'En progreso', color:'#007AFF', bg:'#EBF5FF' },
    { id:'done',     label:'Completado', color:'#34C759', bg:'#F0FFF4' },
    { id:'discarded',label:'Descartado', color:'#8E8E93', bg:'#F2F2F7' },
  ];
  const openRisks = (risks||[]).filter(r=>r.status!=='mitigated');

  return html`
    <div style=${{ maxWidth:'100%', padding:'0 0 20px' }}>
      <!-- Header bar -->
      <div style=${{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14, flexWrap:'wrap', gap:8 }}>
        <div style=${{ display:'flex', alignItems:'center', gap:8 }}>
          <h2 style=${{ fontSize:18, fontWeight:700 }}>🎯 Accionables</h2>
          <span style=${{ fontSize:11, color:'#86868B', background:'#F2F2F7', padding:'2px 8px', borderRadius:8 }}>
            ${actions.filter(a=>a.status!=='done'&&a.status!=='discarded').length} pendientes
          </span>
          ${actions.filter(a=>a.status!=='done'&&a.date&&a.date<today).length>0&&html`
            <span style=${{ fontSize:11, color:'#FFF', background:'#FF3B30', padding:'2px 8px', borderRadius:8, fontWeight:700 }}>
              ⚠️ ${actions.filter(a=>a.status!=='done'&&a.date&&a.date<today).length} vencidos
            </span>`}
        </div>
        <div style=${{ display:'flex', gap:6, flexWrap:'wrap' }}>
          <!-- Owner filter -->
          <select value=${filterOwner} onChange=${e=>setFilterOwner(e.target.value)}
            style=${{ border:'1.5px solid #E5E5EA', borderRadius:8, padding:'5px 10px', fontSize:12, fontFamily:'inherit', outline:'none', background:'#FFF' }}>
            <option value="all">Todos</option>
            <option value="mine">👤 Míos</option>
            ${teamMembers.map(m=>html`<option key=${m.id} value=${m.name}>${m.avatar||'👤'} ${m.name}</option>`)}
          </select>
          <!-- View toggle -->
          <button onClick=${()=>setViewMode('kanban')} style=${{ padding:'5px 12px', borderRadius:8, border:'none', background:viewMode==='kanban'?'#1D1D1F':'#F2F2F7', color:viewMode==='kanban'?'#FFF':'#6E6E73', fontSize:11, fontWeight:600, cursor:'pointer' }}>⬜ Kanban</button>
          <button onClick=${()=>setViewMode('list')} style=${{ padding:'5px 12px', borderRadius:8, border:'none', background:viewMode==='list'?'#1D1D1F':'#F2F2F7', color:viewMode==='list'?'#FFF':'#6E6E73', fontSize:11, fontWeight:600, cursor:'pointer' }}>☰ Lista</button>
        </div>
      </div>

      <div style=${{ display:'grid', gridTemplateColumns:'1fr 280px', gap:14, alignItems:'start' }}>
        <!-- Main area -->
        <div>
          ${viewMode==='kanban' ? html`
            <!-- KANBAN -->
            <div style=${{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:10 }}>
              ${STS_COLS.map(col => {
                const colItems = filtered.filter(a=>a.status===col.id);
                return html`
                  <div key=${col.id}
                    data-kanban-col=${col.id}
                    onDragOver=${e=>{ e.preventDefault(); setOverCol(col.id); }}
                    onDrop=${e=>{ e.preventDefault(); if(dragAct) upSt(dragAct,col.id); setDragAct(null); setOverCol(null); }}
                    style=${{ background:overCol===col.id?col.bg:'#F9F9FB', borderRadius:14,
                      border:'2px solid '+(overCol===col.id?col.color+'40':'#E5E5EA'),
                      minHeight:200, padding:10, transition:'all .15s' }}>
                    <div style=${{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
                      <span style=${{ fontSize:11, fontWeight:700, color:col.color }}>${col.label}</span>
                      <span style=${{ fontSize:10, color:'#86868B', background:'#FFF', padding:'1px 7px', borderRadius:8, border:'1px solid #E5E5EA' }}>${colItems.length}</span>
                    </div>
                    ${colItems.map(a => {
                      const pr = PRIS.find(p=>p.id===a.priority)||PRIS[1];
                      const overdue = a.status!=='done'&&a.date&&a.date<today;
                      return html`
                        <div key=${a.id} draggable=${true}
                          onDragStart=${()=>setDragAct(a.id)}
                          onDragEnd=${()=>{ setDragAct(null); setOverCol(null); }}
                          style=${{ background:'#FFF', borderRadius:10, padding:'10px 12px', marginBottom:8,
                            border:'1px solid '+(overdue?'#FF3B3030':'#E5E5EA'),
                            borderLeft:'3px solid '+pr.color, cursor:'grab',
                            boxShadow:'0 1px 4px rgba(0,0,0,.04)', opacity:dragAct===a.id?.4:1 }}>

                            ${a.date&&html`<span style=${{ fontSize:9, color:overdue?'#FF3B30':'#86868B', fontWeight:overdue?700:400 }}>📅 ${a.date}</span>`}

                          <!-- Quick status change -->
                          <div style=${{ display:'flex', gap:3, marginTop:6 }}>
                            ${STS_COLS.filter(s=>s.id!==col.id).map(s=>html`
                              <button key=${s.id} onClick=${()=>upSt(a.id,s.id)} title=${s.label}
                                style=${{ flex:1, padding:'2px', borderRadius:4, border:'none', background:s.bg,
                                  color:s.color, fontSize:8, fontWeight:700, cursor:'pointer' }}>

                            <button onClick=${()=>delA(a.id)} style=${{ width:20, border:'none', background:'#FFF5F5', color:'#FF3B30', fontSize:10, borderRadius:4, cursor:'pointer' }}>✕</button>
                          </div>

                    })}
                    ${colItems.length===0&&html`<div style=${{ textAlign:'center', padding:'20px 0', color:'#C7C7CC', fontSize:11 }}>Vacío</div>`}
                  </div>`;
              })}
            </div>
          ` : html`
            <!-- LIST -->
            <div style=${{ display:'flex', flexDirection:'column', gap:6 }}>
              ${filtered.length===0&&html`<div style=${{ textAlign:'center', padding:32, color:'#C7C7CC', fontSize:13 }}>Sin accionables</div>`}
              ${filtered.map(a => {
                const pr = PRIS.find(p=>p.id===a.priority)||PRIS[1];
                const st = STS_COLS.find(s=>s.id===a.status)||STS_COLS[0];
                const overdue = a.status!=='done'&&a.date&&a.date<today;
                return html`

                        ${a.date&&html`<span style=${{ color:overdue?'#FF3B30':'#86868B' }}>📅 ${a.date}</span>`}
                      </div>
                    </div>
                    <select value=${a.status} onChange=${e=>upSt(a.id,e.target.value)}
                      style=${{ padding:'4px 8px', borderRadius:7, border:'1px solid '+st.color+'30', background:st.bg, color:st.color, fontSize:11, fontWeight:700, outline:'none' }}>
                      ${STS_COLS.map(s=>html`<option key=${s.id} value=${s.id}>${s.label}</option>`)}
                    </select>
                    <button onClick=${()=>delA(a.id)} style=${{ border:'none', background:'none', color:'#C7C7CC', fontSize:13, cursor:'pointer' }}>✕</button>
                  </div>`;
              })}
            </div>
          `}
        </div>

        <!-- Sidebar: active risks -->
        <div style=${{ background:'#FFF', borderRadius:14, border:'1.5px solid #E5E5EA', padding:'14px', position:'sticky', top:0 }}>
          <h4 style=${{ fontSize:12, fontWeight:700, marginBottom:10 }}>⚠️ Riesgos activos</h4>
          ${openRisks.length===0
            ? html`<p style=${{ fontSize:11, color:'#C7C7CC', textAlign:'center', padding:'16px 0' }}>Sin riesgos activos</p>`
            : html`<div style=${{ display:'flex', flexDirection:'column', gap:6 }}>
                ${openRisks.map(r => {
                  const isEscalated = !!r.escalation;
                  return html`
                    <div key=${r.id} style=${{ padding:'8px 10px', borderRadius:9, background:isEscalated?'#F8F5FF':'#F9F9FB',
                      border:'1px solid '+(isEscalated?'#5856D620':'#E5E5EA'),
                      borderLeft:'3px solid '+(isEscalated?'#5856D6':'#FF9500') }}>
                      <p style=${{ fontSize:11, fontWeight:600, marginBottom:2 }}>${r.text}</p>
                      <div style=${{ display:'flex', gap:6, fontSize:9 }}>
                        ${r.owner&&html`<span style=${{ color:'#007AFF' }}>${r.owner}</span>`}
                        ${isEscalated&&html`<span style=${{ color:'#5856D6', fontWeight:700 }}>📈 Escalado → ${r.escalation.memberName||''}</span>`}
                        ${!isEscalated&&html`<span style=${{ color:'#FF9500' }}>En equipo</span>`}
                      </div>
                    </div>`;
                })}
              </div>`}
          <!-- Legend -->
          <div style=${{ marginTop:12, display:'flex', flexDirection:'column', gap:4 }}>
            <div style=${{ display:'flex', alignItems:'center', gap:6 }}>
              <div style=${{ width:8, height:8, borderRadius:2, background:'#FF9500' }}></div>
              <span style=${{ fontSize:10, color:'#86868B' }}>En equipo</span>
            </div>
            <div style=${{ display:'flex', alignItems:'center', gap:6 }}>
              <div style=${{ width:8, height:8, borderRadius:2, background:'#5856D6' }}></div>
              <span style=${{ fontSize:10, color:'#86868B' }}>Escalado</span>
            </div>
          </div>
        </div>
      </div>
    </div>`;
}


/* ═══ PRIESGOS — Risk Management Dashboard ═══ */
function PRiesgos({ risks, sR, notes, actions, retroHistory }) {
  const [teamMembers, setTeamMembers] = useState([]);
  useEffect(() => {
    sbLoadTeamMembers().then(data => {
      const filtered = data.filter(m=>(m.rooms||[]).includes(SALA));
      setTeamMembers(filtered.length > 0 ? filtered : data);
    });
  }, []);
  const [subTab,    setSubTab]    = useState('riesgos');
  const [escalForm, setEscalForm] = useState({riskId:'', level:'alto_mando', responsible:'', deadline:'', note:'', status:'pendiente'});
  const [form,   setForm]   = useState({type:'riesgo', text:'', impact:'medio', prob:'media', owner:'', mitigation:'', status:'open', opportunity:'', deadline:''});
  const [eId,    setEId]    = useState(null);
  const [eF,     setEF]     = useState({});

  // Merge retro risks (from current session) with portfolio risks
  const allRisks = risks || [];

  // ── Alert helpers ──
  const today = new Date();
  const daysSince = (iso) => iso ? Math.floor((today - new Date(iso)) / 86400000) : null;

  // How many retros has this risk appeared in (by id or text similarity)
  const appearsInRetros = (r) => (retroHistory||[]).filter(rt =>
    (rt.data?.risks||[]).some(x => x.id === r.id || x.text === r.text)
  ).length;

  // Does this risk have an overdue action?
  const hasOverdueAction = (r) => (actions||[]).some(a =>
    a.riskId === r.id && a.status !== 'done' && a.status !== 'discarded' &&
    a.date && new Date(a.date) < today
  );

  // Days since last status update (use createdAt as proxy)
  const staledays = (r) => daysSince(r.updatedAt || r.createdAt);

  const escalCfgRuntime = getEscalationConfig();
  const ALERT_THRESHOLDS = { stale: 5, retros: 2 };
  const staleForRisk = (r) => {
    const imp = r.impact || (getRiskLevel ? getRiskLevel(r.impactVotes)?.id : 'medio') || 'medio';
    return escalCfgRuntime[imp]?.days ?? ALERT_THRESHOLDS.stale;
  };

  const getAlerts = (r) => {
    const alerts = [];
    const sd = staledays(r);
    const threshold = staleForRisk(r);
    if (sd !== null && sd >= threshold) alerts.push({ type:'stale', label:`Sin actualizar ${sd}d (límite ${threshold}d)`, color:'#FF9500' });
    const rc = appearsInRetros(r);
    if (rc >= ALERT_THRESHOLDS.retros) alerts.push({ type:'retros', label:`${rc} retros consecutivas`, color:'#FF3B30' });
    if (hasOverdueAction(r)) alerts.push({ type:'overdue', label:'Accionable vencido', color:'#FF3B30' });
    return alerts;
  };

  // Suggested escalations: risks with alerts and not yet escalated
  const suggestedEscalations = allRisks.filter(r =>
    r.status !== 'mitigated' && !r.escalation && getAlerts(r).length > 0
  );

  // Also pull risks from retro history snapshots
  const histRisks = (retroHistory||[]).flatMap(r =>
    (r.data?.risks||[]).map(risk => ({...risk, _fromRetro: fd(r.created_at), _retroId: r.id}))
  );
  // Deduplicate by id
  const histOnly = histRisks.filter(hr => !allRisks.some(r=>r.id===hr.id));

  const byType = (type, arr) => arr.filter(r => (r.type||'riesgo')===type && r.status!=='mitigated');
  const riesgos     = byType('riesgo', allRisks);
  const problemas   = byType('problema', allRisks);
  const oportunidades = byType('oportunidad', allRisks);
  const mitigados   = allRisks.filter(r=>r.status==='mitigated');
  const histRisk    = byType('riesgo', histOnly);

  const IMPACT_LEVELS = {alto:'#FF3B30', medio:'#FF9500', bajo:'#34C759'};
  const PROB_LEVELS   = {alta:'#FF3B30', media:'#FF9500', baja:'#34C759'};
  const heatColor = (imp, prob) => {
    const iv={alto:3,medio:2,bajo:1}[imp]||2;
    const pv={alta:3,media:2,baja:1}[prob]||2;
    const score=iv*pv;
    return score>=6?'#FF3B30':score>=3?'#FF9500':'#34C759';
  };

  const addItem = () => {
    if (!form.text.trim()) return;
    sR([...allRisks, {
      id: uid(), type: form.type, text: form.text.trim(),
      impact: form.impact, prob: form.prob,
      owner: form.owner, mitigation: form.mitigation,
      opportunity: form.opportunity, deadline: form.deadline||'',
      status: 'open', impactVotes:{}, probVotes:{},
      createdAt: new Date().toISOString()
    }]);
    setForm({type:form.type, text:'', impact:'medio', prob:'media', owner:'', mitigation:'', status:'open', opportunity:''});
  };
  const upd = (id, patch) => sR(allRisks.map(r=>r.id===id?{...r,...patch}:r));
  const del = (id) => sR(allRisks.filter(r=>r.id!==id));
  const saveE = () => { sR(allRisks.map(r=>r.id===eId?{...r,...eF}:r)); setEId(null); };

  const TYPE_CONFIG = {
    riesgo:      { label:'Riesgos',       icon:'⚠️', color:'#FF9500', bg:'#FFF9E6', desc:'Amenazas potenciales', btn:'+ Riesgo' },
    problema:    { label:'Problemas',     icon:'🔴', color:'#FF3B30', bg:'#FFF5F5', desc:'Issues activos',       btn:'+ Problema' },
    oportunidad: { label:'Oportunidades', icon:'🌟', color:'#34C759', bg:'#F0FFF4', desc:'Mejoras potenciales',  btn:'+ Oportunidad' },
  };
  const cur = TYPE_CONFIG[subTab] || TYPE_CONFIG.riesgo;
  const curItems = subTab==='riesgos'?riesgos:subTab==='problemas'?problemas:subTab==='oportunidades'?oportunidades:mitigados;

  // rNum: sequential number for display (R1, R2…)
  // Sequential numbers per type
  const riskNum = (r) => {
    const sameType = allRisks.filter(x=>(x.type||'riesgo')===(r.type||'riesgo'));
    return sameType.indexOf(r) + 1;
  };

  const IMPACT_BTNS = [{id:'alto',label:'Alto',color:'#FF3B30'},{id:'medio',label:'Medio',color:'#FF9500'},{id:'bajo',label:'Bajo',color:'#34C759'}];

  const RiskCard = ({r, fromHist}) => {
    const typeKey = r.type||'riesgo';
    const prefix = typeKey==='problema'?'P':typeKey==='oportunidad'?'O':'R';
    const hc = typeKey==='problema' ? '#FF3B30' : heatColor(r.impact||'medio', r.prob||'media');
    const idx = riskNum(r);
    return html`
      <div style=${{ borderRadius:14, background:'#FFF', border:'1.5px solid #E5E5EA',
        borderLeft:'4px solid '+hc, padding:'12px 14px', position:'relative', opacity:fromHist?.7:1 }}>
        ${fromHist && html`<div style=${{ position:'absolute', top:8, right:8, fontSize:9, color:'#86868B', background:'#F2F2F7', padding:'1px 6px', borderRadius:4 }}>📚 ${r._fromRetro}</div>`}
        ${eId===r.id ? html`
          <div style=${{ display:'flex', flexDirection:'column', gap:6 }}>
            <textarea value=${eF.text} onInput=${e=>setEF({...eF,text:e.target.value})}
              style=${{ border:'1.5px solid #E5E5EA', borderRadius:8, padding:'7px', fontSize:12, resize:'vertical', fontFamily:'inherit', outline:'none', minHeight:60 }} />
            <div style=${{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:6 }}>
              <input value=${eF.owner||''} onInput=${e=>setEF({...eF,owner:e.target.value})} placeholder="Responsable"
                style=${{ border:'1.5px solid #E5E5EA', borderRadius:7, padding:'5px 8px', fontSize:11, fontFamily:'inherit', outline:'none' }} />
              <input value=${eF.mitigation||''} onInput=${e=>setEF({...eF,mitigation:e.target.value})} placeholder="Mitigación"
                style=${{ border:'1.5px solid #E5E5EA', borderRadius:7, padding:'5px 8px', fontSize:11, fontFamily:'inherit', outline:'none' }} />
            </div>
            <div style=${{ display:'flex', gap:6 }}>
              <button onClick=${saveE} style=${{ padding:'6px 14px', borderRadius:7, border:'none', background:'#1D1D1F', color:'#FFF', fontSize:11, fontWeight:600, cursor:'pointer' }}>Guardar</button>
              <button onClick=${()=>setEId(null)} style=${{ padding:'6px 12px', borderRadius:7, border:'1.5px solid #E5E5EA', background:'#FFF', fontSize:11, cursor:'pointer' }}>Cancelar</button>
            </div>
          </div>
        ` : html`
          <div>
            <div style=${{ display:'flex', alignItems:'flex-start', gap:8, marginBottom:8 }}>
              <span style=${{ fontSize:13, fontWeight:800, color:hc, minWidth:30 }}>${prefix}${idx}</span>
              <div style=${{ flex:1 }}>
                <p style=${{ fontSize:13, fontWeight:600, margin:'0 0 3px' }}>${r.text}</p>
                ${r.mitigation && html`<p style=${{ fontSize:11, color:'#86868B', margin:0 }}>🛡️ ${r.mitigation}</p>`}
                ${r.opportunity && html`<p style=${{ fontSize:11, color:'#34C759', margin:0 }}>🌟 ${r.opportunity}</p>`}
                ${!fromHist && html`
                  <div style=${{ display:'flex', gap:4, flexWrap:'wrap', marginTop:6 }}>
                    ${getAlerts(r).map(a => html`
                      <span key=${a.type} style=${{ fontSize:9, fontWeight:700, color:'#FFF', background:a.color,
                        padding:'2px 7px', borderRadius:10,
                        animation: a.type==='overdue' ? 'pulse 1.5s infinite' : 'none' }}>
                        ${a.type==='stale'?'⏱':a.type==='retros'?'🔁':'⚠️'} ${a.label}
                      </span>`)}
                  </div>`}
              </div>
              ${r.owner && html`<span style=${{ fontSize:11, fontWeight:600, color:'#007AFF', flexShrink:0 }}>${r.owner}</span>`}
            </div>
            <!-- Impact + Prob vote buttons -->
            <div style=${{ display:'flex', gap:10, alignItems:'center', flexWrap:'wrap' }}>
              <div style=${{ display:'flex', alignItems:'center', gap:4 }}>
                <span style=${{ fontSize:10, color:'#86868B', fontWeight:600, minWidth:50 }}>Impacto:</span>
                ${IMPACT_BTNS.map(l => html`
                  <button key=${l.id} onClick=${()=>!fromHist&&upd(r.id,{impact:l.id})}
                    style=${{ padding:'2px 8px', borderRadius:5,
                      border:(r.impact||'medio')===l.id?'2px solid '+l.color:'1px solid #E5E5EA',
                      background:(r.impact||'medio')===l.id?l.color+'18':'#FFF',
                      fontSize:9, fontWeight:700, color:l.color, cursor:fromHist?'default':'pointer' }}>
                    ${l.label}
                  </button>`)}
              </div>
              <div style=${{ display:'flex', alignItems:'center', gap:4 }}>
                <span style=${{ fontSize:10, color:'#86868B', fontWeight:600, minWidth:35 }}>Prob:</span>
                ${[{id:'alta',label:'Alta',color:'#FF3B30'},{id:'media',label:'Media',color:'#FF9500'},{id:'baja',label:'Baja',color:'#34C759'}].map(l => html`
                  <button key=${l.id} onClick=${()=>!fromHist&&upd(r.id,{prob:l.id})}
                    style=${{ padding:'2px 8px', borderRadius:5,
                      border:(r.prob||'media')===l.id?'2px solid '+l.color:'1px solid #E5E5EA',
                      background:(r.prob||'media')===l.id?l.color+'18':'#FFF',
                      fontSize:9, fontWeight:700, color:l.color, cursor:fromHist?'default':'pointer' }}>
                    ${l.label}
                  </button>`)}
              </div>
              ${!fromHist && html`
                <div style=${{ display:'flex', gap:3, marginLeft:'auto' }}>
                  <select value=${r.status||'open'} onChange=${e=>upd(r.id,{status:e.target.value})}
                    style=${{ fontSize:9, padding:'3px 6px', borderRadius:5, border:'1px solid #E5E5EA', outline:'none', background:'#FFF', cursor:'pointer' }}>
                    <option value="open">Abierto</option>
                    <option value="mitigated">Mitigado</option>
                    <option value="accepted">Aceptado</option>
                  </select>
                  <button onClick=${()=>{setEId(r.id);setEF({text:r.text,owner:r.owner||'',mitigation:r.mitigation||'',opportunity:r.opportunity||''})}}
                    style=${{ border:'none', background:'none', fontSize:12, color:'#86868B', cursor:'pointer' }}>✏️</button>
                  <button onClick=${()=>del(r.id)}
                    style=${{ border:'none', background:'none', fontSize:12, color:'#C7C7CC', cursor:'pointer' }}>✕</button>
                </div>
              `}
            </div>
          </div>
        `}
      </div>`;
  };

  return html`
    <div style=${{ maxWidth:'100%', margin:'0 auto' }}>

      <!-- KPI row -->
      <div style=${{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:10, marginBottom:18 }}>
        ${[
          ['⚠️','Riesgos',      riesgos.length,      '#FF9500'],
          ['🔴','Problemas',     problemas.length,    '#FF3B30'],
          ['🌟','Oportunidades', oportunidades.length,'#34C759'],
          ['✅','Mitigados',     mitigados.length,    '#007AFF'],
        ].map(([ic,lb,val,col])=>html`
          <div style=${{ background:'#FFF', borderRadius:14, padding:'14px 16px', border:'1.5px solid #E5E5EA', textAlign:'center' }}>
            <div style=${{ fontSize:22, marginBottom:4 }}>${ic}</div>
            <div style=${{ fontSize:24, fontWeight:800, color:col }}>${val}</div>
            <div style=${{ fontSize:10, color:'#86868B' }}>${lb}</div>
          </div>`)}
      </div>

      <!-- Heat map 3x3 with dots + hover tooltip -->
      <div style=${{ background:'#FFF', borderRadius:16, border:'1.5px solid #E5E5EA', padding:'16px 18px', marginBottom:16 }}>
        <h4 style=${{ fontSize:13, fontWeight:700, marginBottom:12 }}>🗺️ Mapa de calor de riesgos</h4>
        <div style=${{ display:'flex', gap:16, alignItems:'flex-start' }}>
          <div style=${{ flex:1 }}>
            <div style=${{ display:'grid', gridTemplateColumns:'28px repeat(3,1fr)', gap:3 }}>
              <div style=${{ gridColumn:1, gridRow:'1/5', display:'flex', alignItems:'center', justifyContent:'center' }}>
                <span style=${{ fontSize:9, color:'#86868B', writingMode:'vertical-rl', transform:'rotate(180deg)', fontWeight:700 }}>IMPACTO ↑</span>
              </div>
              ${['Baja','Media','Alta'].map(p=>html`<div style=${{ textAlign:'center', fontSize:9, fontWeight:700, color:'#86868B', paddingBottom:4 }}>${p}</div>`)}
              ${['alto','medio','bajo'].map(imp => html`
                ${['baja','media','alta'].map(prob => {
                  const hc = (imp==='alto'&&(prob==='alta'||prob==='media'))||(imp==='medio'&&prob==='alta') ? '#FF3B30'
                           : (imp==='alto'&&prob==='baja')||(imp==='medio'&&prob==='media')||(imp==='bajo'&&prob==='alta') ? '#FF9500'
                           : '#34C759';
                  const cellRisks = allRisks.filter(r=>
                    r.status!=='mitigated' &&
                    (r.type||'riesgo')!=='problema' &&
                    (r.impact||'medio')===imp &&
                    (r.prob||'media')===prob
                  );
                  return html`
                    <div style=${{ background:hc+'18', border:'1.5px solid '+hc+'30', borderRadius:10,
                      minHeight:64, padding:6, display:'flex', flexWrap:'wrap', gap:4, alignContent:'flex-start', position:'relative' }}>
                      ${cellRisks.length===0 && html`<span style=${{ fontSize:10, color:hc+'50', alignSelf:'center', margin:'auto' }}>·</span>`}
                      ${cellRisks.map(r => {
                        const rn = riskNum(r);
                        const prefix = (r.type||'riesgo')==='oportunidad' ? 'O' : 'R';
                        const dotColor = (r.type||'riesgo')==='oportunidad' ? '#34C759' : hc;
                        const targetTab = (r.type||'riesgo')==='oportunidad' ? 'oportunidades' : 'riesgos';
                        return html`
                          <div key=${r.id} style=${{ position:'relative' }}
                            onMouseEnter=${e=>{ const t=e.currentTarget.querySelector('.rtip'); if(t) t.style.display='block'; }}
                            onMouseLeave=${e=>{ const t=e.currentTarget.querySelector('.rtip'); if(t) t.style.display='none'; }}>
                            <div style=${{ width:28, height:28, borderRadius:14, background:dotColor, color:'#FFF',
                              fontSize:10, fontWeight:800, display:'flex', alignItems:'center', justifyContent:'center',
                              border:'2px solid #FFF', boxShadow:'0 2px 6px '+dotColor+'50', cursor:'pointer' }}
                              onClick=${()=>setSubTab(targetTab)}>
                              ${prefix}${rn}
                            </div>
                            <!-- Hover tooltip -->
                            <div class="rtip" style=${{ display:'none', position:'absolute', bottom:34, left:'50%', transform:'translateX(-50%)',
                              background:'#1D1D1F', color:'#FFF', borderRadius:10, padding:'8px 10px', fontSize:11,
                              zIndex:9999, width:180, boxShadow:'0 4px 16px rgba(0,0,0,.25)', pointerEvents:'none',
                              lineHeight:1.4 }}>
                              <div style=${{ fontWeight:700, marginBottom:3, color:dotColor }}>${prefix}${rn} ${(r.type||'riesgo')==='oportunidad'?'🌟':'⚠️'}</div>
                              <div style=${{ marginBottom:4 }}>${r.text}</div>
                              ${r.owner && html`<div style=${{ fontSize:10, color:'#86868B' }}>👤 ${r.owner}</div>`}
                              ${r.mitigation && html`<div style=${{ fontSize:10, color:'#86868B' }}>🛡️ ${r.mitigation}</div>`}
                              <!-- triangle -->
                              <div style=${{ position:'absolute', bottom:-5, left:'50%', transform:'translateX(-50%)',
                                width:0, height:0, borderLeft:'5px solid transparent', borderRight:'5px solid transparent', borderTop:'5px solid #1D1D1F' }}></div>
                            </div>
                          </div>`;
                      })}
                    </div>`;
                })}
              `)}
              <div style=${{ gridColumn:'2/5', textAlign:'center', paddingTop:4 }}>
                <span style=${{ fontSize:9, color:'#86868B', fontWeight:700 }}>PROBABILIDAD →</span>
              </div>
            </div>
          </div>
          <!-- Legend + row labels -->
          <div style=${{ display:'flex', flexDirection:'column', gap:6, minWidth:100 }}>

            ${tlabel}
          </button>`)}
      </div>

      <div style=${{ display:'grid', gridTemplateColumns:'1fr 320px', gap:14, alignItems:'start' }}>

        <!-- Main list -->
        <div style=${{ display:'flex', flexDirection:'column', gap:8 }}>
          ${subTab==='escalado' ? html`
            <${EscaladoPanel} risks=${allRisks} upd=${upd} escalForm=${escalForm} setEscalForm=${setEscalForm} />
          ` : subTab==='sugeridos' ? html`
            <${SuggestedEscalations} risks=${suggestedEscalations} allRisks=${allRisks} getAlerts=${getAlerts} upd=${upd} setSubTab=${setSubTab} setEscalForm=${setEscalForm} />
          ` : subTab==='historial' ? html`
            <h4 style=${{ fontSize:13, fontWeight:700, color:'#86868B', marginBottom:4 }}>📚 Riesgos de retros anteriores (solo lectura)</h4>
            ${histOnly.length===0
              ? html`<div style=${{ textAlign:'center', padding:32, color:'#C7C7CC' }}><p style=${{ fontSize:32 }}>📭</p><p>Sin historial de riesgos</p></div>`
              : histOnly.map(r => html`<${RiskCard} key=${r.id} r=${r} fromHist=${true} />`)}
          ` : subTab==='mitigados' ? html`
            ${mitigados.length===0
              ? html`<div style=${{ textAlign:'center', padding:32, color:'#C7C7CC' }}><p style=${{ fontSize:32 }}>✅</p><p>Sin elementos resueltos aún</p></div>`
              : mitigados.map(r => html`<${RiskCard} key=${r.id} r=${r} fromHist=${false} />`)}
          ` : html`
            ${curItems.length===0 && html`
              <div style=${{ textAlign:'center', padding:32, color:'#C7C7CC', border:'2px dashed #E5E5EA', borderRadius:14 }}>
                <p style=${{ fontSize:32, marginBottom:8 }}>${cur.icon}</p>
                <p style=${{ fontSize:14 }}>Sin ${cur.label.toLowerCase()} activos</p>
                <p style=${{ fontSize:12, marginTop:4 }}>${cur.desc}</p>
              </div>`}
            ${curItems.map(r => html`<${RiskCard} key=${r.id} r=${r} fromHist=${false} />`)}

        </div>

        <!-- Add form (right panel) -->
        ${subTab!=='mitigados' && subTab!=='historial' && subTab!=='escalado' && subTab!=='sugeridos' && html`
          <div style=${{ background:'#FFF', borderRadius:16, border:'1.5px solid #E5E5EA', padding:'16px', position:'sticky', top:0 }}>
            <h4 style=${{ fontSize:13, fontWeight:700, marginBottom:12 }}>➕ Nuevo ${subTab==='riesgos'?'riesgo':subTab==='problemas'?'problema':'oportunidad'}</h4>
            <div style=${{ display:'flex', flexDirection:'column', gap:8 }}>
              <textarea value=${form.text} onInput=${e=>setForm({...form,text:e.target.value,type:subTab==='riesgos'?'riesgo':subTab==='problemas'?'problema':'oportunidad'})}
                placeholder=${subTab==='oportunidades'?'Describe la oportunidad…':'Describe el riesgo o problema…'}
                onKeyDown=${e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addItem();}}}
                style=${{ border:'1.5px solid #E5E5EA', borderRadius:10, padding:'9px 12px', fontSize:13, resize:'vertical', fontFamily:'inherit', outline:'none', minHeight:72 }} />
              ${subTab!=='oportunidades' && html`
                <div style=${{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:6 }}>
                  <select value=${form.impact} onChange=${e=>setForm({...form,impact:e.target.value})}
                    style=${{ border:'1.5px solid #E5E5EA', borderRadius:8, padding:'7px 10px', fontSize:12, outline:'none', fontFamily:'inherit' }}>
                    <option value="alto">Impacto: Alto</option>
                    <option value="medio">Impacto: Medio</option>
                    <option value="bajo">Impacto: Bajo</option>
                  </select>
                  <select value=${form.prob} onChange=${e=>setForm({...form,prob:e.target.value})}
                    style=${{ border:'1.5px solid #E5E5EA', borderRadius:8, padding:'7px 10px', fontSize:12, outline:'none', fontFamily:'inherit' }}>
                    <option value="alta">Prob: Alta</option>
                    <option value="media">Prob: Media</option>
                    <option value="baja">Prob: Baja</option>
                  </select>
                </div>
              `}
              <select value=${form.owner} onChange=${e=>setForm({...form,owner:e.target.value})}
                style=${{ border:'1.5px solid #E5E5EA', borderRadius:8, padding:'7px 10px', fontSize:12, fontFamily:'inherit', outline:'none' }}>
                <option value="">— Responsable —</option>
                ${teamMembers.map(m=>html`<option key=${m.id} value=${m.name}>${m.avatar||'👤'} ${m.name}</option>`)}
              </select>
              <input value=${form.mitigation||''} onInput=${e=>setForm({...form,mitigation:e.target.value})}
                placeholder=${subTab==='oportunidades'?'¿Cómo aprovecharla?':'Plan de mitigación'}
                style=${{ border:'1.5px solid #E5E5EA', borderRadius:8, padding:'7px 12px', fontSize:12, fontFamily:'inherit', outline:'none' }} />
              <div>
                <label style=${{ fontSize:10, color:'#86868B', display:'block', marginBottom:3 }}>Fecha resolución prevista</label>
                <input type="date" value=${form.deadline||''} onInput=${e=>setForm({...form,deadline:e.target.value})}
                  style=${{ width:'100%', border:'1.5px solid #E5E5EA', borderRadius:8, padding:'7px 10px', fontSize:12, fontFamily:'inherit', outline:'none' }} />
              </div>
              <button onClick=${addItem}
                style=${{ padding:'9px', borderRadius:9, border:'none', background:cur.color, color:'#FFF', fontSize:13, fontWeight:700, cursor:'pointer' }}>
                ${cur.btn}
              </button>
            </div>
          </div>
        `}
      </div>
    </div>`;
}


function PVacaciones({ embeddedTeam }) {
  const [team,    setTeam]   = useState(loadTeamData);
  const [sbMembers, setSbMembers] = useState([]);
  useEffect(() => {
    if (embeddedTeam && embeddedTeam.length > 0) {
      setTeam(embeddedTeam);
      const allVacs = embeddedTeam.flatMap(m=>(m.vacations||[]).map(v=>({...v,memberId:m.id,name:v.name||m.name})));
      setVacs(allVacs); saveVacsLocal(allVacs);
      return;
    }
    sbLoadTeamMembers().then(data => {
      const salaMembers = data.filter(m=>(m.rooms||[]).includes(SALA));
      setSbMembers(salaMembers);
      if (salaMembers.length > 0) {
        const merged = salaMembers.map(m=>({id:m.id,name:m.name,avatar:m.avatar||'👤',role:m.role||'',color:m.color||'#007AFF'}));
        setTeam(merged); saveTeamLocal(merged);
      }
      const allVacs = data.flatMap(m => (m.vacations||[]).map(v=>({...v, memberId:m.id, name:v.name||m.name})));
      setVacs(allVacs); saveVacsLocal(allVacs);
    });
  }, []);
  const [vacs, setVacs] = useState(loadVacsData);
  const [newVac,  setNewVac] = useState({memberId:'', name:'', from:'', to:'', note:''});
  const [saving,  setSaving] = useState(false);
  const today = new Date();
  const [viewYear,  setViewYear]  = useState(today.getFullYear());
  const [viewMonth, setViewMonth] = useState(today.getMonth()); // 0-11

  const MONTH_NAMES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const days = Array.from({length:daysInMonth},(_,i)=>i+1);
  const todayStr = today.toISOString().slice(0,10);

  const prevMonth = () => { if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);} else setViewMonth(m=>m-1); };
  const nextMonth = () => { if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);} else setViewMonth(m=>m+1); };
  const goToday   = () => { setViewYear(today.getFullYear()); setViewMonth(today.getMonth()); };

  // Load holidays from Supabase calendars assigned to sala members
  const [calHolidays, setCalHolidays] = useState([]);
  useEffect(() => {
    sbLoadTeamMembers().then(members => {
      const salaMembers = members.filter(m=>(m.rooms||[]).includes(SALA));
      const calIds = [...new Set(salaMembers.map(m=>m.calendar_id).filter(Boolean))];
      if (calIds.length === 0) return;
      sbLoadCalendars().then(cals => {
        const relevant = cals.filter(c=>calIds.includes(c.id));
        const allH = [...new Set(relevant.flatMap(c=>(c.holidays||[]).map(h=>h.date.slice(5))))]; // MM-DD
        setCalHolidays(allH);
      });
    });
  }, []);
  const HOLIDAYS = calHolidays.length > 0 ? calHolidays : ['01-01','01-06','02-28','05-01','06-24','08-15','10-12','11-01','12-06','12-08','12-25','12-26'];
  const isOnVac = (member, day) => {
    const dateStr = viewYear+'-'+String(viewMonth+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    return vacs.some(v =>
      (v.memberId===member.id || v.name===member.name) &&
      v.from <= dateStr &&
      (!v.to || v.to >= dateStr)
    );
  };
  const isWeekend = (day) => { const d=new Date(viewYear,viewMonth,day).getDay(); return d===0||d===6; };
  const isToday   = (day) => todayStr === viewYear+'-'+String(viewMonth+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
  const isHoliday = (day) => { const mm=String(viewMonth+1).padStart(2,'0'); const dd=String(day).padStart(2,'0'); return HOLIDAYS.includes(mm+'-'+dd); };

  const persist = async (t, v) => {
    saveTeamLocal(t); saveVacsLocal(v);
    setSaving(true);
    await saveTeamSupabase(t, v);
    setSaving(false);
  };

  const addVac = () => {
    const member = newVac.memberId ? team.find(m=>m.id===newVac.memberId) : null;
    const name = member?.name || newVac.name.trim();
    if (!name || !newVac.from) return;
    const newEntry = {id:uid(), memberId:newVac.memberId||null, name, from:newVac.from, to:newVac.to||newVac.from, note:newVac.note};
    const v = [...vacs, newEntry];
    setVacs(v); saveVacsLocal(v);
    setNewVac({memberId:'',name:'',from:'',to:'',note:''});
    // Save globally to the team_member record
    if (newVac.memberId) {
      const memberVacs = v.filter(x=>x.memberId===newVac.memberId);
      sbSaveMemberVacs(newVac.memberId, memberVacs);
    }
  };
  const delVac = id => {
    const removing = vacs.find(x=>x.id===id);
    const v = vacs.filter(x=>x.id!==id); setVacs(v); saveVacsLocal(v);
    if (removing?.memberId) {
      const memberVacs = v.filter(x=>x.memberId===removing.memberId);
      sbSaveMemberVacs(removing.memberId, memberVacs);
    }
  };

  // Active vacations this month
  const monthStart = viewYear+'-'+String(viewMonth+1).padStart(2,'0')+'-01';
  const monthEnd   = viewYear+'-'+String(viewMonth+1).padStart(2,'0')+'-'+String(daysInMonth).padStart(2,'0');
  const activeThisMonth = vacs.filter(v => v.from<=monthEnd && (!v.to||v.to>=monthStart));

  // Use team; if team is empty, build from vac names
  const members = team.length > 0 ? team
    : [...new Set(vacs.map(v=>v.name))].map((n,i)=>({id:'anon-'+i,name:n,avatar:'👤',role:''}));

  return html`
    <div style=${{ maxWidth:960, margin:'0 auto' }}>

      <!-- Month nav -->
      <div style=${{ display:'flex', alignItems:'center', gap:12, marginBottom:16 }}>
        <button onClick=${prevMonth} style=${{ width:32,height:32,borderRadius:8,border:'1.5px solid #E5E5EA',background:'#FFF',fontSize:16,cursor:'pointer' }}>‹</button>
        <h2 style=${{ fontSize:20, fontWeight:700, flex:1, textAlign:'center' }}>${MONTH_NAMES[viewMonth]} ${viewYear}</h2>
        <button onClick=${nextMonth} style=${{ width:32,height:32,borderRadius:8,border:'1.5px solid #E5E5EA',background:'#FFF',fontSize:16,cursor:'pointer' }}>›</button>
        <button onClick=${goToday} style=${{ padding:'6px 14px', borderRadius:8, border:'1.5px solid #007AFF20', background:'#007AFF10', color:'#007AFF', fontSize:12, fontWeight:600, cursor:'pointer' }}>Hoy</button>
        ${saving && html`<span style=${{ fontSize:11, color:'#007AFF' }}>💾</span>`}
        <span style=${{ fontSize:11, color:'#86868B' }}>${activeThisMonth.length} ausencias este mes</span>
        <div style=${{ display:'flex', gap:10, fontSize:10, alignItems:'center' }}>
          <span><span style=${{ display:'inline-block', width:18, height:18, background:'#C8F0D0', border:'1px solid #ccc', borderRadius:3, marginRight:3, textAlign:'center', lineHeight:'18px', fontSize:9, fontWeight:600, color:'#2D8A4E' }}>L</span>Laboral</span>
          <span><span style=${{ display:'inline-block', width:18, height:18, background:'#E0E0E0', border:'1px solid #ccc', borderRadius:3, marginRight:3 }}></span>Fin semana</span>
          <span><span style=${{ display:'inline-block', width:18, height:18, background:'#EEEEFF', border:'1px solid #ccc', borderRadius:3, marginRight:3, textAlign:'center', lineHeight:'18px', fontSize:9, fontWeight:600, color:'#5856D6' }}>F</span>Festivo</span>
          <span><span style=${{ display:'inline-block', width:18, height:18, background:'#FF9500', border:'1px solid #ccc', borderRadius:3, marginRight:3, textAlign:'center', lineHeight:'18px', fontSize:9, fontWeight:800, color:'#FFF' }}>V</span>Vacaciones</span>
        </div>
      </div>

      <!-- Calendar grid -->
      ${members.length === 0 ? html`
        <div style=${{ textAlign:'center', padding:'48px 20px', color:'#C7C7CC', border:'2px dashed #E5E5EA', borderRadius:16, marginBottom:20 }}>
          <p style=${{ fontSize:40, marginBottom:8 }}>👥</p>
          <p style=${{ fontSize:14 }}>Añade miembros en la pestaña Equipo para ver el calendario</p>
        </div>
      ` : html`
        <div style=${{ background:'#FFF', borderRadius:16, border:'1.5px solid #E5E5EA', overflow:'auto', marginBottom:20 }}>
          <table style=${{ width:'100%', borderCollapse:'collapse', minWidth: members.length>0?600:0 }}>
            <thead>
              <tr style=${{ background:'#F9F9FB' }}>
                <!-- Member column -->
                <th style=${{ padding:'10px 14px', textAlign:'left', fontSize:11, fontWeight:700, color:'#86868B',
                  position:'sticky', left:0, background:'#F9F9FB', borderBottom:'2px solid #E5E5EA',
                  borderRight:'1px solid #E5E5EA', minWidth:140, zIndex:2 }}>Miembro</th>
                <!-- Day columns -->
                ${days.map(d => {
                  const wknd = isWeekend(d);
                  const td   = isToday(d);
                  const dow  = ['D','L','M','X','J','V','S'][new Date(viewYear,viewMonth,d).getDay()];
                  return html`
                    <th key=${d} style=${{ padding:'4px 2px', textAlign:'center', fontSize:10,
                      fontWeight:td?800:500, color:td?'#007AFF':wknd?'#86868B':isHoliday(d)?'#5856D6':'#86868B',
                      background:td?'#007AFF10':wknd?'#E8F4FD':isHoliday(d)?'#EEEEFF':'#F9F9FB',
                      borderBottom:'2px solid '+(td?'#007AFF':isHoliday(d)?'#5856D640':'#E5E5EA'),
                      borderLeft:'1px solid #F2F2F7', minWidth:26 }}>
                      <div>${d}</div>
                      <div style=${{ fontSize:8, fontWeight:400 }}>${dow}</div>
                    </th>`;
                })}
              </tr>
            </thead>
            <tbody>
              ${members.map((m,mi) => html`
                <tr key=${m.id} style=${{ background:mi%2===0?'#FFF':'#FAFAFA' }}>
                  <!-- Member cell -->
                  <td style=${{ padding:'8px 14px', position:'sticky', left:0, background:mi%2===0?'#FFF':'#FAFAFA',
                    borderRight:'1px solid #E5E5EA', borderBottom:'1px solid #F2F2F7', zIndex:1 }}>
                    <div style=${{ display:'flex', alignItems:'center', gap:8 }}>
                      <div style=${{ width:36, height:36, borderRadius:10, background: m.color||'#E5E5EA',
                        display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, flexShrink:0 }}>${m.avatar||'👤'}</div>
                      <div>
                        <div style=${{ fontSize:12, fontWeight:600, color:'#1D1D1F', whiteSpace:'nowrap' }}>${m.name}</div>
                        ${m.role && html`<div style=${{ fontSize:10, color:'#86868B' }}>${m.role}</div>`}
                      </div>
                    </div>
                  </td>
                  <!-- Day cells -->
                  ${days.map(d => {
                    const onVac  = isOnVac(m, d);
                    const wknd   = isWeekend(d);
                    const holi   = isHoliday(d);
                    const td     = isToday(d);
                    const bg     = onVac ? '#FF9500' : wknd ? '#E0E0E0' : holi ? '#EEEEFF' : '#C8F0D0';
                    const label  = onVac ? 'V' : wknd ? '' : holi ? 'F' : 'L';
                    const color  = onVac ? '#FFF' : wknd ? '#888' : holi ? '#5856D6' : '#2D8A4E';
                    const fw     = onVac ? 800 : 600;
                    return html`
                      <td key=${d} title=${onVac?m.name+' - vacaciones':wknd?'Fin de semana':holi?'Festivo':'Laboral'}
                        style=${{ padding:'1px', textAlign:'center', borderBottom:'1px solid #F2F2F7', borderLeft:'1px solid #F2F2F7',
                          background:td?'#007AFF20':bg, minWidth:26, outline:td?'2px solid #007AFF':'none', outlineOffset:'-2px' }}>
                        <div style=${{ fontSize:9, fontWeight:fw, color:td?'#007AFF':color, lineHeight:'18px', height:18 }}>${label}</div>
                      </td>`;
                  })}
                </tr>`)}
            </tbody>
          </table>
        </div>
      `}

      <!-- Vacation list for this month -->
      <div style=${{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>

        <!-- Active/upcoming -->
        <div style=${{ background:'#FFF', borderRadius:14, border:'1.5px solid #E5E5EA', padding:'14px 16px' }}>
          <h3 style=${{ fontSize:13, fontWeight:700, marginBottom:10, color:'#1D1D1F' }}>📅 Ausencias — ${MONTH_NAMES[viewMonth]}</h3>
          ${activeThisMonth.length===0 && html`<p style=${{ fontSize:12, color:'#C7C7CC' }}>Sin ausencias este mes</p>`}
          ${activeThisMonth.map(v => {
            const isActive = v.from<=todayStr && (!v.to||v.to>=todayStr);
            return html`
              <div key=${v.id} style=${{ display:'flex', alignItems:'center', gap:8, padding:'7px 0', borderBottom:'1px solid #F2F2F7' }}>
                <span style=${{ fontSize:14 }}>${isActive?'🏖️':'📅'}</span>
                <div style=${{ flex:1 }}>
                  <span style=${{ fontSize:12, fontWeight:600 }}>${v.name}</span>
                  <div style=${{ fontSize:10, color:'#86868B' }}>${v.from}${v.to&&v.to!==v.from?' → '+v.to:''}${v.note?' · '+v.note:''}</div>
                </div>
                ${isActive && html`<span style=${{ fontSize:9, color:'#FF9500', fontWeight:700, background:'#FF950015', padding:'2px 7px', borderRadius:4 }}>HOY</span>`}
                <button onClick=${()=>delVac(v.id)} style=${{ border:'none',background:'none',color:'#C7C7CC',fontSize:14,cursor:'pointer' }}>✕</button>
              </div>`;
          })}
        </div>

        <!-- Add vacation form -->
        <div style=${{ background:'#F9F9FB', borderRadius:14, border:'1.5px solid #E5E5EA', padding:'14px 16px' }}>
          <h3 style=${{ fontSize:13, fontWeight:700, marginBottom:10 }}>➕ Registrar ausencia</h3>
          <div style=${{ display:'flex', flexDirection:'column', gap:8 }}>
            <select value=${newVac.memberId} onChange=${e=>setNewVac({...newVac,memberId:e.target.value,name:''})}
              style=${{ border:'1.5px solid #E5E5EA', borderRadius:8, padding:'8px 10px', fontSize:12, background:'#FFF', outline:'none', fontFamily:'inherit' }}>
              <option value="">— Selecciona miembro —</option>
              ${members.map(m=>html`<option key=${m.id} value=${m.id}>${m.avatar} ${m.name}</option>`)}
              <option value="__other__">Otro (escribir nombre)</option>
            </select>
            ${newVac.memberId==='__other__' && html`
              <input value=${newVac.name} onInput=${e=>setNewVac({...newVac,name:e.target.value})}
                placeholder="Nombre"
                style=${{ border:'1.5px solid #E5E5EA', borderRadius:8, padding:'8px 10px', fontSize:12, background:'#FFF', outline:'none', fontFamily:'inherit' }} />`}
            <div style=${{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
              <div>
                <label style=${{ fontSize:9, color:'#86868B', display:'block', marginBottom:2 }}>Desde</label>
                <input type="date" value=${newVac.from} onInput=${e=>setNewVac({...newVac,from:e.target.value})}
                  style=${{ width:'100%', border:'1.5px solid #E5E5EA', borderRadius:8, padding:'7px 8px', fontSize:12, outline:'none', fontFamily:'inherit', background:'#FFF' }} />
              </div>
              <div>
                <label style=${{ fontSize:9, color:'#86868B', display:'block', marginBottom:2 }}>Hasta</label>
                <input type="date" value=${newVac.to} onInput=${e=>setNewVac({...newVac,to:e.target.value})}
                  style=${{ width:'100%', border:'1.5px solid #E5E5EA', borderRadius:8, padding:'7px 8px', fontSize:12, outline:'none', fontFamily:'inherit', background:'#FFF' }} />
              </div>
            </div>
            <input value=${newVac.note||''} onInput=${e=>setNewVac({...newVac,note:e.target.value})}
              placeholder="Nota (opcional)"
              style=${{ border:'1.5px solid #E5E5EA', borderRadius:8, padding:'8px 10px', fontSize:12, background:'#FFF', outline:'none', fontFamily:'inherit' }} />
