function RetroBoard({ user, onLogout }) {
  const { state, upd, online, cursors, moveCursor, reset, broadcastTimer, broadcastPhase } = useRealtime(user);
  const [mainTab, setMainTab] = useState('retro');
  const [phase, setPhase] = useState(() => loadRetroPhase());
  const [timer,   setTimer]   = useState(900);
  const [running, setRunning] = useState(false);
  const [showTimerEnd,     setShowTimerEnd]     = useState(false);
  const [showPhaseConfirm, setShowPhaseConfirm] = useState(null);
  const [phaseTimes, setPhaseTimes] = useState(() => loadPhaseTimes()); // { phaseIdx: totalSeconds }
  const phaseStartRef = useRef(Date.now()); // when current phase started (wall clock)

  // Register phase receiver — also saves phase and records time
  const advanceToPhase = useCallback((target) => {
    const elapsed = Math.round((Date.now() - phaseStartRef.current) / 1000);
    setPhaseTimes(prev => {
      const next = { ...prev, [phase]: (prev[phase]||0) + elapsed };
      savePhaseTimes(next);
      return next;
    });
    phaseStartRef.current = Date.now();
    setPhase(target);
    saveRetroPhase(target);
  }, [phase]);

  useEffect(() => { window.__phaseRecv = (p) => advanceToPhase(p); }, [advanceToPhase]);

  // Register timer receiver (for broadcast from other users)
  useEffect(() => {
    window.__timerRecv = (secs, isRunning, startedAt) => {
      if (isRunning && startedAt) {
        const elapsed = Math.floor((Date.now() - startedAt) / 1000);
        const current = Math.max(0, secs - elapsed);
        setTimer(current); setRunning(current > 0);
      } else {
        setTimer(secs); setRunning(isRunning);
      }
    };
    return () => { window.__timerRecv = null; };
  }, []);

  // Helper: set timer + broadcast to all
  const startedAtRef = useRef(null);
  const syncTimer = useCallback((secs, isRunning) => {
    if (isRunning) startedAtRef.current = Date.now();
    else startedAtRef.current = null;
    setTimer(secs); setRunning(isRunning);
    broadcastTimer(secs, isRunning, isRunning ? startedAtRef.current : null);
  }, [broadcastTimer]);

  // Re-broadcast every 10s while running so latecomers sync
  useEffect(() => {
    if (!running) return;
    const iv = setInterval(() => {
      broadcastTimer(timerValRef.current, true, startedAtRef.current);
    }, 10000);
    return () => clearInterval(iv);
  }, [running, broadcastTimer]);
  const [showReset,         setShowReset]         = useState(false);
  const [showGuide,         setShowGuide]         = useState(false);
  const [showHistorial,     setShowHistorial]     = useState(false);
  const [showProjectSwitch, setShowProjectSwitch] = useState(false);
  const [showProfile,       setShowProfile]       = useState(false);
  const [profileTab,        setProfileTab]        = useState('perfil');
  const [notifications,     setNotifications]     = useState([]);
  const [showNotifs,        setShowNotifs]        = useState(false);
  const addNotif = useCallback((msg, type='info') => {
    const n = {id:uid(), msg, type, ts:Date.now()};

    setTimeout(()=>setNotifications(prev=>prev.filter(x=>x.id!==n.id)), 6000);
  }, []);
  useEffect(() => {
    if (!state.risks) return;
    const today = new Date().toISOString().slice(0,10);
    state.risks.forEach(r => {
      if (r.escalation?.memberName && r.escalation?.status==='pendiente') {

  ];
  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

    return () => clearInterval(tRef.current);
  }, [running]);

  useEffect(() => {
    if (!bRef.current) return;
    let last = 0;
    const h = e => {
      if (Date.now()-last<400) return; last=Date.now();
      const r = bRef.current.getBoundingClientRect();

</head><body>

</div>

  const tog = id => sT(tasks.map(t=>t.id===id?{...t,done:!t.done}:t));
  const del = id => sT(tasks.filter(t=>t.id!==id));
  const saveE = () => { if(!eVal.trim())del(eId); else sT(tasks.map(t=>t.id===eId?{...t,text:eVal.trim()}:t)); setEId(null); };
  const dc = tasks.filter(t=>t.done).length;

  return html`
    <div style=${{ maxWidth:860, margin:'0 auto', display:'flex', flexDirection:'column', gap:14 }}>
      <div style=${{ ...cS, padding:22 }}>
        <h3 style=${{ fontSize:15, fontWeight:700, marginBottom:12 }}>🎯 Objetivo de la iteración</h3>
        <textarea value=${obj.text} onInput=${e=>sO({...obj,text:e.target.value})} placeholder="¿Cuál era el objetivo principal?" style=${{ ...iS, height:52, resize:'none' }} />
        <div style=${{ display:'flex', gap:6, marginTop:10 }}>
          ${[{v:true,l:'✅ Cumplido',c:'#34C759'},{v:false,l:'❌ No cumplido',c:'#FF3B30'},{v:'partial',l:'⚠️ Parcial',c:'#FF9500'}].map(o=>html`
            <button key=${String(o.v)} onClick=${()=>sO({...obj,met:o.v})} style=${{ padding:'7px 14px', borderRadius:9, border:obj.met===o.v?'2px solid '+o.c:'1.5px solid #E5E5EA', background:obj.met===o.v?o.c+'10':'#FFF', fontSize:12, fontWeight:600, color:obj.met===o.v?o.c:'#6E6E73' }}>${o.l}</button>
          `)}
        </div>
      </div>
      <div style=${{ ...cS, padding:22 }}>
        <div style=${{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12 }}>
          <h3 style=${{ fontSize:15, fontWeight:700 }}>📋 Tareas de la iteración</h3>
          <span style=${{ fontSize:11, fontWeight:700, color:dc===tasks.length&&tasks.length>0?'#34C759':'#86868B', background:'#F2F2F7', padding:'3px 8px', borderRadius:6 }}>${dc}/${tasks.length}</span>
        </div>
        ${tasks.length>0 && html`<div style=${{ height:5, background:'#F2F2F7', borderRadius:3, marginBottom:12, overflow:'hidden' }}><div style=${{ height:'100%', width:(tasks.length?(dc/tasks.length)*100:0)+'%', background:'linear-gradient(90deg,#34C759,#007AFF)', borderRadius:3, transition:'width .3s' }} /></div>`}
        <div style=${{ display:'flex', gap:6, marginBottom:12 }}><input value=${nt} onInput=${e=>setNt(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&add()} placeholder="Añadir tarea..." style=${{ ...iS, flex:1 }} /><button onClick=${add} style=${{ ...bP, padding:'10px 14px' }}>+</button></div>
        <div style=${{ display:'flex', flexDirection:'column', gap:5 }}>
          ${tasks.map(t=>html`
            <div key=${t.id} style=${{ display:'flex', alignItems:'center', gap:8, padding:'9px 12px', borderRadius:10, background:t.done?'#F0FFF4':'#F9F9FB', border:'1px solid '+(t.done?'#34C75922':'#E5E5EA') }}>
              <div onClick=${()=>tog(t.id)} style=${{ width:20, height:20, borderRadius:6, border:t.done?'none':'2px solid #C7C7CC', background:t.done?'#34C759':'#FFF', display:'flex', alignItems:'center', justifyContent:'center', color:'#FFF', fontSize:11, flexShrink:0, cursor:'pointer' }}>${t.done&&'✓'}</div>
              ${eId===t.id
                ? html`<div style=${{ flex:1, display:'flex', gap:4 }}><input autofocus value=${eVal} onInput=${e=>setEVal(e.target.value)} onKeyDown=${e=>{if(e.key==='Enter')saveE();if(e.key==='Escape')setEId(null)}} style=${{ ...iS, padding:'6px 10px', fontSize:13, flex:1 }} /><button onClick=${saveE} style=${{ ...bP, padding:'6px 12px', fontSize:12 }}>✓</button></div>`
                : html`<span onDblClick=${()=>{setEId(t.id);setEVal(t.text)}} style=${{ fontSize:13, color:t.done?'#86868B':'#1D1D1F', textDecoration:t.done?'line-through':'none', flex:1, cursor:'text' }} title="Doble clic para editar">${t.text}</span>`}
              <button onClick=${()=>del(t.id)} style=${{ border:'none', background:'none', fontSize:14, color:'#C7C7CC', padding:'2px 4px', flexShrink:0 }}>✕</button>
            </div>
          `)}
        </div>
      </div>
    </div>
  `;
}

/* ═══ BOARD ═══ */
function Board({ notes, sN, user, filter, hideOthers }) {
  // Close any open reaction pickers on click outside
  useEffect(() => {
    const close = () => document.querySelectorAll('[id^="rpick-"]').forEach(x=>x.style.display='none');
    document.addEventListener('click', close);
    return () => document.removeEventListener('click', close);
  }, []);
  const [act,      setAct]      = useState(null);
  const [txt,      setTxt]      = useState('');
  const [eId,      setEId]      = useState(null);
  const [eVal,     setEVal]     = useState('');
  const [dragId,   setDragId]   = useState(null);
  const [overCat,  setOverCat]  = useState(null);
  const [touchInfo,setTouchInfo]= useState(null); // {id, x, y}
  const touchRef = useRef(null);

  const addN = c => { if(!txt.trim())return; sN([...notes,{id:uid(),text:txt.trim(),category:c,userId:user.id,userName:user.name,userAvatar:user.avatar,userColor:user.color,voters:[],reactions:{}}]); setTxt(''); setAct(null); };
  const vote = nid => sN(notes.map(n=>{if(n.id!==nid)return n;const v=n.voters||[];return{...n,voters:v.includes(user.id)?v.filter(x=>x!==user.id):[...v,user.id]}}));
  const react = (nid, emoji) => sN(notes.map(n=>{
    if(n.id!==nid) return n;
    const r = {...(n.reactions||{})};
    // Remove this user from ALL other emojis first (one reaction per user)
    Object.keys(r).forEach(e => { if(e!==emoji) r[e]=r[e].filter(x=>x!==user.id); if(r[e]?.length===0) delete r[e]; });
    // Toggle current emoji
    if(!r[emoji]) r[emoji]=[];
    if(r[emoji].includes(user.id)) { r[emoji]=r[emoji].filter(x=>x!==user.id); if(r[emoji].length===0) delete r[emoji]; }
    else r[emoji]=[...r[emoji],user.id];
    return {...n,reactions:r};
  }));
  const delN = nid => sN(notes.filter(n=>n.id!==nid));
  const saveE = () => { if(!eVal.trim())delN(eId); else sN(notes.map(n=>n.id===eId?{...n,text:eVal.trim()}:n)); setEId(null); };
  const drop = (e,c) => { e.preventDefault(); setOverCat(null); if(dragId)sN(notes.map(n=>n.id===dragId?{...n,category:c}:n)); setDragId(null); };

  // ── Touch drag ──
  const onTouchStart = (e, noteId) => {
    const t = e.touches[0];
    touchRef.current = { id: noteId };
    setTouchInfo({ id: noteId, x: t.clientX, y: t.clientY });
  };
  const onTouchMove = (e) => {
    if (!touchRef.current) return;
    e.preventDefault();
    const t = e.touches[0];
    setTouchInfo(prev => prev ? { ...prev, x: t.clientX, y: t.clientY } : null);
    const el = document.elementFromPoint(t.clientX, t.clientY);
    const col = el && el.closest('[data-cat]');
    setOverCat(col ? col.getAttribute('data-cat') : null);
  };
  const onTouchEnd = (e) => {
    if (!touchRef.current) return;
    const t = e.changedTouches[0];
    const el = document.elementFromPoint(t.clientX, t.clientY);
    const col = el && el.closest('[data-cat]');
    if (col) sN(notes.map(n => n.id === touchRef.current.id ? { ...n, category: col.getAttribute('data-cat') } : n));
    touchRef.current = null;
    setTouchInfo(null);
    setOverCat(null);
  };

  let fil = notes;
  if(filter==='mine') fil=notes.filter(n=>n.userId===user.id);
  else if(CATS.some(c=>c.id===filter)) fil=notes.filter(n=>n.category===filter);
  const cats2 = CATS.some(c=>c.id===filter)?CATS.filter(c=>c.id===filter):CATS;

  return html`
    <div style=${{ position:'relative' }}>
    ${touchInfo && html`
      <div style=${{ position:'fixed', left:touchInfo.x-50, top:touchInfo.y-24, pointerEvents:'none', zIndex:9999,
        background:'#007AFF', color:'#FFF', borderRadius:10, padding:'6px 14px', fontSize:12, fontWeight:600,
        boxShadow:'0 6px 20px rgba(0,122,255,.35)', transform:'rotate(-2deg) scale(1.05)', whiteSpace:'nowrap' }}>
        ✋ Moviendo nota
      </div>
    `}
    <div style=${{ display:'grid', gridTemplateColumns:cats2.length===1?'1fr':'repeat(4,1fr)', gap:10, height:'100%' }}>
      ${cats2.map(cat => {
        const cn = fil.filter(n=>n.category===cat.id).sort((a,b)=>(b.voters?.length||0)-(a.voters?.length||0));
        return html`
          <div key=${cat.id} data-cat=${cat.id}
            onDragOver=${e=>{e.preventDefault();setOverCat(cat.id)}} onDragLeave=${()=>setOverCat(null)} onDrop=${e=>drop(e,cat.id)}
            style=${{ ...cS, display:'flex', flexDirection:'column', borderColor:overCat===cat.id?'#007AFF':'#E5E5EA', background:overCat===cat.id?'#007AFF04':'#FFF', transition:'all .2s' }}>
            <div style=${{ padding:'12px 14px 9px', background:cat.color+'06', borderBottom:'2.5px solid '+cat.color }}>
              <div style=${{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                <div style=${{ display:'flex', alignItems:'center', gap:6 }}><span style=${{ fontSize:16 }}>${cat.emoji}</span><span style=${{ fontSize:14, fontWeight:700 }}>${cat.label}</span></div>
                <span style=${{ background:cat.color+'15', color:cat.color, fontSize:11, fontWeight:700, padding:'2px 8px', borderRadius:6 }}>${cn.length}</span>
              </div>
            </div>
            <div style=${{ flex:1, padding:'7px 8px', overflowY:'auto', display:'flex', flexDirection:'column', gap:6, minHeight:60 }}>
              ${cn.map(note => {
                const voted=note.voters?.includes(user.id); const mine=note.userId===user.id;
                const hidden = hideOthers && !mine;
                if (hidden) return html`
                  <div key=${note.id} style=${{ background:cat.color+'08', borderRadius:12, padding:'10px 12px', border:'1px solid '+cat.color+'15' }}>
                    <div style=${{ display:'flex', flexDirection:'column', gap:5 }}>
                      <div style=${{ height:10, background:cat.color+'25', borderRadius:4, width:'85%', animation:'shimmer 1.5s infinite' }}></div>
                      <div style=${{ height:10, background:cat.color+'20', borderRadius:4, width:'60%', animation:'shimmer 1.5s infinite' }}></div>
                      <div style=${{ display:'flex', alignItems:'center', gap:4, marginTop:2 }}>
                        <div style=${{ width:16, height:16, borderRadius:8, background:cat.color+'30' }}></div>
                        <div style=${{ height:8, background:cat.color+'20', borderRadius:4, width:'40%' }}></div>
                      </div>
                    </div>
                  </div>`;
                return html`
                  <div key=${note.id}
                    draggable=${true}
                    onDragStart=${e=>{setDragId(note.id);e.dataTransfer.effectAllowed='move'}}
                    onTouchStart=${e=>onTouchStart(e,note.id)}
                    onTouchMove=${onTouchMove}
                    onTouchEnd=${onTouchEnd}
                    style=${{ background:cat.bg, borderRadius:12, padding:'10px 12px', border:'1px solid '+cat.color+'15', borderLeft:mine?'3px solid '+cat.color:'1px solid '+cat.color+'15', cursor:'grab', touchAction:'none', userSelect:'none', opacity:(dragId===note.id||touchInfo?.id===note.id)?0.4:1 }}>
                    ${eId===note.id
                      ? html`<div>
                          <textarea autofocus value=${eVal} onInput=${e=>setEVal(e.target.value)} onKeyDown=${e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();saveE()}if(e.key==='Escape')setEId(null)}} style=${{ ...iS, height:48, resize:'none', fontSize:12, padding:'8px 10px' }} />
                          <div style=${{ display:'flex', gap:4, marginTop:4 }}>
                            <button onClick=${saveE} style=${{ ...bP, padding:'5px 12px', fontSize:11, background:cat.color }}>Guardar</button>
                            <button onClick=${()=>setEId(null)} style=${{ ...bS, padding:'5px 10px', fontSize:11 }}>Cancelar</button>
                          </div>
                        </div>`
                      : html`
                        <p style=${{ marginBottom:5, fontSize:12, lineHeight:1.4 }}>${note.text}</p>
                        ${Object.keys(note.reactions||{}).length > 0 && html`
                          <div style=${{ display:'flex', gap:3, marginBottom:5, flexWrap:'wrap' }}>
                            ${Object.entries(note.reactions||{}).map(([emoji, users]) => users.length > 0 && html`
                              <span key=${emoji} onClick=${()=>react(note.id, emoji)} style=${{ padding:'1px 5px', borderRadius:6, background:users.includes(user.id)?cat.color+'20':'#F2F2F7', border:users.includes(user.id)?'1px solid '+cat.color+'40':'1px solid transparent', fontSize:10, cursor:'pointer' }}>${emoji} ${users.length}</span>
                            `)}
                          </div>
                        `}
                        <div style=${{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                          <div style=${{ display:'flex', alignItems:'center', gap:4 }}>
                            <span style=${{ fontSize:12 }}>${note.userAvatar}</span>
                            <span style=${{ fontSize:10, color:'#86868B' }}>${note.userName}</span>
                          </div>
                          <div style=${{ display:'flex', alignItems:'center', gap:3 }}>
                            <div style=${{ position:'relative' }}>
                              <button
                                onClick=${e=>{ e.stopPropagation(); document.querySelectorAll('[id^="rpick-"]').forEach(x=>{if(x.id!=='rpick-'+note.id)x.style.display='none';}); const d=document.getElementById('rpick-'+note.id); if(d){const r=e.currentTarget.getBoundingClientRect(); d.style.top=(r.top-8)+'px'; d.style.left=r.left+'px'; d.style.display=d.style.display==='flex'?'none':'flex';} }}
                                style=${{ border:'none', background:'none', fontSize:14, cursor:'pointer', opacity:.55, padding:'2px 4px', borderRadius:6 }}
                                onMouseOver=${e=>{e.currentTarget.style.opacity='1';e.currentTarget.style.background='#F2F2F7'}}
                                onMouseOut=${e=>{e.currentTarget.style.opacity='.55';e.currentTarget.style.background='none'}}>😊</button>
                              <div id=${'rpick-'+note.id} style=${{ display:'none', position:'fixed', zIndex:10000, background:'#FFF',
                                border:'1.5px solid #E5E5EA', borderRadius:12, padding:8, gap:4,
                                boxShadow:'0 8px 24px rgba(0,0,0,.18)', flexWrap:'wrap', width:164,
                                transform:'translateY(-100%) translateY(-8px)' }}>
                                ${REACTIONS.map(emoji => html`
                                  <button key=${emoji}
                                    onClick=${e=>{ e.stopPropagation(); react(note.id,emoji); document.getElementById('rpick-'+note.id).style.display='none'; }}
                                    style=${{ border:'none', background:'none', fontSize:20, cursor:'pointer', padding:'4px', borderRadius:8, lineHeight:1 }}
                                    onMouseOver=${e=>{e.currentTarget.style.background='#F2F2F7';e.currentTarget.style.transform='scale(1.2)'}}
                                    onMouseOut=${e=>{e.currentTarget.style.background='none';e.currentTarget.style.transform='scale(1)'}}>
                                    ${emoji}
                                  </button>`)}
                              </div>
                            </div>
                            <button onClick=${()=>vote(note.id)} style=${{ display:'flex', alignItems:'center', gap:3, padding:'2px 8px', borderRadius:6, border:'none', background:voted?cat.color:cat.color+'12', color:voted?'#FFF':cat.color, fontSize:10, fontWeight:700, marginLeft:3 }}>👍 ${note.voters?.length||0}</button>
                            ${mine && html`
                              <button onClick=${()=>{setEId(note.id);setEVal(note.text)}} style=${{ border:'none', background:'none', fontSize:12, cursor:'pointer', color:'#86868B', padding:'2px' }} title="Editar">✏️</button>
                              <button onClick=${()=>delN(note.id)} style=${{ border:'none', background:'none', fontSize:12, cursor:'pointer', color:'#C7C7CC', padding:'2px' }} title="Eliminar">✕</button>
                            `}
                          </div>
                        </div>
                      `
                    }
                  </div>`;
              })}
            </div>
            ${act===cat.id
              ? html`<div style=${{ padding:'7px 8px 8px', borderTop:'1px solid #F2F2F7' }}><textarea autofocus value=${txt} onInput=${e=>setTxt(e.target.value)} onKeyDown=${e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addN(cat.id)}}} placeholder="Tu reflexión..." style=${{ ...iS, height:52, resize:'none', fontSize:12 }} /><div style=${{ display:'flex', gap:5, marginTop:5 }}><button onClick=${()=>addN(cat.id)} style=${{ ...bP, flex:1, padding:'7px', fontSize:12, background:cat.color }}>Añadir</button><button onClick=${()=>{setAct(null);setTxt('')}} style=${{ ...bS, padding:'7px 10px', fontSize:11 }}>✕</button></div></div>`
              : html`<button onClick=${()=>{setAct(cat.id);setTxt('')}} style=${{ margin:'5px 8px 8px', padding:'8px', borderRadius:9, border:'1.5px dashed '+cat.color+'30', background:'transparent', color:cat.color, fontSize:12, fontWeight:600 }}>+ Añadir nota</button>`}
          </div>`;
      })}
    </div>
    </div>
  `;
}

/* ═══ PHASE 3 ═══ */
function P3({ notes, sN, user }) {
  const [f, setF] = useState('all');
  const fi = [{id:'all',label:'📋 Todas',color:'#1D1D1F'},{id:'mine',label:'👤 Mis notas',color:'#5856D6'},...CATS.map(c=>({id:c.id,label:c.emoji+' '+c.label,color:c.color}))];
  return html`
    <div style=${{ display:'flex', flexDirection:'column', gap:10, height:'100%' }}>
      <div style=${{ display:'flex', gap:5, flexWrap:'wrap' }}>${fi.map(x=>html`<button key=${x.id} onClick=${()=>setF(x.id)} style=${{ padding:'7px 12px', borderRadius:9, border:f===x.id?'none':'1.5px solid #E5E5EA', background:f===x.id?x.color:'#FFF', color:f===x.id?'#FFF':'#6E6E73', fontSize:12, fontWeight:600 }}>${x.label}</button>`)}</div>
      <div style=${{ flex:1 }}><${Board} notes=${notes} sN=${sN} user=${user} filter=${f} /></div>
    </div>
  `;
}

/* ═══ PHASE 4: ACTIONS ═══ */
function P4({ notes, actions, risks, sA, user }) {
  const [teamMembers, setTeamMembers] = useState([]);
  useEffect(() => {
    sbLoadTeamMembers().then(data => {
      const filtered = data.filter(m=>(m.rooms||[]).includes(SALA));
      setTeamMembers(filtered.length > 0 ? filtered : data);
    });
  }, []);
  const [form, setForm] = useState({text:'',owner:'',date:'',priority:'medium'});
  const [eId, setEId] = useState(null);
  const [eF, setEF] = useState({});
  const [actFilter, setActFilter] = useState('all');
  const [viewMode, setViewMode]   = useState('kanban');
  const [dragAct,  setDragAct]    = useState(null);  // id being dragged
  const [overCol,  setOverCol]    = useState(null);  // column id being hovered
  const touchActRef = useRef(null);
  const [touchPos,  setTouchPos]  = useState(null);

  const onActDragStart = (id) => setDragAct(id);
  const onActDrop = (colId) => { if(dragAct) upSt(dragAct, colId); setDragAct(null); setOverCol(null); };
  const onActTouchStart = (e, id) => { touchActRef.current=id; setTouchPos({x:e.touches[0].clientX,y:e.touches[0].clientY}); e.stopPropagation(); };
  const onActTouchMove = (e) => {
    if(!touchActRef.current) return; e.preventDefault();
    const t=e.touches[0]; setTouchPos({x:t.clientX,y:t.clientY});
    const el=document.elementFromPoint(t.clientX,t.clientY);
    const col=el?.closest('[data-kanban-col]');
    setOverCol(col?col.getAttribute('data-kanban-col'):null);
  };
  const onActTouchEnd = (e) => {
    if(!touchActRef.current) return;
    const t=e.changedTouches[0];
    const el=document.elementFromPoint(t.clientX,t.clientY);
    const col=el?.closest('[data-kanban-col]');
    if(col) upSt(touchActRef.current, col.getAttribute('data-kanban-col'));
    touchActRef.current=null; setTouchPos(null); setOverCol(null);
  };
  const topN = [...notes].sort((a,b)=>(b.voters?.length||0)-(a.voters?.length||0)).slice(0,12);
  const openRisks = (risks||[]).filter(r => r.status !== 'mitigated');
  const addA = fn => {
    const t=fn?fn.text:form.text; if(!t.trim())return;
    const vs=fn?(fn.voters?.length||0):0; const pri=fn?(vs>=5?'high':vs>=2?'medium':'low'):form.priority;
    sA([...actions,{id:uid(),text:t.trim(),owner:form.owner||'Sin asignar',date:form.date||'',status:'pending',priority:pri,voteScore:vs,createdBy:user.id,fromCategory:fn?.category||null,noteId:fn?.id||null,riskId:null}]);
    if(!fn)setForm({text:'',owner:'',date:'',priority:'medium'});
  };
  const addAFromRisk = r => {
    const imp = getRiskLevel(r.impactVotes);
    const pri = imp.id==='alto'?'high':imp.id==='medio'?'medium':'low';
    sA([...actions,{id:uid(),text:'Mitigar: '+r.text,owner:r.owner||'Sin asignar',date:'',status:'pending',priority:pri,voteScore:0,createdBy:user.id,fromCategory:null,noteId:null,riskId:r.id}]);
  };
  const togN = n => { const ex=actions.find(a=>a.noteId===n.id); if(ex)sA(actions.filter(a=>a.noteId!==n.id)); else addA(n); };
  const togR = r => { const ex=actions.find(a=>a.riskId===r.id); if(ex)sA(actions.filter(a=>a.riskId!==r.id)); else addAFromRisk(r); };
  const upSt = (id,st) => sA(actions.map(a=>a.id===id?{...a,status:st}:a));
  const delA = id => sA(actions.filter(a=>a.id!==id));
  const saveEA = () => { sA(actions.map(a=>a.id===eId?{...a,...eF}:a)); setEId(null); };
  const priO = {high:3,medium:2,low:1};

  return html`
    <div style=${{ maxWidth:'100%', margin:'0 auto' }}>
      <div style=${{ display:'grid', gridTemplateColumns:'1fr', gap:14 }}>
        <div style=${{ ...cS, padding:22 }}>
          <div style=${{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
            <h3 style=${{ fontSize:17, fontWeight:700 }}>🎯 Accionables</h3>
            <div style=${{ display:'flex', gap:4 }}>
              ${[{id:'all',label:'Todos'},{id:'mine',label:'👤 Mis accionables'},{id:'done',label:'✅ Completados'}].map(f => html`
                <button key=${f.id} onClick=${()=>setActFilter(f.id)} style=${{ padding:'4px 10px', borderRadius:7, border:actFilter===f.id?'none':'1px solid #E5E5EA', background:actFilter===f.id?'#1D1D1F':'#FFF', color:actFilter===f.id?'#FFF':'#6E6E73', fontSize:10, fontWeight:600 }}>${f.label}</button>
              `)}
            </div>
          </div>

/* ═══ PHASE 5: RISKS ═══ */
function P5Risks({ risks, sR, notes, user }) {
  const [teamMembers, setTeamMembers] = useState([]);
  useEffect(() => {
    sbLoadTeamMembers().then(data => {
      const filtered = data.filter(m=>(m.rooms||[]).includes(SALA));
      setTeamMembers(filtered.length > 0 ? filtered : data);
    });
  }, []);
  const [form, setForm] = useState({ text:'', mitigation:'', owner:'' });
  const [eId, setEId] = useState(null);
  const [eF, setEF] = useState({});
  const [riskFilter, setRiskFilter] = useState('all');

  const badStopNotes = notes.filter(n => n.category === 'bad' || n.category === 'stop' || n.category === 'start').sort((a,b) => (b.voters?.length||0) - (a.voters?.length||0));

  const addRisk = (fromNote) => {
    const text = fromNote ? fromNote.text : form.text;
    if (!text.trim()) return;
    sR([...risks, { id:uid(), text:text.trim(), mitigation:form.mitigation||'', owner:form.owner||'Sin asignar', status:'open', impactVotes:{}, probVotes:{}, fromNote:fromNote?.id||null, createdBy:user.id }]);
    if (!fromNote) setForm({ text:'', mitigation:'', owner:'' });
  };

  const toggleFromNote = (note) => {
    const ex = risks.find(r => r.fromNote === note.id);
    if (ex) sR(risks.filter(r => r.fromNote !== note.id));
    else addRisk(note);
  };

  const voteImpact = (riskId, level) => {
    sR(risks.map(r => {
      if (r.id !== riskId) return r;
      const v = { ...(r.impactVotes||{}) };
      v[user.id] = v[user.id] === level ? undefined : level;
      if (!v[user.id]) delete v[user.id];
      return { ...r, impactVotes: v };
    }));
  };

  const voteProb = (riskId, level) => {
    sR(risks.map(r => {
      if (r.id !== riskId) return r;
      const v = { ...(r.probVotes||{}) };
      v[user.id] = v[user.id] === level ? undefined : level;
      if (!v[user.id]) delete v[user.id];
      return { ...r, probVotes: v };
    }));
  };

  const updateStatus = (id, st) => sR(risks.map(r => r.id===id ? {...r, status:st} : r));
  const delRisk = (id) => sR(risks.filter(r => r.id !== id));
  const saveEdit = () => { sR(risks.map(r => r.id===eId ? {...r,...eF} : r)); setEId(null); };

  const allOpen = risks.filter(r => r.status !== 'mitigated');
  const allMitigated = risks.filter(r => r.status === 'mitigated');
  const openRisks = riskFilter === 'mine' ? allOpen.filter(r => r.createdBy === user.id) : allOpen;
  const mitigatedRisks = riskFilter === 'mine' ? allMitigated.filter(r => r.createdBy === user.id) : allMitigated;

  // Heat map data
  const heatData = openRisks.map(r => ({
    ...r,
    impLvl: getRiskLevel(r.impactVotes),
    probLvl: getRiskLevel(r.probVotes),
  }));

  return html`
    <div style=${{ maxWidth:'100%', margin:'0 auto' }}>
      <!-- Heat map full width -->

                      ${inCell.map((r,i) => {

            }
          </div>
        </div>
      </div>
    </div>
  `;
}

/* ═══ PHASE 6: DASHBOARD + PDF ═══ */
function P6({ notes, actions, risks, users, user, obj, tasks, phaseTimes }) {

  const aD   = actions.filter(a => a.status === 'done').length;
  const openRisks   = risks.filter(r => r.status !== 'mitigated');
  const closedRisks = risks.filter(r => r.status === 'mitigated');
  const topNotes    = [...notes].sort((a,b) => (b.voters?.length||0) - (a.voters?.length||0)).slice(0, 10);
  const sortedActs  = [...actions].sort((a,b) => (priO[b.priority]||0) - (priO[a.priority]||0));
  const medals      = ['🥇','🥈','🥉'];
  const objL        = obj.met===true?'Cumplido ✅':obj.met===false?'No cumplido ❌':obj.met==='partial'?'Parcial ⚠️':'Sin evaluar';
  const objColor    = obj.met===true?'#34C759':obj.met===false?'#FF3B30':obj.met==='partial'?'#FF9500':'#86868B';

  // ranking
  const authorMap = {};
  notes.forEach(n => {
    if (!authorMap[n.userId]) authorMap[n.userId] = { name:n.userName, avatar:n.userAvatar, color:n.userColor||'#007AFF', tarjetas:0, votosRecibidos:0 };
    authorMap[n.userId].tarjetas++;
    authorMap[n.userId].votosRecibidos += (n.voters?.length||0);
  });
  const ranking = Object.entries(authorMap).map(([id,d]) => ({
    id, ...d, score: d.tarjetas + d.votosRecibidos
  })).sort((a,b) => b.score - a.score);
  const mx = ranking[0]?.score || 1;

  // Phase time helpers
  const fmtTime = (secs) => {
    if (!secs) return '—';
    const m = Math.floor(secs/60), s = secs%60;
    return m > 0 ? `${m}m ${s}s` : `${s}s`;
  };
  const totalTime = Object.values(phaseTimes||{}).reduce((a,b)=>a+b,0);

  // risk helpers
  const riskScore = r => {
    const avg = v => { const vs=Object.values(v||{}); return vs.length ? vs.reduce((a,b)=>a+b,0)/vs.length : 0; };
    return avg(r.impactVotes) * avg(r.probVotes);
  };

              <div style=${{ padding:'14px 16px', borderRadius:12, background:'#F0F7FF', border:'1.5px solid #007AFF20', marginBottom:0 }}>
                <h4 style=${{ fontSize:12, fontWeight:700, color:'#007AFF', marginBottom:10, display:'flex', alignItems:'center', gap:6 }}>
                  <span>⏱</span> Tiempo real por fase
                </h4>
                <div style=${{ display:'flex', flexDirection:'column', gap:7 }}>
                  ${PHASES.map((p,i) => {
                    const secs = (phaseTimes||{})[i] || 0;
                    const pct = totalTime > 0 ? Math.round((secs/totalTime)*100) : 0;
                    return html`
                      <div key=${i} style=${{ display:'flex', alignItems:'center', gap:8 }}>
                        <span style=${{ fontSize:9, fontWeight:800, color:'#86868B', minWidth:16 }}>${p.num}</span>
                        <span style=${{ fontSize:11, minWidth:90 }}>${p.label}</span>
                        <div style=${{ flex:1, background:'#E5E5EA', borderRadius:4, height:5, overflow:'hidden' }}>
                          <div style=${{ width:pct+'%', height:'100%', background:'#007AFF', borderRadius:4, transition:'width .4s' }}></div>
                        </div>
                        <span style=${{ fontSize:11, fontWeight:700, color:'#007AFF', minWidth:48, textAlign:'right' }}>${fmtTime(secs)}</span>
                        <span style=${{ fontSize:9, color:'#86868B', minWidth:26, textAlign:'right' }}>${pct}%</span>
                      </div>`;
                  })}
                  <div style=${{ display:'flex', justifyContent:'space-between', borderTop:'1px solid #007AFF20', paddingTop:6, marginTop:2 }}>
                    <span style=${{ fontSize:10, color:'#86868B' }}>Total sesión</span>
                    <span style=${{ fontSize:12, fontWeight:800, color:'#007AFF' }}>${fmtTime(totalTime)}</span>
                  </div>
                </div>
              </div>`}

            <!-- Objetivo -->
            ${obj.text && html`
              <div style=${{ padding:'12px 14px', borderRadius:12, background:objColor+'10', border:'1.5px solid '+objColor+'30' }}>
                <p style=${{ fontSize:11, color:objColor, fontWeight:700, marginBottom:4 }}>🎯 Objetivo</p>
                <p style=${{ fontSize:12, lineHeight:1.45, marginBottom:6 }}>${obj.text}</p>
                <span style=${{ fontSize:11, fontWeight:700, color:objColor }}>${objL}</span>
              </div>
            `}

            <!-- Riesgos mini resumen -->
            <div style=${{ padding:'12px 14px', borderRadius:12, background:openRisks.length>0?'#FFF5F5':'#F0FFF4', border:'1.5px solid '+(openRisks.length>0?'#FF3B3020':'#34C75920') }}>
              <p style=${{ fontSize:11, fontWeight:700, color:openRisks.length>0?'#FF3B30':'#34C759', marginBottom:4 }}>⚠️ Riesgos</p>
              <div style=${{ display:'flex', gap:12, fontSize:12 }}>
                <span style=${{ color:'#FF3B30', fontWeight:700 }}>${openRisks.length} abiertos</span>
                <span style=${{ color:'#34C759' }}>${closedRisks.length} mitigados</span>
              </div>
              ${openRisks.slice(0,2).map(r => html`
                <div key=${r.id} style=${{ fontSize:11, color:'#86868B', marginTop:4, borderLeft:'3px solid '+riskColor(r), paddingLeft:6 }}>${r.text}</div>
              `)}
              ${openRisks.length>2 && html`<p style=${{ fontSize:10, color:'#86868B', marginTop:4 }}>+ ${openRisks.length-2} más → pestaña Riesgos</p>`}
            </div>
          </div>
        </div>

        <!-- Top notas -->
        ${topNotes.length > 0 && html`
          <div style=${{ ...cS, padding:20 }}>
            <h3 style=${{ fontSize:14, fontWeight:700, marginBottom:12 }}>🔥 Notas más votadas</h3>
            <div style=${{ display:'grid', gridTemplateColumns:'repeat(2,1fr)', gap:8 }}>
              ${topNotes.slice(0,6).map((n,i) => {
                const c = CATS.find(cat=>cat.id===n.category)||CATS[0];
                return html`
                  <div key=${n.id} style=${{ padding:'10px 12px', borderRadius:10, background:c.bg, borderLeft:'3px solid '+c.color, display:'flex', gap:8, alignItems:'flex-start' }}>
                    <span style=${{ fontSize:14, fontWeight:800, color:'#C7C7CC', minWidth:18 }}>${i+1}</span>
                    <div style=${{ flex:1 }}>
                      <p style=${{ fontSize:12, lineHeight:1.4 }}>${n.text}</p>
                      <div style=${{ display:'flex', gap:6, marginTop:4, fontSize:10, color:'#86868B' }}>
                        <span>${n.userAvatar} ${n.userName}</span>
                        <span style=${{ color:c.color, fontWeight:700 }}>▲ ${n.voters?.length||0}</span>
                      </div>
                    </div>
                  </div>`;
              })}
            </div>
          </div>
        `}
      `}

      <!-- ══ NOTAS ══ -->
      ${activeTab === 'notas' && html`
        <div style=${{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
          ${CATS.map(c => {
            const cn = [...notes.filter(n=>n.category===c.id)].sort((a,b)=>(b.voters?.length||0)-(a.voters?.length||0));
            return html`
              <div key=${c.id} style=${{ ...cS, padding:16 }}>
                <div style=${{ display:'flex', alignItems:'center', gap:7, marginBottom:12 }}>
                  <span style=${{ fontSize:16 }}>${c.emoji}</span>
                  <span style=${{ fontSize:14, fontWeight:700, color:c.color }}>${c.label}</span>
                  <span style=${{ marginLeft:'auto', background:c.color+'20', color:c.color, fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:6 }}>${cn.length}</span>
                </div>
                ${cn.length===0
                  ? html`<p style=${{ color:c.color, opacity:.4, fontSize:12, textAlign:'center', padding:'12px 0' }}>Sin notas</p>`
                  : cn.map(n => html`
                    <div key=${n.id} style=${{ padding:'8px 0', borderBottom:'1px solid #F2F2F7', display:'flex', gap:8, alignItems:'flex-start' }}>
                      <div style=${{ flex:1 }}>
                        <p style=${{ fontSize:12, lineHeight:1.4 }}>${n.text}</p>
                        <div style=${{ display:'flex', gap:5, marginTop:3, fontSize:10, color:'#86868B' }}>
                          <span>${n.userAvatar} ${n.userName}</span>
                          ${(n.voters?.length||0)>0 && html`<span style=${{ color:c.color, fontWeight:700 }}>▲ ${n.voters.length}</span>`}
                        </div>
                      </div>
                    </div>`)
                }
              </div>`;
          })}
        </div>
      `}

      <!-- ══ ACCIONABLES ══ -->
      ${activeTab === 'accionables' && html`
        <div style=${{ ...cS, padding:20 }}>
          <div style=${{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
            <h3 style=${{ fontSize:15, fontWeight:700 }}>🎯 Accionables (${actions.length})</h3>
            <div style=${{ display:'flex', gap:6, fontSize:11 }}>
              <span style=${{ color:'#34C759', fontWeight:700 }}>${aD} ✅ completados</span>
              <span style=${{ color:'#86868B' }}>·</span>
              <span style=${{ color:'#FF9500', fontWeight:700 }}>${actions.filter(a=>a.status==='pending').length} pendientes</span>
            </div>
          </div>
          <!-- Progress bar -->
          <div style=${{ height:8, background:'#F2F2F7', borderRadius:4, overflow:'hidden', marginBottom:16 }}>
            <div style=${{ height:'100%', width:(actions.length?(aD/actions.length)*100:0)+'%', background:'linear-gradient(90deg,#34C759,#30d158)', borderRadius:4, transition:'width .6s' }} />
          </div>
          ${sortedActs.length===0
            ? html`<p style=${{ color:'#C7C7CC', textAlign:'center', padding:20, fontSize:13 }}>Sin accionables</p>`
            : sortedActs.map(a => {
              const pr = PRIS.find(p=>p.id===a.priority)||PRIS[1];
              const st = STS.find(s=>s.id===a.status)||STS[0];
              const ct = a.fromCategory ? CATS.find(c=>c.id===a.fromCategory) : null;
              return html`
                <div key=${a.id} style=${{ display:'flex', alignItems:'center', gap:10, padding:'11px 12px', borderRadius:12, background:a.status==='done'?'#F9F9FB':'#FFF', border:'1.5px solid #E5E5EA', marginBottom:7, opacity:a.status==='discarded'?.5:1 }}>
                  <span style=${{ fontSize:16, flexShrink:0 }}>${pr.icon}</span>
                  <div style=${{ flex:1, minWidth:0 }}>
                    ${ct && html`<span style=${{ fontSize:9, fontWeight:700, color:ct.color, background:ct.color+'10', padding:'1px 5px', borderRadius:3, marginBottom:2, display:'inline-block' }}>${ct.emoji} ${ct.label}</span>`}
                    <p style=${{ fontSize:13, fontWeight:600, textDecoration:a.status==='done'?'line-through':'none', color:a.status==='done'?'#86868B':'#1D1D1F' }}>${a.text}</p>
                    <div style=${{ display:'flex', gap:8, marginTop:2, fontSize:11, color:'#86868B' }}>
                      <span style=${{ color:'#007AFF', fontWeight:600 }}>👤 ${a.owner}</span>
                      ${a.date && html`<span>📅 ${fd(a.date)}</span>`}
                    </div>
                  </div>
                  <span style=${{ padding:'3px 10px', borderRadius:8, background:st.bg, color:st.color, fontSize:10, fontWeight:700, whiteSpace:'nowrap', flexShrink:0 }}>${st.label}</span>
                </div>`;
            })
          }
        </div>
      `}

      <!-- ══ RIESGOS ══ -->
      ${activeTab === 'riesgos' && html`
        <div style=${{ display:'flex', flexDirection:'column', gap:12 }}>

          <!-- Resumen riesgos -->
          <div style=${{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8 }}>
            ${[
              {l:'Abiertos',   v:openRisks.filter(r=>riskScore(r)>=6).length,  c:'#FF3B30', sub:'Score alto (≥6)'},
              {l:'Medios',     v:openRisks.filter(r=>riskScore(r)>=2&&riskScore(r)<6).length, c:'#FF9500', sub:'Score medio (2-5)'},
              {l:'Bajos',      v:openRisks.filter(r=>riskScore(r)<2).length,   c:'#34C759', sub:'Score bajo (<2)'},
            ].map((s,i) => html`
              <div key=${i} style=${{ ...cS, padding:'14px', textAlign:'center' }}>
                <div style=${{ fontSize:22, fontWeight:800, color:s.c }}>${s.v}</div>
                <div style=${{ fontSize:12, fontWeight:600, marginTop:2 }}>${s.l}</div>
                <div style=${{ fontSize:10, color:'#86868B' }}>${s.sub}</div>
              </div>`)}
          </div>

          <!-- Lista riesgos abiertos -->
          ${openRisks.length > 0 && html`
            <div style=${{ ...cS, padding:20 }}>
              <h3 style=${{ fontSize:14, fontWeight:700, marginBottom:12, color:'#FF3B30' }}>⚠️ Riesgos abiertos (${openRisks.length})</h3>
              ${[...openRisks].sort((a,b) => riskScore(b)-riskScore(a)).map((r,idx) => {
                const imp  = getRiskLevel(r.impactVotes);
                const prob = getRiskLevel(r.probVotes);
                const hc   = getHeatColor(imp, prob);
                const st   = RISK_STATUS.find(s=>s.id===r.status)||RISK_STATUS[0];
                const sc   = Math.round(riskScore(r)*10)/10;
                return html`
                  <div key=${r.id} style=${{ padding:'12px 14px', borderRadius:12, border:'1.5px solid #E5E5EA', borderLeft:'5px solid '+hc, marginBottom:9, background:'#FAFAFA' }}>
                    <div style=${{ display:'flex', alignItems:'flex-start', gap:10, marginBottom:6 }}>
                      <div style=${{ background:hc, color:'#FFF', borderRadius:6, padding:'2px 8px', fontSize:10, fontWeight:800, whiteSpace:'nowrap', flexShrink:0 }}>R${idx+1} · ${sc}</div>
                      <div style=${{ flex:1 }}>
                        <p style=${{ fontSize:13, fontWeight:700, marginBottom:3 }}>${r.text}</p>
                        ${r.mitigation && html`<p style=${{ fontSize:11, color:'#86868B' }}>🛡️ ${r.mitigation}</p>`}
                      </div>
                      <span style=${{ fontSize:10, fontWeight:700, color:st.color, background:st.color+'18', padding:'2px 8px', borderRadius:6, flexShrink:0 }}>${st.label}</span>
                    </div>
                    <div style=${{ display:'flex', gap:12, fontSize:11, color:'#86868B' }}>
                      <span>⚡ Impacto: <b style=${{ color:hc }}>${imp.label}</b></span>
                      <span>🎲 Prob: <b style=${{ color:hc }}>${prob.label}</b></span>
                      <span>👤 ${r.owner}</span>
                    </div>
                  </div>`;
              })}
            </div>
          `}

          <!-- Riesgos mitigados -->
          ${closedRisks.length > 0 && html`
            <div style=${{ ...cS, padding:20 }}>
              <h3 style=${{ fontSize:14, fontWeight:700, marginBottom:10, color:'#34C759' }}>✅ Mitigados (${closedRisks.length})</h3>
              ${closedRisks.map(r => html`
                <div key=${r.id} style=${{ padding:'8px 12px', borderRadius:10, background:'#F0FFF4', border:'1px solid #34C75920', marginBottom:6, display:'flex', alignItems:'center', gap:8 }}>
                  <span style=${{ fontSize:16 }}>✅</span>
                  <div style=${{ flex:1 }}>
                    <p style=${{ fontSize:12, textDecoration:'line-through', color:'#86868B' }}>${r.text}</p>
                    ${r.mitigation && html`<p style=${{ fontSize:10, color:'#34C759' }}>🛡️ ${r.mitigation}</p>`}
                  </div>
                  <span style=${{ fontSize:10, color:'#86868B' }}>${r.owner}</span>
                </div>`)}
            </div>
          `}

          ${risks.length === 0 && html`
            <div style=${{ ...cS, padding:28, textAlign:'center', color:'#C7C7CC' }}>
              <p style=${{ fontSize:24, marginBottom:8 }}>✅</p>
              <p style=${{ fontSize:13 }}>Sin riesgos identificados</p>
            </div>
          `}
        </div>
      `}

      <!-- ══ RANKING ══ -->
      ${activeTab === 'ranking' && html`
        <div style=${{ ...cS, padding:22 }}>
          <h3 style=${{ fontSize:16, fontWeight:700, marginBottom:4 }}>🏆 Ranking</h3>
          <p style=${{ fontSize:11, color:'#86868B', marginBottom:18 }}>Tarjetas aportadas + votos recibidos</p>
          ${ranking.length === 0
            ? html`<p style=${{ color:'#C7C7CC', textAlign:'center', padding:20, fontSize:13 }}>Aún no hay notas en el tablero</p>`
            : html`<div style=${{ display:'flex', flexDirection:'column', gap:8 }}>
              ${ranking.map((r,i) => {
                const isMe = r.id === user.id;
                const bw   = mx>0?(r.score/mx)*100:0;
                const bg   = i===0?'linear-gradient(90deg,#FFD60A,#FF9500)':i===1?'linear-gradient(90deg,#C0C0C0,#999)':i===2?'linear-gradient(90deg,#CD7F32,#B8860B)':'#007AFF';
                return html`
                  <div key=${r.id} style=${{ display:'flex', alignItems:'center', gap:12, padding:'14px 18px', borderRadius:14, background:isMe?'#007AFF06':i<3?'#FFFBEB':'#F9F9FB', border:isMe?'2px solid #007AFF25':i<3?'1.5px solid #FFD60A25':'1.5px solid #E5E5EA' }}>
                    <div style=${{ width:32, textAlign:'center', fontSize:i<3?22:14, fontWeight:700, color:'#86868B' }}>${i<3?medals[i]:(i+1)+'º'}</div>
                    <div style=${{ width:36, height:36, borderRadius:18, background:r.color, display:'flex', alignItems:'center', justifyContent:'center', fontSize:20, flexShrink:0, border:'2px solid #FFF', boxShadow:'0 2px 6px rgba(0,0,0,0.06)' }}>${r.avatar}</div>
                    <div style=${{ flex:1 }}>
                      <div style=${{ display:'flex', alignItems:'center', gap:6, marginBottom:4 }}>
                        <span style=${{ fontSize:14, fontWeight:700 }}>${r.name}</span>
                        <span style=${{ fontSize:18, fontWeight:800, color:i<3?'#FFB800':'#86868B' }}>${r.score}</span>
                        <span style=${{ fontSize:10, color:'#86868B' }}>pts</span>
                      </div>
                      <div style=${{ height:5, background:'#E5E5EA', borderRadius:3, overflow:'hidden', marginBottom:5 }}>
                        <div style=${{ height:'100%', width:bw+'%', background:bg, borderRadius:3, transition:'width .5s' }} />
                      </div>
                      <div style=${{ display:'flex', gap:10 }}>
                        <span style=${{ fontSize:11, color:'#86868B' }}>📝 ${r.tarjetas} tarjetas</span>
                        <span style=${{ fontSize:11, color:'#86868B' }}>👍 ${r.votosRecibidos} votos recibidos</span>
                      </div>
                    </div>
                  </div>`;
              })}
            </div>`
          }
        </div>
      `}

    </div>
  `;
}


render(html`<${App} />`, document.getElementById('app'));
</script>
</body>
</html>
