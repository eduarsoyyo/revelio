          </div>
        </div>
      </div>
    </div>`;
}

/* ═══ PTAGS — Tag management per project ═══ */
function PTags({ teamMembers, risks, actions }) {
  const [tags,        setTags]        = useState([]);
  const [assignments, setAssignments] = useState([]);
  const [loading,     setLoading]     = useState(true);
  const [newTag,      setNewTag]      = useState({name:'', color:'#007AFF'});
  const [activeTag,   setActiveTag]   = useState(null);
  const TAG_COLORS = ['#007AFF','#34C759','#FF9500','#FF3B30','#5856D6','#AF52DE','#FF2D55','#00C7BE','#1D1D1F','#86868B'];

  useEffect(() => {
    Promise.all([sbLoadTags(SALA), sbLoadTagAssignments(SALA)]).then(([t,a])=>{ setTags(t); setAssignments(a); setLoading(false); });
  }, []);

  const addTag = async () => {
    if (!newTag.name.trim()) return;
    const saved = await sbSaveTag({sala:SALA, name:newTag.name.trim(), color:newTag.color});
    if (saved) { setTags(prev=>[...prev,saved]); setNewTag({name:'',color:'#007AFF'}); }
  };
  const deleteTag = async (id) => {
    await sbDeleteTag(id);
    setTags(prev=>prev.filter(t=>t.id!==id));
    setAssignments(prev=>prev.filter(a=>a.tag_id!==id));
    if (activeTag===id) setActiveTag(null);
  };
  const toggleAssign = async (tagId, type, entityId) => {
    const added = await sbToggleTagAssignment(tagId, type, entityId, SALA);
    if (added) setAssignments(prev=>[...prev,{tag_id:tagId,entity_type:type,entity_id:entityId,sala:SALA}]);
    else setAssignments(prev=>prev.filter(a=>!(a.tag_id===tagId&&a.entity_type===type&&a.entity_id===entityId)));
  };
  const hasTag = (tagId, type, entityId) => assignments.some(a=>a.tag_id===tagId&&a.entity_type===type&&a.entity_id===entityId);
  const entityTags = (type, entityId) => tags.filter(t=>hasTag(t.id,type,entityId));

  return html`
    <div style=${{maxWidth:900}}>
      <div style=${{marginBottom:16}}>
        <h2 style=${{fontSize:18,fontWeight:700}}>Etiquetas del proyecto</h2>
        <p style=${{fontSize:12,color:'#86868B',marginTop:2}}>Etiqueta personas, riesgos y accionables para filtrar y agrupar</p>
      </div>

      ${loading ? html`<div style=${{textAlign:'center',padding:40,color:'#86868B'}}>⏳ Cargando…</div>` : html`

        <div style=${{background:'#FFF',borderRadius:14,border:'1.5px solid #E5E5EA',padding:'14px 16px',marginBottom:14}}>
          <div style=${{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center',marginBottom:tags.length>0?10:0}}>
            <button onClick=${()=>setActiveTag(null)}
              style=${{padding:'5px 12px',borderRadius:20,border:'1.5px solid '+(activeTag===null?'#1D1D1F':'#E5E5EA'),
                background:activeTag===null?'#1D1D1F':'#FFF',color:activeTag===null?'#FFF':'#6E6E73',fontSize:12,fontWeight:600,cursor:'pointer'}}>Todos</button>
            ${tags.map(t=>html`
              <div key=${t.id} style=${{display:'flex',alignItems:'center'}}>
                <button onClick=${()=>setActiveTag(activeTag===t.id?null:t.id)}
                  style=${{padding:'5px 12px',borderRadius:'20px 0 0 20px',border:'1.5px solid '+(activeTag===t.id?t.color:'#E5E5EA'),
                    background:activeTag===t.id?t.color:'#FFF',color:activeTag===t.id?'#FFF':t.color,
                    fontSize:12,fontWeight:700,cursor:'pointer',borderRight:'none'}}>
                  ${t.name}
                </button>
                <button onClick=${()=>deleteTag(t.id)}
                  style=${{padding:'5px 6px',borderRadius:'0 20px 20px 0',border:'1.5px solid '+(activeTag===t.id?t.color:'#E5E5EA'),
                    background:activeTag===t.id?t.color+'CC':'#FFF',color:activeTag===t.id?'#FFF':'#C7C7CC',
                    fontSize:10,cursor:'pointer',borderLeft:'none'}}>✕</button>
              </div>`)}
          </div>
          <div style=${{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
            <div style=${{display:'flex',gap:3}}>
              ${TAG_COLORS.map(c=>html`
                <div key=${c} onClick=${()=>setNewTag({...newTag,color:c})}
                  style=${{width:20,height:20,borderRadius:10,background:c,cursor:'pointer',
                    outline:newTag.color===c?'2px solid #1D1D1F':'none',outlineOffset:2}}></div>`)}
            </div>
            <input value=${newTag.name} onInput=${e=>setNewTag({...newTag,name:e.target.value})}
              onKeyDown=${e=>e.key==='Enter'&&addTag()} placeholder="Nueva etiqueta…"
              style=${{border:'1.5px solid #E5E5EA',borderRadius:20,padding:'5px 12px',fontSize:12,fontFamily:'inherit',outline:'none',flex:1,minWidth:120}} />
            <button onClick=${addTag}
              style=${{padding:'5px 14px',borderRadius:20,border:'none',background:newTag.color,color:'#FFF',fontSize:12,fontWeight:600,cursor:'pointer'}}>+ Crear</button>
          </div>
        </div>

        ${activeTag&&html`
          <div style=${{borderRadius:10,padding:'8px 14px',marginBottom:14,fontSize:12,color:tags.find(t=>t.id===activeTag)?.color,fontWeight:600,background:tags.find(t=>t.id===activeTag)?.color+'15',border:'1px solid '+tags.find(t=>t.id===activeTag)?.color+'30'}}>
            🏷️ Filtrando: ${tags.find(t=>t.id===activeTag)?.name}
          </div>`}

        <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
          ${[
            {title:'👥 Equipo',items:teamMembers,type:'member',getLabel:m=>m.name,getIcon:m=>m.avatar||'👤'},
            {title:'Riesgos',items:(risks||[]).filter(r=>r.status!=='mitigated'),type:'risk',getLabel:r=>r.text.slice(0,50)+(r.text.length>50?'…':''),getIcon:()=>'⚠️'},
            {title:'Tareas',items:(actions||[]).filter(a=>a.status!=='done'&&a.status!=='discarded'),type:'action',getLabel:a=>a.text.slice(0,50)+(a.text.length>50?'…':''),getIcon:()=>'🎯'},
          ].map(col=>html`
            <div key=${col.type} style=${{background:'#FFF',borderRadius:14,border:'1.5px solid #E5E5EA',padding:'14px'}}>

                })}

        </div>
      `}
    </div>`;
}

/* ═══ PRIESGOS — Risk Management Dashboard ═══ */
/* ═══ heatColor — top-level helper for impact/prob string IDs ═══ */
/* ═══ CRITICALITY — reusable across all components ═══ */
const PROB_VAL = {alto:3,medio:2,bajo:1,alta:3,media:2,baja:1};
const IMP_VAL  = {alto:3,medio:2,bajo:1};
function calculateCriticality(prob, impact) {
  const pv = PROB_VAL[prob||'medio']||2;
  const iv = IMP_VAL[impact||'medio']||2;
  const score = pv * iv;
  return score >= 6 ? 'critical' : score >= 3 ? 'moderate' : 'low';
}
const CRIT_COLORS = { critical:'#FF3B30', moderate:'#FF9500', low:'#34C759' };
const CRIT_LABELS = { critical:'Crítico', moderate:'Moderado', low:'Bajo' };
function critColor(prob, impact) { return CRIT_COLORS[calculateCriticality(prob, impact)]; }

function heatColor(imp, prob) { return critColor(prob, imp); }

function voteMajority(votes, def) {
  const vals = Object.values(votes||{}).filter(Boolean);
  if(!vals.length) return def;
  const counts = {}; vals.forEach(v=>{counts[v]=(counts[v]||0)+1});
  return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0];
}

function PVacaciones({ embeddedTeam }) {
  const [team,    setTeam]   = useState(loadTeamData);
  const [sbMembers, setSbMembers] = useState([]);
  const [vacs,    setVacs]   = useState(loadVacsData);
  const [vacView, setVacView] = useState('anual'); // 'mensual' | 'anual'
  const [newVac,  setNewVac] = useState({memberId:'', name:'', from:'', to:'', note:'', type:'vacaciones', reason:''});
  const [saving,  setSaving] = useState(false);
  const today = new Date();
  const [viewYear,  setViewYear]  = useState(today.getFullYear());
  const [viewMonth, setViewMonth] = useState(today.getMonth());
  const MONTH_NAMES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const daysInMonth = new Date(viewYear, viewMonth+1, 0).getDate();
  const days = Array.from({length:daysInMonth},(_,i)=>i+1);
  const todayStr = today.toISOString().slice(0,10);

  useEffect(() => {
    if (embeddedTeam && embeddedTeam.length > 0) {
      setTeam(embeddedTeam);
      const allVacs = embeddedTeam.flatMap(m=>(m.vacations||[]).map(v=>({...v,memberId:m.id,name:v.name||m.name})));
      setVacs(allVacs); saveVacsLocal(allVacs);
      return;
    }
    sbLoadTeamMembers().then(data => {
      const salaMembers = data.filter(m=>(m.rooms||[]).includes(SALA));
      setSbMembers(salaMembers);
      if (salaMembers.length > 0) {
        const merged = salaMembers.map(m=>({id:m.id,name:m.name,avatar:m.avatar||'👤',role:m.role||'',color:m.color||'#007AFF'}));
        setTeam(merged); saveTeamLocal(merged);
      }
      const allVacs = data.flatMap(m => (m.vacations||[]).map(v=>({...v, memberId:m.id, name:v.name||m.name})));
      setVacs(allVacs); saveVacsLocal(allVacs);
    });
  }, []);

  const [calHolidays, setCalHolidays] = useState([]);
  useEffect(() => {
    sbLoadTeamMembers().then(members => {
      const salaMembers = members.filter(m=>(m.rooms||[]).includes(SALA));
      const calIds = [...new Set(salaMembers.map(m=>m.calendar_id).filter(Boolean))];
      if (calIds.length === 0) return;
      sbLoadCalendars().then(cals => {
        const relevant = cals.filter(c=>calIds.includes(c.id));
        const allH = [...new Set(relevant.flatMap(c=>(c.holidays||[]).map(h=>h.date.slice(5))))];
        setCalHolidays(allH);
      });
    });
  }, []);

  const HOLIDAYS = calHolidays.length > 0 ? calHolidays : ['01-01','01-06','02-28','05-01','06-24','08-15','10-12','11-01','12-06','12-08','12-25','12-26'];
  const isOnVac = (member, day) => {
    const dateStr = viewYear+'-'+String(viewMonth+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    return vacs.some(v=>(v.memberId===member.id||v.name===member.name)&&v.from<=dateStr&&(!v.to||v.to>=dateStr));
  };
  const getVacEntry = (member, day) => {
    const dateStr = viewYear+'-'+String(viewMonth+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    return vacs.find(v=>(v.memberId===member.id||v.name===member.name)&&v.from<=dateStr&&(!v.to||v.to>=dateStr))||null;
  };
  const isWeekend = (day) => { const d=new Date(viewYear,viewMonth,day).getDay(); return d===0||d===6; };
  const isToday   = (day) => todayStr===viewYear+'-'+String(viewMonth+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
  const isHoliday = (day) => { const mm=String(viewMonth+1).padStart(2,'0'),dd=String(day).padStart(2,'0'); return HOLIDAYS.includes(mm+'-'+dd); };

  const prevMonth = () => { if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1); };
  const nextMonth = () => { if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1); };
  const goToday   = () => { setViewYear(today.getFullYear()); setViewMonth(today.getMonth()); };

  const persist = async (t, v) => {
    saveTeamLocal(t); saveVacsLocal(v);
    setSaving(true);
    await saveTeamSupabase(t, v);
    setSaving(false);
  };

  const addVac = () => {
    const member = newVac.memberId ? team.find(m=>m.id===newVac.memberId) : null;
    const name = member?.name || newVac.name.trim();
    if (!name || !newVac.from) return;
    const newEntry = {id:uid(), memberId:newVac.memberId||null, name, from:newVac.from, to:newVac.to||newVac.from, note:newVac.note, type:newVac.type||'vacaciones', reason:newVac.reason||''};
    const v = [...vacs, newEntry];
    setVacs(v); saveVacsLocal(v);
    setNewVac({memberId:'',name:'',from:'',to:'',note:'',type:'vacaciones',reason:''});
    if (newVac.memberId) sbSaveMemberVacs(newVac.memberId, v.filter(x=>x.memberId===newVac.memberId));
  };
  const delVac = id => {
    const removing = vacs.find(x=>x.id===id);
    const v = vacs.filter(x=>x.id!==id); setVacs(v); saveVacsLocal(v);
    if (removing?.memberId) sbSaveMemberVacs(removing.memberId, v.filter(x=>x.memberId===removing.memberId));
  };

  // ── Counters helper ──
  const thisYear = today.getFullYear();
  const countVacDays = (memberId, year, typeFilter) => {
    const m = team.find(x=>x.id===memberId); if(!m) return 0;
    return vacs.filter(v=>(v.memberId===memberId||v.name===m.name)&&(!typeFilter||v.type===typeFilter||(!v.type&&typeFilter==='vacaciones'))).reduce((sum,v)=>{
      if(!v.from) return sum;
      let d=new Date(v.from), to=new Date(v.to||v.from), cnt=0;
      while(d<=to){const yr=d.getFullYear(),dow=d.getDay(),mm=String(d.getMonth()+1).padStart(2,'0'),dd2=String(d.getDate()).padStart(2,'0');if(yr===year&&dow!==0&&dow!==6&&!HOLIDAYS.includes(mm+'-'+dd2))cnt++;d.setDate(d.getDate()+1);}
      return sum+cnt;
    },0);
  };

  const members = team.length > 0 ? team : [...new Set(vacs.map(v=>v.name))].map((n,i)=>({id:'anon-'+i,name:n,avatar:'👤',role:''}));

  return html`
    <div style=${{ maxWidth:960, margin:'0 auto' }}>

      <div style=${{ display:'flex', alignItems:'center', gap:8, marginBottom:16, flexWrap:'wrap' }}>
        <div style=${{ display:'flex', gap:0, borderRadius:10, overflow:'hidden', border:'1.5px solid #E5E5EA', flexShrink:0 }}>
          ${[['anual','📊 Anual'],['mensual','📅 Mensual']].map(([vid,vl])=>html`
            <button key=${vid} onClick=${()=>setVacView(vid)}
              style=${{ padding:'6px 16px', fontSize:12, fontWeight:vacView===vid?700:500,
                background:vacView===vid?'#1D1D1F':'#FFF', color:vacView===vid?'#FFF':'#6E6E73',
                border:'none', cursor:'pointer' }}>${vl}</button>`)}
        </div>
        ${vacView==='mensual' && html`
          <button onClick=${prevMonth} style=${{ width:32,height:32,borderRadius:8,border:'1.5px solid #E5E5EA',background:'#FFF',fontSize:16,cursor:'pointer' }}>‹</button>
          <h3 style=${{ fontSize:15, fontWeight:700 }}>${MONTH_NAMES[viewMonth]} ${viewYear}</h3>
          <button onClick=${nextMonth} style=${{ width:32,height:32,borderRadius:8,border:'1.5px solid #E5E5EA',background:'#FFF',fontSize:16,cursor:'pointer' }}>›</button>
          <button onClick=${goToday} style=${{ padding:'5px 12px', borderRadius:8, border:'1.5px solid #007AFF20', background:'#007AFF10', color:'#007AFF', fontSize:11, fontWeight:600, cursor:'pointer' }}>Hoy</button>`}
        <div style=${{ flex:1 }}/>
        ${saving && html`<span style=${{ fontSize:11, color:'#007AFF' }}>💾</span>`}
      </div>

      ${vacView==='anual' && html`
        <div style=${{ display:'flex', flexDirection:'column', gap:8, marginBottom:20 }}>

          <div style=${{ display:'grid', gridTemplateColumns:'1fr 90px 90px 90px 90px 90px', gap:6, padding:'0 12px', marginBottom:2 }}>
            <span style=${{ fontSize:10, color:'#86868B', fontWeight:700 }}>Miembro</span>
            ${['Días/año','Año ant.','Total disp.','Consumidos','Restantes'].map(l=>html`
              <span key=${l} style=${{ fontSize:10, color:'#86868B', fontWeight:700, textAlign:'center' }}>${l}</span>`)}
          </div>
          ${members.map(m => {
            const mbFull = (embeddedTeam||team).find(x=>x.id===m.id)||m;
            const annualDays = mbFull.annual_vac_days ?? ANNUAL_VAC_DAYS;
            const prevPend   = mbFull.prev_year_pending ?? 0;
            const vacUsed    = countVacDays(m.id, thisYear, 'vacaciones');
            const total      = annualDays + prevPend;
            const remain     = Math.max(0, total - vacUsed);
            const pct        = total>0?Math.min(100,Math.round((vacUsed/total)*100)):0;
            const onVacToday = vacs.some(v=>(v.memberId===m.id||v.name===m.name)&&v.from<=todayStr&&(!v.to||v.to>=todayStr));
            return html`
              <div key=${m.id} style=${{ background:'#FFF', borderRadius:12, border:'1.5px solid '+(onVacToday?'#FF9500':'#E5E5EA'), overflow:'hidden' }}>
                <div style=${{ display:'grid', gridTemplateColumns:'1fr 90px 90px 90px 90px 90px', gap:6, padding:'10px 12px', alignItems:'center' }}>

                  <div style=${{ display:'flex', alignItems:'center', gap:8 }}>
                    <div style=${{ width:32,height:32,borderRadius:9,background:m.color||'#E5E5EA',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0 }}>${m.avatar||'👤'}</div>
                    <div>
                      <div style=${{ fontSize:12, fontWeight:700 }}>${m.name}</div>

            <div style=${{ textAlign:'center' }}><span style=${{ fontSize:14, fontWeight:800, color:'#5856D6' }}>${members.reduce((s,m)=>s+((embeddedTeam||team).find(x=>x.id===m.id)?.prev_year_pending??0),0)}</span></div>
            <div style=${{ textAlign:'center' }}><span style=${{ fontSize:14, fontWeight:800, color:'#007AFF' }}>${members.reduce((s,m)=>{const mb=(embeddedTeam||team).find(x=>x.id===m.id)||m;return s+(mb.annual_vac_days??ANNUAL_VAC_DAYS)+(mb.prev_year_pending??0);},0)}</span></div>
            <div style=${{ textAlign:'center' }}><span style=${{ fontSize:14, fontWeight:800, color:'#FF9500' }}>${members.reduce((s,m)=>s+countVacDays(m.id,thisYear,'vacaciones'),0)}</span></div>
            <div style=${{ textAlign:'center' }}><span style=${{ fontSize:14, fontWeight:800, color:'#34C759' }}>${members.reduce((s,m)=>{const mb=(embeddedTeam||team).find(x=>x.id===m.id)||m;const t=(mb.annual_vac_days??ANNUAL_VAC_DAYS)+(mb.prev_year_pending??0);return s+Math.max(0,t-countVacDays(m.id,thisYear,'vacaciones'));},0)}</span></div>

            ${[['#C8F0D0','#2D8A4E','L','Laboral'],['#E0E0E0','#888','','Fin semana'],['#EEEEFF','#5856D6','F','Festivo'],['#FF9500','#FFF','V','Ausencia']].map(([bg,c,lbl,name])=>html`

                      const td2    = isToday(d);
                      const entry  = onVac ? getVacEntry(m, d) : null;
                      const atype  = entry ? (ABSENCE_TYPES.find(t=>t.id===entry.type)||ABSENCE_TYPES[0]) : null;
                      const bg     = onVac?(atype?.color||'#FF9500'):wknd?'#E0E0E0':holi?'#EEEEFF':'#C8F0D0';
                      const label  = onVac?(atype?.initial||'V'):wknd?'':holi?'F':'L';
                      const color  = onVac?'#FFF':wknd?'#888':holi?'#5856D6':'#2D8A4E';
                      return html`

                    })}

              </tbody>
            </table>

            <h3 style=${{ fontSize:13, fontWeight:700, marginBottom:10 }}>➕ Registrar ausencia</h3>
            <div style=${{ display:'flex', flexDirection:'column', gap:8 }}>
              <div style=${{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                <div>
                  <label style=${{ fontSize:9, color:'#86868B', display:'block', marginBottom:2, fontWeight:600, textTransform:'uppercase' }}>Persona</label>
                  <select value=${newVac.memberId} onChange=${e=>setNewVac({...newVac,memberId:e.target.value,name:''})}
                    style=${{ width:'100%', border:'1.5px solid #E5E5EA', borderRadius:8, padding:'8px 10px', fontSize:12, background:'#FFF', outline:'none', fontFamily:'inherit' }}>
                    <option value="">— Seleccionar —</option>
                    ${members.map(m=>html`<option key=${m.id} value=${m.id}>${m.avatar} ${m.name}</option>`)}

                </div>
                <div>
                  <label style=${{ fontSize:9, color:'#86868B', display:'block', marginBottom:2, fontWeight:600, textTransform:'uppercase' }}>Tipo</label>
                  <select value=${newVac.type||'vacaciones'} onChange=${e=>setNewVac({...newVac,type:e.target.value,reason:''})}
                    style=${{ width:'100%', border:'1.5px solid #E5E5EA', borderRadius:8, padding:'8px 10px', fontSize:12, background:'#FFF', outline:'none', fontFamily:'inherit' }}>
                    ${ABSENCE_TYPES.map(t=>html`<option key=${t.id} value=${t.id}>${t.label}</option>`)}
                  </select>
                </div>
              </div>
              ${newVac.memberId==='__other__'&&html`<input value=${newVac.name} onInput=${e=>setNewVac({...newVac,name:e.target.value})} placeholder="Nombre" style=${{ border:'1.5px solid #E5E5EA', borderRadius:8, padding:'8px 10px', fontSize:12, background:'#FFF', outline:'none', fontFamily:'inherit' }} />`}
              ${(ABSENCE_TYPES.find(t=>t.id===newVac.type)?.reasons||[]).length>0&&html`

                  style=${{ border:'1.5px solid #E5E5EA', borderRadius:8, padding:'8px 10px', fontSize:12, background:'#FFF', outline:'none', fontFamily:'inherit' }}>
                  <option value="">— Motivo —</option>

              <div style=${{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>

            </div>
          </div>
        </div>
      `}
    </div>`;
}

/* ═══ USER PROFILE MODAL ═══ */
function UserProfileModal({ user, onClose, state, sA, sR }) {
  const [tab,      setTab]      = useState('perfil');
  const [profile,  setProfile]  = useState(null);
  const [saving,   setSaving]   = useState(false);
  const [saved,    setSaved]    = useState(false);
  const [rolesList, setRolesList] = useState(getAllRoles);
  useEffect(() => {
    // Include the member's current role even if custom/not-in-localStorage
    if (profile?.role_label) setRolesList(getAllRoles([profile.role_label]));
    const onStorage = () => setRolesList(getAllRoles(profile?.role_label ? [profile.role_label] : []));
    window.addEventListener('storage', onStorage);
    return () => window.removeEventListener('storage', onStorage);
  }, [profile?.role_label]);

  useEffect(() => {
    sbLoadTeamMembers().then(members => {
      const uq = (user.username||user.name||'').toLowerCase();
      const me = members.find(m =>
        m.id === user.id ||
        (m.email    && m.email.toLowerCase()                === uq) ||
        (m.email    && m.email.split('@')[0].toLowerCase()  === uq) ||
        (m.username && m.username.toLowerCase()             === uq) ||
        (m.name     && m.name.toLowerCase()                 === uq)
      );
      setProfile(me ? {...me} : null);
    });
  }, []);

  const saveProfile = async () => {
    if (!profile) return;
    setSaving(true);
    await sbSaveTeamMember(profile);
    // Reload to confirm sync with user management
    sbLoadTeamMembers().then(members => {
      const me = members.find(m => m.id === profile.id);
      if (me) setProfile({...me});
    });
    setSaving(false); setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  const today = new Date().toISOString().slice(0,10);
  const myActions = (state.actions||[]).filter(a => a.owner === user.name || a.createdBy === user.id);
  const _lm = (() => { try{return JSON.parse(localStorage.getItem('rf-level-members-'+SALA)||'{}')}catch{return {}} })();
  const _isMyLevel = (r) => r.escalation && (_lm[r.escalation.level]||[]).includes(user.name);
  const myRisks   = (state.risks||[]).filter(r =>
    r.owner === user.name ||
    (r.escalation?.memberId === user.id) ||
    (r.escalation?.memberName === user.name) ||
    _isMyLevel(r)
  );
  const pendingActions = myActions.filter(a => a.status !== 'done' && a.status !== 'discarded');
  const overdueActions = myActions.filter(a => a.status !== 'done' && a.status !== 'discarded' && a.date && a.date < today);
  const escalatedToMe  = myRisks.filter(r => r.escalation?.memberId === user.id || r.escalation?.memberName === user.name || _isMyLevel(r));

  const PRIS_MAP = {high:'#FF3B30', medium:'#FF9500', low:'#34C759'};

  return html`
    <div style=${{ position:'fixed', inset:0, background:'rgba(0,0,0,.5)', zIndex:9100,
      display:'flex', alignItems:'center', justifyContent:'center', padding:16 }}
      onClick=${onClose}>
      <div onClick=${e=>e.stopPropagation()}
        style=${{ background:'#FFF', borderRadius:24, maxWidth:660, width:'100%',
          maxHeight:'88vh', display:'flex', flexDirection:'column',
          boxShadow:'0 24px 80px rgba(0,0,0,.2)', overflow:'hidden' }}>

        <div style=${{ padding:'20px 24px 0', flexShrink:0 }}>
          <div style=${{ display:'flex', alignItems:'center', gap:14, marginBottom:16 }}>
            <div style=${{ width:56, height:56, borderRadius:16, background:user.color||'#007AFF',
              display:'flex', alignItems:'center', justifyContent:'center', fontSize:30, flexShrink:0 }}>
              ${user.avatar}
            </div>
            <div style=${{ flex:1 }}>
              <h2 style=${{ fontSize:18, fontWeight:700 }}>${user.name}</h2>
              <p style=${{ fontSize:13, color:'#86868B' }}>${user.role||'Sin rol'} ${profile?.company ? '· '+profile.company : ''}</p>
            </div>
            <button onClick=${onClose} style=${{ width:32, height:32, borderRadius:16, border:'none', background:'#F2F2F7', fontSize:16, cursor:'pointer' }}>✕</button>
          </div>

          <div style=${{ display:'flex', gap:0, borderBottom:'2px solid #F2F2F7', overflowX:'auto' }}>
            ${[['perfil','👤 Perfil'],['contacto','📞 Contacto'],['actividad','📊 Actividad']].map(([tid,tl])=>html`
              <button key=${tid} onClick=${()=>setTab(tid)}
                style=${{ padding:'9px 16px', fontSize:12, fontWeight:tab===tid?700:500,
                  color:tab===tid?'#007AFF':'#86868B', background:'transparent', border:'none',
                  borderBottom:tab===tid?'2px solid #007AFF':'2px solid transparent',
                  cursor:'pointer', marginBottom:'-2px', whiteSpace:'nowrap' }}>${tl}</button>`)}
          </div>
        </div>

        <div style=${{ flex:1, overflowY:'auto', padding:'18px 24px 24px' }}>

          ${tab==='perfil' && html`
            ${!profile ? html`<div style=${{ textAlign:'center', padding:32, color:'#86868B' }}>⏳ Cargando…</div>` : html`
              <div style=${{ display:'flex', flexDirection:'column', gap:10 }}>
                <div style=${{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                  <div>
                    <label style=${{ fontSize:11, color:'#86868B', display:'block', marginBottom:3, fontWeight:600 }}>Nombre</label>
                    <input value=${profile.name||''} onInput=${e=>setProfile({...profile,name:e.target.value})}
                      style=${{ ...iS, fontSize:13 }} />
                  </div>
                  <div>
                    <label style=${{ fontSize:11, color:'#86868B', display:'block', marginBottom:3, fontWeight:600 }}>Usuario</label>
                    <input value=${profile.username||''} onInput=${e=>setProfile({...profile,username:e.target.value})}
                      style=${{ ...iS, fontSize:13 }} />
                  </div>
                </div>
                <div>
                  <label style=${{ fontSize:11, color:'#86868B', display:'block', marginBottom:3, fontWeight:600 }}>Email</label>
                  <input value=${profile.email||''} onInput=${e=>setProfile({...profile,email:e.target.value})}
                    style=${{ ...iS, fontSize:13 }} />
                </div>
                <div style=${{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                  <div>
                    <label style=${{ fontSize:11, color:'#86868B', display:'block', marginBottom:3, fontWeight:600 }}>Empresa</label>
                    <input value=${profile.company||''} onInput=${e=>setProfile({...profile,company:e.target.value})}
                      style=${{ ...iS, fontSize:13 }} placeholder="Empresa / Organización" />
                  </div>
                  <div>
                    <label style=${{ fontSize:11, color:'#86868B', display:'block', marginBottom:3, fontWeight:600 }}>Rol</label>
                    <select value=${profile.role_label||''} onChange=${e=>setProfile({...profile,role_label:e.target.value})}
                      style=${{ ...iS, fontSize:13 }}>
                      <option value="">— Sin rol —</option>
                      ${rolesList.map(r=>html`<option key=${r} value=${r}>${r}</option>`)}
                    </select>
                  </div>
                </div>
                <button onClick=${saveProfile} disabled=${saving}
                  style=${{ padding:'10px', borderRadius:10, border:'none', background: saved?'#34C759':'#1D1D1F', color:'#FFF', fontSize:13, fontWeight:600, cursor:'pointer', marginTop:4 }}>
                  ${saving ? '💾 Guardando…' : saved ? '✅ Guardado' : 'Guardar cambios'}
                </button>
              </div>`}
          `}

          ${tab==='vacaciones' && html`
            ${!profile ? html`<div style=${{ textAlign:'center', padding:32, color:'#86868B' }}>⏳ Cargando…</div>` : html`
              <div style=${{ display:'flex', flexDirection:'column', gap:12 }}>
                ${(()=>{
                  const myVacs = (profile.vacations||[]);
                  const yr = new Date().getFullYear();
                  const yrPrev = yr-1;
                  const HOLIDAYS_FALLBACK = ['01-01','01-06','05-01','08-15','10-12','11-01','12-06','12-08','12-25'];
                  const cntDays = (vList, year, type) => vList.filter(v=>(!type||v.type===type||(!v.type&&type==='vacaciones'))&&new Date(v.from||'').getFullYear()===year).reduce((sum,v)=>{
                    if(!v.from) return sum;
                    let d=new Date(v.from), to=new Date(v.to||v.from), cnt=0;
                    while(d<=to){const dow=d.getDay(),mm=String(d.getMonth()+1).padStart(2,'0'),dd2=String(d.getDate()).padStart(2,'0');if(d.getFullYear()===year&&dow!==0&&dow!==6&&!HOLIDAYS_FALLBACK.includes(mm+'-'+dd2))cnt++;d.setDate(d.getDate()+1);}
                    return sum+cnt;
                  },0);
                  const vacUsed  = cntDays(myVacs, yr, 'vacaciones');
                  const annualDays2 = profile.annual_vac_days ?? ANNUAL_VAC_DAYS;
                  const prevPend   = profile.prev_year_pending ?? 0;
                  const total      = annualDays2 + prevPend;
                  const remain   = Math.max(0, total - vacUsed);
                  const pct      = total>0?Math.min(100,Math.round((vacUsed/total)*100)):0;
                  return html`

                    <div style=${{ display:'grid', gridTemplateColumns:'repeat(5,1fr)', gap:8 }}>
                      ${[[annualDays2,'Días anuales','#1D1D1F'],[prevPend,'Año ant. pend.','#5856D6'],[total,'Total disp.','#007AFF'],[vacUsed,'Consumidos','#FF9500'],[remain,'Restantes',remain<=5?'#FF3B30':remain<=10?'#FF9500':'#34C759']].map(([v,l,c])=>html`
                        <div style=${{ textAlign:'center', padding:'10px 6px', borderRadius:12, background:c+'0D', border:'1px solid '+c+'25' }}>
                          <div style=${{ fontSize:24, fontWeight:800, color:c }}>${v}</div>
                          <div style=${{ fontSize:9, color:'#86868B', marginTop:3, lineHeight:1.2 }}>${l}</div>
                        </div>`)}
                    </div>

                    <div>
                      <div style=${{ display:'flex', justifyContent:'space-between', fontSize:10, color:'#86868B', marginBottom:4 }}>
                        <span>Consumido: ${vacUsed}d de ${total}d</span>
                        <span style=${{ fontWeight:700 }}>${pct}%</span>
                      </div>
                      <div style=${{ background:'#F2F2F7', borderRadius:6, height:8, overflow:'hidden' }}>
                        <div style=${{ width:pct+'%', height:'100%', background:pct>90?'#FF3B30':pct>70?'#FF9500':'#34C759', borderRadius:6 }}></div>
                      </div>
                    </div>

                    ${myVacs.filter(v=>new Date(v.from||'').getFullYear()===yr).length>0&&html`
                      <div>
                        <h4 style=${{ fontSize:11, fontWeight:700, color:'#86868B', textTransform:'uppercase', marginBottom:8, letterSpacing:.5 }}>Registro ${yr}</h4>
                        <div style=${{ display:'flex', flexDirection:'column', gap:4 }}>
                          ${[...myVacs].filter(v=>new Date(v.from||'').getFullYear()===yr).sort((a,b)=>a.from>b.from?-1:1).map((v,i)=>{
                            const info = ABSENCE_TYPES.find(t=>t.id===v.type)||{label:v.type||'Vacaciones',id:'vacaciones'};
                            return html`
                              <div key=${v.id||i} style=${{ display:'flex', alignItems:'center', gap:8, padding:'7px 10px', borderRadius:9, background:'#F9F9FB', border:'1px solid #E5E5EA' }}>
                                <span style=${{ fontSize:14 }}>${info.label.split(' ')[0]}</span>
                                <div style=${{ flex:1 }}>
                                  <div style=${{ fontSize:11, fontWeight:600 }}>${info.label.split(' ').slice(1).join(' ')||info.label}</div>
                                  <div style=${{ fontSize:10, color:'#86868B' }}>${v.from}${v.to&&v.to!==v.from?' → '+v.to:''} ${v.reason?'· '+v.reason:''}</div>
                                </div>
                              </div>`;
                          })}
                        </div>
                      </div>`}`;
                })()}
              </div>`}
          `}

          ${tab==='actividad' && html`
            <div style=${{ display:'flex', flexDirection:'column', gap:16 }}>

              <div style=${{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:8 }}>
                ${[
                  ['🎯', pendingActions.length, 'Pendientes', '#FF9500'],
                  ['⚠️', overdueActions.length, 'Vencidos',   '#FF3B30'],
                  ['📈', escalatedToMe.length,  'Escalados',  '#5856D6'],
                ].map(([ic,v,l,c])=>html`
                  <div style=${{ background:'#FFF', borderRadius:12, border:'1.5px solid #E5E5EA', padding:'12px 10px', textAlign:'center' }}>
                    <div style=${{ fontSize:18, marginBottom:4 }}>${ic}</div>
                    <div style=${{ fontSize:22, fontWeight:800, color:c }}>${v}</div>
                    <div style=${{ fontSize:9, color:'#86868B' }}>${l}</div>
                  </div>`)}
              </div>

              ${myActions.length > 0 && html`
                <div>

          ${tab==='contacto' && html`

                  <label style=${{ fontSize:11, color:'#86868B', display:'block', marginBottom:3, fontWeight:600 }}>Teléfono</label>

                    placeholder="+34 6XX XXX XXX" style=${{ ...iS, fontSize:13 }} />
                </div>
                <div style=${{ background:'#F9F9FB', borderRadius:12, padding:'14px', border:'1.5px solid #E5E5EA' }}>

                    ['notif_escalado',  'Riesgo escalado a mí'],

                        style=${{ width:44, height:24, borderRadius:12, border:'none', cursor:'pointer', position:'relative', flexShrink:0,

                        <div style=${{ position:'absolute', top:2, left:profile[key]?22:2, width:20, height:20, borderRadius:10, background:'#FFF',
                          transition:'left .2s', boxShadow:'0 1px 3px rgba(0,0,0,.2)' }}></div>
                      </button>
                    </div>`)}
                </div>
                <button onClick=${saveProfile} disabled=${saving}
                  style=${{ padding:'10px', borderRadius:10, border:'none', background:saved?'#34C759':'#1D1D1F', color:'#FFF', fontSize:13, fontWeight:600, cursor:'pointer' }}>
                  ${saving ? '💾 Guardando…' : saved ? '✅ Guardado' : 'Guardar preferencias'}
                </button>
              </div>`}
          `}
        </div>
      </div>
    </div>`;
}


function RetroBoard({ user, onLogout }) {
  // Ensure session is persisted for this sala (in case user came from homepage)
  useEffect(() => {
    if (user) {
      try { localStorage.setItem('rf-user-' + SALA, JSON.stringify(user)); } catch {}
    }
  }, []);
  const { state, upd, online, cursors, moveCursor, reset, broadcastTimer, broadcastPhase } = useRealtime(user);
  const [mainTab, setMainTab] = useState('resumen');
  const [phase, setPhase] = useState(() => loadRetroPhase());
  const [timer,   setTimer]   = useState(900);
  const [running, setRunning] = useState(false);
  const [showTimerEnd,     setShowTimerEnd]     = useState(false);
  const [showPhaseConfirm, setShowPhaseConfirm] = useState(null);
  const [phaseTimes, setPhaseTimes] = useState(() => loadPhaseTimes()); // { phaseIdx: totalSeconds }
  const phaseStartRef = useRef(Date.now()); // when current phase started (wall clock)

  // Register phase receiver — also saves phase and records time
  const advanceToPhase = useCallback((target) => {
    const elapsed = Math.round((Date.now() - phaseStartRef.current) / 1000);
    setPhaseTimes(prev => {
      const next = { ...prev, [phase]: (prev[phase]||0) + elapsed };
      savePhaseTimes(next);
      return next;
    });
    phaseStartRef.current = Date.now();
    setPhase(target);
    saveRetroPhase(target);
  }, [phase]);

  useEffect(() => { window.__phaseRecv = (p) => advanceToPhase(p); }, [advanceToPhase]);

  // Register timer receiver (for broadcast from other users)
  useEffect(() => {
    window.__timerRecv = (secs, isRunning, startedAt) => {
      if (isRunning && startedAt) {
        const elapsed = Math.floor((Date.now() - startedAt) / 1000);
        const current = Math.max(0, secs - elapsed);
        setTimer(current); setRunning(current > 0);
      } else {
        setTimer(secs); setRunning(isRunning);
      }
    };
    return () => { window.__timerRecv = null; };
  }, []);

  // Helper: set timer + broadcast to all
  const startedAtRef = useRef(null);
  const syncTimer = useCallback((secs, isRunning) => {
    if (isRunning) startedAtRef.current = Date.now();
    else startedAtRef.current = null;
    setTimer(secs); setRunning(isRunning);
    broadcastTimer(secs, isRunning, isRunning ? startedAtRef.current : null);
  }, [broadcastTimer]);

  // Re-broadcast every 10s while running so latecomers sync
  useEffect(() => {
    if (!running) return;
    const iv = setInterval(() => {
      broadcastTimer(timerValRef.current, true, startedAtRef.current);
    }, 10000);
    return () => clearInterval(iv);
  }, [running, broadcastTimer]);
  const [showReset,         setShowReset]         = useState(false);
  const [showGuide,         setShowGuide]         = useState(false);
  const [showHistorial,     setShowHistorial]     = useState(false);
  const [showProjectSwitch, setShowProjectSwitch] = useState(false);
  const [showProfile,       setShowProfile]       = useState(false);
  const [profileTab,        setProfileTab]        = useState('perfil');
  const [notifications,     setNotifications]     = useState([]);
  const [showNotifs,        setShowNotifs]        = useState(false);
  // Close notifs on outside click
  useEffect(() => {
    if (!showNotifs) return;
    const close = (e) => { if (!e.target.closest('[data-notif-panel]')) setShowNotifs(false); };
    document.addEventListener('click', close);
    return () => document.removeEventListener('click', close);
  }, [showNotifs]);
  const notifSeenRef = useRef(new Set()); // track which items already notified
  const addNotif = useCallback((key, msg, type='info') => {
    if (notifSeenRef.current.has(key)) return; // deduplicate
    notifSeenRef.current.add(key);
    const n = {id:uid(), key, msg, type, ts:Date.now(), read:false};
    setNotifications(prev=>[n,...prev.slice(0,29)]);
  }, []);
  // Re-check every time state changes
  useEffect(() => {
    if (!state.risks && !state.actions) return;
    const today = new Date().toISOString().slice(0,10);
    (state.risks||[]).forEach(r => {
      if (r.escalation && r.escalation.level && r.escalation.level !== 'equipo') {
        const _lmn = (() => { try{return JSON.parse(localStorage.getItem('rf-level-members-'+SALA)||'{}')}catch{return {}} })();
        const isMyLevel = (_lmn[r.escalation.level]||[]).includes(user.name);
        if (r.escalation.memberName===user.name||r.escalation.memberId===user.id||isMyLevel)
          addNotif('esc-'+r.id, '📈 Escalado a '+r.escalation.levelLabel+': '+r.text.slice(0,40), 'escalado');
      }
      if (r.owner===user.name&&r.status!=='mitigated'&&r.deadline&&r.deadline<today)
        addNotif('rdl-'+r.id, '⚠️ Riesgo vencido: '+r.text.slice(0,50), 'overdue');
    });
    (state.actions||[]).filter(a=>a.owner===user.name&&a.status!=='done'&&a.status!=='discarded'&&a.date&&a.date<today).forEach(a=>{
      addNotif('adl-'+a.id, '🎯 Tarea vencida: '+a.text.slice(0,50), 'overdue');
    });
  }, [state.risks, state.actions, addNotif]);
  const [sbRetroHistory, setSbRetroHistory] = useState([]);
  useEffect(() => {
    sbLoadRetros().then(all => setSbRetroHistory((all||[]).filter(r=>r.sala===SALA)));
  }, []);

  useEffect(() => {
    if (phase !== 5) return;
    const autoClose = setTimeout(async () => {
      if (phase === 5 && state.notes?.length > 0) {
        await sbCreateRetroArchive(SALA, TIPO, state, user?.id);
        reset(); advanceToPhase(0); setMainTab('retro'); setTimer(900); setRunning(false); setPhaseTimes({}); phaseStartRef.current=Date.now();
        showToast('Retro auto-archivada tras 2 horas');
      }
    }, 2 * 60 * 60 * 1000);
    return () => clearTimeout(autoClose);
  }, [phase]);
  const [toast,   setToast]   = useState(null);
  const globalErr = useErrToast();
  const tRef = useRef(null);
  const timerValRef = useRef(900);
  const bRef = useRef(null);

  const SAVE_QUOTES = [
    '✨ Mischief managed! Retro guardada.',
    '🪄 Accio backup! Archivo descargado.',
    '🧙 Dumbledore estaría orgulloso. Guardado.',
    '⚡ Más rápido que un Nimbus 2000. Listo.',
    '🦉 Una lechuza lleva tu retro a buen puerto.',
    '🔮 El Pensadero ha registrado esta sesión.',
  ];
  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3000); };

  // Listen for Supabase recovery events
  useEffect(() => {
    const h = (e) => {
      const d = e.detail||{};
      showToast('🔄 Datos recuperados de Supabase: ' + (d.actions||0) + ' tareas, ' + (d.risks||0) + ' riesgos');
    };
    window.addEventListener('revelio-recovered', h);
    return () => window.removeEventListener('revelio-recovered', h);
  }, []);

  useEffect(() => {
    if (!running) return;
    tRef.current = setInterval(() => setTimer(p => { const n=p<=0?0:p-1; timerValRef.current=n; if(n===0){setRunning(false);setShowTimerEnd(true);} return n; }), 1000);
    return () => clearInterval(tRef.current);
  }, [running]);

  useEffect(() => {
    if (!bRef.current) return;
    let last = 0;
    const h = e => {
      if (Date.now()-last<400) return; last=Date.now();
      const r = bRef.current.getBoundingClientRect();
      const x = ((e.clientX-r.left)/r.width)*100, y = ((e.clientY-r.top)/r.height)*100;
      if (x>=0&&x<=100&&y>=0&&y<=100) moveCursor(x,y);
    };
    const el = bRef.current;
    el.addEventListener('mousemove',h);
    return () => el.removeEventListener('mousemove',h);
  }, [moveCursor, phase]);

  const fmt = s => Math.floor(s/60).toString().padStart(2,'0')+':'+(s%60).toString().padStart(2,'0');
  const uList = Object.entries(online);
  const sN = d => upd('notes',d);
  const sT = d => upd('tasks',d);
  const sA = d => upd('actions',d);
  const sO = d => upd('obj',d);
  const sR = d => { upd('risks',d); saveRisks(d); };

  // Risk navigation + mitigation callbacks for TaskDetailModal
  // NOTE: these use window globals (__currentRisks/__currentActions) set by PTrabajo
  // because state refs from useRealtime are not in scope here.
  // sA/sR use upd() which calls setState(prev=>{...}) so they work even from stale closures.
  const sRRef = useRef(sR); sRRef.current = sR;
  const sARef = useRef(sA); sARef.current = sA;

  // Keep window globals fresh from RetroBoard (always mounted) for cross-component callbacks
  useEffect(() => { window.__currentRisks = state.risks||[]; }, [state.risks]);
  useEffect(() => { window.__currentActions = state.actions||[]; }, [state.actions]);

  useEffect(() => {
    // TARGETED operations (never replace entire array — prevents data loss)
    window.__linkTaskToRisk = (taskId, riskId) => {
      const cur = window.__currentActions || [];
      sARef.current(cur.map(a => a.id===taskId ? {...a, riskId, source:'risk'} : a));
    };
    window.__unlinkTask = (taskId) => {
      const cur = window.__currentActions || [];
      sARef.current(cur.map(a => a.id===taskId ? {...a, riskId:null, source:a.source==='risk'?'manual':a.source} : a));
    };
    window.__createLinkedTask = (riskId, riskText) => {
      const cur = window.__currentActions || [];
      const newTask = {id:uid(),text:'Mitigar: '+riskText,description:'Tarea vinculada al riesgo',owner:'Sin asignar',date:'',status:'backlog',priority:'high',voteScore:0,createdBy:user?.id||'',fromCategory:null,noteId:null,riskId:riskId,source:'risk',type:'tarea',createdAt:new Date().toISOString()};
      sARef.current([...cur, newTask]);
    };
    window.__goToTask = (task) => {
      setMainTab('trabajo');
      // The PTrabajo component will pick up window.__pendingTaskDetail
      window.__pendingTaskDetail = task;
    };
    window.__goToRisk = (riskId) => {
      setMainTab('riesgos');
    };
    window.__goMitigateRisk = (riskId) => {
      const currentRisks = window.__currentRisks || [];
      const updated = currentRisks.map(r => r.id === riskId ? {...r, status:'mitigated'} : r);
      sRRef.current(updated);
    };
    return () => { window.__goToRisk = null; window.__goMitigateRisk = null; window.__createLinkedTask = null; window.__linkTaskToRisk = null; window.__unlinkTask = null; window.__goToTask = null; };
  }, []);

  const saveRetro = () => {
    const data = { sala: SALA, date: new Date().toISOString(), ...state };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'retro-' + SALA + '-' + new Date().toISOString().split('T')[0] + '.json';
    a.click();
    URL.revokeObjectURL(a.href);

    // Save metrics to localStorage for admin dashboard
    try {
      const participants = [...new Set(state.notes.map(n => n.userId))];
      const participantNames = [...new Set(state.notes.map(n => n.userName))];
      saveMetricEntry(SALA, {
        date: new Date().toISOString(),
        notes: state.notes.length,
        participants: participants.length,
        participantNames,
        actions: state.actions.length,
        actionsDone: state.actions.filter(a => a.status === 'done').length,
        votes: state.notes.reduce((s, n) => s + (n.voters?.length || 0), 0),
        objective: state.obj?.met != null ? String(state.obj.met) : null,
        tasksDone: state.tasks.filter(t => t.done).length,
        tasksTotal: state.tasks.length,
      });
    } catch {}
    showToast(SAVE_QUOTES[Math.floor(Math.random()*SAVE_QUOTES.length)]);
    // Also persist snapshot to Supabase (async, fire-and-forget)
    sbSaveRetroSnapshot(SALA, TIPO, state, user.id).catch(() => {});
  };

  const content = () => {
    if (phase===0) return html`<${P1} tasks=${state.tasks} sT=${sT} obj=${state.obj} sO=${sO} user=${user} />`;
    if (phase===1) return html`<${Board} notes=${state.notes} sN=${sN} user=${user} filter="all" hideOthers=${true} showReactions=${false} />`;
    if (phase===2) return html`<${P3} notes=${state.notes} sN=${sN} user=${user} />`;
    if (phase===3) return html`<${P5Risks} risks=${state.risks} sR=${sR} notes=${state.notes} user=${user} />`;
    if (phase===4) return html`<${P4} notes=${state.notes} actions=${state.actions} risks=${state.risks} sA=${sA} user=${user} />`;
    if (phase===5) return html`<${P6} notes=${state.notes} actions=${state.actions} risks=${state.risks} users=${online} user=${user} obj=${state.obj} tasks=${state.tasks} phaseTimes=${phaseTimes} onFinalize=${async()=>{
      await sbCreateRetroArchive(SALA, TIPO, state, user.id);
      reset(); advanceToPhase(0); setMainTab('retro'); setTimer(900); setRunning(false); setPhaseTimes({}); phaseStartRef.current=Date.now();
      showToast('Retro finalizada y archivada en Supabase');
    }} />`;

    return null;
  };

  return html`
    <div ref=${bRef} style=${{ display:'flex', flexDirection:'column', height:'100vh', position:'relative' }}>
      ${Object.entries(cursors).map(([id,c])=>html`
        <div key=${id} style=${{ position:'fixed', left:c.x+'%', top:c.y+'%', pointerEvents:'none', zIndex:9999, transition:'left .4s ease-out, top .4s ease-out' }}>
          <svg width="22" height="22" viewBox="0 0 20 20"><path d="M3 2L17 10L10 11L7 18L3 2Z" fill=${c.color} stroke="#FFF" stroke-width="1.5"/></svg>
          <div style=${{ position:'absolute', left:18, top:12, background:c.color, color:'#FFF', borderRadius:20, padding:'3px 8px 3px 4px', display:'flex', alignItems:'center', gap:4, whiteSpace:'nowrap', boxShadow:'0 2px 8px rgba(0,0,0,.2)' }}>
            <span style=${{ fontSize:18, lineHeight:1 }}>${c.avatar}</span>
            <span style=${{ fontSize:11, fontWeight:700 }}>${c.name}</span>
          </div>
        </div>
      `)}
      <header style=${{ ...gl, padding:'9px 18px', display:'flex', alignItems:'center', justifyContent:'space-between', borderBottom:'1px solid rgba(0,0,0,0.06)', flexShrink:0, zIndex:100 }}>
        <div style=${{ display:'flex', alignItems:'center', gap:10 }}>
          
          <div>
            <h2 style=${{ fontSize:16, fontWeight:700 }}><span class="wm" style=${{ fontSize:18, cursor:'pointer' }} onClick=${()=>window.location.href='/'} title="Volver al inicio">revelio</span> <span style=${{ fontSize:12, fontWeight:500, color:'#007AFF', background:'#007AFF10', padding:'2px 8px', borderRadius:6, marginLeft:4 }}>${SALA_DISPLAY}</span> <span style=${{ fontSize:10, fontWeight:500, color:TIPO_INFO.color, background:TIPO_INFO.color+'10', padding:'2px 6px', borderRadius:5, marginLeft:2 }}>${TIPO_INFO.icon} ${TIPO_INFO.label}</span></h2>
            <span style=${{ fontSize:11, color:'#86868B' }}>${fd(new Date().toISOString())}</span>
          </div>

        </div>

        <div style=${{ display:'flex', alignItems:'center', gap:6 }}>
          ${uList.slice(0,8).map(([id,u],i)=>html`<div key=${id} title=${u.name} style=${{ width:52, height:52, borderRadius:26, background:u.color, border:'3px solid #FFF', display:'flex', alignItems:'center', justifyContent:'center', fontSize:28, marginLeft:i>0?-12:0, zIndex:10-i, boxShadow:'0 2px 10px rgba(0,0,0,.18)' }}>${u.avatar}</div>`)}
          ${uList.length>0 && html`<span style=${{ fontSize:11, color:'#86868B', marginLeft:4 }}>${uList.length} online</span>`}

          <div data-notif-panel style=${{ position:'relative' }}>
            <button onClick=${()=>setShowNotifs(v=>!v)}
              style=${{ width:36, height:36, borderRadius:10, border:'1px solid #E5E5EA', background:'#FFF', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', fontSize:16, position:'relative' }}>
              🔔
              ${notifications.length>0 && html`<div style=${{ position:'absolute', top:-3, right:-3, width:16, height:16, borderRadius:8, background:'#FF3B30', color:'#FFF', fontSize:9, fontWeight:800, display:'flex', alignItems:'center', justifyContent:'center' }}>${notifications.length}</div>`}
            </button>
            ${showNotifs && html`
              <div style=${{ position:'absolute', right:0, top:44, width:320, background:'#FFF', borderRadius:16, border:'1.5px solid #E5E5EA', boxShadow:'0 8px 32px rgba(0,0,0,.12)', zIndex:9999, overflow:'hidden' }}>
                <div style=${{ padding:'12px 16px', borderBottom:'1px solid #F2F2F7', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                  <span style=${{ fontSize:13, fontWeight:700 }}>Notificaciones</span>
                  <button onClick=${()=>{ setNotifications([]); setShowNotifs(false); }} style=${{ border:'none', background:'none', fontSize:11, color:'#86868B', cursor:'pointer' }}>Limpiar</button>

                      ${notifications.map(n=>html`
                        <div key=${n.id} style=${{ padding:'10px 16px', borderBottom:'1px solid #F9F9FB', background:n.type==='escalado'?'#FFF9E6':n.type==='overdue'?'#FFF5F5':'#FFF' }}>

/* ═══ NEW RETRO MODAL ═══ */
function NewRetroModal({ user, state, onClose, onConfirm }) {
  const [saving, setSaving] = useState(false);

  const handleConfirm = async () => {
    setSaving(true);
    // Close the existing active snapshot (update status to 'closed')
    try {
      const { data: existing } = await supabase.from('retros')
        .select('id')
        .eq('sala', SALA)
        .eq('status', 'active')
        .order('created_at', { ascending: false })
        .limit(1);
      if (existing && existing[0]) {
        await supabase.from('retros')
          .update({ status: 'closed', data: state, updated_at: new Date().toISOString() })
          .eq('id', existing[0].id);
      } else {
        // No active row — insert as closed archive
        await sbCreateRetroArchive(SALA, TIPO, state, user.id);
      }
    } catch(e) { console.warn('Archive retro:', e); }
    setSaving(false);
    onConfirm();

/* ═══ PHASE 1: REVIEW ═══ */
function P1({ tasks, sT, obj, sO, user }) {
  const [nt, setNt] = useState('');
  const [eId, setEId] = useState(null);
  const [eVal, setEVal] = useState('');
  const add = () => { if(!nt.trim())return; sT([...tasks,{id:uid(),text:nt.trim(),done:false}]); setNt(''); };
  const tog = id => sT(tasks.map(t=>t.id===id?{...t,done:!t.done}:t));
  const del = id => sT(tasks.filter(t=>t.id!==id));
  const saveE = () => { if(!eVal.trim())del(eId); else sT(tasks.map(t=>t.id===eId?{...t,text:eVal.trim()}:t)); setEId(null); };
  const dc = tasks.filter(t=>t.done).length;

  return html`
    <div style=${{ maxWidth:860, margin:'0 auto', display:'flex', flexDirection:'column', gap:14 }}>
      <div style=${{ ...cS, padding:22 }}>
        <h3 style=${{ fontSize:15, fontWeight:700, marginBottom:12 }}>🎯 Objetivo de la iteración</h3>
        <textarea value=${obj.text} onInput=${e=>sO({...obj,text:e.target.value})} placeholder="¿Cuál era el objetivo principal?" style=${{ ...iS, height:52, resize:'none' }} />
        <div style=${{ display:'flex', gap:6, marginTop:10 }}>
          ${[{v:true,l:'✅ Cumplido',c:'#34C759'},{v:false,l:'❌ No cumplido',c:'#FF3B30'},{v:'partial',l:'⚠️ Parcial',c:'#FF9500'}].map(o=>html`
            <button key=${String(o.v)} onClick=${()=>sO({...obj,met:o.v})} style=${{ padding:'7px 14px', borderRadius:9, border:obj.met===o.v?'2px solid '+o.c:'1.5px solid #E5E5EA', background:obj.met===o.v?o.c+'10':'#FFF', fontSize:12, fontWeight:600, color:obj.met===o.v?o.c:'#6E6E73' }}>${o.l}</button>
          `)}
        </div>
      </div>
      <div style=${{ ...cS, padding:22 }}>
        <div style=${{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12 }}>
          <h3 style=${{ fontSize:15, fontWeight:700 }}>📋 Tareas de la iteración</h3>
          <span style=${{ fontSize:11, fontWeight:700, color:dc===tasks.length&&tasks.length>0?'#34C759':'#86868B', background:'#F2F2F7', padding:'3px 8px', borderRadius:6 }}>${dc}/${tasks.length}</span>
        </div>
        ${tasks.length>0 && html`<div style=${{ height:5, background:'#F2F2F7', borderRadius:3, marginBottom:12, overflow:'hidden' }}><div style=${{ height:'100%', width:(tasks.length?(dc/tasks.length)*100:0)+'%', background:'linear-gradient(90deg,#34C759,#007AFF)', borderRadius:3, transition:'width .3s' }} /></div>`}
        <div style=${{ display:'flex', gap:6, marginBottom:12 }}><input value=${nt} onInput=${e=>setNt(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&add()} placeholder="Añadir tarea..." style=${{ ...iS, flex:1 }} /><button onClick=${add} style=${{ ...bP, padding:'10px 14px' }}>+</button></div>
        <div style=${{ display:'flex', flexDirection:'column', gap:5 }}>
          ${tasks.map(t=>html`
            <div key=${t.id} style=${{ display:'flex', alignItems:'center', gap:8, padding:'9px 12px', borderRadius:10, background:t.done?'#F0FFF4':'#F9F9FB', border:'1px solid '+(t.done?'#34C75922':'#E5E5EA') }}>
              <div onClick=${()=>tog(t.id)} style=${{ width:20, height:20, borderRadius:6, border:t.done?'none':'2px solid #C7C7CC', background:t.done?'#34C759':'#FFF', display:'flex', alignItems:'center', justifyContent:'center', color:'#FFF', fontSize:11, flexShrink:0, cursor:'pointer' }}>${t.done&&'✓'}</div>
              ${eId===t.id
                ? html`<div style=${{ flex:1, display:'flex', gap:4 }}><input autofocus value=${eVal} onInput=${e=>setEVal(e.target.value)} onKeyDown=${e=>{if(e.key==='Enter')saveE();if(e.key==='Escape')setEId(null)}} style=${{ ...iS, padding:'6px 10px', fontSize:13, flex:1 }} /><button onClick=${saveE} style=${{ ...bP, padding:'6px 12px', fontSize:12 }}>✓</button></div>`
                : html`<span onDblClick=${()=>{setEId(t.id);setEVal(t.text)}} style=${{ fontSize:13, color:t.done?'#86868B':'#1D1D1F', textDecoration:t.done?'line-through':'none', flex:1, cursor:'text' }} title="Doble clic para editar">${t.text}</span>`}
              <button onClick=${()=>del(t.id)} style=${{ border:'none', background:'none', fontSize:14, color:'#C7C7CC', padding:'2px 4px', flexShrink:0 }}>✕</button>
            </div>
          `)}
        </div>
      </div>
    </div>
  `;
}

/* ═══ BOARD ═══ */
function Board({ notes, sN, user, filter, hideOthers, showReactions }) {
  // Close any open reaction pickers on click outside
  useEffect(() => {
    const close = () => document.querySelectorAll('[id^="rpick-"]').forEach(x=>x.style.display='none');
    document.addEventListener('click', close);
    return () => document.removeEventListener('click', close);
  }, []);
  const [act,      setAct]      = useState(null);
  const [txt,      setTxt]      = useState('');
  const [noteModal, setNoteModal] = useState(null);
  const [dragId,   setDragId]   = useState(null);
  const [overCat,  setOverCat]  = useState(null);
  const [touchInfo,setTouchInfo]= useState(null); // {id, x, y}
  const touchRef = useRef(null);

  const addN = c => { if(!txt.trim())return; sN([...notes,{id:uid(),text:txt.trim(),category:c,userId:user.id,userName:user.name,userAvatar:user.avatar,userColor:user.color,voters:[],reactions:{}}]); setTxt(''); setAct(null); };
  const vote = nid => sN(notes.map(n=>{if(n.id!==nid)return n;const v=n.voters||[];return{...n,voters:v.includes(user.id)?v.filter(x=>x!==user.id):[...v,user.id]}}));
  const react = (nid, emoji) => sN(notes.map(n=>{
    if(n.id!==nid) return n;
    const r = {...(n.reactions||{})};
    // Remove this user from ALL other emojis first (one reaction per user)
    Object.keys(r).forEach(e => { if(e!==emoji) r[e]=r[e].filter(x=>x!==user.id); if(r[e]?.length===0) delete r[e]; });
    // Toggle current emoji
    if(!r[emoji]) r[emoji]=[];
    if(r[emoji].includes(user.id)) { r[emoji]=r[emoji].filter(x=>x!==user.id); if(r[emoji].length===0) delete r[emoji]; }
    else r[emoji]=[...r[emoji],user.id];
    return {...n,reactions:r};
  }));
  const delN = nid => window.__confirm({title:'Eliminar nota',message:'¿Eliminar esta nota?',onConfirm:()=>sN(notes.filter(n=>n.id!==nid))});
  const saveNote = (id, newText) => { if(!newText.trim()) delN(id); else sN(notes.map(n=>n.id===id?{...n,text:newText.trim()}:n)); setNoteModal(null); };
  const drop = (e,c) => { e.preventDefault(); setOverCat(null); if(dragId)sN(notes.map(n=>n.id===dragId?{...n,category:c}:n)); setDragId(null); };

  // ── Touch drag ──
  const onTouchStart = (e, noteId) => {
    const t = e.touches[0];
    touchRef.current = { id: noteId };
    setTouchInfo({ id: noteId, x: t.clientX, y: t.clientY });
  };
  const onTouchMove = (e) => {
    if (!touchRef.current) return;
    e.preventDefault();
    const t = e.touches[0];
    setTouchInfo(prev => prev ? { ...prev, x: t.clientX, y: t.clientY } : null);
    const el = document.elementFromPoint(t.clientX, t.clientY);
    const col = el && el.closest('[data-cat]');
    setOverCat(col ? col.getAttribute('data-cat') : null);
  };
  const onTouchEnd = (e) => {
    if (!touchRef.current) return;
    const t = e.changedTouches[0];
    const el = document.elementFromPoint(t.clientX, t.clientY);
    const col = el && el.closest('[data-cat]');
    if (col) sN(notes.map(n => n.id === touchRef.current.id ? { ...n, category: col.getAttribute('data-cat') } : n));
    touchRef.current = null;
    setTouchInfo(null);
    setOverCat(null);
  };

  let fil = notes;
  if(filter==='mine') fil=notes.filter(n=>n.userId===user.id);
  else if(CATS.some(c=>c.id===filter)) fil=notes.filter(n=>n.category===filter);
  const cats2 = CATS.some(c=>c.id===filter)?CATS.filter(c=>c.id===filter):CATS;

  return html`
    <div style=${{ position:'relative' }}>
    ${touchInfo && html`
      <div style=${{ position:'fixed', left:touchInfo.x-50, top:touchInfo.y-24, pointerEvents:'none', zIndex:9999,
        background:'#007AFF', color:'#FFF', borderRadius:10, padding:'6px 14px', fontSize:12, fontWeight:600,
        boxShadow:'0 6px 20px rgba(0,122,255,.35)', transform:'rotate(-2deg) scale(1.05)', whiteSpace:'nowrap' }}>
        ✋ Moviendo nota
      </div>
    `}
    <div style=${{ display:'grid', gridTemplateColumns:cats2.length===1?'1fr':'repeat(4,1fr)', gap:10, height:'100%' }}>
      ${cats2.map(cat => {
        const cn = fil.filter(n=>n.category===cat.id).sort((a,b)=>(b.voters?.length||0)-(a.voters?.length||0));
        return html`
          <div key=${cat.id} data-cat=${cat.id}
            onDragOver=${e=>{e.preventDefault();setOverCat(cat.id)}} onDragLeave=${()=>setOverCat(null)} onDrop=${e=>drop(e,cat.id)}
            style=${{ ...cS, display:'flex', flexDirection:'column', borderColor:overCat===cat.id?'#007AFF':'#E5E5EA', background:overCat===cat.id?'#007AFF04':'#FFF', transition:'all .2s' }}>
            <div style=${{ padding:'12px 14px 9px', background:cat.color+'06', borderBottom:'2.5px solid '+cat.color }}>
              <div style=${{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                <div style=${{ display:'flex', alignItems:'center', gap:6 }}><span style=${{ fontSize:16 }}>${cat.emoji}</span><span style=${{ fontSize:14, fontWeight:700 }}>${cat.label}</span></div>
                <span style=${{ background:cat.color+'15', color:cat.color, fontSize:11, fontWeight:700, padding:'2px 8px', borderRadius:6 }}>${cn.length}</span>
              </div>
            </div>
            <div style=${{ flex:1, padding:'7px 8px', overflowY:'auto', display:'flex', flexDirection:'column', gap:6, minHeight:60 }}>
              ${cn.map(note => {
                const voted=note.voters?.includes(user.id); const mine=note.userId===user.id;
                const hidden = hideOthers && !mine;
                if (hidden) return html`
                  <div key=${note.id} style=${{ background:cat.color+'08', borderRadius:12, padding:'10px 12px', border:'1px solid '+cat.color+'15' }}>
                    <div style=${{ display:'flex', flexDirection:'column', gap:5 }}>
                      <div style=${{ height:10, background:cat.color+'25', borderRadius:4, width:'85%', animation:'shimmer 1.5s infinite' }}></div>
                      <div style=${{ height:10, background:cat.color+'20', borderRadius:4, width:'60%', animation:'shimmer 1.5s infinite' }}></div>
                      <div style=${{ display:'flex', alignItems:'center', gap:4, marginTop:2 }}>
                        <div style=${{ width:16, height:16, borderRadius:8, background:cat.color+'30' }}></div>
                        <div style=${{ height:8, background:cat.color+'20', borderRadius:4, width:'40%' }}></div>
                      </div>
                    </div>
                  </div>`;
                return html`
                  <div key=${note.id}
                    draggable=${true}
                    onDragStart=${e=>{setDragId(note.id);e.dataTransfer.effectAllowed='move'}}
                    onTouchStart=${e=>onTouchStart(e,note.id)}
                    onTouchMove=${onTouchMove}
                    onTouchEnd=${onTouchEnd}
                    style=${{ background:cat.bg, borderRadius:12, padding:'10px 12px', border:'1px solid '+cat.color+'15', borderLeft:mine?'3px solid '+cat.color:'1px solid '+cat.color+'15', cursor:'pointer', touchAction:'none', userSelect:'none', opacity:(dragId===note.id||touchInfo?.id===note.id)?0.4:1 }}
                    onClick=${()=>mine&&setNoteModal({...note,_cat:cat})}>
                        <p style=${{ marginBottom:5, fontSize:12, lineHeight:1.4 }}>${note.text}</p>
                        ${showReactions!==false && Object.keys(note.reactions||{}).length > 0 && html`
                          <div style=${{ display:'flex', gap:3, marginBottom:5, flexWrap:'wrap' }}>
                            ${Object.entries(note.reactions||{}).map(([emoji, users]) => users.length > 0 && html`
                              <span key=${emoji} onClick=${e=>{e.stopPropagation();react(note.id, emoji)}} style=${{ padding:'1px 5px', borderRadius:6, background:users.includes(user.id)?cat.color+'20':'#F2F2F7', border:users.includes(user.id)?'1px solid '+cat.color+'40':'1px solid transparent', fontSize:10, cursor:'pointer' }}>${emoji} ${users.length}</span>
                            `)}
                          </div>
                        `}
                        <div style=${{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
                          <div style=${{ display:'flex', alignItems:'center', gap:4 }}>
                            <span style=${{ fontSize:12 }}>${note.userAvatar}</span>
                            <span style=${{ fontSize:10, color:'#86868B' }}>${note.userName}</span>
                          </div>
                          <div style=${{ display:'flex', alignItems:'center', gap:3 }}>
                            ${showReactions!==false && html`
                              <div style=${{ position:'relative' }}>
                                <button
                                  onClick=${e=>{ e.stopPropagation(); document.querySelectorAll('[id^="rpick-"]').forEach(x=>{if(x.id!=='rpick-'+note.id)x.style.display='none';}); const d=document.getElementById('rpick-'+note.id); if(d){const r=e.currentTarget.getBoundingClientRect(); d.style.top=(r.top-8)+'px'; d.style.left=r.left+'px'; d.style.display=d.style.display==='flex'?'none':'flex';} }}
                                  style=${{ border:'none', background:'none', fontSize:14, cursor:'pointer', opacity:.55, padding:'2px 4px', borderRadius:6 }}
                                  onMouseOver=${e=>{e.currentTarget.style.opacity='1';e.currentTarget.style.background='#F2F2F7'}}
                                  onMouseOut=${e=>{e.currentTarget.style.opacity='.55';e.currentTarget.style.background='none'}}>😊</button>
                                <div id=${'rpick-'+note.id} style=${{ display:'none', position:'fixed', zIndex:10000, background:'#FFF',
                                  border:'1.5px solid #E5E5EA', borderRadius:12, padding:8, gap:4,
                                  boxShadow:'0 8px 24px rgba(0,0,0,.18)', flexWrap:'wrap', width:164,
                                  transform:'translateY(-100%) translateY(-8px)' }}>
                                  ${REACTIONS.map(emoji => html`
                                    <button key=${emoji}
                                      onClick=${e=>{ e.stopPropagation(); react(note.id,emoji); document.getElementById('rpick-'+note.id).style.display='none'; }}
                                      style=${{ border:'none', background:'none', fontSize:20, cursor:'pointer', padding:'4px', borderRadius:8, lineHeight:1 }}
                                      onMouseOver=${e=>{e.currentTarget.style.background='#F2F2F7';e.currentTarget.style.transform='scale(1.2)'}}
                                      onMouseOut=${e=>{e.currentTarget.style.background='none';e.currentTarget.style.transform='scale(1)'}}>
                                      ${emoji}
                                    </button>`)}
                                </div>
                              </div>
                            `}
                            <button onClick=${e=>{e.stopPropagation();vote(note.id)}} style=${{ display:'flex', alignItems:'center', gap:3, padding:'2px 8px', borderRadius:6, border:'none', background:voted?cat.color:cat.color+'12', color:voted?'#FFF':cat.color, fontSize:10, fontWeight:700, marginLeft:3 }}>👍 ${note.voters?.length||0}</button>
                          </div>
                        </div>
                  </div>`;
              })}
            </div>
            ${act===cat.id
              ? html`<div style=${{ padding:'7px 8px 8px', borderTop:'1px solid #F2F2F7' }}><textarea autofocus value=${txt} onInput=${e=>setTxt(e.target.value)} onKeyDown=${e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();addN(cat.id)}}} placeholder="Tu reflexión..." style=${{ ...iS, height:52, resize:'none', fontSize:12 }} /><div style=${{ display:'flex', gap:5, marginTop:5 }}><button onClick=${()=>addN(cat.id)} style=${{ ...bP, flex:1, padding:'7px', fontSize:12, background:cat.color }}>Añadir</button><button onClick=${()=>{setAct(null);setTxt('')}} style=${{ ...bS, padding:'7px 10px', fontSize:11 }}>✕</button></div></div>`
              : html`<button onClick=${()=>{setAct(cat.id);setTxt('')}} style=${{ margin:'5px 8px 8px', padding:'8px', borderRadius:9, border:'1.5px dashed '+cat.color+'30', background:'transparent', color:cat.color, fontSize:12, fontWeight:600 }}>+ Añadir nota</button>`}
          </div>`;
      })}
    </div>

    ${noteModal && html`
      <div style=${{position:'fixed',inset:0,zIndex:15000,display:'flex',alignItems:'center',justifyContent:'center',padding:'24px'}}>
        <div onClick=${()=>setNoteModal(null)} style=${{position:'absolute',inset:0,background:'rgba(0,0,0,.18)',backdropFilter:'blur(8px)',WebkitBackdropFilter:'blur(8px)'}}></div>
        <div onClick=${e=>e.stopPropagation()} style=${{position:'relative',background:'#FFF',borderRadius:20,width:'100%',maxWidth:480,boxShadow:'0 12px 48px rgba(0,0,0,.12)',animation:'fadeIn .15s ease',overflow:'hidden'}}>
          <div style=${{padding:'20px 24px 12px',borderBottom:'1px solid #F2F2F7',background:noteModal._cat?.bg||'#FAFAFA',display:'flex',alignItems:'center',gap:10}}>
            <div style=${{width:8,height:8,borderRadius:4,background:noteModal._cat?.color||'#007AFF'}}></div>
            <h3 style=${{fontSize:15,fontWeight:700,margin:0,flex:1}}>${noteModal._cat?.label||'Nota'}</h3>
            <span style=${{fontSize:11,color:'#86868B'}}>${noteModal.userAvatar} ${noteModal.userName}</span>
            <button onClick=${()=>setNoteModal(null)} style=${{border:'none',background:'#F2F2F7',borderRadius:10,width:30,height:30,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',fontSize:14,color:'#86868B'}}>✕</button>
          </div>
          <div style=${{padding:'16px 24px'}}>
            <textarea id="note-edit-area" value=${noteModal.text||''} onInput=${e=>{const nm={...noteModal,text:e.target.value};setNoteModal(nm);}}
              style=${{width:'100%',border:'1.5px solid #E5E5EA',borderRadius:10,padding:'12px 14px',fontSize:14,fontFamily:'inherit',outline:'none',resize:'vertical',minHeight:100,boxSizing:'border-box'}} />
          </div>
          <div style=${{padding:'12px 24px 20px',display:'flex',gap:8,justifyContent:'space-between'}}>
            <button onClick=${()=>{window.__confirm({title:'Eliminar nota',message:'¿Eliminar esta nota?',confirmColor:'#FF3B30',onConfirm:()=>{sN(notes.filter(n=>n.id!==noteModal.id));setNoteModal(null);}});}}
              style=${{padding:'8px 16px',borderRadius:10,border:'1.5px solid #FF3B3015',background:'#FFF5F5',color:'#FF3B30',fontSize:12,fontWeight:600,cursor:'pointer'}}>Eliminar</button>
            <div style=${{display:'flex',gap:8}}>
              <button onClick=${()=>setNoteModal(null)} style=${{padding:'8px 16px',borderRadius:10,border:'1.5px solid #E5E5EA',background:'#FFF',fontSize:12,color:'#6E6E73',cursor:'pointer'}}>Cancelar</button>
              <button onClick=${()=>saveNote(noteModal.id, noteModal.text)}
                style=${{padding:'8px 20px',borderRadius:10,border:'none',background:noteModal._cat?.color||'#007AFF',color:'#FFF',fontSize:12,fontWeight:600,cursor:'pointer'}}>Guardar</button>
            </div>
          </div>
        </div>
      </div>
    `}

    </div>
  `;
}

/* ═══ PHASE 3 ═══ */
function P3({ notes, sN, user }) {
  const [f, setF] = useState('all');
  const fi = [{id:'all',label:'Todas',color:'#1D1D1F'},{id:'mine',label:'Mis notas',color:'#5856D6'}];
  return html`
    <div style=${{ display:'flex', flexDirection:'column', gap:10, height:'100%' }}>
      <div style=${{ display:'flex', gap:5, flexWrap:'wrap' }}>${fi.map(x=>html`<button key=${x.id} onClick=${()=>setF(x.id)} style=${{ padding:'7px 12px', borderRadius:9, border:f===x.id?'none':'1.5px solid #E5E5EA', background:f===x.id?x.color:'#FFF', color:f===x.id?'#FFF':'#6E6E73', fontSize:12, fontWeight:600 }}>${x.label}</button>`)}</div>
      <div style=${{ flex:1 }}><${Board} notes=${notes} sN=${sN} user=${user} filter=${f} showReactions=${true} /></div>
    </div>
  `;
}

/* ═══ PHASE 4: ACTIONS ═══ */
function P4({ notes, actions, risks, sA, user }) {
  const [teamMembers, setTeamMembers] = useState([]);
  useEffect(() => {
    sbLoadTeamMembers().then(data => {
      const filtered = data.filter(m=>(m.rooms||[]).includes(SALA));
      setTeamMembers(filtered.length > 0 ? filtered : data);
    });
  }, []);
  const [detailAction, setDetailAction] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({text:'',owner:'',date:'',priority:'medium',type:'accion_retro'});

  const topN = [...notes].sort((a,b)=>(b.voters?.length||0)-(a.voters?.length||0)).slice(0,15);
  const openRisks = (risks||[]).filter(r => r.status !== 'mitigated');
  const priO = {critical:4,high:3,medium:2,low:1};
  const STS_MAP = {backlog:{l:'Backlog',c:'#86868B'},todo:{l:'Por hacer',c:'#FF9500'},in_progress:{l:'En curso',c:'#007AFF'},done:{l:'Hecho',c:'#34C759'}};

  const createAction = (obj) => {
    sA([...actions,{id:uid(),text:(obj.text||'').trim(),owner:obj.owner||'',date:obj.date||'',status:'backlog',priority:obj.priority||'medium',voteScore:0,createdBy:user.id,fromCategory:null,noteId:obj.noteId||null,riskId:obj.riskId||null,source:obj.source||'manual',type:obj.type||'accion_retro',createdAt:new Date().toISOString()}]);
  };
  const togNote = n => { const ex=actions.find(a=>a.noteId===n.id); if(ex)sA(actions.filter(a=>a.noteId!==n.id)); else createAction({text:n.text,source:'retro',noteId:n.id,priority:n.voters?.length>=5?'high':n.voters?.length>=2?'medium':'low'}); };
  const togRisk = r => { const ex=actions.find(a=>a.riskId===r.id); if(ex)sA(actions.filter(a=>a.riskId!==r.id)); else createAction({text:'Mitigar: '+r.text,owner:r.owner||'',source:'risk',riskId:r.id,priority:(r.impact||'medio')==='alto'?'high':'medium',type:'tarea'}); };
  const updA = (id, patch) => sA(actions.map(a=>a.id===id?{...a,...patch}:a));
  const delA = id => window.__confirm({title:'Eliminar accionable',message:'Se eliminara de la retro.',onConfirm:()=>sA(actions.filter(a=>a.id!==id))});

  return html`
    <div data-p="actions" style=${{ maxWidth:'100%' }}>
      <div style=${{ display:'flex', alignItems:'center', gap:10, marginBottom:12 }}>
        <h3 style=${{ fontSize:16, fontWeight:700, margin:0 }}>Accionables</h3>
        <span style=${{ fontSize:11, background:'#007AFF12', color:'#007AFF', padding:'2px 8px', borderRadius:8, fontWeight:600 }}>${actions.filter(a=>a.status!=='done').length} abiertos</span>
        <div style=${{ flex:1 }}></div>
        <button onClick=${()=>{setForm({text:'',owner:'',date:'',priority:'medium',type:'accion_retro'});setShowForm(true)}}
          style=${{ padding:'7px 14px', borderRadius:9, border:'none', background:'#1D1D1F', color:'#FFF', fontSize:12, fontWeight:600, cursor:'pointer' }}>+ Crear accionable</button>
      </div>

    if (!text.trim()) return;
    sR([...risks, { id:uid(), text:text.trim(), type:type||'riesgo', impact:'medio', prob:(type||'riesgo')==='problema'?'alta':'media', mitigation:'', owner:'', status:'open', impactVotes:{}, probVotes:{}, createdBy:user.id, createdAt:new Date().toISOString() }]);
  };

    const ex = risks.find(r => r.fromNote === note.id);
    if (ex) sR(risks.filter(r => r.fromNote !== note.id));
    else sR([...risks, { id:uid(), text:note.text, type:'riesgo', impact:'medio', prob:'media', mitigation:'', owner:'', status:'open', impactVotes:{}, probVotes:{}, fromNote:note.id, createdBy:user.id, createdAt:new Date().toISOString() }]);
