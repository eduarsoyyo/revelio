<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#5856D6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="url(#shine)"/>

  <!-- Letter r -->
  <text x="256" y="370" text-anchor="middle" font-family="Comfortaa,sans-serif" font-size="340" font-weight="300" fill="white">r</text>

  <!-- Wand spark at tip of r (top right) -->
  <g filter="url(#glow)">
    <!-- Main star -->
    <path d="M340 130 L345 115 L350 130 L365 135 L350 140 L345 155 L340 140 L325 135Z" fill="white">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="scale" values="0.8;1.2;0.8" dur="2s" repeatCount="indefinite" additive="sum" origin="345 135"/>
    </path>
    <!-- Small sparkles -->
    <circle cx="370" cy="110" r="3" fill="white">
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="315" cy="118" r="2.5" fill="white">
      <animate attributeName="opacity" values="0;0.8;0" dur="1.8s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="358" cy="155" r="2" fill="white">
      <animate attributeName="opacity" values="0;0.7;0" dur="2.2s" begin="1.1s" repeatCount="indefinite"/>
    </circle>
    <!-- Trail line (wand trace) -->
    <line x1="300" y1="165" x2="345" y2="130" stroke="white" stroke-width="1.5" stroke-linecap="round">
      <animate attributeName="opacity" values="0;0.5;0" dur="3s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>
